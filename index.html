<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Space Invaders Game</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Arial', sans-serif;
            background-color: #000;
            color: #0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100dvh; /* Dynamic viewport height for mobile UI consideration */
            min-height: 100vh; /* Fallback for older browsers */
            width: 100vw;
            position: relative;
            overflow: hidden; /* コンテンツがボディからはみ出るのを防ぐ */
            /* スマホのノッチやホームバー領域に対応 */
            padding-top: env(safe-area-inset-top, 0);
            padding-right: env(safe-area-inset-right, 0);
            padding-bottom: env(safe-area-inset-bottom, 0);
            padding-left: env(safe-area-inset-left, 0);
        }

        /* 背景動画 */
        #background-video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover; /* アスペクト比を維持しつつ、要素全体を覆うように拡大・縮小 */
            z-index: -2; /* canvasより奥に、bodyの背景よりは手前に */
            display: none; /* 初期状態はJSで制御 */
        }

        /* ゲームコンテナ - キャンバスと動画、UI要素を内包 */
        #gameContainer {
            position: relative;
            overflow: hidden;
            border: 2px solid #0f0;
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.8);
            z-index: 1;
            margin: auto; /* 画面中央に配置 */

            /* ゲームのアスペクト比を常に維持 (幅:高さ = 9:19.5) */
            aspect-ratio: 9 / 19.5; 
            
            /* ★修正: 幅をビューポート幅の90%または最大420pxに制限する */
            /* これは、スマートフォンの画面幅にフィットさせつつ、PCで過度に大きくならないようにします */
            width: min(90vw, 420px);
            
            /* 高さは幅とアスペクト比から自動的に計算されるようにする */
            height: auto; 

            /* ★追加: 高さがビューポート高さを超えないように制限する */
            /* これは、縦長のスマホ画面で、幅から計算された高さが画面をはみ出さないようにします */
            max-height: 95dvh; 
            max-height: 95vh; /* Fallback for older browsers */

            /* これまでの max-width と max-height を min() で結合した複雑な定義は不要になります */
        }

        /* キャンバス */
        canvas {
            display: block; /* インライン要素による余白を削除 */
            width: 100%;
            height: 100%;
            background-color: transparent; /* 動画を背景として表示するため透明に */
        }

        /* スタートボタンコンテナ */
        #startButtonContainer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: rgba(0, 0, 0, 0.8);
            z-index: 10; /* ゲームより手前に表示 */
            color: #0f0;
            text-align: center;
        }

        #startButton {
            background-color: #0f0;
            color: #000;
            border: none;
            padding: 15px 30px;
            font-size: 1.5em;
            cursor: pointer;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.7);
            transition: background-color 0.3s, transform 0.3s;
        }

        #startButton:hover {
            background-color: #0a0;
            transform: scale(1.05);
        }

        /* メッセージボックス */
        #messageBox {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: rgba(30, 30, 30, 0.9);
            padding: 20px 30px;
            border-radius: 10px;
            border: 2px solid #0f0;
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.8);
            text-align: center;
            z-index: 11;
            display: none; /* 初期状態は非表示 */
            color: #0f0;
            font-size: 1.5em;
        }

        #messageBox button {
            margin-top: 15px;
            background-color: #0f0;
            color: #000;
            border: none;
            padding: 10px 20px;
            font-size: 1em;
            cursor: pointer;
            border-radius: 5px;
            box-shadow: 0 0 8px rgba(0, 255, 0, 0.7);
            transition: background-color 0.3s, transform 0.3s;
        }

        #messageBox button:hover {
            background-color: #0a0;
            transform: scale(1.05);
        }

        /* ボリュームスライダーとラベル */
        #volumeControl {
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #volumeControl label {
            margin-bottom: 5px;
            font-size: 0.9em;
        }

        #volumeSlider {
            -webkit-appearance: none; /* デフォルトのスタイルをリセット */
            width: 80%;
            height: 8px;
            background: #555;
            outline: none;
            border-radius: 4px;
            cursor: pointer;
        }

        #volumeSlider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            background: #0f0;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 5px rgba(0, 255, 0, 0.7);
        }

        #volumeSlider::-moz-range-thumb {
            width: 20px;
            height: 20px;
            background: #0f0;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 5px rgba(0, 255, 0, 0.7);
        }

        /* スコア、ライフ、レベル表示 */
        .game-info {
            position: absolute;
            color: #0f0;
            font-weight: bold;
            /* ゲーム画面の比率に合わせてフォントサイズを調整 */
            font-size: 3vw; /* ビューポートの幅に応じて調整 */
            text-shadow: 0 0 5px rgba(0, 255, 0, 0.5);
            white-space: nowrap; /* テキストの折り返しを防ぐ */
        }

        #score {
            top: 2%;
            left: 2%;
        }

        #lives {
            top: 2%;
            right: 2%;
        }

        #level {
            bottom: 2%;
            left: 2%;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <video id="background-video" loop muted playsinline>
            <source src="video/background_loop.mp4" type="video/mp4">
            お使いのブラウザは動画をサポートしていません。
        </video>
        <canvas id="gameCanvas"></canvas>
        <div id="startButtonContainer">
            <h1>SPACE INVADERS</h1>
            <p>Improved</p>
            <button id="startButton">TAP TO START</button>
            <div id="volumeControl">
                <label for="volumeSlider">Volume</label>
                <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="0.5">
            </div>
        </div>
        <div id="messageBox"></div>
        <div id="score" class="game-info">Score: 0</div>
        <div id="lives" class="game-info">Lives: 3</div>
        <div id="level" class="game-info">Level: 1</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/howler/2.2.3/howler.min.js"></script>
    <script>
        // 定数
        const GAME_WIDTH = 420;
        const GAME_HEIGHT = GAME_WIDTH * (19.5 / 9); // 縦長のゲーム用アスペクト比

        const PLAYER_WIDTH = 40;
        const PLAYER_HEIGHT = 40;
        const PLAYER_SPEED = 5;
        const PLAYER_BULLET_SPEED = 10;

        const INVADER_WIDTH = 30;
        const INVADER_HEIGHT = 30;
        const INVADER_ROWS = 5;
        const INVADERS_PER_ROW = 8;
        const INVADER_DROP_SPEED = 10;
        const INVADER_BULLET_SPEED = 5;
        const INVADER_BULLET_FREQUENCY = 0.02; // 調整可能：弾の発射頻度

        const MAX_INVADER_BULLETS = 5; // 同時に存在するインベーダー弾の最大数

        const CANVAS_BORDER_THICKNESS = 2; // CSSのボーダーの太さに合わせる

        const GAME_STATE = {
            START_SCREEN: 'start_screen',
            PLAYING: 'playing',
            PAUSED: 'paused',
            GAME_OVER: 'game_over',
            LEVEL_CLEAR: 'level_clear',
        };

        // DOM要素の取得
        const gameCanvas = document.getElementById('gameCanvas');
        const ctx = gameCanvas.getContext('2d');
        const startButtonContainer = document.getElementById('startButtonContainer');
        const startButton = document.getElementById('startButton');
        const messageBox = document.getElementById('messageBox');
        const backgroundVideo = document.getElementById('background-video');
        const volumeSlider = document.getElementById('volumeSlider');
        const scoreDisplay = document.getElementById('score');
        const livesDisplay = document.getElementById('lives');
        const levelDisplay = document.getElementById('level');

        // ゲーム変数
        let player;
        let bullets = [];
        let invaders = [];
        let invaderBullets = [];
        let score = 0;
        let lives = 3;
        let level = 1;
        let currentGameState = GAME_STATE.START_SCREEN;
        let lastFrameTime = 0;
        let input = {
            left: false,
            right: false,
            space: false,
            touchX: null,
            touchY: null,
            touchStartTime: 0,
            touchThreshold: 100, // タップとホールドの区別時間 (ms)
            isHolding: false,
            lastTapTime: 0,
            doubleTapDelay: 300, // ダブルタップ判定の時間 (ms)
        };
        let animationFrameId;
        let loadedImages = {};
        let loadedSounds = {};
        let isInitialStartTapDone = false; // 最初のタップが済んだかどうか

        // 画像の読み込み
        async function loadImage(name, src) {
            return new Promise((resolve, reject) => {
                const img = new Image();
                img.src = src;
                img.onload = () => {
                    loadedImages[name] = img;
                    resolve(img);
                };
                img.onerror = (e) => {
                    console.error(`Error loading assets: Failed to load image: ${src} (${e})`);
                    reject(new Error(`Failed to load image: ${src}`));
                };
            });
        }

        // サウンドの読み込み
        function loadSound(name, src, loop = false, volume = 0.5) {
            loadedSounds[name] = new Howl({
                src: [src],
                loop: loop,
                volume: volume,
                html5: true, // モバイルデバイスでの互換性向上
                preload: true,
                onload: () => { /* console.log(`Sound ${name} loaded.`); */ },
                onloaderror: (id, err) => { console.error(`Error loading sound ${name}:`, err); }
            });
        }

        // アセットの読み込み
        async function loadAssets() {
            try {
                await Promise.all([
                    loadImage('player', 'image/player.png'),
                    loadImage('invader1', 'image/invader1.png'),
                    loadImage('invader2', 'image/invader2.png'),
                    loadImage('invader3', 'image/invader3.png'),
                    loadImage('boss_explosion', 'image/explosion.png'), // 爆発画像をボス爆発として使用
                ]);

                loadSound('bgm', 'audio/bgm_amelo1.mp3', true, volumeSlider.value); // BGM
                loadSound('player_shoot', 'audio/shoot.mp3', false, 0.5); // プレイヤーのショット音
                loadSound('invader_shoot', 'audio/invader_shoot.mp3', false, 0.5); // インベーダーのショット音
                loadSound('explosion', 'audio/explosion.mp3', false, 0.7); // 爆発音
                loadSound('hit', 'audio/hit.mp3', false, 0.7); // ヒット音

                console.log("All assets loaded successfully.");
            } catch (error) {
                console.error("Failed to load some assets:", error);
                showMessage("アセットの読み込みに失敗しました。<br>ページをリロードしてください。", "reload");
            }
        }

        // ゲーム要素クラス
        class Player {
            constructor() {
                this.width = PLAYER_WIDTH;
                this.height = PLAYER_HEIGHT;
                this.x = (GAME_WIDTH - this.width) / 2;
                this.y = GAME_HEIGHT - this.height - 20;
                this.lives = lives;
                this.image = loadedImages['player'];
            }

            draw() {
                if (this.image) {
                    ctx.drawImage(this.image, this.x, this.y, this.width, this.height);
                } else {
                    ctx.fillStyle = 'blue';
                    ctx.fillRect(this.x, this.y, this.width, this.height);
                }
            }

            update(deltaTime) {
                const moveAmount = PLAYER_SPEED * deltaTime;
                if (input.left) {
                    this.x -= moveAmount;
                }
                if (input.right) {
                    this.x += moveAmount;
                }

                // タッチ操作での移動
                if (input.touchX !== null) {
                    // タッチしているX座標の中心に移動
                    const targetX = input.touchX - (this.width / 2);
                    this.x += (targetX - this.x) * 0.2; // 滑らかな移動
                }

                // 画面端の制限
                if (this.x < 0) this.x = 0;
                if (this.x + this.width > GAME_WIDTH) this.x = GAME_WIDTH - this.width;
            }

            shoot() {
                // プレイヤー弾の最大数を制限（例：3発）
                if (bullets.length < 3) {
                    bullets.push(new Bullet(this.x + this.width / 2 - 2.5, this.y, -PLAYER_BULLET_SPEED, 'player'));
                    if (loadedSounds['player_shoot']) {
                        loadedSounds['player_shoot'].play();
                    }
                }
            }
        }

        class Bullet {
            constructor(x, y, speed, type) {
                this.x = x;
                this.y = y;
                this.width = 5;
                this.height = 10;
                this.speed = speed;
                this.type = type; // 'player' or 'invader'
                this.color = (type === 'player') ? 'lime' : 'red';
            }

            draw() {
                ctx.fillStyle = this.color;
                ctx.fillRect(this.x, this.y, this.width, this.height);
            }

            update(deltaTime) {
                this.y += this.speed * deltaTime;
            }
        }

        class Invader {
            constructor(x, y, type) {
                this.x = x;
                this.y = y;
                this.width = INVADER_WIDTH;
                this.height = INVADER_HEIGHT;
                this.type = type; // 1, 2, 3などで画像の切り替え
                this.image = loadedImages[`invader${type}`];
                this.health = 1; // 初期ヘルス
                this.isBoss = false; // ボスかどうかのフラグ
                this.animationFrame = 0; // アニメーションフレーム
                this.animationSpeed = 0.1; // アニメーション速度
            }

            draw() {
                if (this.image) {
                    ctx.drawImage(this.image, this.x, this.y, this.width, this.height);
                } else {
                    ctx.fillStyle = 'green';
                    ctx.fillRect(this.x, this.y, this.width, this.height);
                }
            }

            update(dx, dy) {
                this.x += dx;
                this.y += dy;
                this.animationFrame = (this.animationFrame + this.animationSpeed) % 2; // アニメーションの切り替え
            }

            shoot() {
                if (invaderBullets.length < MAX_INVADER_BULLETS) {
                    invaderBullets.push(new Bullet(this.x + this.width / 2 - 2.5, this.y + this.height, INVADER_BULLET_SPEED, 'invader'));
                    if (loadedSounds['invader_shoot']) {
                        loadedSounds['invader_shoot'].play();
                    }
                }
            }
        }

        class BossInvader extends Invader {
            constructor(x, y) {
                super(x, y, 3); // タイプ3のインベーダーをボスとして使用
                this.width = INVADER_WIDTH * 1.5; // ボスは大きく
                this.height = INVADER_HEIGHT * 1.5;
                this.health = 10; // ボスのヘルス
                this.isBoss = true;
                this.image = loadedImages['boss_explosion']; // 仮に爆発画像をボスとして表示
            }

            draw() {
                if (this.image) {
                    ctx.drawImage(this.image, this.x, this.y, this.width, this.height);
                } else {
                    ctx.fillStyle = 'purple'; // ボスの色
                    ctx.fillRect(this.x, this.y, this.width, this.height);
                }
            }
        }

        // ゲームの初期化
        function initGame() {
            gameCanvas.width = GAME_WIDTH;
            gameCanvas.height = GAME_HEIGHT;

            // 描画をクリアして背景を透明に保つ
            ctx.clearRect(0, 0, GAME_WIDTH, GAME_HEIGHT);

            player = new Player();
            bullets = [];
            invaders = [];
            invaderBullets = [];
            score = 0;
            lives = 3;
            level = 1;
            updateGameInfo(); // UIの初期化
        }

        // インベーダーの生成
        function createInvaders() {
            invaders = [];
            const startX = (GAME_WIDTH - INVADERS_PER_ROW * (INVADER_WIDTH + 10)) / 2; // 中央寄せ
            for (let row = 0; row < INVADER_ROWS; row++) {
                for (let col = 0; col < INVADERS_PER_ROW; col++) {
                    const invaderType = (row % 3) + 1; // 3種類のインベーダーを交互に配置
                    invaders.push(new Invader(
                        startX + col * (INVADER_WIDTH + 10),
                        50 + row * (INVADER_HEIGHT + 10),
                        invaderType
                    ));
                }
            }
            // レベルに応じてボスを追加 (例: レベル3ごとにボス出現)
            if (level > 1 && level % 3 === 0) {
                const bossX = (GAME_WIDTH - (INVADER_WIDTH * 1.5)) / 2; // ボスを中央に配置
                invaders.push(new BossInvader(bossX, 20)); // 画面上部にボスを配置
            }
        }

        // ゲーム情報UIの更新
        function updateGameInfo() {
            scoreDisplay.textContent = `Score: ${score}`;
            livesDisplay.textContent = `Lives: ${player.lives}`;
            levelDisplay.textContent = `Level: ${level}`;
        }

        // ゲームループ
        function gameLoop(currentTime) {
            if (currentGameState !== GAME_STATE.PLAYING) {
                animationFrameId = requestAnimationFrame(gameLoop);
                return;
            }

            const deltaTime = (currentTime - lastFrameTime) / 1000; // 秒単位
            lastFrameTime = currentTime;

            // 更新
            player.update(deltaTime);

            bullets = bullets.filter(bullet => {
                bullet.update(deltaTime);
                return bullet.y > -bullet.height; // 画面外に出た弾を削除
            });

            invaderBullets = invaderBullets.filter(bullet => {
                bullet.update(deltaTime);
                return bullet.y < GAME_HEIGHT; // 画面外に出た弾を削除
            });

            // インベーダーの移動
            let invaderMoveX = (level * 2 + 1) * deltaTime; // レベルが上がると速くなる
            let invaderMoveY = 0;
            let shouldDrop = false;

            for (let i = 0; i < invaders.length; i++) {
                const invader = invaders[i];
                // インベーダーが画面端に達したら方向を反転
                if (invader.x + invader.width > GAME_WIDTH || invader.x < 0) {
                    invaderMoveX *= -1; // 全体の移動方向を反転
                    shouldDrop = true;
                    break; // 他のインベーダーも同じ方向に移動させるためループを抜ける
                }
            }
            for (let i = 0; i < invaders.length; i++) {
                const invader = invaders[i];
                invader.update(invaderMoveX, shouldDrop ? INVADER_DROP_SPEED : 0);

                // インベーダーの弾発射
                if (Math.random() < INVADER_BULLET_FREQUENCY) {
                    invader.shoot();
                }

                // インベーダーがプレイヤーの高さに到達したらゲームオーバー
                if (invader.y + invader.height > player.y) {
                    endGame('game_over');
                    return;
                }
            }

            // 衝突判定
            checkCollisions();

            // 描画
            draw();

            animationFrameId = requestAnimationFrame(gameLoop);
        }

        // 衝突判定
        function checkCollisions() {
            // プレイヤーの弾とインベーダーの衝突
            bullets.forEach((bullet, bulletIndex) => {
                if (bullet.type === 'player') {
                    invaders.forEach((invader, invaderIndex) => {
                        if (
                            bullet.x < invader.x + invader.width &&
                            bullet.x + bullet.width > invader.x &&
                            bullet.y < invader.y + invader.height &&
                            bullet.y + bullet.height > invader.y
                        ) {
                            // 衝突
                            if (loadedSounds['hit']) {
                                loadedSounds['hit'].play();
                            }

                            invader.health--;
                            bullets.splice(bulletIndex, 1); // 弾を削除

                            if (invader.health <= 0) {
                                // 爆発エフェクトなど追加可能
                                if (loadedSounds['explosion']) {
                                    loadedSounds['explosion'].play();
                                }
                                if (invader.isBoss) {
                                    score += 500; // ボス撃破で高得点
                                } else {
                                    score += 10;
                                }
                                invaders.splice(invaderIndex, 1); // インベーダーを削除
                            }
                        }
                    });
                }
            });

            // インベーダーの弾とプレイヤーの衝突
            invaderBullets.forEach((bullet, bulletIndex) => {
                if (bullet.type === 'invader') {
                    if (
                        bullet.x < player.x + player.width &&
                        bullet.x + bullet.width > player.x &&
                        bullet.y < player.y + player.height &&
                        bullet.y + bullet.height > player.y
                    ) {
                        // 衝突
                        if (loadedSounds['explosion']) {
                            loadedSounds['explosion'].play(); // プレイヤーが当たった時の音
                        }
                        player.lives--;
                        invaderBullets.splice(bulletIndex, 1); // 弾を削除
                        updateGameInfo();

                        if (player.lives <= 0) {
                            endGame('game_over');
                        }
                    }
                }
            });

            // インベーダーが全滅したらレベルクリア
            if (invaders.length === 0) {
                endGame('level_clear');
            }
        }

        // 描画
        function draw() {
            ctx.clearRect(0, 0, GAME_WIDTH, GAME_HEIGHT); // 全体をクリア

            player.draw();
            bullets.forEach(bullet => bullet.draw());
            invaders.forEach(invader => invader.draw());
            invaderBullets.forEach(bullet => bullet.draw());
        }

        // ゲームの開始
        function startGame(startNewGame = false) {
            if (startNewGame) {
                initGame(); // ゲームデータをリセット
            }
            createInvaders(); // インベーダーを生成
            currentGameState = GAME_STATE.PLAYING;
            startButtonContainer.style.display = 'none';
            messageBox.style.display = 'none';
            gameCanvas.style.display = 'block'; // キャンバスを表示
            backgroundVideo.style.display = 'block'; // 動画を表示

            if (loadedSounds['bgm'] && !loadedSounds['bgm'].playing()) {
                loadedSounds['bgm'].play();
            }
            lastFrameTime = performance.now();
            animationFrameId = requestAnimationFrame(gameLoop);
        }

        // ゲームの一時停止
        function pauseGame() {
            if (currentGameState === GAME_STATE.PLAYING) {
                currentGameState = GAME_STATE.PAUSED;
                cancelAnimationFrame(animationFrameId);
                showMessage("PAUSED", "resume");
                if (loadedSounds['bgm'] && loadedSounds['bgm'].playing()) {
                    loadedSounds['bgm'].pause();
                }
            } else if (currentGameState === GAME_STATE.PAUSED) {
                currentGameState = GAME_STATE.PLAYING;
                messageBox.style.display = 'none';
                if (loadedSounds['bgm'] && !loadedSounds['bgm'].playing()) {
                    loadedSounds['bgm'].play();
                }
                lastFrameTime = performance.now(); // 一時停止からの再開時にdeltaTimeが巨大になるのを防ぐ
                animationFrameId = requestAnimationFrame(gameLoop);
            }
        }

        // ゲームの終了 (ゲームオーバー / レベルクリア)
        function endGame(reason) {
            cancelAnimationFrame(animationFrameId);
            if (loadedSounds['bgm'] && loadedSounds['bgm'].playing()) {
                loadedSounds['bgm'].stop(); // BGMを停止
            }

            gameCanvas.style.display = 'none'; // キャンバスを非表示
            backgroundVideo.style.display = 'none'; // 動画を非表示

            if (reason === 'game_over') {
                showMessage("GAME OVER! Score: " + score, "play_again");
                currentGameState = GAME_STATE.GAME_OVER;
            } else if (reason === 'level_clear') {
                level++;
                showMessage(`Level ${level-1} Clear! Score: ${score}`, "next_level");
                currentGameState = GAME_STATE.LEVEL_CLEAR;
            }
        }

        // メッセージボックスの表示
        function showMessage(msg, type) {
            messageBox.innerHTML = `<h2>${msg}</h2>`;
            if (type === 'play_again') {
                messageBox.innerHTML += '<button id="playAgainButton">PLAY AGAIN</button>';
                assignPlayAgainButtonHandler('showStartScreen'); // ★修正: assignPlayAgainHandler -> assignPlayAgainButtonHandler
            } else if (type === 'next_level') {
                messageBox.innerHTML += '<button id="nextLevelButton">Next Level (' + level + ')</button>';
                assignPlayAgainButtonHandler('startGameNextLevel'); // ★修正: assignPlayAgainHandler -> assignPlayAgainButtonHandler
            } else if (type === 'resume') {
                messageBox.innerHTML += '<button id="resumeButton">RESUME</button>';
                document.getElementById('resumeButton').onclick = pauseGame;
            } else if (type === 'reload') {
                messageBox.innerHTML += '<button id="reloadButton">Reload Page</button>';
                document.getElementById('reloadButton').onclick = () => location.reload();
            }
            messageBox.style.display = 'block';
        }

        // "Play Again" / "Next Level" ボタンのイベントハンドラ割り当て
        function assignPlayAgainButtonHandler(action) {
            const button = document.getElementById('playAgainButton') || document.getElementById('nextLevelButton');
            if (button) {
                button.onclick = () => {
                    if (action === 'showStartScreen') {
                        showStartButton(); // ゲームオーバー後、スタート画面に戻る
                    } else if (action === 'startGameNextLevel') {
                        startGame(false); // レベルクリア後、新しいレベルでゲームを続ける
                    }
                };
            }
        }

        // スタートボタンの表示
        function showStartButton() {
            startButtonContainer.style.display = 'flex';
            messageBox.style.display = 'none';
            gameCanvas.style.display = 'none';

            if (backgroundVideo) {
                backgroundVideo.style.display = 'block';
                backgroundVideo.currentTime = 0; // 動画を最初から再生
                backgroundVideo.muted = true; // ★自動再生のため常にミュートにしておく
                backgroundVideo.style.zIndex = -2;
            }

            currentGameState = GAME_STATE.START_SCREEN;
            startButton.innerText = "TAP TO START";
            isInitialStartTapDone = false; // 最初のタップ状態をリセット
            
            // BGMの再生がブロックされる場合があるので、ここでボリュームを初期化し、再生はボタンタップに委ねる
            if (loadedSounds['bgm']) {
                loadedSounds['bgm'].volume(volumeSlider.value);
                if (loadedSounds['bgm'].playing()) {
                    loadedSounds['bgm'].stop(); // 既に再生中なら停止
                }
            }
        }

        // イベントリスナー
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') input.left = true;
            if (e.key === 'ArrowRight') input.right = true;
            if (e.key === ' ') input.space = true; // スペースキーでの弾発射
            if (e.key === 'p' || e.key === 'P') pauseGame(); // Pキーで一時停止
        });

        document.addEventListener('keyup', (e) => {
            if (e.key === 'ArrowLeft') input.left = false;
            if (e.key === 'ArrowRight') input.right = false;
            if (e.key === ' ') {
                if (currentGameState === GAME_STATE.PLAYING) {
                    player.shoot();
                }
                input.space = false;
            }
        });

        // タッチ操作
        gameCanvas.addEventListener('touchstart', (e) => {
            e.preventDefault(); // デフォルトのブラウザスクロールなどを防ぐ
            if (currentGameState === GAME_STATE.PLAYING) {
                const touch = e.touches[0];
                input.touchX = touch.clientX - gameCanvas.getBoundingClientRect().left;
                input.touchY = touch.clientY - gameCanvas.getBoundingClientRect().top;
                input.touchStartTime = performance.now();
                input.isHolding = true;

                // ダブルタップによるショット (実験的)
                const currentTime = performance.now();
                if (currentTime - input.lastTapTime < input.doubleTapDelay) {
                    player.shoot();
                    input.lastTapTime = 0; // リセットして連続発射を防ぐ
                } else {
                    input.lastTapTime = currentTime;
                }
            }
        }, { passive: false }); // passive: false で preventDefault を有効にする

        gameCanvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            if (currentGameState === GAME_STATE.PLAYING && input.isHolding) {
                const touch = e.touches[0];
                input.touchX = touch.clientX - gameCanvas.getBoundingClientRect().left;
                input.touchY = touch.clientY - gameCanvas.getBoundingClientRect().top;
            }
        }, { passive: false });

        gameCanvas.addEventListener('touchend', (e) => {
            if (currentGameState === GAME_STATE.PLAYING) {
                input.touchX = null;
                input.touchY = null;
                input.isHolding = false;

                // ホールドが短時間ならショット（シングルタップ）
                if (performance.now() - input.touchStartTime < input.touchThreshold) {
                    // ダブルタップで既に発射されている場合は発射しない
                    if (performance.now() - input.lastTapTime > input.doubleTapDelay || input.lastTapTime === 0) {
                        player.shoot();
                    }
                }
            }
        });

        // スタートボタンタップ処理
        startButton.addEventListener('click', handleStartButtonTap);

        function handleStartButtonTap() {
            if (currentGameState === GAME_STATE.START_SCREEN) {
                if (!isInitialStartTapDone) {
                    // 1回目のタップ：動画再生とボタンテキスト変更
                    if (backgroundVideo) {
                        backgroundVideo.muted = false; // ここでミュート解除
                        backgroundVideo.volume = volumeSlider.value; // スライダーの値に設定
                        // promiseをcatchしてエラーをハンドル
                        backgroundVideo.play().catch(err => {
                            console.error("Video playback error on first tap:", err);
                            // 自動再生がブロックされた場合の代替処理（例：動画を非表示にする、ゲームをすぐに開始するなど）
                            // backgroundVideo.style.display = 'none';
                            // startGame(true); // もし自動再生がブロックされたらすぐにゲーム開始するなら
                        });
                    }
                    // BGMもここで再生を試みる
                    if (loadedSounds['bgm']) {
                        loadedSounds['bgm'].volume(volumeSlider.value);
                        loadedSounds['bgm'].play().catch(err => {
                            console.error("BGM playback error on first tap:", err);
                        });
                    }
                    startButton.innerText = "START GAME";
                    isInitialStartTapDone = true;
                } else {
                    // 2回目のタップ：ゲーム開始
                    startGame(true);
                }
            }
        }

        // ボリュームスライダーのイベントリスナー
        volumeSlider.addEventListener('input', (e) => {
            const volume = parseFloat(e.target.value);
            Howler.volume(volume); // Howler.js全体のボリュームを調整
            if (backgroundVideo) {
                backgroundVideo.volume = volume; // 動画のボリュームも調整
            }
        });


        // 初期ロード時の処理
        window.onload = async () => {
            initGame(); // ゲームの初期設定（canvasサイズなど）
            await loadAssets(); // アセットを先に読み込む
            showStartButton(); // スタート画面を表示
        };

        // ウィンドウのリサイズ対応
        window.addEventListener('resize', () => {
            // ここでゲームの論理的なサイズは変更せず、CSSによるスケールに任せる
            // 必要に応じて、要素の位置調整などを行う
            updateGameInfo(); // UIの位置が相対的なので、再計算は不要だが、念のため
        });

    </script>
</body>
</html>

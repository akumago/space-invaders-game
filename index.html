<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Improved Space Invaders</title>
    <style>
        /* 全体のリセットと基本設定 */
        html, body {
            margin: 0;
            padding: 0;
            overflow: hidden; /* スクロール禁止 */
            background-color: #000; /* デフォルトの背景色を黒に設定（ゲーム画面外） */
            font-family: 'Arial', sans-serif;
            color: #fff;
            -webkit-user-select: none; /* テキスト選択無効化 (iOS) */
            -moz-user-select: none; /* テキスト選択無効化 (Firefox) */
            -ms-user-select: none; /* テキスト選択無効化 (IE/Edge) */
            user-select: none; /* テキスト選択無効化 (標準) */
            -webkit-tap-highlight-color: rgba(0,0,0,0); /* タップ時のハイライトを無効化 (iOS) */
        }

        /* 画面中央にゲームコンテンツを配置するためのFlexbox */
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh; /* 画面全体の高さ */
            width: 100vw; /* 画面全体の幅 */
            position: relative; /* 子要素の絶対配置の基準 */
        }

        /* ゲームコンテナ - キャンバスと動画、UI要素を内包 */
        #gameContainer {
            position: relative; /* 子要素（canvas, video）の基準 */
            width: 420px; /* GAME_WIDTHと同期 */
            height: calc(420px * (19.5 / 9)); /* GAME_HEIGHTと同期 */
            overflow: hidden; /* はみ出たコンテンツを隠す */
            border: 2px solid #0f0; /* ゲーム画面の枠線 */
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.8);
            z-index: 1; /* 他のUIより手前 */
            margin: auto; /* 画面中央に配置 */
            box-sizing: border-box; /* パディングとボーダーを幅と高さに含める */
        }

        /* スマートフォンなど、画面幅が768px以下のデバイスにのみ適用するスタイル */
        @media (max-width: 768px) {
            #gameContainer {
                width: min(100vw, calc(100vh * (9 / 19.5)));
                height: min(calc(100vw * (19.5 / 9)), 100vh);
                /* safe-area-inset は必要に応じて追加してください。
                   現状のコードにはないので今回は含めません。
                padding-top: env(safe-area-inset-top);
                padding-bottom: env(safe-area-inset-bottom);
                padding-left: env(safe-area-inset-left);
                padding-right: env(safe-area-inset-right);
                */
            }
        }

        /* ゲームキャンバス */
        #gameCanvas {
            position: absolute; /* gameContainerを基準に配置 */
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block; /* 初期状態はJSで制御 */
            z-index: 0; /* 動画より手前 */
            background-color: lightgray; /* ゲームプレイ中の背景色をライトグレーに設定 */
        }

        /* 背景動画 - gameContainerのサイズに合わせる */
        #background-video {
            position: absolute; /* gameContainerを基準に配置 */
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover; /* 縦横比を維持しつつ要素を覆う */
            filter: brightness(0.5); /* 少し暗くして見やすくする */
            z-index: -1; /* キャンバスより奥に配置 */
            display: block; /* 初期状態はJSで制御 */
        }

        /* スコア、ライフ、レベル表示 */
        #score, #lives, #level {
            position: absolute;
            font-size: 1.2em;
            font-weight: bold;
            color: #0f0;
            text-shadow: 0 0 5px #0f0;
            z-index: 2; /* ゲーム要素より手前 */
            padding: 5px 10px;
            background-color: rgba(0, 0, 0, 0.5);
            border-radius: 5px;
        }
        #score { top: 10px; left: 10px; }
        #lives { top: 10px; right: 10px; }
        #level { bottom: 10px; left: 10px; }

        /* メッセージボックス (ゲームオーバー/クリア時) */
        #messageBox {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: rgba(0, 0, 0, 0.8);
            border: 2px solid #0f0;
            padding: 20px;
            text-align: center;
            z-index: 3;
            display: none;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.8);
            max-width: 80%;
            box-sizing: border-box; /* パディングを含めて幅を計算 */
        }
        #messageBox p {
            margin: 0 0 20px 0;
            font-size: 1.5em;
            font-weight: bold;
            color: #0f0;
            text-shadow: 0 0 5px #0f0;
        }
        #messageBox button {
            background-color: #0f0;
            color: #000;
            border: none;
            padding: 10px 20px;
            font-size: 1.2em;
            font-weight: bold;
            cursor: pointer;
            border-radius: 5px;
            transition: background-color 0.3s, color 0.3s;
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.5);
        }
        #messageBox button:hover {
            background-color: #0a0;
            color: #fff;
        }

        /* スタートボタンコンテナ */
        #startButtonContainer {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: rgba(0, 0, 0, 0.7);
            border: 2px solid #0f0;
            padding: 30px 40px;
            border-radius: 15px;
            box-shadow: 0 0 25px rgba(0, 255, 0, 0.8);
            z-index: 2; /* ゲーム画面より手前 */
            width: 80%; /* 適度な幅に */
            max-width: 400px; /* 最大幅 */
            box-sizing: border-box; /* パディングを含めて幅を計算 */
        }
        #startButtonContainer h1 {
            font-size: 2.5em;
            color: #0f0;
            text-shadow: 0 0 10px #0f0;
            margin-bottom: 10px;
      　    text-align: center;
        }
        #startButtonContainer p {
            font-size: 1.2em;
            color: #fff;
            margin-bottom: 30px;
            text-align: center;
        }
        #startButton {
            background-color: #0f0;
        　  color: #000;
            border: none;
            padding: 15px 30px;
            font-size: 1.5em;
            font-weight: bold;
            cursor: pointer;
            border-radius: 8px;
            transition: background-color 0.3s, color 0.3s, transform 0.1s;
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.5);
            white-space: nowrap; /* ボタン内のテキストが改行されないように */
        }
        #startButton:hover {
            background-color: #0a0;
            color: #fff;
        }
        #startButton:active {
            transform: scale(0.98);
        }

        /* ローディングメッセージ */
        #loadingMessage {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 1.8em;
    　     font-weight: bold;
            color: #0f0;
            text-shadow: 0 0 8px #0f0;
            z-index: 4;
            display: none;
        }

        /* 音量スライダー */
        .volume-control {
            margin-top: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1em;
            color: #fff;
        }
        #volumeSlider {
            width: 150px;
            -webkit-appearance: none; /* デフォルトスタイルを無効化 */
            appearance: none;
            height: 8px;
            background: #333;
            outline: none;
      　    border-radius: 4px;
            cursor: pointer;
            box-shadow: inset 0 0 5px rgba(0, 255, 0, 0.3);
        }
        #volumeSlider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            background: #0f0;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.7);
        }
        #volumeSlider::-moz-range-thumb {
            width: 20px;
            height: 20px;
            background: #0f0;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.7);
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/howler/2.2.3/howler.min.js"></script>
</head>
<body>
    <div id="loadingMessage">Loading Game Assets...</div>

    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        <video autoplay loop muted playsinline id="background-video">
            <source src="video/background_loop.mp4" type="video/mp4">
            Your browser does not support the video tag.
        </video>
        <div id="score">Score: 0</div>
        <div id="lives">Lives: 3</div>
        <div id="level">Level: 1</div>
    </div>

    <div id="messageBox">
        <p id="message"></p>
        <button>Play Again</button>
    </div>

    <div id="startButtonContainer">
        <h1>SPACE INVADERS</h1>
        <p>Improved</p>
        <button id="startButton">TAP TO START</button>
        <div class="volume-control">
            <span>Volume</span>
            <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="0.5">
        </div>
    </div>

    <script>
        // --- Global Constants ---
        const GAME_WIDTH = 420;
        const GAME_HEIGHT = GAME_WIDTH * (19.5 / 9); // Aspect ratio for mobile portrait
        const PLAYER_SPEED = 7;
        const PLAYER_PROJECTILE_SPEED = 10;
        const INVADER_BASE_SPEED = 15; // 修正: 20から15に減少（インベーダーの初期移動速度）
        const INVADER_MOVE_DOWN_AMOUNT = 20; // インベーダーが下に移動する量

        // ★難易度調整: 敵の弾速を少し上げる
        const ENEMY_PROJECTILE_SPEED = 5; // 変更: 4 -> 5

        const INVADER_ROWS = 5; // ★修正: 6から5に戻す（敵の行数）
        const INVADER_COLS = 5; // （敵の列数）
        const INVADER_WIDTH = 75; // （敵の表示サイズ）
  　    const INVADER_HEIGHT = 75; // （敵の表示サイズ）

        // インベーダー間の横方向の間隔と縦方向の間隔を調整
        const INVADER_SPACING_X = 10; // インベーダー間の横方向の間隔を詰める
        const INVADER_SPACING_Y = 15; // インベーダー間の縦方向の間隔を調整

        const BOSS_WIDTH = 150; // ★変更: ボスの幅を大きく
        const BOSS_HEIGHT = 120; // ★変更: ボスの高さを大きく
        const BOSS_HP_PER_LEVEL = 10; // （ボスのHP）
        const MAX_LEVELS = 30; // ★難易度調整: 最大レベル数を30に設定

        const PLAYER_WIDTH = 40; // 修正: 30から40に増加（自機の表示サイズ）
        const PLAYER_HEIGHT = 40; // 修正: 30から40に増加（自機の表示サイズ）
        const PLAYER_SHOOT_COOLDOWN_MAX = 15; // 修正: 20から15に減少（自機の発射間隔）

        // ボスの放射状ミサイル関連の定数
        const BOSS_RADIAL_PROJECTILE_COUNT_BASE = 3; // ボスの初期放射状ミサイル数
        const BOSS_RADIAL_SPREAD_ANGLE = Math.PI * 0.75; // 放射状に広がる角度（ラジアン、例: 135度）

        const GAME_STATE = {
            LOADING: 'LOADING',
            START_SCREEN: 'START_SCREEN', // 最初の「TAP TO START」で動画再生
            PLAYING: 'PLAYING', // 実際のゲームプレイ中
            GAME_OVER: 'GAME_OVER', // ゲームオーバー/クリア画面
            FINAL_BOSS: 'FINAL_BOSS' // ★追加: 最終ボス戦状態
        };

        // --- Global Variables ---
        let canvas, ctx;
        let player;
        let invaders = [];
        let projectiles = [];
        let invaderProjectiles = []; // invaderProjectilesはボスや通常の敵の弾を扱う
        let score = 0;
        let lives = 3;
        let currentLevel = 1;
        let lastTimestamp = 0;
        let animationFrameId;
        let currentGameState = GAME_STATE.LOADING;
        let loadedImages = {};
        let loadedAudio = {};
        let boss = null; // 通常のボス
        let finalBoss = null; // ★追加: 最終ボスオブジェクト
        let bossCreatedForThisLevel = false; // ★追加: 通常ボスがこのレベルで生成されたかどうかのフラグ

        // Player shooting cooldown
        let playerShootCooldown = 0;

        // Player movement target for touch/mouse
        let playerTargetX = null;
        let isPointerDown = false; // Tracks if mouse/touch is currently pressed

        // UI elements
        let scoreDisplay;
        let livesDisplay;
        let levelDisplay;
        let messageBox;
        let messageText;
        let startButtonContainer;
        let startButton;
        let loadingMessage;
        let volumeSlider; // 音量スライダー
        // BGM変数の宣言場所を変更または追加が必要かも - Howler.jsで管理しているのでloadedAudioを使う
        // let backgroundMusic; // Howler.js BGM
        let backgroundVideo; // 背景動画要素

        // Invader movement flags
        let lastInvaderMoveDownTime = 0;
        const INVADER_MOVE_DOWN_INTERVAL = 1500; // ★修正: 500から1500に増加（インベーダーが下に移動する間隔（ミリ秒））

        let isInitialStartTapDone = false; // 最初のタップ（動画再生）が完了したかどうかのフラグ

        // --- Initialization ---

        function init() {
            initGameEssentials();
            loadAssets().then(() => {
                hideLoadingMessage();
                currentGameState = GAME_STATE.START_SCREEN;
                showStartButton(); // これで「TAP TO START」が表示される

                // 音量スライダーの初期値を設定し、イベントリスナーを追加
                const savedVolume = parseFloat(localStorage.getItem('gameVolume')) || 0.5;
          　    Howler.volume(savedVolume);
                volumeSlider.value = savedVolume;

                volumeSlider.addEventListener('input', (e) => {
                    const newVolume = parseFloat(e.target.value);
                    Howler.volume(newVolume); // Howler.jsのグローバル音量を更新
                    localStorage.setItem('gameVolume', newVolume); // 音量設定をローカルストレージに保存

                    if (backgroundVideo) {
                        backgroundVideo.volume = newVolume;
                        if (newVolume > 0 && backgroundVideo.muted) {
                            backgroundVideo.muted = false;
                        } else if (newVolume === 0 && !backgroundVideo.muted) {
                            backgroundVideo.muted = true;
                        }
                    }
                });

                // スタートボタンのクリックイベントリスナー
                startButton.addEventListener('click', () => {
                    if (currentGameState === GAME_STATE.START_SCREEN) {
                        if (!isInitialStartTapDone) {
                            // 1回目のタップ：動画再生とボタンテキスト変更
                            if (backgroundVideo) {
                                backgroundVideo.muted = false; // ミュート解除
                                backgroundVideo.volume = Howler.volume(); // スライダーの音量に合わせる
                                backgroundVideo.play().catch(e => console.error("Video playback error on first tap:", e));
                                backgroundVideo.style.display = 'block'; // 動画を表示
                            }
                            startButton.innerText = "START GAME"; // ボタンのテキストを変更
                            isInitialStartTapDone = true; // フラグを立てる
                        } else {
                            // 2回目のタップ：ゲーム開始
                            startGame(true); // 新しいゲームを開始
                        }
                    }
                });
            }).catch(error => {
                console.error("Error loading assets:", error);
                loadingMessage.innerText = `Error loading assets: ${error.message || error}. Please check console for details.`;
            });
        }

        // Sets up canvas, player object, and event listeners once
        function initGameEssentials() {
            canvas = document.getElementById('gameCanvas');
            ctx = canvas.getContext('2d');
            canvas.width = GAME_WIDTH;
            canvas.height = GAME_HEIGHT;
            canvas.style.display = 'none'; // ゲーム開始前はキャンバスを非表示にする

            // UI elements
    　      scoreDisplay = document.getElementById('score');
            livesDisplay = document.getElementById('lives');
            levelDisplay = document.getElementById('level');
            messageBox = document.getElementById('messageBox');
            messageText = messageBox.querySelector('p');
          　 startButtonContainer = document.getElementById('startButtonContainer');
            startButton = document.getElementById('startButton');
            loadingMessage = document.getElementById('loadingMessage');
            volumeSlider = document.getElementById('volumeSlider'); // スライダー要素を取得

            // 背景動画要素を取得
            backgroundVideo = document.getElementById('background-video');
            if (backgroundVideo) {
                backgroundVideo.style.display = 'none'; // 最初は隠す
                backgroundVideo.muted = true; // 最初はミュートにする
            }

            player = {
                x: GAME_WIDTH / 2 - PLAYER_WIDTH / 2,
                y: GAME_HEIGHT - PLAYER_HEIGHT - 120,
                width: PLAYER_WIDTH,
                height: PLAYER_HEIGHT,
                movingLeft: false,
                movingRight: false,
                invincible: false, // Is player invincible?
                invincibleTimer: 0, // How long player has been invincible
                blinkTimer: 0 // For blinking effect
            };

            // Input Event Listeners
            document.addEventListener('keydown', handleKeyDown);

            document.body.addEventListener('touchstart', handleTouchStart, { passive: false });
            document.body.addEventListener('touchmove', handleTouchMove, { passive: false });

            // Mouse event listeners for desktop

        // 画像ロード関数
        function loadImage(name, src) {
            return new Promise((resolve, reject) => {
                const img = new Image();
                img.src = src;
                img.onload = () => {
                    loadedImages[name] = img;
                    resolve();
                };
                // エラーハンドリングを強化
                img.onerror = (e) => {
                    console.error(`Failed to load image: ${src}`, e);
                    reject(new Error(`Failed to load image: ${src}`));
                };
            });
        }

        // 音声ロード関数 (Howler.js)
        function loadAudio(name, src) {
            return new Promise((resolve, reject) => {
                const sound = new Howl({
                    src: [src],
                    volume: Howler.volume(), // <-- ここは全体音量を参照
                    onload: () => {
                        loadedAudio[name] = sound;
                         // ★個別の音量を調整 - 初期音量に依存せず個別に調整
                         if (name === 'shoot') {
                             sound.volume(0.05); // ミサイル音の音量を0.05に設定
                         }
                         // 他の効果音の個別音量調整もここに追加できます
                         // if (name === 'invaderHit') { sound.volume(0.7); } など
                         // if (name === 'finalBossMusic') { sound.volume(0.8); } // 最終ボスBGMの個別音量調整 (必要であれば)

                        resolve(); // 音声がロードされたらPromiseを解決
                    },
                    onloaderror: (id, error) => {
      　               console.error(`Failed to load audio: ${src} (Howler ID: ${id})`, error);
                         reject(new Error(`Failed to load audio: ${src}`));
                    }
                });
            });
        }

        // --- Game State Management Functions ---

        function createInvaders() {
            invaders = [];
            // インベーダー全体の幅を計算
            const totalInvaderBlockWidth = (INVADER_COLS * INVADER_WIDTH) + ((INVADER_COLS - 1) * INVADER_SPACING_X);
            // 開始X座標を計算（中央揃え）
            const startX = (GAME_WIDTH - totalInvaderBlockWidth) / 2;
            const startY = 80; // インベーダーの初期Y座標は高く保つ

            for (let row = 0; row < INVADER_ROWS; row++) {
                for (let col = 0; col < INVADER_COLS; col++) {
                    invaders.push({
                        x: startX + col * (INVADER_WIDTH + INVADER_SPACING_X),
                        y: startY + row * (INVADER_HEIGHT + INVADER_SPACING_Y),
                        width: INVADER_WIDTH,
                        height: INVADER_HEIGHT,
                        // ★難易度調整: インベーダーのレベルごとの速度増加率を上げる
                        dx: (INVADER_BASE_SPEED + (currentLevel - 1) * 7), // 変更: * 5 -> * 7
                        hp: 1
                    });
                }
            }
        }

        function createBoss() {
             // 通常ボスの生成 - 最終ボスとは別
            boss = {
                x: GAME_WIDTH / 2 - BOSS_WIDTH / 2, // 中央に配置
                y: 30,
                width: BOSS_WIDTH,
                height: BOSS_HEIGHT,
                // ★難易度調整: ボスのレベルごとの速度増加率を上げる
                dx: (INVADER_BASE_SPEED + (currentLevel - 1) * 13) * 1.5, // 変更: * 10 -> * 13
                hp: BOSS_HP_PER_LEVEL, // ボスのHPを定数BOSS_HP_PER_LEVELで固定
                shootTimer: 0,
                // ★難易度調整: ボスのレベルごとの発射間隔の短縮率を上げる (攻撃頻度UP)
                shootInterval: Math.max(60, 120 - (currentLevel - 1) * 18), // 変更: * 15 -> * 18
                isExploding: false,
                explosionTimer: 0,
                explosionDuration: 50,
                originalImage: 'boss',
                explosionImage: 'boss_explosion'
            };
        }

        function startGame(isNewGame) {
            if (animationFrameId) {
                cancelAnimationFrame(animationFrameId);
                animationFrameId = null;
            }

            if (isNewGame) {
                score = 0;
                lives = 3;
                currentLevel = 1;
                 // 新しいゲーム開始時はUIをリセット
                 updateScoreDisplay();
                 updateLivesDisplay();
                 updateLevelDisplay();
                 levelDisplay.style.display = 'block'; // レベル表示を再開
            } else {
                // 既存のゲームからの継続の場合、プレイヤーの状態のみリセット
                player.x = GAME_WIDTH / 2 - PLAYER_WIDTH / 2;
                player.movingLeft = false;
                player.movingRight = false;
                player.invincible = false;
                player.invincibleTimer = 0;
                player.blinkTimer = 0;
                 // 継続時はUI表示状態を維持（hideMessageBoxで表示される想定）
  　             levelDisplay.style.display = 'block'; // レベル表示を再開
            }

            boss = null; // 通常ボスは最初に生成しない（インベーダー全滅後に生成）
            finalBoss = null; // ★最終ボスも最初に生成しない
            bossCreatedForThisLevel = false; // 通常ボス生成フラグをリセット
            projectiles = []; // 自機弾をクリア
            invaderProjectiles = []; // 敵弾（通常、ボス、最終ボス）をクリア

            createInvaders(); // まずインベーダーのみを生成

            updateScoreDisplay();
            updateLivesDisplay();
            updateLevelDisplay();
            hideMessageBox(); // メッセージボックスがあれば隠す
            hideStartButton(); // スタートボタンと動画を隠しキャンバスを表示

            currentGameState = GAME_STATE.PLAYING; // ゲーム状態をプレイ中に設定
            lastTimestamp = performance.now();

            // ★修正：音楽が既に再生中でなければ再生開始、ループを設定
             // 通常BGMがロードされていて、かつ再生中でない場合のみ再生
            if (loadedAudio.backgroundMusic && !loadedAudio.backgroundMusic.playing()) {
                 loadedAudio.backgroundMusic.play();
                 loadedAudio.backgroundMusic.loop(true); // ループを有効にする
                 loadedAudio.backgroundMusic.volume(Howler.volume()); // 全体音量に合わせる
            }
             // 最終ボスBGMが再生中であれば停止 (新しいゲーム開始時)
            if (loadedAudio.finalBossMusic && loadedAudio.finalBossMusic.playing()) {
                 loadedAudio.finalBossMusic.stop();
      　     }


            animationFrameId = requestAnimationFrame(update);

            lastInvaderMoveDownTime = performance.now();
        }

            updateScoreDisplay(); // スコア表示は必要


            // ゲームループは既に動いているはずなので、再開の必要はない (endGame から呼ばれる想定)
            // もし endGame を抜けた後ループが止まる構造であれば、ここで requestAnimationFrame(update) が必要になるかもしれません。
            // 現在のコード構造では、endGame は update から呼ばれていないので、ループは止まりません。

            // 必要であれば、最終ボス出現の演出などを追加
        }

        // --- Game Loop ---
        // update 関数内で全てのゲーム要素の状態を更新します
        function update(timestamp) {
            // ★Log 1: Update 関数の開始を記録★
            console.log("Update function start");

            // ゲームがロード中、スタート画面、またはゲームオーバー状態の場合は更新・描画しない
            if (currentGameState === GAME_STATE.LOADING || currentGameState === GAME_STATE.START_SCREEN || currentGameState === GAME_STATE.GAME_OVER) {
                 // ただし、ゲームループ自体は requestAnimationFrame で継続させる必要がある
                 // この場合は update 処理の本体をスキップして描画（通常は何も描画されないか、静止画）と次のフレーム予約のみ行う
                 draw(); // 静止画でも描画は必要
                 animationFrameId = requestAnimationFrame(update); // ループを継続
                 return; // 更新処理の本体はスキップ
            }

            const deltaTime = (timestamp - lastTimestamp) / 1000; // 秒単位
            lastTimestamp = timestamp;

            // --- プレイヤーの移動と射撃 ---
            // タッチ/マウス操作でのプレイヤー移動
            if (isPointerDown && playerTargetX !== null) {
                const deltaX = playerTargetX - (player.x + player.width / 2); // ターゲットまでの距離
                // 移動量を計算（速度とフレーム時間を考慮）
                // ターゲットまでの距離に応じて移動速度を調整すると滑らかになる
                const moveAmount = Math.min(Math.abs(deltaX), PLAYER_SPEED * (Math.abs(deltaX) / 50) + 1); // 距離が近いほど速度を落とす
                if (deltaX > 0) {
                    player.x += moveAmount;
                } else {
                    player.x -= moveAmount;
                }
                // 画面端での停止
                player.x = Math.max(0, Math.min(GAME_WIDTH - player.width, player.x));
            }

            // キーボード操作でのプレイヤー移動 (タッチ/マウス操作と併用可能)
            if (player.movingLeft) {
                player.x -= PLAYER_SPEED;
            }
            if (player.movingRight) {
                player.x += PLAYER_SPEED;
            }
            // 画面端での停止
            player.x = Math.max(0, Math.min(GAME_WIDTH - player.width, player.x));

            // プレイヤーの射撃
            if (playerShootCooldown > 0) {
                playerShootCooldown--;
            }
            // タッチ/マウス操作中に射撃（クールダウン後）
            if (isPointerDown && playerShootCooldown === 0) {
                projectiles.push({
                    x: player.x + player.width / 2 - 2.5, // 弾の中心を自機の中央に合わせる
                    y: player.y,
                    width: 5,
                    height: 10,
                    dy: -PLAYER_PROJECTILE_SPEED
                });
                playerShootCooldown = PLAYER_SHOOT_COOLDOWN_MAX; // クールダウンを設定
                // 射撃音を再生
                if (loadedAudio.shoot) {
                    // Play the sound.
                    loadedAudio.shoot.play();
                }
            }


            // --- 弾丸の更新 ---
            // 自機ミサイルの更新
            projectiles.forEach(p => {
                p.y += p.dy;
            });
            // 画面外に出た自機ミサイルを削除
            projectiles = projectiles.filter(p => p.y > -p.height);

            // 敵弾の更新（通常敵、通常ボス、最終ボスの弾をまとめて処理）
            invaderProjectiles.forEach(p => {
                p.x += p.dx || 0; // dx がない場合（通常の縦方向弾）は 0 を加算
                p.y += p.dy;
            });
            // 画面外に出た敵弾を削除
            invaderProjectiles = invaderProjectiles.filter(p => p.y < GAME_HEIGHT && p.x > -10 && p.x < GAME_WIDTH + 10); // 画面外の少し余裕を持たせる


            // --- ゲーム状態に応じた敵の更新 ---
            if (currentGameState === GAME_STATE.PLAYING) {
                // 通常インベーダーの移動
                let moveDown = false;
                invaders.forEach(invader => {
                    invader.x += invader.dx;
                    // 画面端に到達したかチェック
                    if (invader.x + invader.width > GAME_WIDTH || invader.x < 0) {
                        moveDown = true; // 方向転換と一段下に移動のフラグ
                    }
                });

                // 画面端に到達したインベーダーがいれば、方向転換して一段下に移動
                if (moveDown) {
                    invaders.forEach(invader => {
                        invader.dx *= -1; // 移動方向を反転
                        invader.y += INVADER_MOVE_DOWN_AMOUNT; // 下に移動
                    });
                }

                // 通常インベーダーの射撃（ランダムに発射）
                if (invaders.length > 0 && Math.random() < 0.02) { // 確率で発射
                    const randomInvader = invaders[Math.floor(Math.random() * invaders.length)];
                    invaderProjectiles.push({
                        x: randomInvader.x + randomInvader.width / 2 - 2.5,
                        y: randomInvader.y + randomInvader.height,
                        width: 5,
                        height: 10,
                        dx: 0, // 通常敵弾は縦方向のみ
                        dy: ENEMY_PROJECTILE_SPEED // 弾速を使用
                    });
                }

                // 通常ボスの移動と射撃（プレイ中状態かつ通常ボスが存在する場合）
                if (boss) {
                    if (!boss.isExploding) {
                        // ボスの移動
                        boss.x += boss.dx;
                        // 画面端での方向転換
  　                    if (boss.x + boss.width > GAME_WIDTH || boss.x < 0) {
                            boss.dx *= -1; // 移動方向を反転
                        }

                        // ボスの射撃タイマーを更新
                        boss.shootTimer++;
                        // 通常弾の発射
                        if (boss.shootTimer >= boss.shootInterval) {
                            invaderProjectiles.push({
                                x: boss.x + boss.width / 2 - 2.5, // ボスの中心から発射
                                y: boss.y + boss.height,
      　                        width: 5,
                                height: 10,
                                dx: 0, // 通常弾は縦方向のみ
                                dy: ENEMY_PROJECTILE_SPEED // 弾速を使用
                            });
                            boss.shootTimer = 0; // タイマーをリセット
                        }
                    } else { // ボスが爆発中の処理
                        boss.explosionTimer++;
                        if (boss.explosionTimer >= boss.explosionDuration) {
                            boss = null; // 爆発アニメーション終了後、ボスを消滅させる
                            score += 5000 * currentLevel; // ボス撃破ボーナス
                            updateScoreDisplay();
                            // ★Debug Log: endGame(true)を呼び出す直前★
                            console.log("update内でendGame(true)を呼び出す直前です。");
                            endGame(true); // レベルクリアまたは最終ボス戦開始へ
                        }
                    }
                }

                // ★通常インベーダーと通常ボスの両方がいなくなったら、次のレベルへ進むかボス生成★
                // ただし、レベルがMAX_LEVELSでない、かつ通常ボスがまだ生成されてない場合
                if (invaders.length === 0 && !boss && currentLevel < MAX_LEVELS && !bossCreatedForThisLevel) {
                    // 通常インベーダー全滅 -> 通常ボス出現
                    createBoss();
                    bossCreatedForThisLevel = true; // 通常ボス生成フラグを立てる
                    // 必要であれば、ボス出現音などを再生
                    // if (loadedAudio.bossSpawn) { loadedAudio.bossSpawn.play(); }
                }


        　  } else if (currentGameState === GAME_STATE.FINAL_BOSS) {
                // --- 最終ボス戦中の更新処理 ---
                if (finalBoss) {
                    if (!finalBoss.isExploding) {
                        // 最終ボスの移動 (必要であれば)
                        finalBoss.x += finalBoss.dx;
                        finalBoss.y += finalBoss.dy;

                        // 最終ボスの射撃タイマーを更新
                        finalBoss.shootTimer++;
                        finalBoss.radialShootTimer++;

                        // 最終ボスの通常弾の発射
                        if (finalBoss.shootTimer >= finalBoss.shootInterval) {
                            invaderProjectiles.push({
                                x: finalBoss.x + finalBoss.width / 2 - 2.5, // ボスの中心から発射
                                y: finalBoss.y + finalBoss.height,
                                width: 5,
                                height: 10,
                                dx: 0, // 最終ボス通常弾は縦方向のみ
                                dy: ENEMY_PROJECTILE_SPEED * 1.2 // 少し速い弾
                            });
                            finalBoss.shootTimer = 0; // タイマーをリセット
                        }

                        // 最終ボスの放射状ミサイルの発射
                        if (finalBoss.radialShootTimer >= finalBoss.radialShootInterval) {
                            const numProjectiles = BOSS_RADIAL_PROJECTILE_COUNT_BASE + Math.floor(currentLevel / 5); // レベルに応じて弾数を増やす
                            const startAngle = Math.PI / 2 - BOSS_RADIAL_SPREAD_ANGLE / 2; // 広がる角度の中心を下に向けた状態から開始
                            const angleStep = BOSS_RADIAL_SPREAD_ANGLE / (numProjectiles - 1);

                            for (let i = 0; i < numProjectiles; i++) {
                                const angle = startAngle + i * angleStep;
                                invaderProjectiles.push({
                                    x: finalBoss.x + finalBoss.width / 2 - 2.5, // ボスの中心から発射
                                    y: finalBoss.y + finalBoss.height,
                                    width: 5,
                                    height: 10,
                                    dx: Math.cos(angle) * ENEMY_PROJECTILE_SPEED, // 放射状の速度計算
                                    dy: Math.sin(angle) * ENEMY_PROJECTILE_SPEED
                                });
                            }
                            finalBoss.radialShootTimer = 0; // タイマーをリセット
                        }
                    } else { // 最終ボスが爆発中の処理
                        finalBoss.explosionTimer++;
                        if (finalBoss.explosionTimer >= finalBoss.explosionDuration) {
                            finalBoss = null; // 爆発アニメーション終了後、最終ボスを消滅させる
                            score += 10000 * MAX_LEVELS; // 最終ボス撃破ボーナス
                            updateScoreDisplay();
                            // ゲームクリア処理へ
                            // ★Debug Log: endGame(true)を呼び出す直前★
                            console.log("update内でendGame(true)を呼び出す直前です。（最終ボス撃破後）");
                            endGame(true); // ゲームクリアへ
                        }
                    }
                }
            }


            // --- 衝突判定 ---
            // 自機ミサイルと敵（インベーダー、通常ボス、最終ボス）の衝突
            projectiles.forEach((projectile, pIndex) => {
                // 通常インベーダーとの衝突判定（プレイ中状態のみ）
                if (currentGameState === GAME_STATE.PLAYING) {
                    invaders.forEach((invader, iIndex) => {
                        if (
                            projectile.x < invader.x + invader.width &&
                            projectile.x + projectile.width > invader.x &&
                            projectile.y < invader.y + invader.height &&
          　               projectile.y + projectile.height > invader.y
                        ) {
                            // 衝突！ インベーダーとミサイルを削除
                            // invaders.splice(iIndex, 1); // これは forEach 中では危険なので別の方法で
                            // projectiles.splice(pIndex, 1); // これも危険

                            // 削除フラグを立てる方式に変更
                            invader.markedForDeletion = true;
                            projectile.markedForDeletion = true;

                            score += 100; // インベーダー撃破でスコア加算
                            updateScoreDisplay();
                            // 効果音再生（必要であれば）
                            // if (loadedAudio.invaderHit) { loadedAudio.invaderHit.play(); }
                        }
                    });
                    // markedForDeletion フラグを使ってインベーダーとミサイルを配列から削除
                    invaders = invaders.filter(invader => !invader.markedForDeletion);
                    projectiles = projectiles.filter(projectile => !projectile.markedForDeletion);
                }

                // 自機ミサイルと通常ボスの衝突判定（プレイ中状態かつ通常ボスが存在する場合）
                if (currentGameState === GAME_STATE.PLAYING && boss && !boss.isExploding) {
                    projectiles.forEach((projectile, pIndex) => {
                        if (
                            projectile.x < boss.x + boss.width &&
                            projectile.x + projectile.width > boss.x &&
                            projectile.y < boss.y + boss.height &&
                            projectile.y + projectile.height > boss.y
                        ) {
                            // 衝突！ ボスのHPを減らし、ミサイルを削除
                            boss.hp--;
                            projectile.markedForDeletion = true; // ミサイルに削除フラグ
                            updateScoreDisplay(); // スコア表示はHP減少時にも更新で良い

                            // 効果音再生（必要であれば）
                            // if (loadedAudio.bossHit) { loadedAudio.bossHit.play(); }

                            // ボスのHPが0以下になったら爆発開始
                            if (boss.hp <= 0 && !boss.isExploding) {
                                boss.isExploding = true;
                                boss.explosionTimer = 0;
                                // ボス撃破時の効果音（必要であれば）
                                // if (loadedAudio.bossExplosion) { loadedAudio.bossExplosion.play(); }
                            }
                        }
                    });
                    // markedForDeletion フラグを使ってミサイルを配列から削除
                    projectiles = projectiles.filter(projectile => !projectile.markedForDeletion);
                }

                // 自機ミサイルと最終ボスの衝突判定（最終ボス戦中状態かつ最終ボスが存在する場合）
            } else if (currentGameState === GAME_STATE.FINAL_BOSS && finalBoss && !finalBoss.isExploding) {
                projectiles.forEach((projectile, pIndex) => {
                    if (
                        projectile.x < finalBoss.x + finalBoss.width &&
                        projectile.x + projectile.width > finalBoss.x &&
                        projectile.y < finalBoss.y + finalBoss.height &&
                        projectile.y + projectile.height > finalBoss.y
                    ) {
                        // 衝突！ 最終ボスのHPを減らし、ミサイルを削除
                        finalBoss.hp--;
                        projectile.markedForDeletion = true; // ミサイルに削除フラグ
                        updateScoreDisplay(); // スコア表示を更新

                        // 効果音再生（必要であれば）
                        // if (loadedAudio.bossHit) { loadedAudio.bossHit.play(); }

                        // 最終ボスのHPが0以下になったら爆発開始
                        if (finalBoss.hp <= 0 && !finalBoss.isExploding) {
                            finalBoss.isExploding = true;
                            finalBoss.explosionTimer = 0;
                            // 最終ボス撃破時の効果音（必要であれば）
                            // if (loadedAudio.bossExplosion) { loadedAudio.bossExplosion.play(); }
                        }
                    }
                });
                // markedForDeletion フラグを使ってミサイルを配列から削除
                projectiles = projectiles.filter(projectile => !projectile.markedForDeletion);
            }


            // 敵弾と自機の衝突判定
            // プレイヤーが無敵時間中でない場合のみ衝突判定を行う
            if (!player.invincible) {
                invaderProjectiles.forEach((projectile, pIndex) => {
                    if (
                        projectile.x < player.x + player.width &&
                        projectile.x + projectile.width > player.x &&
                        projectile.y < player.y + player.height &&
                        projectile.y + projectile.height > player.y
                    ) {
                        // 衝突！ ライフを減らし、敵弾を削除
                        invaderProjectiles.splice(pIndex, 1); // 敵弾を削除
                        lives--; // ライフを減らす
                        updateLivesDisplay(); // ライフ表示を更新
                        // 効果音再生（必要であれば）
                        // if (loadedAudio.playerHit) { loadedAudio.playerHit.play(); }


                        // 自機に無敵時間を設定
                        player.invincible = true;
                        player.invincibleTimer = 120; // 2秒間（120フレーム）無敵とする


                        // ライフが0以下になったらゲームオーバー
                        if (lives <= 0) {
                            // ★Debug Log: endGame(false)を呼び出す直前★
                            console.log("update内でendGame(false)を呼び出す直前です。（ライフ0以下）");
                            endGame(false); // ゲームオーバーへ
                        }
                    }
                });
            }

            // プレイヤーの無敵時間を更新
            if (player.invincibleTimer > 0) {
                player.invincibleTimer--;
                player.blinkTimer++; // 点滅タイマーも更新
                if (player.invincibleTimer === 0) {
                    player.invincible = false; // 無敵時間終了
                    player.blinkTimer = 0; // 点滅タイマーリセット
                }
            }


            // --- 勝利条件または最終ボス戦開始条件のチェック ---
            // 通常インベーダーと通常ボスの両方がいなくなったら次のレベルへ (ゲームプレイ中状態のみ)
            // 最終ボス戦開始のトリガーは endGame 関数内で処理されるように変更済み


            draw(); // 描画関数を呼び出す

            // 次のフレームを予約 - ゲームループを継続
            animationFrameId = requestAnimationFrame(update);
        }


        // --- Event Handlers ---
        function handleKeyDown(e) {
            if (currentGameState === GAME_STATE.PLAYING || currentGameState === GAME_STATE.FINAL_BOSS) { // プレイ中または最終ボス戦中のみ操作を受け付ける
                if (e.key === 'ArrowLeft' || e.key === 'a') {
                    player.movingLeft = true;
                } else if (e.key === 'ArrowRight' || e.key === 'd') {
                    player.movingRight = true;
                } else if ((e.key === ' ' || e.key === 'w') && playerShootCooldown === 0) { // スペースキーまたはWキーで射撃
                    projectiles.push({
                        x: player.x + player.width / 2 - 2.5, // 弾の中心を自機の中央に合わせる
                        y: player.y,
                        width: 5,
                        height: 10,
                        dy: -PLAYER_PROJECTILE_SPEED
                    });
                    playerShootCooldown = PLAYER_SHOOT_COOLDOWN_MAX; // クールダウンを設定
                    // 射撃音を再生
                    if (loadedAudio.shoot) {
                        // Play the sound.
                        loadedAudio.shoot.play();
                    }
                }
            }

            // ★デバッグ用: レベルスキップ (最終ボス戦開始トリガーを直接テスト)
            if (e.key === 'L' || e.key === 'l') {
                 console.log("Level Skip to Final Boss Start Trigger!"); // Debug Log
                 // 現在のゲーム状態がロード中やスタート画面でないことを確認
                 if (currentGameState !== GAME_STATE.LOADING && currentGameState !== GAME_STATE.START_SCREEN) {
                     // ゲームオーバー状態から押した場合もリセット
                     if (currentGameState === GAME_STATE.GAME_OVER) {
                         // ゲームオーバー状態からスキップする場合は、一部のゲーム状態をリセットする必要があるかも
                         lives = 3; // ライフを回復
                         score = 0; // スコアをリセット（任意）
                         updateLivesDisplay();
                         updateScoreDisplay();
                         hideMessageBox(); // ゲームオーバーメッセージを隠す
                     }

                     currentLevel = MAX_LEVELS; // ★レベルを直接MAX_LEVELSに設定★
                     invaders = []; // インベーダーを全てクリア
                     projectiles = []; // 自機弾をクリア
                     invaderProjectiles = []; // 敵弾を全てクリア
                     boss = null; // 通常ボスをクリア
                     finalBoss = null; // ★最終ボスもクリア (念のため)★
                     bossCreatedForThisLevel = false; // 通常ボス生成フラグをリセット

                     updateLevelDisplay(); // レベル表示を更新 (Level: 30 になるはず)
                     levelDisplay.style.display = 'none'; // 最終ボス戦ではレベルを非表示に

                     // 強制的に endGame(true) を呼び出し、最終ボス戦開始ロジックをトリガー
                     console.log("Level Skip: Directly calling endGame(true) to trigger final boss."); // Debug Log
                     endGame(true); // ★直接 endGame(true) を呼び出す★

                     // ゲームループが止まっている場合を考慮して、ここで再開することも検討
                     // if (!animationFrameId) {
                     //   animationFrameId = requestAnimationFrame(update);
                     //}
                 } else {
                     console.log("Level Skip ignored: Game is in loading or start screen state.");
                 }
            }
        }

        function handleKeyUp(e) {
            if (currentGameState === GAME_STATE.PLAYING || currentGameState === GAME_STATE.FINAL_BOSS) { // プレイ中または最終ボス戦中のみ操作を受け付ける
                if (e.key === 'ArrowLeft' || e.key === 'a') {
                    player.movingLeft = false;
                } else if (e.key === 'ArrowRight' || e.key === 'd') {
                    player.movingRight = false;
                }
                // Note: Shooting is handled on keydown for instant firing
            }
        }

        // タッチ/マウス操作関連のイベントハンドラ
        function handleTouchStart(e) {
            if (currentGameState === GAME_STATE.PLAYING || currentGameState === GAME_STATE.FINAL_BOSS) {
                e.preventDefault(); // 標準のタッチイベント（スクロールなど）をキャンセル
                const touch = e.touches[0]; // 最初の指の情報を取得
                // gameContainer 相対の座標に変換
                const gameContainerRect = gameContainer.getBoundingClientRect();
                playerTargetX = touch.clientX - gameContainerRect.left;
                isPointerDown = true;
            }
        }

        function handleTouchMove(e) {
            if (currentGameState === GAME_STATE.PLAYING || currentGameState === GAME_STATE.FINAL_BOSS) {
                e.preventDefault(); // 標準のタッチイベント（スクロールなど）をキャンセル
                const touch = e.touches[0];
                const gameContainerRect = gameContainer.getBoundingClientRect();
                playerTargetX = touch.clientX - gameContainerRect.left;
            }
        }

        function handleTouchEnd(e) {
            if (currentGameState === GAME_STATE.PLAYING || currentGameState === GAME_STATE.FINAL_BOSS) {
                // e.preventDefault(); // touchend では preventDefault は不要な場合が多い
                isPointerDown = false;
                playerTargetX = null;
            }
        }

        function handleMouseDown(e) {
            if (currentGameState === GAME_STATE.PLAYING || currentGameState === GAME_STATE.FINAL_BOSS) {
                // e.preventDefault(); // 標準のクリックイベントをキャンセル（必要であれば）
                const gameContainerRect = gameContainer.getBoundingClientRect();
                playerTargetX = e.clientX - gameContainerRect.left;
                isPointerDown = true;
            }
        }

        function handleMouseMove(e) {
            if (currentGameState === GAME_STATE.PLAYING || currentGameState === GAME_STATE.FINAL_BOSS) {
                if (isPointerDown) {
                    const gameContainerRect = gameContainer.getBoundingClientRect();
                    playerTargetX = e.clientX - gameContainerRect.left;
                }
            }
        }

        function handleMouseUp(e) {
            if (currentGameState === GAME_STATE.PLAYING || currentGameState === GAME_STATE.FINAL_BOSS) {
                isPointerDown = false;
                playerTargetX = null;
            }
        }


        // --- Start Game on window load ---
        // DOMContentLoaded は HTML の読み込みが完了した時点で発火するので、
        // アセットロード前に UI 要素を取得する initGameEssentials には適切
        document.addEventListener('DOMContentLoaded', () => {
            // ゲームの初期化開始（アセットロード含む）
            init();
        });

    </script>

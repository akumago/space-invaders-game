<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Improved Space Invaders</title>
    <style>
        /* 全体のリセットと基本設定 */
        html, body {
            margin: 0;
            padding: 0;
            overflow: hidden; /* スクロール禁止 */
            background-color: #000; /* 背景色を黒に設定 */
            font-family: 'Arial', sans-serif;
            color: #fff;
            -webkit-user-select: none; /* テキスト選択無効化 (iOS) */
            -moz-user-select: none; /* テキスト選択無効化 (Firefox) */
            -ms-user-select: none; /* テキスト選択無効化 (IE/Edge) */
            user-select: none; /* テキスト選択無効化 (標準) */
            -webkit-tap-highlight-color: rgba(0,0,0,0); /* タップ時のハイライトを無効化 (iOS) */
        }

        /* 画面中央にゲームコンテンツを配置するためのFlexbox */
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh; /* 画面全体の高さ */
            width: 100vw; /* 画面全体の幅 */
            position: relative; /* 子要素の絶対配置の基準 */
        }

        /* ゲームコンテナ - キャンバスと動画、UI要素を内包 */
        #gameContainer {
            position: relative; /* 子要素（canvas, video）の基準 */
            width: 420px; /* GAME_WIDTHと同期 */
            height: calc(420px * (19.5 / 9)); /* GAME_HEIGHTと同期 */
            overflow: hidden; /* はみ出たコンテンツを隠す */
            background-color: black; /* ゲーム中の背景色 */
            border: 2px solid #0f0; /* ゲーム画面の枠線 */
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.8);
            z-index: 1; /* 他のUIより手前 */
            /* 画面中央に配置するためのFlexboxの余白調整 */
            margin: auto; 
        }

        /* ゲームキャンバス */
        #gameCanvas {
            position: absolute; /* gameContainerを基準に配置 */
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block; /* 初期状態はJSで制御 */
            z-index: 0; /* 動画より手前 */
        }

        /* 背景動画 - gameContainerのサイズに合わせる */
        #background-video {
            position: absolute; /* gameContainerを基準に配置 */
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover; /* 縦横比を維持しつつ要素を覆う */
            filter: brightness(0.5); /* 少し暗くして見やすくする */
            z-index: -1; /* キャンバスより奥に配置 */
            display: block; /* 初期状態はJSで制御 */
        }

        /* スコア、ライフ、レベル表示 */
        #score, #lives, #level {
            position: absolute;
            font-size: 1.2em;
            font-weight: bold;
            color: #0f0;
            text-shadow: 0 0 5px #0f0;
            z-index: 2; /* ゲーム要素より手前 */
            padding: 5px 10px;
            background-color: rgba(0, 0, 0, 0.5);
            border-radius: 5px;
        }
        #score { top: 10px; left: 10px; }
        #lives { top: 10px; right: 10px; }
        #level { bottom: 10px; left: 10px; }

        /* メッセージボックス (ゲームオーバー/クリア時) */
        #messageBox {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: rgba(0, 0, 0, 0.8);
            border: 2px solid #0f0;
            padding: 20px;
            text-align: center;
            z-index: 3;
            display: none;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.8);
            max-width: 80%;
        }
        #messageBox p {
            margin: 0 0 20px 0;
            font-size: 1.5em;
            font-weight: bold;
            color: #0f0;
            text-shadow: 0 0 5px #0f0;
        }
        #messageBox button {
            background-color: #0f0;
            color: #000;
            border: none;
            padding: 10px 20px;
            font-size: 1.2em;
            font-weight: bold;
            cursor: pointer;
            border-radius: 5px;
            transition: background-color 0.3s, color 0.3s;
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.5);
        }
        #messageBox button:hover {
            background-color: #0a0;
            color: #fff;
        }

        /* スタートボタンコンテナ */
        #startButtonContainer {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: rgba(0, 0, 0, 0.7);
            border: 2px solid #0f0;
            padding: 30px 40px;
            border-radius: 15px;
            box-shadow: 0 0 25px rgba(0, 255, 0, 0.8);
            z-index: 2; /* ゲーム画面より手前 */
            width: 80%; /* 適度な幅に */
            max-width: 400px; /* 最大幅 */
        }
        #startButtonContainer h1 {
            font-size: 2.5em;
            color: #0f0;
            text-shadow: 0 0 10px #0f0;
            margin-bottom: 10px;
            text-align: center;
        }
        #startButtonContainer p {
            font-size: 1.2em;
            color: #fff;
            margin-bottom: 30px;
            text-align: center;
        }
        #startButton {
            background-color: #0f0;
            color: #000;
            border: none;
            padding: 15px 30px;
            font-size: 1.5em;
            font-weight: bold;
            cursor: pointer;
            border-radius: 8px;
            transition: background-color 0.3s, color 0.3s, transform 0.1s;
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.5);
            white-space: nowrap; /* ボタン内のテキストが改行されないように */
        }
        #startButton:hover {
            background-color: #0a0;
            color: #fff;
        }
        #startButton:active {
            transform: scale(0.98);
        }

        /* ローディングメッセージ */
        #loadingMessage {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 1.8em;
            font-weight: bold;
            color: #0f0;
            text-shadow: 0 0 8px #0f0;
            z-index: 4;
            display: none;
        }

        /* 音量スライダー */
        .volume-control {
            margin-top: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1em;
            color: #fff;
        }
        #volumeSlider {
            width: 150px;
            -webkit-appearance: none; /* デフォルトスタイルを無効化 */
            appearance: none;
            height: 8px;
            background: #333;
            outline: none;
            border-radius: 4px;
            cursor: pointer;
            box-shadow: inset 0 0 5px rgba(0, 255, 0, 0.3);
        }
        #volumeSlider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            background: #0f0;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.7);
        }
        #volumeSlider::-moz-range-thumb {
            width: 20px;
            height: 20px;
            background: #0f0;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.7);
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/howler/2.2.3/howler.min.js"></script>
</head>
<body>
    <div id="loadingMessage">Loading Game Assets...</div>

    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        <video autoplay loop muted playsinline id="background-video">
            <source src="background_loop.mp4" type="video/mp4">
            Your browser does not support the video tag.
        </video>
        <div id="score">Score: 0</div>
        <div id="lives">Lives: 3</div>
        <div id="level">Level: 1</div>
    </div>

    <div id="messageBox">
        <p id="message"></p>
        <button>Play Again</button>
    </div>

    <div id="startButtonContainer">
        <h1>SPACE INVADERS</h1>
        <p>Improved</p>
        <button id="startButton">TAP TO START</button>
        <div class="volume-control">
            <span>Volume</span>
            <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="0.5">
        </div>
    </div>

    <script>
        // --- Global Constants ---
        const GAME_WIDTH = 420;
        const GAME_HEIGHT = GAME_WIDTH * (19.5 / 9); // Aspect ratio for mobile portrait
        const PLAYER_SPEED = 7;
        const PLAYER_PROJECTILE_SPEED = 10;
        const INVADER_SPEED = 1;
        const INVADER_PROJECTILE_SPEED = 5;
        const INVADER_ROWS = 5;
        const INVADER_COLS = 8;
        const INVADER_WIDTH = 30;
        const INVADER_HEIGHT = 20;
        const INVADER_SPACING = 40;
        const BOSS_HP_PER_LEVEL = 5; // ボスのHPはレベルごとに増加
        const MAX_LEVELS = 5; // 最大レベル数
        const PLAYER_WIDTH = 40; // プレイヤーの幅（画像に合わせて調整）
        const PLAYER_HEIGHT = 30; // プレイヤーの高さ（画像に合わせて調整）


        const GAME_STATE = {
            LOADING: 'LOADING',
            START_SCREEN: 'START_SCREEN', // 最初の「TAP TO START」で動画再生
            VIDEO_PLAYING: 'VIDEO_PLAYING', // 動画再生中で「START GAME」待ち
            PLAYING: 'PLAYING', // 実際のゲームプレイ中
            GAME_OVER: 'GAME_OVER' // ゲームオーバー/クリア画面
        };

        // --- Global Variables ---
        let canvas, ctx;
        let player;
        let invaders = [];
        let projectiles = [];
        let invaderProjectiles = [];
        let score = 0;
        let lives = 3;
        let currentLevel = 1;
        let lastTimestamp = 0;
        let animationFrameId;
        let currentGameState = GAME_STATE.LOADING;
        let loadedImages = {};
        let loadedAudio = {};
        let boss = null;

        // UI elements
        let scoreDisplay;
        let livesDisplay;
        let levelDisplay;
        let messageBox;
        let messageText;
        let startButtonContainer;
        let startButton;
        let loadingMessage;
        let volumeSlider; // 音量スライダー
        let backgroundMusic; // Howler.js BGM
        let backgroundVideo; // 背景動画要素

        // --- Initialization ---

        function init() {
            initGameEssentials();
            loadAssets().then(() => {
                hideLoadingMessage();
                currentGameState = GAME_STATE.START_SCREEN;
                showStartButton(); // ここでスタートボタンと動画を表示

                // 音量スライダーの初期値を設定し、イベントリスナーを追加
                const savedVolume = parseFloat(localStorage.getItem('gameVolume')) || 0.5;
                Howler.volume(savedVolume);
                volumeSlider.value = savedVolume;
                if (backgroundVideo) { // 初期ロード時に動画の音量も同期
                    backgroundVideo.volume = savedVolume;
                    // HTMLでmutedされているので、ここでは特にミュート解除はしない
                }

                volumeSlider.addEventListener('input', (e) => {
                    const newVolume = parseFloat(e.target.value);
                    Howler.volume(newVolume); // Howler.jsのグローバル音量を更新
                    localStorage.setItem('gameVolume', newVolume); // 音量設定をローカルストレージに保存

                    // 背景動画の音量も同期させる
                    if (backgroundVideo) {
                        backgroundVideo.volume = newVolume;
                    }
                });
            }).catch(error => {
                console.error("Error loading assets:", error);
                loadingMessage.innerText = "Error loading assets. Please try again.";
            });
        }

        // Sets up canvas, player object, and event listeners once
        function initGameEssentials() {
            canvas = document.getElementById('gameCanvas');
            ctx = canvas.getContext('2d');
            canvas.width = GAME_WIDTH;
            canvas.height = GAME_HEIGHT;
            canvas.style.display = 'none'; // ゲーム開始前はキャンバスを非表示にする

            // UI elements
            scoreDisplay = document.getElementById('score');
            livesDisplay = document.getElementById('lives');
            levelDisplay = document.getElementById('level');
            messageBox = document.getElementById('messageBox');
            messageText = messageBox.querySelector('p');
            startButtonContainer = document.getElementById('startButtonContainer');
            startButton = document.getElementById('startButton');
            loadingMessage = document.getElementById('loadingMessage');
            volumeSlider = document.getElementById('volumeSlider'); // スライダー要素を取得

            // 背景動画要素を取得
            backgroundVideo = document.getElementById('background-video');
            // 初期状態（ロード完了時）では動画が表示されている状態にする
            if (backgroundVideo) {
                backgroundVideo.style.display = 'block';
                // z-indexはCSSで設定されているが、念のため明示
                backgroundVideo.style.zIndex = 0; 
            }
            
            // 初期状態ではHowler.jsのBGMを停止しておく (スタート画面では動画の音が鳴るため)
            if (loadedAudio.backgroundMusic) {
                console.log("initGameEssentials - Howler.jsのBGMを停止します。");
                loadedAudio.backgroundMusic.stop();
            }

            player = {
                x: GAME_WIDTH / 2 - PLAYER_WIDTH / 2,
                y: GAME_HEIGHT - PLAYER_HEIGHT - 120,
                width: PLAYER_WIDTH,
                height: PLAYER_HEIGHT,
                movingLeft: false,
                movingRight: false,
                invincible: false, // Is player invincible?
                invincibleTimer: 0, // How long player has been invincible
                blinkTimer: 0 // For blinking effect
            };

            // Input Event Listeners
            document.addEventListener('keydown', handleKeyDown);
            document.addEventListener('keyup', handleKeyUp);

            // Touch event listeners for mobile
            // canvasではなく、body全体でイベントを捕捉し、ゲーム状態に応じて処理を振り分け
            document.body.addEventListener('touchstart', handleTouchStart, { passive: false });
            document.body.addEventListener('touchmove', handleTouchMove, { passive: false });
            document.body.addEventListener('touchend', handleTouchEnd);

            // Mouse event listeners for desktop
            // canvasではなく、body全体でイベントを捕捉し、ゲーム状態に応じて処理を振り分け
            document.body.addEventListener('mousedown', handleMouseDown);
            document.body.addEventListener('mousemove', handleMouseMove);
            document.body.addEventListener('mouseup', handleMouseUp);

            // Screen orientation lock (Added in a previous iteration)
            if (screen.orientation && screen.orientation.lock) {
                screen.orientation.lock('portrait')
                    .then(() => console.log("画面の向きを縦向きにロックしました。"))
                    .catch(error => console.warn("画面の向きをロックできませんでした。:", error.name, error.message));
            }
        }

        function loadAssets() {
            showLoadingMessage();
            const imagePromises = [
                // プレイヤーの画像: あなたの 'camera_biz.png' を使用します
                loadImage('player', 'camera_biz.png'), 

                // インベーダーの画像: あなたの 'invader1.png' を使用します
                loadImage('invader', 'invader1.png'), 
                
                // ボスの画像: あなたの 'invader2.png' を使用します
                loadImage('boss', 'invader2.png'),

                // ↓↓ 以下は現在ファイルが不足しているか、不要とされた画像です ↓↓
                // これらのファイルを追加して、ゲームで利用したい場合は、
                // 各行の先頭にある '//' を削除 (コメントアウトを解除) してください。
                
                // プレイヤーの弾の画像
                // loadImage('projectile', 'image_d3adcb.png'),
                
                // 敵の弾の画像
                // loadImage('invaderProjectile', 'image_d3a96c.png'),
                
                // ボスの弾の画像
                // loadImage('bossProjectile', 'image_d25f70.png')
            ];
            const audioPromises = [
                // BGM: bgm_amelo1.mp3 は必ず 'audio/' フォルダに入れてください
                loadAudio('backgroundMusic', 'audio/bgm_amelo1.mp3'),

                // ↓↓ 以下は全て、ユーザーからの要望により不要とされた効果音です ↓↓
                // これらのファイルを追加して、ゲームで利用したい場合は、
                // 各行の先頭にある '//' を削除 (コメントアウトを解除) してください。

                // 射撃音
                // loadAudio('shoot', 'audio/shoot.wav'),
                
                // 敵の被弾音
                // loadAudio('invaderHit', 'audio/invader_hit.wav'), 
                
                // プレイヤー被弾音
                // loadAudio('playerHit', 'audio/player_hit.wav'),
                
                // ゲームオーバー音
                // loadAudio('gameOver', 'audio/game_over.wav'),
                
                // レベルクリア音
                // loadAudio('levelClear', 'audio/level_clear.wav'),
                
                // ボス被弾音
                // loadAudio('bossHit', 'audio/boss_hit.wav'),     
                
                // ボス撃破音
                // loadAudio('bossDefeat', 'audio/boss_defeat.wav'), 
            ];

            return Promise.all([...imagePromises, ...audioPromises]);
        }

        function loadImage(name, src) {
            return new Promise((resolve, reject) => {
                const img = new Image();
                img.src = src;
                img.onload = () => {
                    loadedImages[name] = img;
                    resolve();
                };
                img.onerror = (e) => reject(new Error(`Failed to load image: <span class="math-inline">\{src\} \(</span>{e.message || e})`)); // エラーメッセージを詳細化
            });
        }

        function loadAudio(name, src) {
            return new Promise((resolve, reject) => {
                const sound = new Howl({
                    src: [src],
                    volume: Howler.volume(), // グローバル音量設定を反映
                    onload: () => {
                        loadedAudio[name] = sound;
                        resolve();
                    },
                    onloaderror: (id, error) => reject(new Error(`Failed to load audio: ${src} (ID: ${id}, Error: ${error})`)) // エラーメッセージを詳細化
                });
            });
        }

        // --- Game State Management ---

        function createInvaders() {
            invaders = [];
            const startX = (GAME_WIDTH - (INVADER_COLS * (INVADER_WIDTH + INVADER_SPACING) - INVADER_SPACING)) / 2;
            const startY = 50; // 少し上から開始

            for (let row = 0; row < INVADER_ROWS; row++) {
                for (let col = 0; col < INVADER_COLS; col++) {
                    invaders.push({
                        x: startX + col * (INVADER_WIDTH + INVADER_SPACING),
                        y: startY + row * (INVADER_HEIGHT + INVADER_SPACING),
                        width: INVADER_WIDTH,
                        height: INVADER_HEIGHT,
                        dx: INVADER_SPEED + (currentLevel - 1) * 0.5, // レベルアップで速くなる
                        hp: 1
                    });
                }
            }
        }

        function createBoss() {
            boss = {
                x: GAME_WIDTH / 2 - 50, // 中央に配置
                y: 30, // 上の方に配置
                width: 100,
                height: 80,
                dx: (INVADER_SPEED + (currentLevel - 1) * 0.5) * 1.5, // インベーダーより速く
                hp: BOSS_HP_PER_LEVEL * currentLevel, // レベルごとにHPが増加
                shootTimer: 0, // 発射間隔を管理
                shootInterval: 60 // 発射間隔のフレーム数
            };
        }

        function startGame(isNewGame) {
            if (animationFrameId) {
                cancelAnimationFrame(animationFrameId);
                animationFrameId = null;
            }

            if (isNewGame) {
                score = 0;
                lives = 3;
                currentLevel = 1;
            } else {
                player.x = GAME_WIDTH / 2 - PLAYER_WIDTH / 2;
                player.movingLeft = false;
                player.movingRight = false;
                player.invincible = false;
                player.invincibleTimer = 0;
                player.blinkTimer = 0;
            }
            
            boss = null;
            projectiles = [];
            invaderProjectiles = [];

            createInvaders();

            updateScoreDisplay();
            updateLivesDisplay();
            updateLevelDisplay();
            hideMessageBox();
            hideStartButton(); // ゲーム開始時にスタートボタンと動画を隠す

            currentGameState = GAME_STATE.PLAYING;
            lastTimestamp = performance.now();

            // Howler.jsのBGMを最初から再生 (ゲームプレイ中のBGM)
            if (loadedAudio.backgroundMusic) {
                console.log("startGame - Howler.jsのBGMを最初から再生します。");
                loadedAudio.backgroundMusic.stop();
                loadedAudio.backgroundMusic.play();
                loadedAudio.backgroundMusic.loop(true);
                loadedAudio.backgroundMusic.volume(Howler.volume());
            }

            animationFrameId = requestAnimationFrame(update);
        }

        function endGame(win) {
            currentGameState = GAME_STATE.GAME_OVER;
            if (animationFrameId) {
                cancelAnimationFrame(animationFrameId);
                animationFrameId = null;
            }

            // BGMの停止と背景動画の表示/音声制御
            if (loadedAudio.backgroundMusic) {
                if (!win || currentLevel >= MAX_LEVELS) {
                    // ゲームオーバーまたは全レベルクリア時: BGMを停止
                    console.log("endGame - Howler.jsのBGMを停止します（ゲームオーバーまたは全レベルクリア）。");
                    loadedAudio.backgroundMusic.stop();
                    
                    // 背景動画を再表示し、再生を確実に開始 (スタート画面に戻るため)
                    if (backgroundVideo) {
                        backgroundVideo.style.display = 'block'; // 動画を再表示する
                        backgroundVideo.muted = false; // ミュートを解除
                        backgroundVideo.volume = Howler.volume(); // スライダーの音量に合わせる
                        backgroundVideo.play().catch(e => console.error("Video playback error:", e)); // 念のため再生開始
                        backgroundVideo.style.zIndex = 0; // Canvasと同じか上に配置
                    }
                    canvas.style.display = 'none'; // キャンバスを非表示に戻す
                    showStartButton(); // スタートボタンを再表示し、初期状態に戻す
                } else {
                    // レベルクリアで次のレベルへ進む場合: BGMは継続。背景動画は非表示のまま
                    console.log("endGame - レベルクリア、Howler.jsのBGMは継続します。");
                    // 背景動画は非表示のままなので何もしない
                    if (backgroundVideo) {
                        backgroundVideo.style.display = 'none'; // 念のため非表示を維持
                        backgroundVideo.pause(); // 一時停止を維持
                        backgroundVideo.currentTime = 0; // 最初に戻す
                    }
                    canvas.style.display = 'block'; // キャンバスは表示されたまま
                }
            } else if (backgroundVideo && (!win || currentLevel >= MAX_LEVELS)) {
                    // loadedAudio.backgroundMusicがないが、backgroundVideoがありゲームオーバー/全レベルクリアの場合 (念のため)
                    backgroundVideo.style.display = 'block'; // 動画を再表示する
                    backgroundVideo.muted = false;
                    backgroundVideo.volume = Howler.volume();
                    backgroundVideo.play().catch(e => console.error("Video playback error:", e));
                    backgroundVideo.style.zIndex = 0; // Canvasと同じか上に配置
                    canvas.style.display = 'none'; // キャンバスを非表示に戻す
                    showStartButton(); // スタートボタンを再表示し、初期状態に戻す
            }


            let message = '';
            const playAgainButton = messageBox.querySelector('button');

            if (win) {
                if (currentLevel >= MAX_LEVELS) {
                    message = `You Win! Final Score: ${score}`;
                    playAgainButton.innerText = "Play Again";
                    playAgainButton.onclick = () => startGame(true);
                } else {
                    message = `Level ${currentLevel} Clear! Score: ${score}`;
                    currentLevel++;
                    playAgainButton.innerText = `Next Level (${currentLevel})`;
                    playAgainButton.onclick = () => startGame(false); // 次のレベルへ
                }
            } else {
                message = `Game Over! Score: ${score}`;
                playAgainButton.innerText = "Play Again";
                playAgainButton.onclick = () => startGame(true);
            }
            showMessage(message);
        }

        // --- Game Loop ---

        function update(timestamp) {
            const deltaTime = (timestamp - lastTimestamp) / 1000; // Convert to seconds
            lastTimestamp = timestamp;

            if (currentGameState !== GAME_STATE.PLAYING) {
                animationFrameId = requestAnimationFrame(update);
                return;
            }

            // Update player position
            if (player.movingLeft && player.x > 0) {
                player.x -= PLAYER_SPEED;
            }
            if (player.movingRight && player.x < GAME_WIDTH - player.width) {
                player.x += PLAYER_SPEED;
            }

            // Update projectiles
            projectiles.forEach(p => p.y -= PLAYER_PROJECTILE_SPEED);
            projectiles = projectiles.filter(p => p.y > 0); // Remove off-screen

            // Update invader projectiles
            invaderProjectiles.forEach(p => p.y += INVADER_PROJECTILE_SPEED);
            invaderProjectiles = invaderProjectiles.filter(p => p.y < GAME_HEIGHT); // Remove off-screen

            // Update invader movement
            let hitEdge = false;
            invaders.forEach(invader => {
                invader.x += invader.dx;
                if (invader.x + invader.width > GAME_WIDTH || invader.x < 0) {
                    hitEdge = true;
                }
            });

            if (hitEdge) {
                invaders.forEach(invader => {
                    invader.dx *= -1; // Reverse direction
                    invader.y += 20; // Move down
                });
            }

            // Update boss movement (if exists)
            if (boss) {
                boss.x += boss.dx;
                if (boss.x + boss.width > GAME_WIDTH || boss.x < 0) {
                    boss.dx *= -1;
                }

                // Boss shooting
                boss.shootTimer++;
                if (boss.shootTimer >= boss.shootInterval) {
                    invaderProjectiles.push({
                        x: boss.x + boss.width / 2 - 2,
                        y: boss.y + boss.height,
                        width: 4,
                        height: 10
                    });
                    boss.shootTimer = 0;
                }
            }

            // Collision Detection: Player Projectiles vs Invaders
            projectiles.forEach((p, pIndex) => {
                invaders.forEach((invader, invaderIndex) => {
                    if (
                        p.x < invader.x + invader.width &&
                        p.x + p.width > invader.x &&
                        p.y < invader.y + invader.height &&
                        p.y + p.height > invader.y
                    ) {
                        // Collision!
                        invader.hp--;
                        projectiles.splice(pIndex, 1); // Remove projectile
                        
                        if (invader.hp <= 0) {
                            invaders.splice(invaderIndex, 1); // Remove invader
                            score += 10; // Score for invader
                            updateScoreDisplay();
                            // if (loadedAudio.invaderHit) loadedAudio.invaderHit.play(); // Play hit sound
                        }
                        // else {
                        //     if (loadedAudio.invaderHit) loadedAudio.invaderHit.play(); // Play hit sound even if not defeated
                        // }
                    }
                });
            });

            // Collision Detection: Player Projectiles vs Boss
            if (boss) {
                projectiles.forEach((p, pIndex) => {
                    if (
                        p.x < boss.x + boss.width &&
                        p.x + p.width > boss.x &&
                        p.y < boss.y + boss.height &&
                        p.y + p.height > boss.y
                    ) {
                        // Collision!
                        boss.hp--;
                        projectiles.splice(pIndex, 1); // Remove projectile
                        // if (loadedAudio.bossHit) loadedAudio.bossHit.play(); // Play boss hit sound

                        if (boss.hp <= 0) {
                            // if (loadedAudio.bossDefeat) loadedAudio.bossDefeat.play(); // Play boss defeat sound
                            score += 100 * currentLevel; // Score for boss defeat
                            updateScoreDisplay();
                            boss = null; // Remove boss
                        }
                    }
                });
            }


            // Collision Detection: Invader Projectiles vs Player
            if (!player.invincible) {
                invaderProjectiles.forEach((p, pIndex) => {
                    if (
                        p.x < player.x + player.width &&
                        p.x + p.width > player.x &&
                        p.y < player.y + player.height &&
                        p.y + p.height > player.y
                    ) {
                        // Collision!
                        invaderProjectiles.splice(pIndex, 1); // Remove projectile
                        lives--;
                        updateLivesDisplay();
                        // if (loadedAudio.playerHit) loadedAudio.playerHit.play(); // Play player hit sound

                        if (lives <= 0) {
                            // if (loadedAudio.gameOver) loadedAudio.gameOver.play(); // Play game over sound
                            endGame(false); // Game Over
                        } else {
                            player.invincible = true;
                            player.invincibleTimer = 0;
                            player.blinkTimer = 0;
                        }
                    }
                });
            }

            // Invincible Timer & Blinking
            if (player.invincible) {
                player.invincibleTimer++;
                player.blinkTimer++;

                // Blinking effect (every 10 frames)
                if (player.blinkTimer >= 10) {
                    player.blinkTimer = 0;
                }

                if (player.invincibleTimer >= 100) { // Invincible for 100 frames (approx 1.6 seconds)
                    player.invincible = false;
                    player.invincibleTimer = 0;
                }
            }


            // Check for win condition (all invaders and boss defeated)
            if (invaders.length === 0 && boss === null) {
                // if (loadedAudio.levelClear) loadedAudio.levelClear.play(); // Play level clear sound
                endGame(true); // Win!
            }


            draw();
            animationFrameId = requestAnimationFrame(update);
        }

        // --- Drawing Functions ---

        function draw() {
            ctx.clearRect(0, 0, GAME_WIDTH, GAME_HEIGHT); // Clear canvas

            // Draw player
            // Blinking effect during invincibility
            if (player.invincible && player.blinkTimer < 5) {
                // Do not draw player (creating the blink)
            } else {
                if (loadedImages.player) {
                    ctx.drawImage(loadedImages.player, player.x, player.y, player.width, player.height);
                } else {
                    ctx.fillStyle = 'blue';
                    ctx.fillRect(player.x, player.y, player.width, player.height);
                }
            }

            // Draw invaders
            invaders.forEach(invader => {
                if (loadedImages.invader) {
                    ctx.drawImage(loadedImages.invader, invader.x, invader.y, invader.width, invader.height);
                } else {
                    ctx.fillStyle = 'green';
                    ctx.fillRect(invader.x, invader.y, invader.width, invader.height);
                }
            });

            // Draw boss (if exists)
            if (boss) {
                if (loadedImages.boss) {
                    ctx.drawImage(loadedImages.boss, boss.x, boss.y, boss.width, boss.height);
                } else {
                    ctx.fillStyle = 'purple';
                    ctx.fillRect(boss.x, boss.y, boss.width, boss.height);
                }
            }

            // Draw projectiles
            projectiles.forEach(p => {
                if (loadedImages.projectile) {
                    ctx.drawImage(loadedImages.projectile, p.x, p.y, p.width, p.height);
                } else {
                    ctx.fillStyle = 'white';
                    ctx.fillRect(p.x, p.y, p.width, p.height);
                }
            });

            // Draw invader projectiles
            invaderProjectiles.forEach(p => {
                if (loadedImages.invaderProjectile) {
                    ctx.drawImage(loadedImages.invaderProjectile, p.x, p.y, p.width, p.height);
                } else {
                    ctx.fillStyle = 'red';
                    ctx.fillRect(p.x, p.y, p.width, p.height);
                }
            });
        }

        // --- Input Handlers ---

        function handleKeyDown(e) {
            if (currentGameState === GAME_STATE.PLAYING) {
                if (e.key === 'ArrowLeft') {
                    player.movingLeft = true;
                } else if (e.key === 'ArrowRight') {
                    player.movingRight = true;
                } else if (e.key === ' ') { // Spacebar for shooting
                    e.preventDefault(); // Prevent scrolling
                    shootProjectile();
                }
            }
        }

        function handleKeyUp(e) {
            if (currentGameState === GAME_STATE.PLAYING) {
                if (e.key === 'ArrowLeft') {
                    player.movingLeft = false;
                } else if (e.key === 'ArrowRight') {
                    player.movingRight = false;
                }
            }
        }

        let touchStartX = null;
        let touchIdentifier = null; // トラッキングする最初のタッチの識別子

        function handleTouchStart(e) {
            if (currentGameState === GAME_STATE.START_SCREEN) {
                // スタートボタンが押された場合の処理
                const rect = startButton.getBoundingClientRect();
                const touch = e.changedTouches[0];
                if (touch.clientX >= rect.left && touch.clientX <= rect.right &&
                    touch.clientY >= rect.top && touch.clientY <= rect.bottom) {
                    // startButtonがタップされた
                    console.log("Start Button Tapped!");
                    e.preventDefault(); // デフォルトのタッチイベントを停止
                    startButton.click(); // プログラムからクリックイベントを発火
                    return;
                }
            } else if (currentGameState === GAME_STATE.GAME_OVER) {
                // リプレイボタンが押された場合の処理
                const rect = messageBox.querySelector('button').getBoundingClientRect();
                const touch = e.changedTouches[0];
                if (touch.clientX >= rect.left && touch.clientX <= rect.right &&
                    touch.clientY >= rect.top && touch.clientY <= rect.bottom) {
                    e.preventDefault();
                    messageBox.querySelector('button').click();
                    return;
                }
            }

            if (currentGameState === GAME_STATE.PLAYING) {
                e.preventDefault(); // ゲーム中はタッチイベントのデフォルト動作を停止
                if (e.touches.length > 0 && touchIdentifier === null) {
                    // 最初のタッチのみをトラッキング
                    touchIdentifier = e.touches[0].identifier;
                    touchStartX = e.touches[0].clientX;
                    shootProjectile(); // タッチで射撃
                }
            }
        }

        function handleTouchMove(e) {
            if (currentGameState === GAME_STATE.PLAYING) {
                e.preventDefault(); // ゲーム中はタッチイベントのデフォルト動作を停止
                for (let i = 0; i < e.changedTouches.length; i++) {
                    const touch = e.changedTouches[i];
                    if (touch.identifier === touchIdentifier) {
                        // トラッキングしているタッチの場合のみ移動を処理
                        const currentX = touch.clientX;
                        const canvasRect = canvas.getBoundingClientRect();
                        const scaleX = GAME_WIDTH / canvasRect.width;

                        const playerCenter = player.x + player.width / 2;
                        const touchXInGame = (currentX - canvasRect.left) * scaleX;

                        const moveThreshold = 5; // タッチ移動の閾値

                        if (Math.abs(touchXInGame - playerCenter) > moveThreshold) {
                            if (touchXInGame < playerCenter) {
                                player.movingLeft = true;
                                player.movingRight = false;
                            } else {
                                player.movingRight = true;
                                player.movingLeft = false;
                            }
                        } else {
                            player.movingLeft = false;
                            player.movingRight = false;
                        }
                        break;
                    }
                }
            }
        }

        function handleTouchEnd(e) {
            if (currentGameState === GAME_STATE.PLAYING) {
                for (let i = 0; i < e.changedTouches.length; i++) {
                    if (e.changedTouches[i].identifier === touchIdentifier) {
                        player.movingLeft = false;
                        player.movingRight = false;
                        touchStartX = null;
                        touchIdentifier = null; // トラッキングを終了
                        break;
                    }
                }
            }
        }


        let isMouseDown = false;
        let mouseStartX = null;

        function handleMouseDown(e) {
            if (currentGameState === GAME_STATE.START_SCREEN) {
                const rect = startButton.getBoundingClientRect();
                if (e.clientX >= rect.left && e.clientX <= rect.right &&
                    e.clientY >= rect.top && e.clientY <= rect.bottom) {
                    e.preventDefault();
                    startButton.click();
                    return;
                }
            } else if (currentGameState === GAME_STATE.GAME_OVER) {
                const rect = messageBox.querySelector('button').getBoundingClientRect();
                if (e.clientX >= rect.left && e.clientX <= rect.right &&
                    e.clientY >= rect.top && e.clientY <= rect.bottom) {
                    e.preventDefault();
                    messageBox.querySelector('button').click();
                    return;
                }
            }

            if (currentGameState === GAME_STATE.PLAYING) {
                isMouseDown = true;
                mouseStartX = e.clientX;
                shootProjectile(); // クリックで射撃
            }
        }

        function handleMouseMove(e) {
            if (currentGameState === GAME_STATE.PLAYING && isMouseDown) {
                const currentX = e.clientX;
                const canvasRect = canvas.getBoundingClientRect();
                const scaleX = GAME_WIDTH / canvasRect.width;

                const playerCenter = player.x + player.width / 2;
                const mouseXInGame = (currentX - canvasRect.left) * scaleX;

                const moveThreshold = 5; // マウス移動の閾値

                if (Math.abs(mouseXInGame - playerCenter) > moveThreshold) {
                    if (mouseXInGame < playerCenter) {
                        player.movingLeft = true;
                        player.movingRight = false;
                    } else {
                        player.movingRight = true;
                        player.movingLeft = false;
                    }
                } else {
                    player.movingLeft = false;
                    player.movingRight = false;
                }
            }
        }

        function handleMouseUp(e) {
            if (currentGameState === GAME_STATE.PLAYING) {
                isMouseDown = false;
                player.movingLeft = false;
                player.movingRight = false;
                mouseStartX = null;
            }
        }

        function shootProjectile() {
            // if (loadedAudio.shoot) loadedAudio.shoot.play(); // Play shoot sound
            projectiles.push({
                x: player.x + player.width / 2 - 2, // Centered
                y: player.y,
                width: 4,
                height: 10
            });
        }

        // --- UI Update Functions ---

        function updateScoreDisplay() {
            scoreDisplay.innerText = `Score: ${score}`;
        }

        function updateLivesDisplay() {
            livesDisplay.innerText = `Lives: ${lives}`;
        }

        function updateLevelDisplay() {
            levelDisplay.innerText = `Level: ${currentLevel}`;
            if (currentLevel > 1) {
                createBoss(); // レベル2からボス出現
            }
        }

        function showMessage(msg) {
            messageText.innerText = msg;
            messageBox.style.display = 'block';
        }

        function hideMessageBox() {
            messageBox.style.display = 'none';
        }

        function showStartButton() {
            startButtonContainer.style.display = 'flex'; // ボタンを表示
            if (backgroundVideo) {
                backgroundVideo.style.display = 'block'; // 動画も表示
                backgroundVideo.muted = false; // ここで動画のミュートを解除
                backgroundVideo.volume = Howler.volume(); // 音量をスライダーと同期
                backgroundVideo.play().catch(e => console.error("Video playback error:", e)); // 再生を試みる
            }
            canvas.style.display = 'none'; // キャンバスは非表示
            scoreDisplay.style.display = 'none';
            livesDisplay.style.display = 'none';
            levelDisplay.style.display = 'none';
        }

        function hideStartButton() {

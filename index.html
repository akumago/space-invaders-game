// --- Game Loop ---

function update(timestamp) {
    // animationFrameId が null の場合はループを抜ける (endGameなどで設定される)
    // これは update の最後の requestAnimationFrame(update) が呼ばれない場合にループが自然に停止するための安全策
    if (animationFrameId === null) {
        // console.log("Animation frame cancelled, stopping update loop."); // Debug Log (頻繁に出るのでコメントアウト)
        return; // ループを終了
    }

    // deltaTime を計算（秒単位）
    const deltaTime = (timestamp - lastTimestamp) / 1000;
    lastTimestamp = timestamp;

    // ゲームがロード中、スタート画面、またはゲームオーバー状態の場合は更新処理の大部分をスキップ
    // ただし、背景動画やUIは表示されるため、描画自体は必要
    // FINAL_BOSS状態でも更新処理は行われます
    if (currentGameState === GAME_STATE.LOADING || currentGameState === GAME_STATE.START_SCREEN || currentGameState === GAME_STATE.GAME_OVER) {
        // これらの状態では描画のみ行い、ゲームオブジェクトの更新や当たり判定はスキップ
        draw();
        // これらの状態では update 関数の最後で requestAnimationFrame は呼ばれないため、ループはこのまま自然に停止する
        // スタートボタンやメッセージボックスのイベントリスナーで次のゲームが開始されるまで待機
         // loadingMessageが表示されている間はゲームループを進めない
        if (document.getElementById('loadingMessage').style.display !== 'block') {
             // ロード完了後、初回表示のための描画は行う
             draw(); // 描画は必要
             // ただし、次のフレームはリクエストしないため、ループは停止したままになる
        }
        return; // 更新処理の本体はスキップ
    }


    // --- PLAYING 状態と FINAL_BOSS 状態共通の更新処理 ---

    // Update player position (deltaTime 考慮)
    // キー操作とポインタ操作を両立
    if (player) { // player オブジェクトが存在するかチェック
        const playerMoveSpeed = PLAYER_SPEED * deltaTime * 60; // deltaTime 考慮済みの移動量

        if (playerTargetX !== null) { // ポインタ操作中
            const targetPlayerCenter = playerTargetX;
            const currentPlayerCenter = player.x + player.width / 2;

            if (Math.abs(targetPlayerCenter - currentPlayerCenter) < playerMoveSpeed * 0.5) { // 目標に十分近ければ直接移動
                player.x = targetPlayerCenter - player.width / 2;
                // 目標到達してもポインタが押されている間は targetX は null にしない
                // playerTargetX = null; // ポインタが離されるまで目標は維持
            } else {
                if (targetPlayerCenter < currentPlayerCenter) {
                    player.x -= playerMoveSpeed;
                } else {
                    player.x += playerMoveSpeed;
                }
            }
             // ポインタ操作時はキー操作フラグをリセット
             player.movingLeft = false;
             player.movingRight = false;

        } else if (player.movingLeft || player.movingRight) { // キー操作中
            if (player.movingLeft) {
                player.x -= playerMoveSpeed;
            } else if (player.movingRight) {
                player.x += playerMoveSpeed;
            }
        }
        // 自機が画面外に出ないようにクランプ
        player.x = Math.max(0, Math.min(player.x, GAME_WIDTH - player.width));

        // Player shooting cooldown (フレーム単位で計算、deltaTime 考慮)
        if (playerShootCooldown > 0) {
            playerShootCooldown -= deltaTime * 60;
        }
        // ポインタが押されている間、クールダウンが完了していれば発射
        // またはキーボードの射撃キーが押されている場合 (別途キーイベントで実装)
        if (isPointerDown && playerShootCooldown <= 0) {
            // ポインタ操作時のみ自動連射
            shootProjectile();
        }
    }


    // Update projectiles (自機の弾) (deltaTime 考慮)
    projectiles.forEach(p => p.y -= PLAYER_PROJECTILE_SPEED * deltaTime * 60);
    projectiles = projectiles.filter(p => p.y > 0 - p.height); // 画面外に出たら削除

    // Update invader projectiles (敵弾 - 通常敵とボス、最終ボス含む) (deltaTime 考慮)
    invaderProjectiles.forEach(p => {
        p.x += p.dx * deltaTime * 60;
        p.y += p.dy * deltaTime * 60;
    });
    // 画面外に出たら削除 (上下左右に対応)
    invaderProjectiles = invaderProjectiles.filter(p =>
        p.y < GAME_HEIGHT + p.height &&
        p.y > 0 - p.height &&
        p.x > 0 - p.width &&
        p.x < GAME_WIDTH + p.width
    );

    // Player invincibility timer (deltaTime 考慮)
    if (player && player.invincible) { // player オブジェクトが存在するかチェック
        player.invincibleTimer += deltaTime * 60; // フレーム単位でカウントアップ
        player.blinkTimer += deltaTime * 60; // フレーム単位でカウントアップ
        if (player.invincibleTimer >= 120) { // 120フレーム = 2秒 (60 fps想定)
            player.invincible = false;
            player.invincibleTimer = 0;
            player.blinkTimer = 0; // 点滅タイマーリセット
            console.log("Player is no longer invincible."); // Debug Log
        }
         // 点滅タイマーが一定値を超えたらリセット (点滅頻度調整用)
         if (player.blinkTimer >= 10) { // 10フレームごとに点滅反転
             player.blinkTimer = 0;
         }
    }


    // --- 各ゲーム状態ごとの固有の更新処理 ---

    // PLAYING 状態の更新処理 (インベーダーと通常ボス)
    if (currentGameState === GAME_STATE.PLAYING) {
        // ★インベーダーグループ全体の移動処理 (deltaTime対応)
        if (invaders.length > 0) {
            let minX = Infinity;
            let maxX = -Infinity;

            // 全インベーダーを移動 (deltaTime 考慮)
            invaders.forEach(invader => {
                invader.x += invaderSpeed * invaderDirection * deltaTime * 60;
                minX = Math.min(minX, invader.x);
                maxX = Math.max(maxX, invader.x + invader.width);
            });

            let reverseDirection = false;
            // 端に到達したかどうかの判定（画面の端で判定）
            if (minX < 0 && invaderDirection < 0) {
                reverseDirection = true;
            } else if (maxX > GAME_WIDTH && invaderDirection > 0) {
                reverseDirection = true;
            }

            if (reverseDirection) {
                invaderDirection *= -1; // 水平方向反転

                // 方向転換と同時に下へ移動（時間間隔のチェックも維持）
                const currentTime = performance.now();
                if (currentTime - lastInvaderMoveDownTime > INVADER_MOVE_DOWN_INTERVAL) {
                    invaders.forEach(invader => {
                        invader.y += INVADER_MOVE_DOWN_AMOUNT;
                    });
                    lastInvaderMoveDownTime = currentTime; // タイマー更新
                }
            }
        } // if (invaders.length > 0) End

        // Invader shooting (PLAYING状態かつインベーダーが存在する場合)
        if (invaders.length > 0) {
            // deltaTime を考慮して発射確率を調整
            // 1フレームあたりの発射確率 = 1 / currentInvaderShootInterval (フレーム単位)
            // 経過時間 (deltaTime) あたりの発射回数の期待値 = (1 / currentInvaderShootInterval) * (deltaTime * 60)
            // 確率として表現 = (1 / currentInvaderShootInterval) * (deltaTime * 60)
            const baseInvaderShootInterval = 90; // フレーム単位での基準間隔
            const intervalDecreasePerLevel = 3;
            const currentInvaderShootInterval = Math.max(30, baseInvaderShootInterval - (currentLevel - 1) * intervalDecreasePerLevel); // 最小間隔30フレーム
            const shootProbability = (1 / currentInvaderShootInterval) * (deltaTime * 60); // 経過時間あたりの発射確率

            if (Math.random() < shootProbability) {
                const randomInvader = invaders[Math.floor(Math.random() * invaders.length)];
                // 射撃音を鳴らす (try-catchで囲む)
                try {
                    if (loadedAudio.invaderShoot) { // もし invaderShoot というキーでロードしていれば
                        loadedAudio.invaderShoot.play();
                    } else if (loadedAudio.shoot) { // なければ自機音で代用
                         loadedAudio.shoot.play();
                    }
                } catch (e) {
                    // console.warn("Invader shoot sound playback failed:", e); // Debug Log
                }

                invaderProjectiles.push({
                    x: randomInvader.x + randomInvader.width / 2 - 2.5,
                    y: randomInvader.y + randomInvader.height,
                    width: 5, height: 10, dx: 0, dy: ENEMY_PROJECTILE_SPEED, type: 'invader'
                });
            }
        }

        // ★★★通常ボス出現のロジックです！★★★
        // インベーダー全滅かつ、まだ通常ボスが生成されていない場合 (MAX_LEVELS未満のレベルでのみ通常ボスを生成)
        if (invaders.length === 0 && !boss && !bossCreatedForThisLevel && currentLevel < MAX_LEVELS) {
            console.log(`Invaders cleared on Level ${currentLevel}. Spawning Boss!`); // Debug Log
            createBoss(); // 通常ボスを生成
            bossCreatedForThisLevel = true; // このレベルでボスは生成済みとする
            // 通常ボス出現音があれば再生 (loadedAudio.bossSpawnなど)
            try {
                if (loadedAudio.bossSpawn) { // もし bossSpawn というキーでロードしていれば
                    loadedAudio.bossSpawn.play();
                }
            } catch (e) {
                // console.warn("Boss spawn sound playback failed:", e); // Debug Log
            }
        }
        // ★★★通常ボス出現のロジック、ここまで！★★★


        // Boss movement and shooting (PLAYING状態かつ通常ボスが存在する場合)
        if (boss && !boss.isExploding) { // ボスが存在し、爆発中でなければ更新
            boss.x += boss.dx * deltaTime * 60; // deltaTime 考慮

            if (boss.x + boss.width > GAME_WIDTH || boss.x < 0) {
                boss.dx *= -1;
                // 端に張り付かないように少し押し戻す
                if (boss.x + boss.width > GAME_WIDTH) boss.x = GAME_WIDTH - boss.width;
                else if (boss.x < 0) boss.x = 0;
            }

            boss.shootTimer++;
            // 通常弾発射
            if (boss.shootTimer >= boss.shootInterval) {
                try { // 射撃音を鳴らす (try-catchで囲む)
                    if (loadedAudio.bossShoot) { // もし bossShoot というキーでロードしていれば
                        loadedAudio.bossShoot.play();
                    } else if (loadedAudio.invaderShoot) { // なければインベーダー射撃音で代用
                         loadedAudio.invaderShoot.play();
                    } else if (loadedAudio.shoot) { // それもなければ自機射撃音で代用
                         loadedAudio.shoot.play();
                    }
                } catch (e) {
                    // console.warn("Boss shoot sound playback failed:", e); // Debug Log
                }
                invaderProjectiles.push({
                    x: boss.x + boss.width / 2 - 3.5, // 弾の中心をボスの中心に合わせる
                    y: boss.y + boss.height,
                    width: 7, height: 14, dx: 0, dy: ENEMY_PROJECTILE_SPEED * 1.5, type: 'boss_straight'
                });
                boss.shootTimer = 0;
            }

            // 放射状ミサイル発射 (別のタイマー)
            boss.radialShootTimer++;
            if (boss.radialShootTimer >= boss.radialShootInterval) {
                 try { // 射撃音を鳴らす (try-catchで囲む)
                    if (loadedAudio.bossRadialShoot) { // もし bossRadialShoot というキーでロードしていれば
                        loadedAudio.bossRadialShoot.play();
                    } else if (loadedAudio.bossShoot) { // なければ通常の射撃音で代用
                        loadedAudio.bossShoot.play();
                    } else if (loadedAudio.invaderShoot) { // なければインベーダー射撃音で代用
                         loadedAudio.invaderShoot.play();
                    } else if (loadedAudio.shoot) { // それもなければ自機射撃音で代用
                         loadedAudio.shoot.play();
                    }
                } catch (e) {
                    // console.warn("Boss radial shoot sound playback failed:", e); // Debug Log
                }

                const radialCount = BOSS_RADIAL_PROJECTILE_COUNT_BASE + Math.floor(currentLevel / 2); // レベルに応じて増加
                const startAngle = Math.PI / 2 - BOSS_RADIAL_SPREAD_ANGLE / 2;
                const angleStep = radialCount > 1 ? BOSS_RADIAL_SPREAD_ANGLE / (radialCount - 1) : 0; // 弾が1つの場合は角度ステップは0

                for (let i = 0; i < radialCount; i++) {
                    const angle = startAngle + i * angleStep;
                    invaderProjectiles.push({
                        x: boss.x + boss.width / 2 - 3.5,
                        y: boss.y + boss.height,
                        width: 7, height: 14,
                        dx: Math.cos(angle) * ENEMY_PROJECTILE_SPEED * 1.5,
                        dy: Math.sin(angle) * ENEMY_PROJECTILE_SPEED * 1.5,
                        type: 'boss_radial'
                    });
                }
                boss.radialShootTimer = 0;
            }


        } else if (boss && boss.isExploding) { // 通常ボス爆発中アニメーションタイマー (deltaTime 考慮)
            boss.explosionTimer += deltaTime * 60; // フレーム単位でカウントアップ
            if (boss.explosionTimer >= boss.explosionDuration) {
                boss = null; // 爆発アニメーション終了後、ボスを消滅させる
                // スコア加算は衝突時に行う

                // ★★★ ここが通常ボス撃破後のレベルチェック！★★★
                // インベーダーと通常ボス両方いない場合 == レベルクリア
                if (invaders.length === 0 && !boss) {
                    if (currentLevel < MAX_LEVELS) {
                        // 通常レベルクリア -> 次のレベルへ移行
                        endGame(true); // 通常レベルクリア画面へ移行（次のレベルへ）
                        console.log(`Level ${currentLevel} cleared! Proceeding to next level.`); // Debug Log
                    } else {
                        // MAX_LEVELS に到達した場合 -> 最終ボス戦を開始
                        console.log(`Level ${currentLevel} cleared! Starting Final Boss Battle!`); // Debug Log
                        startFinalBossBattle(); // ★★★ 最終ボス戦を開始する関数を呼び出す ★★★
                        // endGame(true); // これは startFinalBossBattle から最終ボス撃破後に呼ばれる
                    }
                }
            }
        }
    } // if (currentGameState === GAME_STATE.PLAYING) End

    // ★★★ここから FINAL_BOSS 状態の更新処理！★★★
    if (currentGameState === GAME_STATE.FINAL_BOSS && finalBoss) {
        if (!finalBoss.isExploding) { // 最終ボスが爆発中でなければ更新
            // 最終ボスの移動ロジック（必要であれば実装、この時点では停止）
            // finalBoss.x += finalBoss.dx * deltaTime * 60;

            // 最終ボスの射撃タイマーを更新 (deltaTime 考慮)
            finalBoss.shootTimer += deltaTime * 60;
            finalBoss.radialShootTimer += deltaTime * 60; // 放射状ミサイル用タイマーも更新

            // 最終ボスの通常弾の発射
            if (finalBoss.shootTimer >= finalBoss.shootInterval) {
                try { // 射撃音を鳴らす (try-catchで囲む)
                    if (loadedAudio.bossShoot) { loadedAudio.bossShoot.play(); }
                    else if (loadedAudio.invaderShoot) { loadedAudio.invaderShoot.play(); }
                    else if (loadedAudio.shoot) { loadedAudio.shoot.play(); }
                } catch (e) { /* console.warn("Final Boss shoot sound playback failed:", e); */ }
                invaderProjectiles.push({
                    x: finalBoss.x + finalBoss.width / 2 - 3.5,
                    y: finalBoss.y + finalBoss.height,
                    width: 7, height: 14, dx: 0, dy: ENEMY_PROJECTILE_SPEED * 1.8, type: 'finalboss_straight'
                });
                finalBoss.shootTimer = 0;
            }

            // 最終ボスの放射状ミサイルの発射
            if (finalBoss.radialShootTimer >= finalBoss.radialShootInterval) {
                 try {
                    if (loadedAudio.bossRadialShoot) { loadedAudio.bossRadialShoot.play(); }
                    else if (loadedAudio.bossShoot) { loadedAudio.bossShoot.play(); }
                    else if (loadedAudio.invaderShoot) { loadedAudio.invaderShoot.play(); }
                    else if (loadedAudio.shoot) { loadedAudio.shoot.play(); }
                } catch (e) { /* console.warn("Final Boss radial shoot sound playback failed:", e); */ }

                const radialCount = FINAL_BOSS_RADIAL_PROJECTILE_COUNT; // 最終ボス放射状ミサイル数は固定値を使用
                const startAngle = Math.PI / 2 - BOSS_RADIAL_SPREAD_ANGLE / 2;
                const angleStep = radialCount > 1 ? BOSS_RADIAL_SPREAD_ANGLE / (radialCount - 1) : 0; // 弾が1つの場合は角度ステップは0

                for (let i = 0; i < radialCount; i++) {
                    const angle = startAngle + i * angleStep;
                    invaderProjectiles.push({
                        x: finalBoss.x + finalBoss.width / 2 - 3.5,
                        y: finalBoss.y + finalBoss.height,
                        width: 7, height: 14,
                        dx: Math.cos(angle) * ENEMY_PROJECTILE_SPEED * 1.5,
                        dy: Math.sin(angle) * ENEMY_PROJECTILE_SPEED * 1.5,
                        type: 'finalboss_radial'
                    });
                }
                finalBoss.radialShootTimer = 0;
            }


        } else { // 最終ボスが爆発中の処理 (deltaTime 考慮)
            finalBoss.explosionTimer += deltaTime * 60; // フレーム単位でカウントアップ
            if (finalBoss.explosionTimer >= finalBoss.explosionDuration) {
                finalBoss = null; // 爆発アニメーション終了後、最終ボスを消滅させる
                // スコア加算は衝突時に行う

                // 最終ゲームクリア処理へ
                console.log("Final Boss defeated. Ending game with win."); // Debug Log
                endGame(true); // ゲームクリア
            }
        }
    }
    // ★★★ FINAL_BOSS 状態の更新処理、ここまで！★★★


    // Collision detection (PLAYING 状態と FINAL_BOSS 状態の両方でチェック)
    checkCollisions(); // この関数内で FINAL_BOSS 状態の衝突判定も処理されます。


    // ゲームオーバー判定 (ライフ0になったら、またはインベーダーがプレイヤーラインに到達したら) - updateの最後の方でチェック
    let invaderReachedPlayer = false;
    if (currentGameState === GAME_STATE.PLAYING && invaders.length > 0) { // インベーダーがプレイヤーラインに到達するのはPLAYING状態のみ かつ インベーダーがいる場合
         for(const invader of invaders) {
             // player オブジェクトが存在するかチェック
             if (player && invader.y + invader.height > player.y) {
                 invaderReachedPlayer = true;
                 break; // 一体でも到達したらループを抜ける
             }
         }
    }

    // ライフが0になったらゲームオーバー (ゲームオーバー状態に遷移中でなければ実行)
    if (lives <= 0 && currentGameState !== GAME_STATE.GAME_OVER) {
        console.log("Game over condition met (Lives 0). Ending game with loss."); // Debug Log
        endGame(false); // ゲームオーバー
    }
    // インベーダーがプレイヤーラインに到達したらゲームオーバー (ゲームオーバー状態に遷移中でなければ実行)
     if (invaderReachedPlayer && currentGameState !== GAME_STATE.GAME_OVER) {
         console.log("Game over condition met (Invaders reached). Ending game with loss."); // Debug Log
         endGame(false); // ゲームオーバー
     }


    // 描画は update の最後で行われます
    draw(); // ★ draw() 関数が呼ばれていることを確認 ★


    // 次のフレームを予約
    // ゲームがプレイ中またはボス戦中の場合のみ、次のフレームをリクエスト
    // GAME_OVERなどの状態では、endGameでanimationFrameId=nullになるため、
    // update関数冒頭のチェック(if (animationFrameId === null) return;)でループが自然に停止する
    if (currentGameState === GAME_STATE.PLAYING || currentGameState === GAME_STATE.FINAL_BOSS) {
        animationFrameId = requestAnimationFrame(update);
    } else {
        // console.log(`Game loop paused/stopped in state: ${currentGameState}`); // Debug Log (頻繁に出るのでコメントアウト)
    }

} // ★ update() 関数の閉じカッコ } ★


// --- Drawing Functions ---

function draw() {
    // context が取得できているかチェック
    if (!ctx) {
        console.error("Canvas context not available for drawing!"); return;
    }

    // 描画の最初に画面をクリアし、背景を描画
    // Canvasのサイズはリサイズ関数で設定済み
    ctx.fillStyle = '#000'; // 背景を黒に設定
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Canvasの解像度(GAME_WIDTH, GAME_HEIGHT)と表示サイズ(canvas.width, canvas.height)が異なる場合、
    // 描画内容をCanvasの表示サイズに合わせて伸縮させるための変換行列を設定
    // これにより、ゲーム内部の座標系(0～GAME_WIDTH, 0～GAME_HEIGHT)で描画したものが、
    // Canvasの現在の表示サイズに合わせて正しく拡大・縮小されて表示される
    if (canvas.width !== GAME_WIDTH || canvas.height !== GAME_HEIGHT) {
        ctx.save(); // 現在の変換行列を保存
        // スケール変換を設定
        const scaleX = canvas.width / GAME_WIDTH;
        const scaleY = canvas.height / GAME_HEIGHT;
        ctx.scale(scaleX, scaleY);
         // Debug Log (頻繁に出るのでコメントアウト)
         // console.log(`Drawing scaled: ${scaleX.toFixed(2)}, ${scaleY.toFixed(2)}`);
    }


    // Draw player
    // 点滅効果のロジックを追加
    // ゲームオーバー画面ではプレイヤーは描画しない
    // 無敵中は点滅 (blinkTimer % 20 < 10 で非表示、ここでは blinkTimer >= 0 は常に真なので >= 0 を削除)
    // player オブジェクトが存在し、ゲームオーバー状態でなければ描画
    if (player && currentGameState !== GAME_STATE.GAME_OVER) {
        // 無敵中でなく、または無敵中でも点滅表示タイミングであれば描画
        if (!player.invincible || Math.floor(player.blinkTimer / 10) % 2 === 0) { // blinkTimer/10 の偶数フレームで表示
             if (loadedImages.player) {
                 // GAME_WIDTH/HEIGHT 基準の座標とサイズで描画
                 ctx.drawImage(loadedImages.player, player.x, player.y, player.width, player.height);
             } else {
                 ctx.fillStyle = 'blue'; // 画像がない場合の代替
                 ctx.fillRect(player.x, player.y, player.width, player.height);
             }
        }
    }


    // Draw invaders (PLAYING状態のみ)
    if (currentGameState === GAME_STATE.PLAYING) {
        invaders.forEach(invader => {
            if (loadedImages.invader) {
                 // GAME_WIDTH/HEIGHT 基準の座標とサイズで描画
                ctx.drawImage(loadedImages.invader, invader.x, invader.y, invader.width, invader.height);
            } else {
                ctx.fillStyle = 'green'; // 画像がない場合の代替
                ctx.fillRect(invader.x, invader.y, invader.width, invader.height);
            }
        });
    }

    // Draw boss or boss explosion (PLAYING状態での通常ボスのみ)
    if (currentGameState === GAME_STATE.PLAYING && boss) {
        if (boss.isExploding && loadedImages[boss.explosionImage]) {
            // ボス爆発のアニメーションを描画
            const frame = Math.floor(boss.explosionTimer / (boss.explosionDuration / 8)); // 8フレームアニメーションと仮定
            const spriteWidth = loadedImages[boss.explosionImage] ? loadedImages[boss.explosionImage].width / 8 : 0; // 画像ロード済みかチェック
            const spriteHeight = loadedImages[boss.explosionImage] ? loadedImages[boss.explosionImage].height : 0;
            const drawWidth = boss.width * 2; // 描画サイズはボスの2倍 (調整可能)
            const drawHeight = boss.height * 2; // 描画サイズはボスの2倍 (調整可能)
            const drawX = boss.x + boss.width / 2 - drawWidth / 2; // ボスの中心基準で描画
            const drawY = boss.y + boss.height / 2 - drawHeight / 2; // ボスの中心基準で描画

            // スプライトシート画像があり、フレームが有効範囲内かチェック
             if (loadedImages[boss.explosionImage] && frame < 8 && spriteWidth > 0 && spriteHeight > 0) {
                ctx.drawImage(
                    loadedImages[boss.explosionImage], // スプライトシート画像
                    frame * spriteWidth, 0, spriteWidth, spriteHeight, // 切り出すSpriteの座標とサイズ
                    drawX, drawY, drawWidth, drawHeight // 描画先のCanvas座標とサイズ (GAME_WIDTH/HEIGHT 基準)
                );
             } else if (loadedImages[boss.explosionImage] && (spriteWidth <= 0 || spriteHeight <= 0)) {
                 console.warn("Boss explosion sprite sheet dimensions invalid!"); // Debug Log
             } else if (!loadedImages[boss.explosionImage]) {
                 console.warn("Boss explosion image not loaded!"); // Debug Log
             } else if (frame >= 8) {
                 // 爆発アニメーションの最終フレームを超えたら描画しない (本来は爆発タイマーで制御)
             }

        } else if (!boss.isExploding && loadedImages[boss.originalImage]) {
            // 通常ボスの画像を描画 (爆発中でなければ) (GAME_WIDTH/HEIGHT 基準)
            ctx.drawImage(loadedImages[boss.originalImage], boss.x, boss.y, boss.width, boss.height);
            // ボスのHPバーを描画 (GAME_WIDTH/HEIGHT 基準)
            const hpBarWidth = boss.width * 0.8;
            const hpBarHeight = 5;
            const hpBarX = boss.x + (boss.width - hpBarWidth) / 2;
            const hpBarY = boss.y + boss.height + 5;
            // hp / max_hp を計算する際は、0除算を防ぐ
            const maxHp = BOSS_HP_PER_LEVEL * currentLevel;
            const currentHpBarWidth = boss.hp > 0 && maxHp > 0 ? hpBarWidth * (boss.hp / maxHp) : 0;

            ctx.fillStyle = 'red'; ctx.fillRect(hpBarX, hpBarY, hpBarWidth, hpBarHeight); // 赤い背景（最大HP）
            ctx.fillStyle = 'lime'; ctx.fillRect(hpBarX, hpBarY, currentHpBarWidth, hpBarHeight); // 緑色のバー（現在HP）
            ctx.strokeStyle = '#0f0'; ctx.strokeRect(hpBarX, hpBarY, hpBarWidth, hpBarHeight); // 緑色の枠線
        } else if (!boss.isExploding) {
            // 画像がない場合の代替描画 (爆発中でなければ) (GAME_WIDTH/HEIGHT 基準)
            ctx.fillStyle = 'purple';
            ctx.fillRect(boss.x, boss.y, boss.width, boss.height);
        }
    }

    // ★★★ここから FINAL_BOSS 状態の描画処理！★★★
    if (currentGameState === GAME_STATE.FINAL_BOSS && finalBoss) {
        if (finalBoss.isExploding && loadedImages[finalBoss.explosionImage]) {
            // 最終ボス爆発のアニメーションを描画 (通常ボスと同じロジックを流用)
            const frame = Math.floor(finalBoss.explosionTimer / (finalBoss.explosionDuration / 8)); // 8フレームアニメーションと仮定
            const spriteWidth = loadedImages[finalBoss.explosionImage] ? loadedImages[finalBoss.explosionImage].width / 8 : 0; // 画像ロード済みかチェック
            const spriteHeight = loadedImages[finalBoss.explosionImage] ? loadedImages[finalBoss.explosionImage].height : 0;
            const drawWidth = finalBoss.width * 1.5; // 描画サイズは最終ボスの1.5倍 (調整可能)
            const drawHeight = finalBoss.height * 1.5; // 描画サイズは最終ボスの1.5倍 (調整可能)
            const drawX = finalBoss.x + finalBoss.width / 2 - drawWidth / 2; // ボスの中心基準で描画
            const drawY = finalBoss.y + finalBoss.height / 2 - drawHeight / 2; // ボスの中心基準で描画

            // スプライトシート画像があり、フレームが有効範囲内かチェック
             if (loadedImages[finalBoss.explosionImage] && frame < 8 && spriteWidth > 0 && spriteHeight > 0) {
                ctx.drawImage(
                    loadedImages[finalBoss.explosionImage], // スプライトシート画像
                    frame * spriteWidth, 0, spriteWidth, spriteHeight, // 切り出すSpriteの座標とサイズ
                    drawX, drawY, drawWidth, drawHeight // 描画先のCanvas座標とサイズ (GAME_WIDTH/HEIGHT 基準)
                );
             } else if (loadedImages[finalBoss.explosionImage] && (spriteWidth <= 0 || spriteHeight <= 0)) {
                 console.warn("Final Boss explosion sprite sheet dimensions invalid!"); // Debug Log
             } else if (!loadedImages[finalBoss.explosionImage]) {
                 console.warn("Final Boss explosion image not loaded!"); // Debug Log
             } else if (frame >= 8) {
                 // 爆発アニメーションの最終フレームを超えたら描画しない
             }

        } else if (!finalBoss.isExploding && loadedImages[finalBoss.originalImage]) {
            // 最終ボスの画像を描画 (爆発中でなければ) (GAME_WIDTH/HEIGHT 基準)
            ctx.drawImage(loadedImages[finalBoss.originalImage], finalBoss.x, finalBoss.y, finalBoss.width, finalBoss.height);

            // 最終ボスのHPバーを描画 (GAME_WIDTH/HEIGHT 基準)
            const hpBarWidth = finalBoss.width * 0.9; // HPバーを少し大きく
            const hpBarHeight = 7; // HPバーを少し太く
            const hpBarX = finalBoss.x + (finalBoss.width - hpBarWidth) / 2;
            const hpBarY = finalBoss.y + finalBoss.height + 10; // 少し下に表示
            // hp / max_hp を計算する際は、0除算を防ぐ
            const currentHpBarWidth = finalBoss.hp > 0 && finalBossHpMax > 0 ? hpBarWidth * (finalBoss.hp / finalBossHpMax) : 0;

            ctx.fillStyle = 'red'; ctx.fillRect(hpBarX, hpBarY, hpBarWidth, hpBarHeight); // 赤い背景（最大HP）
            ctx.fillStyle = 'lime'; ctx.fillRect(hpBarX, hpBarY, currentHpBarWidth, hpBarHeight); // 緑色のバー（現在HP）
            ctx.strokeStyle = '#0f0'; ctx.strokeRect(hpBarX, hpBarY, hpBarWidth, hpBarHeight); // 緑色の枠線
        } else if (!finalBoss.isExploding) {
            // 画像がない場合の代替描画 (爆発中でなければ) (GAME_WIDTH/HEIGHT 基準)
            ctx.fillStyle = 'darkred'; // 最終ボスは濃い赤
            ctx.fillRect(finalBoss.x, finalBoss.y, finalBoss.width, finalBoss.height);
        }
    }
    // ★★★ FINAL_BOSS 状態の描画処理、ここまで！★★★


    // Draw projectiles (自機の弾) (GAME_WIDTH/HEIGHT 基準)
    projectiles.forEach(p => {
        ctx.fillStyle = 'yellow'; // 自機の弾は黄色
        ctx.fillRect(p.x, p.y, p.width, p.height);
    });

    // Draw invader projectiles (敵弾 - 通常敵とボス、最終ボス含む) (GAME_WIDTH/HEIGHT 基準)
    invaderProjectiles.forEach(p => {
        ctx.fillStyle = 'red'; // 敵弾は赤
        ctx.fillRect(p.x, p.y, p.width, p.height);
    });

    // スケール変換を元に戻す
    if (canvas.width !== GAME_WIDTH || canvas.height !== GAME_HEIGHT) {
        ctx.restore(); // 変換行列を保存時点に戻す
    }


    // UI要素はHTMLで別途描画されるため、ここではゲーム要素と弾のみ描画
    // スコア、ライフ、レベル表示は updateDisplay 関数群で更新される
}


// --- Collision Detection ---

function checkCollisions() {
    // player が存在する場合のみ衝突判定を行う
    if (!player || player.invincible) { // 無敵時間中も敵弾との衝突判定はスキップ
        return;
    }

    // Player vs Invader Projectiles (deltaTime 考慮は不要、位置で判定)
    // 当たり判定を高速化するため、衝突した弾と敵を別配列に格納し、ループ後にまとめて削除する
    const hitProjectiles = [];
    const hitInvaders = [];

    invaderProjectiles.forEach((projectile, projIndex) => {
        if (
            projectile.x < player.x + player.width &&
            projectile.x + projectile.width > player.x &&
            projectile.y < player.y + player.height &&
            projectile.y + projectile.height > player.y
        ) {
            // 衝突！
            console.log("Player hit by enemy projectile!"); // Debug Log
            // 敵弾を削除リストに追加
            hitProjectiles.push(projIndex);

            // ライフを減らす
            lives--;
            updateLivesDisplay();

            // 爆発音を鳴らす (try-catchで囲む)
            try {
                if (loadedAudio.explosion) { // もし explosion というキーでロードしていれば
                     loadedAudio.explosion.play();
                }
            } catch (e) {
                 console.warn("Player hit sound playback failed:", e); // Debug Log
            }


            // ライフが残っていれば無敵時間を付与
            if (lives > 0) {
                player.invincible = true;
                player.invincibleTimer = 0; // 無敵時間タイマーをリセット
                player.blinkTimer = 0; // 点滅タイマーもリセット
                console.log(`Player is now invincible. Lives: ${lives}`); // Debug Log
            } else {
                // ライフが0になったらゲームオーバー
                // ゲームオーバー処理は update の最後でまとめて行う
                console.log("Player lives reached 0."); // Debug Log
                // endGame(false); // updateの最後で判定するのでここでは呼ばない
            }
        }
    });

    // ヒットした敵弾を逆順に削除 (インデックスずれを防ぐため)
    for (let i = hitProjectiles.length - 1; i >= 0; i--) {
        invaderProjectiles.splice(hitProjectiles[i], 1);
    }


    // Player Projectiles vs Invaders, Boss, Final Boss (deltaTime 考慮は不要、位置で判定)
    const playerHitSomething = []; // 衝突した自機弾のインデックス

    projectiles.forEach((projectile, projIndex) => {
        if (projectile.hit) return; // すでにヒット済みの弾は処理しない

        // 通常インベーダーとの衝突 (PLAYING状態のみ)
        if (currentGameState === GAME_STATE.PLAYING) {
             invaders.forEach((invader, invaderIndex) => {
                if (invader.hit) return; // すでにヒット済みの敵は処理しない
                if (projectile.hit) return; // 弾が既にヒットしていたら終了 (多重ヒット防止)

                if (
                    projectile.x < invader.x + invader.width &&
                    projectile.x + projectile.width > invader.x &&
                    projectile.y < invader.y + invader.height &&
                    projectile.y + projectile.height > invader.y
                ) {
                    // 衝突！
                    console.log("Invader hit!"); // Debug Log
                    // 弾と敵にヒットフラグを立てる
                    projectile.hit = true;
                    invader.hit = true;
                    playerHitSomething.push(projIndex); // ヒットした弾のインデックスを記録

                    // スコア加算
                    score += 100; // インベーダー撃破で100点
                    updateScoreDisplay();

                    // 爆発音を鳴らす (try-catchで囲む)
                    try {
                         if (loadedAudio.explosion) { // もし explosion というキーでロードしていれば
                            loadedAudio.explosion.play();
                         }
                    } catch (e) {
                         console.warn("Invader explosion sound playback failed:", e); // Debug Log
                    }
                }
            });

            // 通常ボスとの衝突 (PLAYING状態かつボスが存在し、爆発中でない場合)
            if (boss && !boss.isExploding) {
                 if (projectile.hit) return; // 弾が既にヒットしていたら終了

                if (
                    projectile.x < boss.x + boss.width &&
                    projectile.x + projectile.width > boss.x &&
                    projectile.y < boss.y + boss.height &&
                    projectile.y + projectile.height > boss.y
                ) {
                    // 衝突！
                    console.log("Boss hit!"); // Debug Log
                    projectile.hit = true; // 弾にヒットフラグを立てる
                    playerHitSomething.push(projIndex); // ヒットした弾のインデックスを記録

                    // ボスのHPを減らす
                    boss.hp--;

                    // ボス撃破判定
                    if (boss.hp <= 0 && !boss.isExploding) { // 重複して爆発状態にならないようにチェック
                        console.log("Boss defeated!"); // Debug Log
                        // ボスを爆発状態にする
                        boss.isExploding = true;
                        boss.explosionTimer = 0; // 爆発タイマーリセット

                        // ボス爆発音を鳴らす (try-catchで囲む)
                        try {
                             if (loadedAudio.bossExplosion) { loadedAudio.bossExplosion.play(); }
                             else if (loadedAudio.explosion) { loadedAudio.explosion.play(); } // なければ通常の爆発音で代用
                        } catch (e) {
                             console.warn("Boss explosion sound playback failed:", e); // Debug Log
                        }

                        // ボス撃破ボーナス加算
                        score += 5000 * currentLevel; // レベルに応じてボーナス増加
                        updateScoreDisplay();

                        // ボスが撃破された後のレベルチェックは update の最後でボスがnullになった後に行われる
                    }
                }
            } // if (boss) End

        } // if (currentGameState === GAME_STATE.PLAYING) End

        // ★★★ここから FINAL_BOSS 状態の衝突判定！★★★
        if (currentGameState === GAME_STATE.FINAL_BOSS) {
             // 最終ボスとの衝突 (FINAL_BOSS状態かつ最終ボスが存在し、爆発中でない場合)
            if (finalBoss && !finalBoss.isExploding) {
                 if (projectile.hit) return; // 弾が既にヒットしていたら終了

                if (
                    projectile.x < finalBoss.x + finalBoss.width &&
                    projectile.x + projectile.width > finalBoss.x &&
                    projectile.y < finalBoss.y + finalBoss.height &&
                    projectile.y + finalBoss.height > player.y // 最終ボスは画面上部固定なので、プレイヤーのy座標との衝突は不要かも？
                                                              // 画面上部のボス位置とのy座標衝突判定に戻す
                    && projectile.y < finalBoss.y + finalBoss.height
                    && projectile.y + projectile.height > finalBoss.y

                ) {
                    // 衝突！
                    console.log("Final Boss hit!"); // Debug Log
                    projectile.hit = true; // 弾にヒットフラグを立てる
                    playerHitSomething.push(projIndex); // ヒットした弾のインデックスを記録

                    // 最終ボスのHPを減らす
                    finalBoss.hp--;

                    // 最終ボス撃破判定
                    if (finalBoss.hp <= 0 && !finalBoss.isExploding) { // 重複して爆発状態にならないようにチェック
                        console.log("Final Boss defeated!"); // Debug Log
                        // 最終ボスを爆発状態にする
                        finalBoss.isExploding = true;
                        finalBoss.explosionTimer = 0; // 爆発タイマーリセット

                        // ボス爆発音を鳴らす (try-catchで囲む)
                         try {
                             if (loadedAudio.bossExplosion) { loadedAudio.bossExplosion.play(); }
                             else if (loadedAudio.explosion) { loadedAudio.explosion.play(); } // なければ通常の爆発音で代用
                         } catch (e) {
                             console.warn("Final Boss explosion sound playback failed:", e); // Debug Log
                         }

                        // 最終ボス撃破ボーナス加算
                        score += 10000 * MAX_LEVELS * 1.5; // 最終ボス撃破ボーナス（調整可能）
                        updateScoreDisplay();

                        // 最終ボスが撃破された後のゲームクリア処理は update の最後でボスがnullになった後に行われる
                    }
                } // if (finalBoss) End
            } // if (currentGameState === GAME_STATE.FINAL_BOSS) End
        } // if (currentGameState === GAME_STATE.FINAL_BOSS) End

    }); // projectiles.forEach End

    // ヒットフラグが付いた敵（インベーダー）を削除
    invaders = invaders.filter(invader => !invader.hit);

    // ヒットフラグが付いた自機弾を削除
    projectiles = projectiles.filter(projectile => !projectile.hit);

    // 敵弾は衝突時に即時削除しているので、ここでフィルタリングする必要はない
}


// --- Sound Control ---
function setOverallVolume(volume) {
    Howler.volume(volume);
     // console.log(`Overall volume set to: ${volume}`); // Debug Log
    // 背景動画の音量もHowlerの全体音量に同期させる
    if (backgroundVideo) {
        backgroundVideo.volume = volume;
        // ミュート状態もHowlerと同期させる場合はここに追加
        // 例: backgroundVideo.muted = (volume === 0);
         // console.log(`Background video volume set to: ${volume}`); // Debug Log
    }
}


// --- Initialize and Start ---

// ゲームの初期設定とアセットロード
function init() {
    console.log("init called."); // Debug Log
    // Canvasの初期サイズ設定 (CSSで見た目は調整済みなので、描画解像度を設定)
    // GAME_WIDTH/HEIGHT はゲーム内の仮想解像度としてのみ使用し、Canvasの実際のwidth/heightは表示サイズに合わせる
    // canvas.width = GAME_WIDTH; // これは削除またはコメントアウト
    // canvas.height = GAME_HEIGHT; // これは削除またはコメントアウト

    // Canvasの描画解像度をCanvas要素の表示サイズに合わせる
    resizeCanvas(); // 初回実行

    // ウィンドウのリサイズに合わせてCanvasの描画解像度も変更するようにイベントリスナーを追加
    window.addEventListener('resize', resizeCanvas);


    // Howler.jsの全体設定
     Howler.html5PoolSize(5); // HTML5 audio pool size
    Howler.volume(0.5); // 全体音量（調整可能）

    // 音量スライダーのイベントリスナーを追加
     if (volumeSlider) { // volumeSlider 要素が存在するかチェック
         // 初期値をHowlerの音量に合わせる
         volumeSlider.value = Howler.volume();
         volumeSlider.addEventListener('input', (e) => {
              setOverallVolume(parseFloat(e.target.value)); // スライダーの値をfloatに変換して設定
         });
         console.log("Volume slider event listener added.");
     } else {
         console.warn("Volume slider element not found!"); // Debug Log
     }


    currentGameState = GAME_STATE.LOADING;
    console.log(`Initial State: ${currentGameState}`); // Debug Log

    // UI要素の初期状態設定
    canvas.style.display = 'none'; // キャンバスは非表示から開始 (スタート画面で動画を表示するため)
    messageBox.style.display = 'none'; // メッセージボックスも非表示から開始
    // UI表示/非表示は showStartButton / hideStartButton で制御

    // アセットロード開始
    loadAssets().then(() => {
        console.log("All assets loaded."); // Debug Log

        // ロードしたHowlオブジェクトを変数に格納
        backgroundMusic = loadedAudio.backgroundMusic;
        finalBossMusic = loadedAudio.finalBossMusic;

        currentGameState = GAME_STATE.START_SCREEN;
        console.log(`Assets loaded. State: ${currentGameState}`); // Debug Log

        // スタートボタンと背景動画を表示
        showStartButton();

        // オーディオアンロックを試みるためのリスナーを設定
        unlockAudio();

        // ロード後にプレイヤーオブジェクトを初期化 (最初の位置だけ)
        player = {
             x: GAME_WIDTH / 2 - PLAYER_WIDTH / 2,
             y: GAME_HEIGHT - PLAYER_HEIGHT - 10,
             width: PLAYER_WIDTH,
             height: PLAYER_HEIGHT,
             movingLeft: false,
             movingRight: false,
             invincible: false, // 無敵状態
             invincibleTimer: 0, // 無敵時間タイマー
             blinkTimer: 0 // 点滅用タイマー
        };
        console.log("Player initialized (initial position)."); // Debug Log


    }).catch(e => {
        console.error("Asset loading failed:", e); // Debug Log
        showMessageBox("Failed to load game assets. Please try again."); // エラーメッセージ表示
        currentGameState = GAME_STATE.GAME_OVER; // ゲームオーバー状態にする
         // ロード失敗時はスタートボタンは表示しない
         hideStartButton(); // 念のため非表示に
         canvas.style.display = 'block'; // キャンバスは表示
         if (backgroundVideo) {
             backgroundVideo.style.display = 'block'; // 動画も表示
         }
         // ゲームループは開始しない
    });
}

// イベントリスナー設定 (DOMContentLoaded後にinitで呼び出される)
function setupEventListeners() {
     console.log("Setting up event listeners."); // Debug Log

     // スタートボタンクリックでゲーム開始 (初回とPlay Again共通)
     if (startButton) {
         startButton.addEventListener('click', () => {
              // StartScreen または GameOver 状態でのみ開始/リスタート可能
              if (currentGameState === GAME_STATE.START_SCREEN || currentGameState === GAME_STATE.GAME_OVER) {
                 console.log("Start/Play Again button clicked."); // Debug Log
                 startGame(currentGameState === GAME_STATE.GAME_OVER); // Game Over状態ならリスタートフラグをtrueに
              }
         });
         console.log("Start button event listener added."); // Debug Log
     } else {
         console.error("Start button element not found!"); // Debug Log
     }

    // messageBox の Play Again ボタンのリスナーは endGame で設定

     // PCキーボード操作
     document.addEventListener('keydown', (e) => {
         if (currentGameState === GAME_STATE.PLAYING || currentGameState === GAME_STATE.FINAL_BOSS) {
             if (e.key === 'ArrowLeft' || e.key === 'a') {
                  player.movingLeft = true;
                  playerTargetX = null; // キー操作時はポインタ目標をリセット
             } else if (e.key === 'ArrowRight' || e.key === 'd') {
                  player.movingRight = true;
                  playerTargetX = null; // キー操作時はポインタ目標をリセット
             }
              // スペースキーで射撃（キー操作の場合のみ）
             if (e.key === ' ' && !isPointerDown) { // ポインタ操作中のスペースは無視（誤作動防止）
                  if (playerShootCooldown <= 0) {
                      shootProjectile();
                  }
             }
         }
          // デバッグ用：ゲームオーバー/クリア時にEnterまたはスペースでリトライ
          if (currentGameState === GAME_STATE.GAME_OVER && (e.key === 'Enter' || e.key === ' ')) {
               console.log("Enter/Space pressed on Game Over screen. Simulating Play Again."); // Debug Log
               const playAgainButton = messageBox.querySelector('button');
               if (playAgainButton && messageBox.style.display !== 'none') { // メッセージボックスが表示されている場合のみ有効
                   playAgainButton.click();
               } else {
                    // console.warn("Play again button not found or message box not displayed!"); // Debug Log
               }
          }
     });

     document.addEventListener('keyup', (e) => {
         if (currentGameState === GAME_STATE.PLAYING || currentGameState === GAME_STATE.FINAL_BOSS) {
             if (e.key === 'ArrowLeft' || e.key === 'a') {
                  player.movingLeft = false;
             } else if (e.key === 'ArrowRight' || e.key === 'd') {
                  player.movingRight = false;
             }
         }
     });

     // スマホ/タブレット対応 (ポインタ操作 - Canvas領域のみで判定)
     // gameContainerではなくcanvas要素自体にリスナーを付ける方が確実
     if (canvas) {
         canvas.addEventListener('pointerdown', (e) => {
              if (currentGameState === GAME_STATE.PLAYING || currentGameState === GAME_STATE.FINAL_BOSS) {
                   isPointerDown = true;
                   // ポインタが押されたらプレイヤーをそのX座標に移動させる目標を設定
                   const canvasRect = canvas.getBoundingClientRect(); // Canvasの表示サイズと位置を取得
                   // Canvasの表示座標から、ゲーム内部の仮想座標(GAME_WIDTH, GAME_HEIGHT)に変換
                   const scaleX = GAME_WIDTH / canvas.clientWidth; // 表示サイズに対する仮想解像度のスケール
                   const pointerXInGameCoords = (e.clientX - canvasRect.left) * scaleX;
                   playerTargetX = pointerXInGameCoords;
                    // ポインタ操作時はキー操作フラグをリセット
                    player.movingLeft = false;
                    player.movingRight = false;
                    // console.log(`Pointer Down at canvas X: ${pointerXInGameCoords.toFixed(2)} (Game Coords)`); // Debug Log

                    // ポインタダウンで即時射撃 (クールダウンはチェック)
                    if (playerShootCooldown <= 0) {
                         shootProjectile();
                    }
              }
              // スタート画面でキャンバスが非表示の場合も、canvasが覆っているarea (gameContainer)へのクリックでゲーム開始を試みる
              // currentGameState === GAME_STATE.GAME_OVER もスタートボタンが表示されている場合を想定
              // StartButtonContainer 自体にリスナーを付けた方が確実だが、ここではCanvasへのポインタダウンで代替
              // このロジックは startButton.addEventListener('click', ...) で統一したので不要だが、念のため残す
              /*
              if ((currentGameState === GAME_STATE.START_SCREEN || currentGameState === GAME_STATE.GAME_OVER) && startButtonContainer && startButtonContainer.style.display !== 'none') {
                   console.log("Pointer Down on canvas area in Start/Game Over screen. Simulating Start Button Click."); // Debug Log
                    if (startButton) {
                         startButton.click();
                    } else {
                         console.error("Start button element not found for click simulation!");
                    }
              }
              */
         });

          canvas.addEventListener('pointermove', (e) => {
               if (currentGameState === GAME_STATE.PLAYING || currentGameState === GAME_STATE.FINAL_BOSS) {
                   if (isPointerDown) {
                       // ポインタが移動したらプレイヤーの目標X座標を更新
                       const canvasRect = canvas.getBoundingClientRect(); // Canvasの表示サイズと位置を取得
                       const scaleX = GAME_WIDTH / canvas.clientWidth; // 表示サイズに対する仮想解像度のスケール
                       const pointerXInGameCoords = (e.clientX - canvasRect.left) * scaleX;
                       playerTargetX = pointerXInGameCoords;
                       // console.log(`Pointer Move to canvas X: ${pointerXInGameCoords.toFixed(2)} (Game Coords)`); // Debug Log
                   }
               }
          });

         canvas.addEventListener('pointerup', (e) => {
              if (currentGameState === GAME_STATE.PLAYING || currentGameState === GAME_STATE.FINAL_BOSS) {
                   isPointerDown = false;
                   // ポインタが離されても、最後の targetX は保持しておく (慣性移動などに使う場合)
                   // 今回は即時停止なので null に戻す
                   playerTargetX = null; // ポインタが離されたら目標をリセット
                   // console.log("Pointer Up."); // Debug Log
              }
         });
     } else {
         console.error("Canvas element not found for pointer listeners!"); // Debug Log
     }

     // Canvas外でのpointerup対策 (念のため - document全体に設定)
     document.addEventListener('pointerup', (e) => {
         // pointerdown が canvas 上で発生した場合のみ、pointerup も canvas 上で発生することを期待するが、
         // ドラッグ中に要素外で離す場合もあるため、document 全体で isPointerDown をリセットするのは安全
         // ただし、Canvas以外のUI要素（ボタンなど）でのpointerupと区別する必要がある場合、この処理は調整が必要
         // 今回はCanvas内でのポインタ操作を主に想定しているため、シンプルにisPointerDownをfalseにする
          if (isPointerDown && (currentGameState === GAME_STATE.PLAYING || currentGameState === GAME_STATE.FINAL_BOSS)) {
              // 実際にイベントが発生した要素がCanvas自身またはCanvasの子要素でない場合のみ処理するなど、より複雑な判定も可能
              // 例: if (!canvas.contains(e.target)) { ... }
              // シンプル版：
               isPointerDown = false;
               playerTargetX = null; // ポインタが離されたら目標をリセット
               // console.log("Pointer Up outside canvas (detected by document listener)."); // Debug Log
          }

          // スタート画面等で背景動画（Canvasの下にある）へのクリックでもゲーム開始を試みるためのリスナーは
          // startButton の click リスナーで統一しているので、ここでは不要。
     });


} // ★ setupEventListeners() 関数の閉じカッコ } ★


// Call init when the DOM is fully loaded
// DOMContentLoaded イベントは Howler.js スクリプトのロードも待機する
document.addEventListener('DOMContentLoaded', () => {
    console.log("DOM Content Loaded. Initializing game."); // Debug Log
    init(); // init 関数を呼び出し
    setupEventListeners(); // イベントリスナーを設定
});

    </script>

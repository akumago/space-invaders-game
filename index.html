<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Improved Space Invaders</title>
    <style>
        /* 全体のリセットと基本設定 */
        html, body {
            margin: 0;
            padding: 0;
            overflow: hidden; /* スクロール禁止 */
            background-color: #000; /* デフォルトの背景色を黒に設定（ゲーム画面外） */
            font-family: 'Arial', sans-serif;
            color: #fff;
            -webkit-user-select: none; /* テキスト選択無効化 (iOS) */
            -moz-user-select: none; /* テキスト選択無効化 (Firefox) */
            -ms-user-select: none; /* テキスト選択無効化 (IE/Edge) */
            user-select: none; /* テキスト選択無効化 (標準) */
            -webkit-tap-highlight-color: rgba(0,0,0,0); /* タップ時のハイライトを無効化 (iOS) */
        }

        /* 画面中央にゲームコンテンツを配置するためのFlexbox */
        body {
            display: flex;
            justify-content: center;
            align-items: center; /* 垂直方向の中央揃え */
            min-height: 100vh; /* 画面全体の高さ */
            width: 100vw; /* 画面全体の幅 */
            position: relative; /* 子要素の絶対配置の基準 */
        }

        /* ゲームコンテナ - キャンバスと動画、UI要素を内包 */
        #gameContainer {
            position: relative; /* 子要素（canvas, video）の基準 */
            /* PCでの表示サイズとアスペクト比維持、画面へのフィット感を調整 */
            /* 画面の幅と高さの比率から、ゲームのアスペクト比(9:19.5)に合う最大のサイズを計算 */
            width: min(100vw, calc(100vh * (9 / 19.5))); /* 画面幅の100% と、画面高さからゲーム比率で計算した幅 の小さい方 */
            height: min(100vh, calc(100vw * (19.5 / 9))); /* 画面高さの100% と、画面幅からゲーム比率で計算した高さ の小さい方 */

            max-width: 100vw; /* 念のため画面幅の100%を超えない制限 */
            max-height: 100vh; /* 念のため画面高さの100%を超えない制限 */
             /* aspect-ratio は width/height で計算されるため、ここでは特に指定しない */


            overflow: hidden; /* はみ出たコンテンツを隠す */
            border: 2px solid #0f0; /* ゲーム画面の枠線 */
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.8);
            z-index: 1; /* 他のUIより手前 */
            margin: auto; /* 水平方向の中央配置（Flexboxと組み合わせ） */
            box-sizing: border-box; /* パディングとボーダーを幅と高さに含める */

             /* Flexアイテムとしてのサイズ調整（bodyのFlexboxに影響される） */
             flex-shrink: 1; /* 必要に応じて縮小を許可 */
             flex-grow: 0; /* 拡大はしない */

             /* body に align-items: center; が設定されているため、垂直方向の中央配置は親によって行われる */
        }

        /* スマートフォンなど、画面幅が768px以下のデバイスにのみ適用するスタイル */
        /* スマートフォン用は前回と同じ設定で維持 */
        @media (max-width: 768px) {
            #gameContainer {
                width: min(100vw, calc(100vh * (9 / 19.5))); /* 画面幅または画面高さから計算した幅の小さい方 */
                height: min(calc(100vw * (19.5 / 9)), 100vh); /* 画面高さまたは画面幅から計算した高さの小さい方 */
                 max-width: unset; /* 最大幅の制限を解除 */
                 max-height: unset; /* 最大高さの制限を解除 */
                 /* aspect-ratio: unset; /* スマホサイズでは CSS による aspect-ratio は解除 */
                /* safe-area-inset は必要に応じて追加してください。
                padding-top: env(safe-area-inset-top);
                padding-bottom: env(safe-area-inset-bottom);
                padding-left: env(safe-area-inset-left);
                padding-right: env(safe-area-inset-right);
                */
            }
        }


        /* ゲームキャンバス */
        #gameCanvas {
            position: absolute; /* gameContainerを基準に配置 */
            top: 0;
            left: 0;
            width: 100%; /* 親要素 (gameContainer) に合わせる */
            height: 100%; /* 親要素 (gameContainer) に合わせる */
            display: block; /* 初期状態はJSで制御 */
            z-index: 0; /* 動画より手前 */
            background-color: lightgray; /* ゲームプレイ中の背景色をライトグレーに設定 */
        }

        /* 背景動画 - gameContainerのサイズに合わせる */
        #background-video {
            position: absolute; /* gameContainerを基準に配置 */
            top: 0;
            left: 0;
            width: 100%; /* 親要素 (gameContainer) に合わせる */
            height: 100%; /* 親要素 (gameContainer) に合わせる */
            object-fit: cover; /* 縦横比を維持しつつ要素を覆う */
            filter: brightness(0.5); /* 少し暗くして見やすくする */
            z-index: -1; /* キャンバスより奥に配置 */
            display: block; /* 初期状態はJSで制御 */
             /* video タグに muted 属性はつけず、JSで制御 */
        }

        /* スコア、ライフ、レベル表示 */
        #score, #lives, #level {
            position: absolute;
            font-size: 1.2em;
            font-weight: bold;
            color: #0f0;
            text-shadow: 0 0 5px #0f0;
            z-index: 2; /* ゲーム要素より手前 */
            padding: 5px 10px;
            background-color: rgba(0, 0, 0, 0.5);
            border-radius: 5px;
        }
        #score { top: 10px; left: 10px; }
        #lives { top: 10px; right: 10px; }
        #level { bottom: 10px; left: 10px; }

        /* メッセージボックス (ゲームオーバー/クリア時) */
        #messageBox {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: rgba(0, 0, 0, 0.8);
            border: 2px solid #0f0;
            padding: 20px;
            text-align: center;
            z-index: 3;
            display: none;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.8);
            max-width: 80%;
            box-sizing: border-box; /* パディングを含めて幅を計算 */
        }
        #messageBox p {
            margin: 0 0 20px 0;
            font-size: 1.5em;
            font-weight: bold;
            color: #0f0;
            text-shadow: 0 0 5px #0f0;
        }
        #messageBox button {
            background-color: #0f0;
            color: #000;
            border: none;
            padding: 10px 20px;
            font-size: 1.2em;
            font-weight: bold;
            cursor: pointer;
            border-radius: 5px;
            transition: background-color 0.3s, color 0.3s, transform 0.1s;
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.5);
            white-space: nowrap; /* ボタン内のテキストが改行されないように */
        }
        #messageBox button:hover {
            background-color: #0a0;
            color: #fff;
        }
        #messageBox button:active {
            transform: scale(0.98);
        }

        /* スタートボタンコンテナ */
        #startButtonContainer {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex !important; /* ★強制的に表示★ */
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: rgba(0, 0, 0, 0.7);
            border: 2px solid #0f0;
            padding: 30px 40px;
            border-radius: 15px;
            box-shadow: 0 0 25px rgba(0, 255, 0, 0.8);
            z-index: 10 !important; /* ★他の要素より手前に強制表示★ */
            width: 80%; /* 適度な幅に */
            max-width: 400px; /* 最大幅 */
            box-sizing: border-box; /* パディングを含めて幅を計算 */
        }
        #startButtonContainer h1 {
            font-size: 2.5em;
            color: #0f0;
            text-shadow: 0 0 10px #0f0;
            margin-bottom: 10px;
            text-align: center;
        }
        #startButtonContainer p {
            font-size: 1.2em;
            color: #fff;
            margin-bottom: 30px;
            text-align: center;
        }
        #startButton {
            background-color: #0f0;
            color: #000;
            border: none;
            padding: 15px 30px;
            font-size: 1.5em;
            font-weight: bold;
            cursor: pointer;
            border-radius: 8px;
            transition: background-color 0.3s, color 0.3s, transform 0.1s;
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.5);
            white-space: nowrap; /* ボタン内のテキストが改行されないように */
        }
        #startButton:hover {
            background-color: #0a0;
            color: #fff;
        }
        #startButton:active {
            transform: scale(0.98);
        }

        /* ローディングメッセージ */
        #loadingMessage {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 1.8em;
            font-weight: bold;
            color: #0f0;
            text-shadow: 0 0 8px #0f0;
            z-index: 4;
            display: none;
        }

        /* 音量スライダー */
        .volume-control {
            margin-top: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1em;
            color: #fff;
        }
        #volumeSlider {
            width: 150px;
            -webkit-appearance: none; /* デフォルトスタイルを無効化 */
            appearance: none;
            height: 8px;
            background: #333;
            outline: none;
            border-radius: 4px;
            cursor: pointer;
            box-shadow: inset 0 0 5px rgba(0, 255, 0, 0.3);
        }
        #volumeSlider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            background: #0f0;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.7);
        }
        #volumeSlider::-moz-range-thumb {
            width: 20px;
            height: 20px;
            background: #0f0;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.7);
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/howler/2.2.3/howler.min.js"></script>
</head>
<body>
    <div id="loadingMessage">Loading Game Assets...</div>

    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        <video autoplay loop playsinline id="background-video">
            <source src="video/background_loop.mp4" type="video/mp4">
            Your browser does not support the video tag.
        </video>
        <div id="score">Score: 0</div>
        <div id="lives">Lives: 3</div>
        <div id="level">Level: 1</div>
        </div>

    <div id="messageBox">
        <p id="message"></p>
        <button>Play Again</button>
    </div>

    <div id="startButtonContainer">
        <h1>SPACE INVADERS</h1>
        <p>Improved</p>
        <button id="startButton">TAP TO START</button>
        <div class="volume-control">
            <span>Volume</span>
            <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="0.5">
        </div>
    </div>
    <script>
        // ★★★ このscriptタグの中身全てを、お手元のscriptタグの中身全てと置き換えてください ★★★

        // --- Global Constants ---
        const GAME_WIDTH = 420;
        const GAME_HEIGHT = GAME_WIDTH * (19.5 / 9); // Aspect ratio for mobile portrait
        const PLAYER_SPEED = 7;
        const PLAYER_PROJECTILE_SPEED = 10;
        const INVADER_BASE_SPEED = 15; // 修正: 20から15に減少（インベーダーの初期移動速度）
        const INVADER_MOVE_DOWN_AMOUNT = 20; // インベーダーが下に移動する量

        // ★難易度調整: 敵の弾速を少し上げる
        const ENEMY_PROJECTILE_SPEED = 5; // 変更: 4 -> 5

        const INVADER_ROWS = 5; // ★修正: 6から5に戻す（敵の行数）
        const INVADER_COLS = 5; // （敵の列数）
        const INVADER_WIDTH = 75; // （敵の表示サイズ）
        const INVADER_HEIGHT = 75; // （敵の表示サイズ）

        // インベーダー間の横方向の間隔と縦方向の間隔を調整
        const INVADER_SPACING_X = 10; // インベーダー間の横方向の間隔を詰める
        const INVADER_SPACING_Y = 15; // インベーダー間の縦方向の間隔を調整

        const BOSS_WIDTH = 150; // ★変更: ボスの幅を大きく
        const BOSS_HEIGHT = 120; // ★変更: ボスの高さを大きく
        const BOSS_HP_PER_LEVEL = 10; // （ボスのHP）
        const MAX_LEVELS = 30; // ★難易度調整: 最大レベル数を30に設定

        const PLAYER_WIDTH = 40; // 修正: 30から40に増加（自機の表示サイズ）
        const PLAYER_HEIGHT = 40; // 修正: 30から40に増加（自機の表示サイズ）
        const PLAYER_SHOOT_COOLDOWN_MAX = 15; // 修正: 20から15に減少（自機の発射間隔）

        // ボスの放射状ミサイル関連の定数
        const BOSS_RADIAL_PROJECTILE_COUNT_BASE = 3; // ボスの初期放射状ミサイル数
        const BOSS_RADIAL_SPREAD_ANGLE = Math.PI * 0.75; // 放射状に広がる角度（ラジアン、例: 135度）

        const GAME_STATE = {
            LOADING: 'LOADING',
            START_SCREEN: 'START_SCREEN', // 最初の「TAP TO START」で動画再生
            PLAYING: 'PLAYING', // 実際のゲームプレイ中
            GAME_OVER: 'GAME_OVER', // ゲームオーバー/クリア画面
            FINAL_BOSS: 'FINAL_BOSS' // ★最終ボス状態を追加★
        };

        // --- Global Variables ---
        let canvas, ctx;
        let player;
        let invaders = [];
        let projectiles = [];
        let invaderProjectiles = []; // invaderProjectilesはボスや通常の敵の弾を扱う
        let score = 0;
        let lives = 3;
        let currentLevel = 1;
        let lastTimestamp = 0;
        let animationFrameId = null; // 初期値はnullにしておく
        let currentGameState = GAME_STATE.LOADING;
        let loadedImages = {};
        let loadedAudio = {};
        let boss = null;
        let bossCreatedForThisLevel = false; // ★追加: ボスがこのレベルで生成されたかどうかのフラグ
        let finalBoss = null; // ★最終ボスオブジェクトを追加★

        // Player shooting cooldown
        let playerShootCooldown = 0;

        // Player movement target for touch/mouse
        let playerTargetX = null;
        let isPointerDown = false; // Tracks if mouse/touch is currently pressed

        // UI elements
        let scoreDisplay;
        let livesDisplay;
        let levelDisplay;
        let messageBox;
        let messageText;
        let startButtonContainer;
        let startButton;
        let loadingMessage;
        let volumeSlider; // 音量スライダー
        let backgroundMusic = null; // Howler.js BGM オブジェクトへの参照用
        let finalBossMusic = null; // Howler.js 最終ボスBGM オブジェクトへの参照用
        let backgroundVideo; // 背景動画要素

        // Invader movement flags
        let lastInvaderMoveDownTime = 0;
        const INVADER_MOVE_DOWN_INTERVAL = 1500; // ★修正: 500から1500に増加（インベーダーが下に移動する間隔（ミリ秒））

        let isInitialStartTapDone = false; // 最初のタップ（動画再生）が完了したかどうかのフラグ
        let audioUnlocked = false; // オーディオコンテキストがアンロックされたかどうかのフラグ


        // --- Initialization ---

        // オーディオコンテキストをアンロックする処理 (一部ブラウザで必要)
        // ユーザー操作（最初のタップなど）によって実行される必要がある
        function unlockAudio() {
             // 既にアンロック済みなら何もしない
             if (audioUnlocked) {
                  console.log("Audio already unlocked."); // Debug Log
                  return;
             }

             // Howler.js がロードされているか確認
             if (typeof Howler === 'undefined') {
                  console.log("Howler.js is not loaded yet, unlock skipped."); // Debug Log
                  return;
             }
             if (!Howler.usingWebAudio) {
                  console.log("Howler.js not using Web Audio API, unlock skipped."); // Debug Log
                  audioUnlocked = true; // Web Audio API を使わない場合はアンロック済みとみなす
                  return;
             }

             // Howler.js のオーディオコンテキストが中断状態の場合に再開を試みる
             if (Howler.state === 'suspended') {
                  console.log("Unlocking audio context..."); // Debug Log
                  // Howler.ctx が null かチェックを追加
                  if (Howler.ctx === null) {
                       console.error("Howler.ctx is null, cannot resume audio context."); // Debug Log
                       return;
                  }
                  Howler.ctx.resume().then(() => {
                       console.log("Audio context resumed successfully."); // Debug Log
                       audioUnlocked = true; // アンロック成功フラグを立てる
                       // 再開後にボリュームが正しく設定されているか確認
                       Howler.volume(parseFloat(volumeSlider.value) || 0.5);
                       // BGMが再生すべき状態なら再生を試みる（ゲーム状態を確認）
                       if (currentGameState === GAME_STATE.PLAYING && backgroundMusic && !backgroundMusic.playing()) {
                            backgroundMusic.play().catch(e => console.error("BGM autoplay after unlock failed:", e));
                       } else if (currentGameState === GAME_STATE.FINAL_BOSS && finalBossMusic && !finalBossMusic.playing()) {
                            finalBossMusic.play().catch(e => console.error("Final Boss BGM autoplay after unlock failed:", e));
                       }

                  }).catch(e => console.error("Failed to resume audio context:", e));
             } else if (Howler.state === 'running') {
                  // すでに実行中（アンロック済み）
                   console.log("Audio context is already running."); // Debug Log
                  audioUnlocked = true; // アンロック済みフラグを立てる
             } else {
                  console.log(`Audio context state: ${Howler.state}, unlock not needed.`); // Debug Log
                  // other states like 'closed' might need different handling, but suspended/running are most common
             }
        }


        function init() {
             console.log("Initializing game..."); // Debug Log
             initGameEssentials(); // キャンバス設定やUI要素の取得、イベントリスナーの設定
             // Howler.js アンロックは最初のユーザー操作で行うように変更済み

             // loadAssets 関数の呼び出しは initGameEssentials の後、かつ非同期で行われます。
             // ReferenceError は initGameEssentials の中で loadAssets を呼ぼうとしていないか確認
             // init 関数内では、loadAssets は .then() の前に呼ばれています。
             loadAssets().then(() => { // ★ここに loadAssets 関数の呼び出しがあります★
                // アセットロード完了後の処理
                 console.log("Assets loaded successfully."); // Debug Log
                hideLoadingMessage();
                currentGameState = GAME_STATE.START_SCREEN;
                showStartButton(); // これで「TAP TO START」が表示される

                // 音量スライダーの初期値を設定し、イベントリスナーを追加
                const savedVolume = parseFloat(localStorage.getItem('gameVolume')) || 0.5;
                Howler.volume(savedVolume); // Howlerのグローバル音量を設定
                volumeSlider.value = savedVolume; // スライダーの表示値を設定

                volumeSlider.addEventListener('input', (e) => {
                    const newVolume = parseFloat(e.target.value);
                    Howler.volume(newVolume); // Howler.jsのグローバル音量を更新
                    localStorage.setItem('gameVolume', newVolume); // 音量設定をローカルストレージに保存

                    // BGMや動画の音量も個別に設定 (Howlerのグローバル音量に連動)
                    // Howlerオブジェクト自体にvolume設定が反映されるため、個別のsound.volume()設定は不要な場合が多いですが、
                    // 念のため Howler.volume() の値で設定しておきます。
                    if (backgroundMusic) backgroundMusic.volume(Howler.volume());
                    if (finalBossMusic) finalBossMusic.volume(Howler.volume());
                    // 効果音の音量もグローバル音量に連動させる場合
                    if (loadedAudio.shoot) loadedAudio.shoot.volume(Howler.volume() * 0.05); // 効果音は小さめに


                    if (backgroundVideo) {
                        backgroundVideo.volume = newVolume; // 動画の音量はスライダーの値に直接連動
                        // 音量が0より大きい場合はミュートを解除 (ブラウザによっては必要)
                        // ただし、動画の play() はユーザー操作が必要なので、このミュート解除だけでは音は出ない場合がある
                        if (newVolume > 0 && backgroundVideo.muted) {
                             // backgroundVideo.muted = false; // startButtonクリックで制御
                        } else if (newVolume === 0 && !backgroundVideo.muted) {
                             // 音量が0の場合はミュート
                             // backgroundVideo.muted = true; // startButtonクリックで制御
                        }
                    }
                });

                // スタートボタンのクリックイベントリスナー
                // ★クリックハンドラーの中身を一時的にシンプルにする★
                // async は削除
                startButton.addEventListener('click', () => { // async を削除
                    console.log("--- Start button clicked! (Simplified handler) ---"); // Debug Log - Added at start
                    // ★★★ このログが表示されるかを確認してください！★★★

                    // ★元のクリックハンドラーの中身は一時的にコメントアウトするか削除してください★
                    // console.log(`Current state: ${currentGameState}, Initial tap done: ${isInitialStartTapDone}, Audio unlocked: ${audioUnlocked}`); // Debug Log
                    // unlockAudio();
                    // if (typeof Howler !== 'undefined' && Howler.usingWebAudio && Howler.state === 'suspended') { ... }
                    // if (currentGameState === GAME_STATE.START_SCREEN) { ... }
                    // console.log("--- Start button click handler finished ---"); // Debug Log - Added at end
                });
                 console.log("Attempted to add click event listener to startButton."); // Debug Log - Added after listener registration


            }).catch(error => {
                console.error("Error loading assets:", error);
                loadingMessage.innerText = `Error loading assets: ${error.message || error}. Please check console for details.`;
            });
        }

        // Sets up canvas, player object, and event listeners once
        function initGameEssentials() {
            console.log("Initializing game essentials..."); // Debug Log - Added
            canvas = document.getElementById('gameCanvas');
            ctx = canvas.getContext('2d');
            // CanvasのサイズはCSSに追従するが、描画コンテキストの解像度として設定
            canvas.width = GAME_WIDTH;
            canvas.height = GAME_HEIGHT;

        // --- Game State Management ---

        function createInvaders() {
            invaders = [];
            // インベーダー全体の幅を計算
            const totalInvaderBlockWidth = (INVADER_COLS * INVADER_WIDTH) + ((INVADER_COLS - 1) * INVADER_SPACING_X);
            // 開始X座標を計算（中央揃え）
            const startX = (GAME_WIDTH - totalInvaderBlockWidth) / 2;
            const startY = 80; // インベーダーの初期Y座標は高く保つ

            for (let row = 0; row < INVADER_ROWS; row++) {
                for (let col = 0; col < INVADER_COLS; col++) {
                    invaders.push({
                        x: startX + col * (INVADER_WIDTH + INVADER_SPACING_X),
                        y: startY + row * (INVADER_HEIGHT + INVADER_SPACING_Y),
                        width: INVADER_WIDTH,
                        height: INVADER_HEIGHT,
                        dx: (INVADER_BASE_SPEED + (currentLevel - 1) * 7),
                        hp: 1
                    });
                }
            }
        }

            // animationFrameId は update ループ内で requestAnimationFrame を呼んでいるので、ここで開始は不要

        // ★★★ startFinalBossBattle 関数、ここまで ★★★


        function startGame(isNewGame) {
             console.log(`startGame called. isNewGame: ${isNewGame}`); // Debug Log
            if (animationFrameId) {
                cancelAnimationFrame(animationFrameId);
                animationFrameId = null; // 明示的にnullにする

                lives = 3;
                currentLevel = 1;
                 console.log("Starting a new game."); // Debug Log

                player.x = GAME_WIDTH / 2 - PLAYER_WIDTH / 2;
                player.movingLeft = false;
                player.movingRight = false;
                player.invincible = false;
                player.invincibleTimer = 0;
                player.blinkTimer = 0;
                // bossCreatedForThisLevel は次のレベルに進むので false のまま
                 console.log(`Continuing game from level ${currentLevel}.`); // Debug Log
            }

            boss = null; // ボスは最初に生成しない（インベーダー全滅後に生成）
            bossCreatedForThisLevel = false; // 新しいゲームまたはレベル開始時にリセット
            finalBoss = null; // ゲーム開始時に最終ボスもリセット
            projectiles = [];
            invaderProjectiles = [];

            createInvaders(); // まずインベーダーのみを生成

            updateScoreDisplay();
            updateLivesDisplay();
            updateLevelDisplay();
            hideMessageBox();
            hideStartButton(); // ゲーム開始時にスタートボタンコンテナと動画を非表示にし、キャンバスを表示

            currentGameState = GAME_STATE.PLAYING;
            lastTimestamp = performance.now(); // ゲーム開始時刻を設定

            // ★修正：音楽が既に再生中でなければ再生開始、ループを設定
            // スタート画面からゲーム開始時は必ず再生開始
            if (backgroundMusic) { // backgroundMusic グローバル変数を使用
                 if (finalBossMusic && finalBossMusic.playing()) { // もし最終ボス音楽が鳴っていれば停止
                      finalBossMusic.stop();
                      console.log("Stopped final boss music before starting background music."); // Debug Log
                 }
                 if (!backgroundMusic.playing()) { // 通常BGMが再生中でなければ開始
                     backgroundMusic.play();
                     backgroundMusic.loop(true); // ループを有効にする
                     backgroundMusic.volume(Howler.volume());
                      console.log("Started background music."); // Debug Log
                 } else {
                      backgroundMusic.volume(Howler.volume()); // 音量だけは設定しておく
                       console.log("Background music already playing, adjusting volume."); // Debug Log
                 }
            } else {
                 console.warn("Background music Howl object not available in startGame."); // Debug Log
                 // ロード自体に失敗している可能性もある (loadAudioのエラーを確認)
            }

            // ゲームループを開始
            if (animationFrameId === null) { // animationFrameId が null の場合のみ request (多重起動防止)
                 animationFrameId = requestAnimationFrame(update); // ゲームループ開始
                  console.log("Requested first animation frame from startGame."); // Debug Log
            }

            lastInvaderMoveDownTime = performance.now(); // インベーダーの下移動タイマーもリセット
             console.log("startGame complete. State: PLAYING."); // Debug Log
        }

        function endGame(win) {
             console.log(`endGame called. Win: ${win}. Current State: ${currentGameState}`); // Debug Log
             // endGame 関数は、ゲームオーバー、中間レベルクリア、最終ボス撃破クリアの３つのシナリオで使用されます。

            // アニメーションフレームを停止
            if (animationFrameId) {
                cancelAnimationFrame(animationFrameId);
                animationFrameId = null; // 明示的にnullにする
                 console.log("Cancelled animation frame in endGame."); // Debug Log
            }


            // BGM停止
            if (backgroundMusic && backgroundMusic.playing()) {
                backgroundMusic.stop();
                 console.log("Stopped background music in endGame."); // Debug Log
            }
             if (finalBossMusic && finalBossMusic.playing()) {
                 finalBossMusic.stop(); // もし最終ボス音楽が鳴っていれば停止
                  console.log("Stopped final boss music in endGame."); // Debug Log
             }

            // メッセージボックスを表示
            const playAgainButton = messageBox.querySelector('button');
            let message = '';

            // 勝利条件の判定は、update関数内で finalBoss = null; になった直後に行い、
            // そこから endGame(true) を呼び出すように修正済みです。
            // ここでは、引数 win と currentGameState で判定します。
            if (win) {
                 // 最終ボスを倒した勝利の場合 (update から endGame(true) が呼ばれたとき)
                 if (currentGameState === GAME_STATE.FINAL_BOSS) { // finalBoss 状態中に endGame(true) が呼ばれた = 最終ボス撃破
                    message = `You Win! Final Score: ${score}`;
                    playAgainButton.innerText = "Play Again";
                     console.log("Game Win - Final Boss Defeated."); // Debug Log
                 } else { // 通常レベルクリア (update から endGame(true) が呼ばれたときで、FINAL_BOSS 状態ではない場合)
                     message = `Level ${currentLevel} Clear! Score: ${score}`; // 表示はクリアしたレベル
                     currentLevel++; // 次のレベルへ進めるようにレベルをインクリメント
                     playAgainButton.innerText = `Next Level (${currentLevel})`; // ボタンは次のレベルへ
                      console.log(`Game Clear - Level ${currentLevel -1}. Ready for Level ${currentLevel}.`); // Debug Log
                 }
            } else { // ゲームオーバー（敗北）
                message = `Game Over! Score: ${score}`;
                playAgainButton.innerText = "Play Again";
                 console.log("Game Over - Player defeated."); // Debug Log
            }

            // Play Again または Next Level ボタンの共通処理を設定
            playAgainButton.onclick = () => {
                hideMessageBox();
                // 中間レベルクリアの場合は、現在のスコア・ライフで次のレベルを開始
                if (win && currentGameState !== GAME_STATE.FINAL_BOSS) { // 勝利かつ、最終ボス戦ではなかった場合 = 中間レベルクリア
                     startGame(false); // 既存ゲームを継続 (レベルは既にインクリメント済み)
                } else {
                    // ゲームオーバーまたは最終クリアの場合は、完全に新しいゲームを開始
                     showStartButton(); // 最初のスタート画面に戻る
                     // startGame(true); // showStartButtonから始まる新しい流れなのでここでstartGameは呼ばない
                }
            };

            // メッセージ表示中はキャンバスは表示したまま、背景動画は再度表示
             canvas.style.display = 'block'; // キャンバスは表示
             if (backgroundVideo) {
                 backgroundVideo.style.display = 'block'; // 動画を再表示
                 backgroundVideo.currentTime = 0; // 動画の再生位置をリセット
                 backgroundVideo.muted = false; // ミュート解除
                 backgroundVideo.volume = Howler.volume(); // 音量設定
                 backgroundVideo.play().catch(e => console.error("Video playback error on game over/win screen:", e));
                 backgroundVideo.style.zIndex = -1;
                  console.log("Video shown for end screen."); // Debug Log
             } else {
                  console.warn("Background video element not found for end screen."); // Debug Log
             }


            // ゲーム状態を GAME_OVER に最終確定 (中間レベルクリアの場合も表示中は GAME_OVER 扱い)
            currentGameState = GAME_STATE.GAME_OVER;

            showMessage(message);
             console.log(`endGame complete. State: ${currentGameState}`); // Debug Log
        }

        // --- Game Loop ---

        function update(timestamp) {
            // animationFrameId が null の場合はループを抜ける (endGameなどで設定される)
            if (animationFrameId === null) {
                // console.log("Animation frame cancelled, stopping update loop."); // Debug Log (頻繁に出るのでコメントアウト)
                return; // ループを終了
            }

            const deltaTime = (timestamp - lastTimestamp) / 1000; // 秒単位
            lastTimestamp = timestamp;

            // ゲームがロード中、スタート画面、またはゲームオーバー状態の場合は更新処理の大部分をスキップ
            // FINAL_BOSS状態でも更新処理は行います
            if (currentGameState === GAME_STATE.LOADING || currentGameState === GAME_STATE.START_SCREEN || currentGameState === GAME_STATE.GAME_OVER) {
                 draw(); // 静止画でも描画は必要
                 animationFrameId = requestAnimationFrame(update); // ループを継続
                 return; // 更新処理の本体はスキップ
            }

            // --- PLAYING 状態と FINAL_BOSS 状態共通の更新処理 ---

            // Update player position
            if (player.movingLeft && player.x > 0) {
                player.x -= PLAYER_SPEED * deltaTime * 60; // deltaTime 考慮
            } else if (player.movingRight && player.x < GAME_WIDTH - player.width) {
                player.x += PLAYER_SPEED * deltaTime * 60; // deltaTime 考慮
            } else if (playerTargetX !== null) {
                const targetPlayerCenter = playerTargetX;
                const currentPlayerCenter = player.x + player.width / 2;

                // 移動量が小さければ直接目標位置へ (カクつき防止)
                if (Math.abs(targetPlayerCenter - currentPlayerCenter) < PLAYER_SPEED * deltaTime * 60 * 0.5) { // deltaTime 考慮
                     player.x = targetPlayerCenter - player.width / 2;
                } else {
                    if (targetPlayerCenter < currentPlayerCenter) {
                        player.x -= PLAYER_SPEED * deltaTime * 60; // deltaTime 考慮
                    } else {
                        player.x += PLAYER_SPEED * deltaTime * 60; // deltaTime 考慮
                    }
                }
                // 自機が画面外に出ないようにクランプ
                player.x = Math.max(0, Math.min(player.x, GAME_WIDTH - player.width));
            }

            // Player shooting cooldown
            if (playerShootCooldown > 0) {
                playerShootCooldown -= deltaTime * 60; // フレーム単位で計算
            }
            // ポインタが押されている間、クールダウンが完了していれば発射
            if (isPointerDown && playerShootCooldown <= 0) {
                shootProjectile();
            }

            // Update projectiles (自機の弾)
            projectiles.forEach(p => p.y -= PLAYER_PROJECTILE_SPEED * deltaTime * 60); // deltaTime 考慮
            projectiles = projectiles.filter(p => p.y > 0 - p.height); // 画面外に出たら削除

            // Update invader projectiles (敵弾 - 通常敵とボス、最終ボス含む)
            invaderProjectiles.forEach(p => {
                p.x += p.dx * deltaTime * 60; // deltaTime 考慮
                p.y += p.dy * deltaTime * 60; // deltaTime 考慮
            });
            invaderProjectiles = invaderProjectiles.filter(p => p.y < GAME_HEIGHT + p.height && p.x > 0 - p.width && p.x < GAME_WIDTH + p.width); // 画面外に出たら削除

            // Player invincibility timer
            if (player.invincible) {
                player.invincibleTimer++;
                player.blinkTimer++;
                if (player.invincibleTimer >= 120) { // 2 seconds (60 frames/sec * 2)
                    player.invincible = false;
                    player.invincibleTimer = 0;
                    player.blinkTimer = 0; // Reset blink timer
                     console.log("Player is no longer invincible."); // Debug Log
                }
            }

            // --- 各ゲーム状態ごとの固有の更新処理 ---

            // PLAYING 状態の更新処理
            if (currentGameState === GAME_STATE.PLAYING) {
                // ★インベーダーグループ全体の移動処理 (deltaTime対応)
                if (invaders.length > 0) {
                    let minX = Infinity;
                    let maxX = -Infinity;
                    // インベーダーのdxは速度の方向も示す
                    const currentDirection = invaders[0].dx > 0 ? 1 : -1;

                    invaders.forEach(invader => {
                        // deltaTime を掛けて速度調整
                        invader.x += invader.dx * deltaTime;
                        minX = Math.min(minX, invader.x);
                        maxX = Math.max(maxX, invader.x + invader.width);
                    });

                    let reverseDirection = false;
                    // 端に到達したかどうかの判定（画面の端から少し手前で判定するなど調整可能）
                    if (minX < 0 && currentDirection < 0) {
                        reverseDirection = true;
                    } else if (maxX > GAME_WIDTH && currentDirection > 0) {
                         reverseDirection = true;
                    }

                    if (reverseDirection) {
                        invaders.forEach(invader => {
                            invader.dx *= -1; // 水平速度を反転
                            // 方向転換時に少し押し戻す（端に張り付かないように）
                             const nudgeAmount = Math.abs(invader.dx * deltaTime * 10); // 押し戻し量を調整
                            if (invader.dx > 0) { // 右向きになった場合
                                invader.x += nudgeAmount;
                            } else { // 左向きになった場合
                                invader.x -= nudgeAmount;
                            }
                        });

                         // 方向転換と同時に下へ移動（時間間隔のチェックは維持）
                        const currentTime = performance.now();
                        if (currentTime - lastInvaderMoveDownTime > INVADER_MOVE_DOWN_INTERVAL) {
                             invaders.forEach(invader => {
                                 invader.y += INVADER_MOVE_DOWN_AMOUNT;
                                 // ゲームオーバー判定
                                 // インベーダーがプレイヤーのY座標（またはそれ以下）に到達したら
                                 if (invader.y + invader.height > player.y) { // インベーダーの下端がプレイヤーの上端を超えたら
                                      if (currentGameState !== GAME_STATE.GAME_OVER) { // 重複防止
                                           console.log("Invaders reached player line. Ending game."); // Debug Log
                                          endGame(false); // インベーダーがプレイヤーのラインを超えたらゲームオーバー
                                      }
                                     // return; // ゲームオーバーなので以降の処理は不要 (endGame でループがキャンセルされる)
                                 }
                             });
                             lastInvaderMoveDownTime = currentTime;
                        }
                    }

                    // 個々のインベーダーが画面外に出ないようにクランプ (押し戻し処理をしたので不要かも)
                    // invaders.forEach(invader => {
                    //      invader.x = Math.max(0, Math.min(invader.x, GAME_WIDTH - invader.width));
                    // });
                }

                // Invader shooting (PLAYING状態かつインベーダーが存在する場合)
                if (invaders.length > 0) {
                    const randomInvader = invaders[Math.floor(Math.random() * invaders.length)];
                    const baseInvaderShootInterval = 90; // フレーム単位での基準間隔
                    const intervalDecreasePerLevel = 3;
                    const currentInvaderShootInterval = Math.max(30, baseInvaderShootInterval - (currentLevel - 1) * intervalDecreasePerLevel); // 最小間隔30フレーム

                    // deltaTime を考慮して発射確率を調整
                    // 1フレームあたりの発射確率 = 1 / currentInvaderShootInterval
                    // 経過時間 (deltaTime) あたりの発射回数の期待値 = (1 / currentInvaderShootInterval) * (deltaTime * 60)
                    // 確率として表現 = (1 / currentInvaderShootInterval) * (deltaTime * 60)
                    const shootProbability = (1 / currentInvaderShootInterval) * (deltaTime * 60);

                    if (Math.random() < shootProbability) {
                         invaderProjectiles.push({
                            x: randomInvader.x + randomInvader.width / 2 - 2.5,
                            y: randomInvader.y + randomInvader.height,
                            width: 5,
                            height: 10,
                            dx: 0, // 横移動はしない
                            dy: ENEMY_PROJECTILE_SPEED, // 下向き
                            type: 'invader' // 弾のタイプを追加
                        });
                    }
                }

                 // ★★★ここが通常ボス出現のロジックです！★★★
                // インベーダー全滅かつ、まだ通常ボスが生成されていない場合
                if (invaders.length === 0 && !boss && !bossCreatedForThisLevel && currentLevel < MAX_LEVELS) { // MAX_LEVELS未満のレベルでのみ通常ボスを生成
                     console.log(`Invaders cleared on Level ${currentLevel}. Spawning Boss!`); // Debug Log
                     createBoss(); // 通常ボスを生成
                     bossCreatedForThisLevel = true; // このレベルでボスは生成済みとする
                     // 通常ボス出現音があれば再生 (loadedAudio.bossSpawnなど)
                }
                 // ★★★通常ボス出現のロジック、ここまで！★★★


                // Boss movement and shooting (PLAYING状態かつ通常ボスが存在する場合)
                if (boss && !boss.isExploding) { // ボスが爆発中でなければ更新
                    boss.x += boss.dx * deltaTime * 60; // deltaTime 考慮

                    if (boss.x + boss.width > GAME_WIDTH || boss.x < 0) {
                        boss.dx *= -1;
                         // 端に張り付かないように少し押し戻す
                        if (boss.x + boss.width > GAME_WIDTH) boss.x = GAME_WIDTH - boss.width;
                        else if (boss.x < 0) boss.x = 0;
                    }

                    boss.shootTimer++;
                    if (boss.shootTimer >= boss.shootInterval) {
                        // 通常弾
                        invaderProjectiles.push({
                            x: boss.x + boss.width / 2 - 3.5, // 弾の中心をボスの中心に合わせる
                            y: boss.y + boss.height,
                            width: 7, height: 14, dx: 0, dy: ENEMY_PROJECTILE_SPEED * 1.5, type: 'boss_straight'
                        });
                        // 放射状ミサイル
                        const radialCount = BOSS_RADIAL_PROJECTILE_COUNT_BASE + Math.floor(currentLevel / 2);
                        const startAngle = Math.PI / 2 - BOSS_RADIAL_SPREAD_ANGLE / 2;
                        const angleStep = radialCount > 1 ? BOSS_RADIAL_SPREAD_ANGLE / (radialCount - 1) : 0; // 弾が1つの場合は角度ステップは0

                        for (let i = 0; i < radialCount; i++) {
                             const angle = startAngle + i * angleStep;
                             invaderProjectiles.push({
                                x: boss.x + boss.width / 2 - 3.5,
                                y: boss.y + boss.height,
                                width: 7, height: 14, dx: Math.cos(angle) * ENEMY_PROJECTILE_SPEED * 1.5, dy: Math.sin(angle) * ENEMY_PROJECTILE_SPEED * 1.5, type: 'boss_radial'
                            });
                        }
                        // if (loadedAudio.bossShoot) { loadedAudio.bossShoot.play(); }
                        boss.shootTimer = 0;
                    }
                } else if (boss && boss.isExploding) { // 通常ボス爆発中
                    boss.explosionTimer++;
                    if (boss.explosionTimer >= boss.explosionDuration) {
                        boss = null; // 爆発アニメーション終了後、ボスを消滅させる
                        score += 5000 * currentLevel; // ボス撃破ボーナス
                        updateScoreDisplay();
                         // ★★★ ここが修正箇所！通常ボス撃破後のレベルチェック ★★★
                        if (invaders.length === 0 && !boss) { // インベーダーと通常ボス両方いない場合
                             if (currentLevel < MAX_LEVELS) {
                                  endGame(true); // 通常レベルクリア画面へ移行（次のレベルへ）
                             } else { // MAX_LEVELS に到達した場合
                                  // あなたの計画通り、最終ボス戦を開始する関数を呼び出す
                                  console.log(`Level ${currentLevel} cleared! Starting Final Boss Battle!`); // Debug Log
                                  startFinalBossBattle(); // ★★★ 通常レベルクリアではなく、最終ボス戦を開始する関数を呼び出す ★★★
                                  // endGame(true); // これは startFinalBossBattle から最終ボス撃破後に呼ばれる
                             }
                        }
                    }
                }

                // 通常レベルクリア判定 (インベーダー全滅かつ通常ボス撃破後)
                // これはボス撃破時の処理内に移動したのでここでは削除
                // if (invaders.length === 0 && !boss && currentLevel < MAX_LEVELS) {
                //     endGame(true);
                // }
            }

            // ★★★ここから FINAL_BOSS 状態の更新処理！★★★
            if (currentGameState === GAME_STATE.FINAL_BOSS && finalBoss) {
                 if (!finalBoss.isExploding) { // 最終ボスが爆発中でなければ更新
                     // 最終ボスの移動ロジック（必要であれば実装、この時点では停止）
                     // finalBoss.x += finalBoss.dx * deltaTime;

                     // 最終ボスの射撃タイマーを更新
                     finalBoss.shootTimer++;
                     finalBoss.radialShootTimer++; // 放射状ミサイル用タイマーも更新

                     // 最終ボスの通常弾の発射
                     if (finalBoss.shootTimer >= finalBoss.shootInterval) {
                         invaderProjectiles.push({
                             x: finalBoss.x + finalBoss.width / 2 - 3.5,
                             y: finalBoss.y + finalBoss.height,
                             width: 7, height: 14, dx: 0, dy: ENEMY_PROJECTILE_SPEED * 1.8, type: 'finalboss_straight'
                         });
                         finalBoss.shootTimer = 0;
                     }

                     // 最終ボスの放射状ミサイルの発射
                     if (finalBoss.radialShootTimer >= finalBoss.radialShootInterval) {
                          const radialCount = BOSS_RADIAL_PROJECTILE_COUNT_BASE + Math.floor(MAX_LEVELS / 5); // 最終ボスなので固定数または最大レベル基準
                          const startAngle = Math.PI / 2 - BOSS_RADIAL_SPREAD_ANGLE / 2;
                          const angleStep = radialCount > 1 ? BOSS_RADIAL_SPREAD_ANGLE / (radialCount - 1) : 0; // 弾が1つの場合は角度ステップは0

                          for (let i = 0; i < radialCount; i++) {
                               const angle = startAngle + i * angleStep;
                               invaderProjectiles.push({
                                    x: finalBoss.x + finalBoss.width / 2 - 3.5,
                                    y: finalBoss.y + finalBoss.height,
                                    width: 7, height: 14, dx: Math.cos(angle) * ENEMY_PROJECTILE_SPEED * 1.5, dy: Math.sin(angle) * ENEMY_PROJECTILE_SPEED * 1.5, type: 'finalboss_radial'
                               });
                          }
                          finalBoss.radialShootTimer = 0;
                     }

                 } else { // 最終ボスが爆発中の処理
                     finalBoss.explosionTimer++;
                     if (finalBoss.explosionTimer >= finalBoss.explosionDuration) {
                         finalBoss = null; // 爆発アニメーション終了後、最終ボスを消滅させる
                         score += 10000 * MAX_LEVELS * 1.5; // ★ 最終ボス撃破ボーナスをHPに合わせて調整 (調整可能)
                         updateScoreDisplay();
                         // 最終ゲームクリア処理へ
                          console.log("Final Boss defeated. Ending game with win."); // Debug Log
                         endGame(true); // ゲームクリア
                     }
                 }
            }
            // ★★★ FINAL_BOSS 状態の更新処理、ここまで！★★★

            // Collision detection (PLAYING 状態と FINAL_BOSS 状態の両方でチェック)
            checkCollisions(); // この関数内で FINAL_BOSS 状態の衝突判定も処理されます。

            // ゲームオーバー判定 (ライフ0になったら) - updateの最後の方でチェック
            if (lives <= 0 && currentGameState !== GAME_STATE.GAME_OVER) { // すでにゲームオーバー状態で重複して呼ばれないようにチェックを追加
                 console.log("Lives reached 0. Ending game with loss."); // Debug Log
                endGame(false); // ゲームオーバー
            }

             // 描画は update の最後で行われます
            draw();

            // 次のフレームを予約 (endGame でキャンセルされる可能性がある)
            animationFrameId = requestAnimationFrame(update);
        }

        // --- Drawing Functions ---

        function draw() {
            ctx.clearRect(0, 0, GAME_WIDTH, GAME_HEIGHT); // 描画の最初に画面をクリア

            // Draw player
            // 点滅効果のロジックを追加
            if (currentGameState !== GAME_STATE.GAME_OVER) { // ゲームオーバー画面ではプレイヤーは描画しない
                if (player.invincible && player.blinkTimer % 10 < 5) {
                    // 非表示期間なので描画しない
                } else {
                    if (loadedImages.player) {
                        ctx.drawImage(loadedImages.player, player.x, player.y, player.width, player.height);
                    } else {
                        ctx.fillStyle = 'blue';
                        ctx.fillRect(player.x, player.y, player.width, player.height);
                    }
                }
            }


            // Draw invaders (PLAYING状態のみ)
            if (currentGameState === GAME_STATE.PLAYING) {
                invaders.forEach(invader => {
                    if (loadedImages.invader) {
                        ctx.drawImage(loadedImages.invader, invader.x, invader.y, invader.width, invader.height);
                    } else {
                        ctx.fillStyle = 'green';
                        ctx.fillRect(invader.x, invader.y, invader.width, invader.height);
                    }
                });
            }

            // Draw boss or boss explosion (PLAYING状態での通常ボスのみ)
            if (currentGameState === GAME_STATE.PLAYING && boss) {
                if (boss.isExploding && loadedImages[boss.explosionImage]) {
                    const frame = Math.floor(boss.explosionTimer / (boss.explosionDuration / 8));
                    const spriteWidth = 256;
                    const spriteHeight = 256;
                    const drawX = boss.x + boss.width / 2 - spriteWidth / 2;
                    const drawY = boss.y + boss.height / 2 - spriteHeight / 2;
                    const drawWidth = spriteWidth;
                    const drawHeight = spriteHeight;
                    ctx.drawImage(
                        loadedImages[boss.explosionImage],
                        frame * spriteWidth, 0, spriteWidth, spriteHeight,
                        drawX, drawY, drawWidth, drawHeight
                    );
                } else if (loadedImages[boss.originalImage]) {
                    ctx.drawImage(loadedImages[boss.originalImage], boss.x, boss.y, boss.width, boss.height);
                    // ボスのHPバーを描画
                    const hpBarWidth = boss.width * 0.8;
                    const hpBarHeight = 5;
                    const hpBarX = boss.x + (boss.width - hpBarWidth) / 2;
                    const hpBarY = boss.y + boss.height + 5;
                    ctx.fillStyle = 'red'; ctx.fillRect(hpBarX, hpBarY, hpBarWidth, hpBarHeight);
                    ctx.fillStyle = 'lime'; ctx.fillRect(hpBarX, hpBarY, hpBarWidth * (boss.hp / BOSS_HP_PER_LEVEL), hpBarHeight);
                    ctx.strokeStyle = '#0f0'; ctx.strokeRect(hpBarX, hpBarY, hpBarWidth, hpBarHeight);
                } else {
                    ctx.fillStyle = 'purple';
                    ctx.fillRect(boss.x, boss.y, boss.width, boss.height);
                }
            }

            // ★★★ここから FINAL_BOSS 状態の描画処理！(あなたが提供してくれたコードを元に) ★★★
             if (currentGameState === GAME_STATE.FINAL_BOSS && finalBoss) {
                 if (finalBoss.isExploding && loadedImages[finalBoss.explosionImage]) {
                     // 最終ボス爆発のアニメーションを描画 (通常ボスと同じロジックを流用)
                     const frame = Math.floor(finalBoss.explosionTimer / (finalBoss.explosionDuration / 8));
                     const spriteWidth = 256;
                     const spriteHeight = 256;
                     const drawX = finalBoss.x + finalBoss.width / 2 - spriteWidth / 2;
                     const drawY = finalBoss.y + finalBoss.height / 2 - spriteHeight / 2;
                     const drawWidth = spriteWidth;
                     const drawHeight = spriteHeight;
                     ctx.drawImage(
                         loadedImages[finalBoss.explosionImage],
                         frame * spriteWidth, 0, spriteWidth, spriteHeight,
                         drawX, drawY, drawWidth, drawHeight
                     );

                 } else if (loadedImages[finalBoss.originalImage]) {
                    // 最終ボスの画像を描画
                    ctx.drawImage(loadedImages[finalBoss.originalImage], finalBoss.x, finalBoss.y, finalBoss.width, finalBoss.height);

                    // 最終ボスのHPバーを描画 (あなたが提供してくれたコードを元に)
                    const hpBarWidth = finalBoss.width * 0.9; // HPバーを少し大きく
                    const hpBarHeight = 7; // HPバーを少し太く
                    const hpBarX = finalBoss.x + (finalBoss.width - hpBarWidth) / 2;
                    const hpBarY = finalBoss.y + finalBoss.height + 10; // 少し下に表示

                    ctx.fillStyle = 'red'; ctx.fillRect(hpBarX, hpBarY, hpBarWidth, hpBarHeight);
                    ctx.fillStyle = 'lime'; ctx.fillRect(hpBarX, hpBarY, hpBarWidth * (finalBoss.hp / (BOSS_HP_PER_LEVEL * MAX_LEVELS * 1.5)), hpBarHeight); // ★ 最大HPに合わせて修正
                    ctx.strokeStyle = '#0f0'; ctx.strokeRect(hpBarX, hpBarY, hpBarWidth, hpBarHeight);

                 } else {
                     // 画像がない場合の代替描画
                     ctx.fillStyle = 'purple';
                     ctx.fillRect(finalBoss.x, finalBoss.y, finalBoss.width, finalBoss.height);
                 }
             }
            // ★★★ FINAL_BOSS 状態の描画処理、ここまで！★★★

            // Draw projectiles (自機の弾)
            projectiles.forEach(p => {
                ctx.fillStyle = 'yellow';
                ctx.fillRect(p.x, p.y, p.width, p.height);
            });

            // Draw invader projectiles (敵弾 - 通常敵とボス、最終ボス含む)
            invaderProjectiles.forEach(p => {
                ctx.fillStyle = 'red'; // 敵弾の色
                ctx.fillRect(p.x, p.y, p.width, p.height);
            });

             // UI 要素はゲームコンテナのHTML要素として描画されるため、キャンバス上での描画は不要
             // スコア、ライフ、レベル表示はHTML側で自動的に更新される
        }


        // --- Collision Detection ---

        function checkCollisions() {
            // Player projectiles hitting invaders (PLAYING状態のみ)
            if (currentGameState === GAME_STATE.PLAYING) {
                // 後ろから処理することで、spliceによるインデックスずれを防ぐ
                for (let i = projectiles.length - 1; i >= 0; i--) {
                    const p = projectiles[i];
                    let hit = false;
                    for (let j = invaders.length - 1; j >= 0; j--) {
                         const invader = invaders[j];
                         if (isColliding(p, invader)) {
                             invaders.splice(j, 1); // Remove invader
                             score += 100;
                             updateScoreDisplay();
                             // if (loadedAudio.invaderHit) { loadedAudio.invaderHit.play(); }
                             hit = true; // インベーダーに当たった
                             break; // この弾丸はもう他のインベーダーには当たらないと仮定
                         }
                    }
                     if (hit) {
                          projectiles.splice(i, 1); // 弾丸を削除
                     }
                }


                 // プレイヤーの弾丸が通常のボスに当たる処理 (PLAYING状態での通常ボスのみ)
                 if (boss && !boss.isExploding) { // ボスが爆発中でなければ判定
                     // 後ろから処理することで、spliceによるインデックスずれを防ぐ
                     for (let i = projectiles.length - 1; i >= 0; i--) {
                         const p = projectiles[i];
                         if (isColliding(p, boss)) {
                              projectiles.splice(i, 1); // プレイヤーの弾丸を削除
                              boss.hp--;
                              // if (loadedAudio.bossHit) { loadedAudio.bossHit.play(); }
                               console.log(`Boss hit! HP: ${boss.hp}`); // Debug Log
                              if (boss.hp <= 0) {
                                  boss.isExploding = true; // ボスを爆発状態にする
                                  boss.explosionTimer = 0;
                                  // if (loadedAudio.bossExplosion) { loadedAudio.bossExplosion.play(); }
                                   console.log("Boss is exploding."); // Debug Log
                              }
                             // ボスに当たったらその弾丸のチェックは終了
                             // break; // ボスは単体なので当たったら終了
                         }
                     }
                 }

            }

             // ★★★ここからプレイヤーの弾丸が最終ボスに当たる衝突判定！(あなたが提供してくれたコードを元に) ★★★★
             // PLAYING状態のボス衝突判定とは別のブロックで行う
             if (currentGameState === GAME_STATE.FINAL_BOSS && finalBoss && !finalBoss.isExploding) {
                  // 後ろから処理することで、spliceによるインデックスずれを防ぐ
                  for (let i = projectiles.length - 1; i >= 0; i--) {
                      const p = projectiles[i];
                      if (isColliding(p, finalBoss)) {
                          projectiles.splice(i, 1); // プレイヤーの弾丸を削除
                          finalBoss.hp--; // 最終ボスのHPを減らす
                           // 最終ボス被弾音があれば再生 (loadedAudio.finalBossHitなど)
                            console.log(`Final Boss hit! HP: ${finalBoss.hp}`); // Debug Log
                           if (finalBoss.hp <= 0) {
                               finalBoss.isExploding = true; // 最終ボスを爆発状態にする
                               finalBoss.explosionTimer = 0;
                               // 最終ボス爆発音があれば再生 (loadedAudio.finalBossExplosionなど)
                               // 最終ボス撃破時の処理は update 関数で行います。
                                console.log("Final Boss is exploding."); // Debug Log
                           }
                          // プレイヤーの弾丸のチェックを終了
                          // break; // ボスは単体なので当たったら終了
                      }
                  }
             }
             // ★★★プレイヤーの弾丸が最終ボスに当たる衝突判定、ここまで！★★★


            // Invader projectiles hitting player (PLAYING状態とFINAL_BOSS状態の両方でチェック)
            // 後ろから処理することで、spliceによるインデックスずれを防ぐ
            for (let i = invaderProjectiles.length - 1; i >= 0; i--) {
                 const ip = invaderProjectiles[i];
                if (!player.invincible && currentGameState !== GAME_STATE.GAME_OVER && isColliding(ip, player)) { // ゲームオーバー画面では被弾しない
                    invaderProjectiles.splice(i, 1); // Remove projectile
                    lives--;
                    updateLivesDisplay();
                     console.log(`Player hit! Lives remaining: ${lives}`); // Debug Log
                    player.invincible = true;
                    player.invincibleTimer = 0;
                    player.blinkTimer = 0;
                    // if (loadedAudio.playerHit) { loadedAudio.playerHit.play(); }
                    // ゲームオーバー判定
                    if (lives <= 0 && currentGameState !== GAME_STATE.GAME_OVER) { // すでにゲームオーバー状態で重複して呼ばれないようにチェックを追加
                         console.log("Lives reached 0. Ending game with loss."); // Debug Log
                         endGame(false); // ゲームオーバー
                         // return; // ゲームオーバーなので以降の敵弾チェックは不要 (endGame でループがキャンセルされる)
                    }
                    // プレイヤーに当たったらその弾丸のチェックは終了
                    // break; // プレイヤーは単体なので当たったら終了
                }
            }
             // 注意：ループ内で endGame(false) が呼ばれると、ループの残り処理で問題が起きる可能性があるので、
             // ライフが0になったら即座に update 関数全体を終了するなどの処理が必要になる場合があります。
             // 現在のコードでは requestAnimationFrame のキャンセルで対応しています。


        }

        function isColliding(rect1, rect2) {
            // 衝突しているかどうかの基本的な判定
            return rect1.x < rect2.x + rect2.width &&
                rect1.x + rect1.width > rect2.x &&
                rect1.y < rect2.y + rect2.height &&
                rect1.y + rect1.height > rect2.y;
        }


        // --- Input Handling ---

        function handleKeyDown(e) {
            // ゲームプレイ中 (PLAYING) または最終ボス戦中 (FINAL_BOSS) のみキー操作を有効にする
            // この関数の最初の状態チェックは、このままで大丈夫です。
            if (currentGameState !== GAME_STATE.PLAYING && currentGameState !== GAME_STATE.FINAL_BOSS) {
                 // スタート画面やゲームオーバー画面でのキー操作は必要に応じてここに追加
                 // 例: スタート画面でSpaceキーを押したらゲーム開始など
                 // if (currentGameState === GAME_STATE.START_SCREEN && e.key === ' ') {
                 //      // スタートボタンのクリックイベントをプログラムから発生させるなど
                 //      startButton.click();
                 // }
                 return; // ゲームプレイ/最終ボス戦以外では大部分のキー操作を無視
            }

            // ここに既存のキー操作 (矢印キーやスペースキー) の if / else if ブロックがあります
            if (e.key === 'ArrowLeft' || e.key === 'a') {
                player.movingLeft = true;
            } else if (e.key === 'ArrowRight' || e.key === 'd') {
                player.movingRight = true;
            } else if (e.key === ' ' || e.key === 'w') {
                // キーボードでの発射は、isPointerDown とは別に実装する必要があるか、
                // あるいはキーボードでも isPointerDown を true に設定するなどの連携が必要。
                // 現在のタッチ/マウス中心の発射ロジックとは分離しています。
                // キーボードでの単発発射が必要なら以下のコメントアウトを解除。
                // shootProjectile(); // キーボードでの単発発射
            }
            // ↑↑↑ この既存のキー操作のブロックはここで終わっています ↑↑↑

            // ↓↓↓ 前回デバッグ用に追加したLキーのコードブロック（最終ボスオブジェクト生成＋音楽停止を含んでいた）です！ ↓↓↓
            // 通常クリアからの最終ボス移行を実装したので、このデバッグ用のLキーは不要になりました。
            // 必要であれば残しておいても良いですが、混乱を防ぐためコメントアウト推奨です。
            /*
            if (e.key === 'L' || e.key === 'l') { // Lキーが押されたかチェック
                console.log("Level Skip to Final Boss Trigger!"); // Debug Log
                // 現在のゲーム状態が、スキップを許可する状態かチェック
                if (currentGameState !== GAME_STATE.LOADING && currentGameState !== GAME_STATE.START_SCREEN && currentGameState !== GAME_STATE.GAME_OVER && currentGameState !== GAME_STATE.FINAL_BOSS) {
                     console.log("Changing state to FINAL_BOSS via L key."); // Debug Log
                     startFinalBossBattle(); // Lキーで直接最終ボス戦を開始
                } else {
                    console.log("Level Skip ignored: Game is not in a state where skip is allowed or already in FINAL_BOSS.");
                }
            }
            */
            // ↑↑↑ Lキーのコードブロック、ここまで！ ↑↑↑

        } // handleKeyDown 関数の最後の閉じ波括弧


        function handleKeyUp(e) {
             // ゲームプレイ中または最終ボス戦中のみ操作を有効にする
            if (currentGameState !== GAME_STATE.PLAYING && currentGameState !== GAME_STATE.FINAL_BOSS) return;

            if (e.key === 'ArrowLeft' || e.key === 'a') {
                player.movingLeft = false;
            } else if (e.key === 'ArrowRight' || e.key === 'd') {
                player.movingRight = false;
            }
        }

        function handleTouchStart(e) {
             // ゲームプレイ中または最終ボス戦中以外の場合の処理
             if (currentGameState === GAME_STATE.LOADING || currentGameState === GAME_STATE.GAME_OVER) {
                 e.preventDefault(); // ロード中やゲームオーバー画面での意図しない操作を防ぐ
                 // オーディオアンロックを試みる
                 unlockAudio();
                 return;
             }
            // スタート画面でのタップは startButton のイベントリスナーで処理されるのが望ましい
            if (currentGameState === GAME_STATE.START_SCREEN) {
                 // スタートボタン以外の場所をタップした場合の処理（何もしない、またはメッセージ表示など）
                 // e.preventDefault(); // 意図しないスクロールなどを防ぐ
                 // オーディオアンロックを試みる
                 unlockAudio();
                 return; // スタート画面での操作はボタンに限定するため、ここでは処理しない
            }


            // ゲームプレイ中または最終ボス戦中
            e.preventDefault(); // Prevent default touch behaviors like scrolling/zooming

            if (e.touches.length > 0) {
                isPointerDown = true;
                 // タッチ位置をプレイヤーのターゲット位置として設定
                 handleTouchMove(e); // タッチ開始時の位置で一度更新
            }
        }

        function handleTouchMove(e) {
             // ゲームプレイ中または最終ボス戦中のみ操作を有効にする
            if (currentGameState !== GAME_STATE.PLAYING && currentGameState !== GAME_STATE.FINAL_BOSS || !isPointerDown) return;

            e.preventDefault(); // デフォルトのスクロールやズームを防止

            if (e.touches.length > 0) {
                const touchX = e.touches[0].clientX; // スクリーン座標でのタッチX
                const rect = canvas.getBoundingClientRect(); // Canvasの表示位置とサイズを取得

                // Canvas表示領域基準でのタッチX座標
                let targetXOnCanvas = touchX - rect.left;
                // --- スマートフォン向け端処理ロジック ---
                // 画面端から何ピクセル以内にタッチしたら吸着させるかの閾値（表示ピクセル基準）
                const edgeThreshold = 30; // ピクセル数を調整

                if (rect.width > 0) { // Canvasが表示されている場合のみ処理
                     if (targetXOnCanvas < edgeThreshold) {
                         // 実際のゲーム座標に変換して設定
                         playerTargetX = player.width / 2; // 左端に吸着（自機中央を左端+自機半径に）
                     } else if (targetXOnCanvas > rect.width - edgeThreshold) {
                          // 実際のゲーム座標に変換して設定
                          playerTargetX = GAME_WIDTH - player.width / 2; // 右端に吸機（自機中央を右端-自機半径に）
                     } else {
                         // Canvas表示領域内にクランプしてからゲーム座標に変換
                         targetXOnCanvas = Math.max(0, Math.min(targetXOnCanvas, rect.width)); // Canvas表示領域内にクランプ
                         const gameToDisplayRatio = rect.width / GAME_WIDTH; // 表示サイズとゲームサイズの比率
                         playerTargetX = targetXOnCanvas / gameToDisplayRatio; // ゲーム座標に変換
                     }
                      // 目標座標がゲーム領域内に収まるようにクランプ（念のため）
                     playerTargetX = Math.max(player.width / 2, Math.min(playerTargetX, GAME_WIDTH - player.width / 2));
                } else {
                     console.warn("Canvas rect width is 0, cannot calculate playerTargetX from touch move."); // Debug Log
                }
            }
        }


        function handleTouchEnd() {
             // ゲームプレイ中または最終ボス戦中以外の場合の処理
            if (currentGameState !== GAME_STATE.PLAYING && currentGameState !== GAME_STATE.FINAL_BOSS) {
                  // スタート画面でのタップ終了は startButton のイベントリスナーで処理されるのが望ましい
                 if (currentGameState === GAME_STATE.START_SCREEN) return;
                 // それ以外の状態（ロード中、ゲームオーバー画面など）では入力を無視
                 return;
            }

            isPointerDown = false;
            playerTargetX = null;
        }

        function handleMouseDown(e) {
             // ゲームプレイ中または最終ボス戦中以外の場合の処理
             if (currentGameState === GAME_STATE.LOADING || currentGameState === GAME_STATE.GAME_OVER) {
                 e.preventDefault(); // ロード中やゲームオーバー画面での意図しない操作を防ぐ
                 // オーディオアンロックを試みる
                 unlockAudio();
                 return;
             }
            // スタート画面でのマウスクリックは startButton のイベントリスナーで処理されるのが望ましい
             if (currentGameState === GAME_STATE.START_SCREEN) {
                 // スタートボタン以外の場所をクリックした場合の処理（何もしない、またはメッセージ表示など）
                 // e.preventDefault(); // 意図しない右クリックメニューなどを防ぐ
                 // オーディオアンロックを試みる
                 unlockAudio();
                 return; // スタート画面での操作はボタンに限定するため、ここでは処理しない
             }


            // ゲームプレイ中または最終ボス戦中
            isPointerDown = true;
            const rect = canvas.getBoundingClientRect();
            let mouseX = e.clientX - rect.left;
             // Canvas表示領域内にクランプ
             mouseX = Math.max(0, Math.min(mouseX, rect.width));
             const gameToDisplayRatio = rect.width / GAME_WIDTH;
            playerTargetX = mouseX / gameToDisplayRatio;
        }

        function handleMouseMove(e) {
             // ゲームプレイ中または最終ボス戦中のみ操作を有効にする
            if (currentGameState !== GAME_STATE.PLAYING && currentGameState !== GAME_STATE.FINAL_BOSS || !isPointerDown) return;

            const rect = canvas.getBoundingClientRect();
            let mouseX = e.clientX - rect.left;
            // Canvas表示領域内にクランプ
             mouseX = Math.max(0, Math.min(mouseX, rect.width));
             const gameToDisplayRatio = rect.width / GAME_WIDTH;
            playerTargetX = mouseX / gameToDisplayRatio;
        }

        function handleMouseUp() {
             // ゲームプレイ中または最終ボス戦中のみ操作を有効にする
            if (currentGameState !== GAME_STATE.PLAYING && currentGameState !== GAME_STATE.FINAL_BOSS) return;
            isPointerDown = false;
            playerTargetX = null;
        }

        function shootProjectile() {
            // ゲームプレイ中または最終ボス戦中のみ発射を許可する
            if (currentGameState !== GAME_STATE.PLAYING && currentGameState !== GAME_STATE.FINAL_BOSS) return;

            // 自機が無敵状態でない、または無敵状態でも発射を許可する場合
            // if (!player.invincible) { // 無敵中は撃てなくするならこのチェックを追加
                 projectiles.push({
                     x: player.x + player.width / 2 - 2.5,
                     y: player.y,
                     width: 5,
                     height: 10,
                     dx: 0, // 弾のdx, dyを追加（放射状などにも対応できるように）
                     dy: -PLAYER_PROJECTILE_SPEED // 上向きなのでマイナス
                 });
                 playerShootCooldown = PLAYER_SHOOT_COOLDOWN_MAX;
                 if (loadedAudio.shoot) {
                     // loadedAudio.shoot.play(); // loadAudioでHowlオブジェクトは取得済み
                     loadedAudio.shoot.play().catch(e => console.error("Shoot sound play failed:", e)); // 再生失敗時のエラーをキャッチ
                 } else {
                      console.warn("Shoot sound not loaded or found."); // Debug Log
                 }
            // } // 無敵中は撃てなくするならこの閉じ括弧が必要
        }


        // Call init when the DOM is fully loaded
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Improved Space Invaders</title>
    <style>
        /* 全体のリセットと基本設定 */
        html, body {
            margin: 0;
            padding: 0;
            overflow: hidden; /* スクロール禁止 */
            background-color: #000; /* デフォルトの背景色を黒に設定（ゲーム画面外） */
            font-family: 'Arial', sans-serif;
            color: #fff;
            -webkit-user-select: none; /* テキスト選択無効化 (iOS) */
            -moz-user-select: none; /* テキスト選択無効化 (Firefox) */
            -ms-user-select: none; /* テキスト選択無効化 (IE/Edge) */
            user-select: none; /* テキスト選択無効化 (標準) */
            -webkit-tap-highlight-color: rgba(0,0,0,0); /* タップ時のハイライトを無効化 (iOS) */
        }

        /* 画面中央にゲームコンテンツを配置するためのFlexbox */
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh; /* 画面全体の高さ */
            width: 100vw; /* 画面全体の幅 */
            position: relative; /* 子要素の絶対配置の基準 */
        }

        /* ゲームコンテナ - キャンバスと動画、UI要素を内包 */
        #gameContainer {
            position: relative; /* 子要素（canvas, video）の基準 */
            width: 420px; /* GAME_WIDTHと同期 */
            height: calc(420px * (19.5 / 9)); /* GAME_HEIGHTと同期 */
            overflow: hidden; /* はみ出たコンテンツを隠す */
            border: 2px solid #0f0; /* ゲーム画面の枠線 */
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.8);
            z-index: 1; /* 他のUIより手前 */
            margin: auto; /* 画面中央に配置 */
            box-sizing: border-box; /* パディングとボーダーを幅と高さに含める */
        }

        /* スマートフォンなど、画面幅が768px以下のデバイスにのみ適用するスタイル */
        @media (max-width: 768px) {
            #gameContainer {
                width: min(100vw, calc(100vh * (9 / 19.5)));
                height: min(calc(100vw * (19.5 / 9)), 100vh);
                /* safe-area-inset は必要に応じて追加してください。
                   現状のコードにはないので今回は含めません。
                padding-top: env(safe-area-inset-top);
                padding-bottom: env(safe-area-inset-bottom);
                padding-left: env(safe-area-inset-left);
                padding-right: env(safe-area-inset-right);
                */
            }
        }

        /* ゲームキャンバス */
        #gameCanvas {
            position: absolute; /* gameContainerを基準に配置 */
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block; /* 初期状態はJSで制御 */
            z-index: 0; /* 動画より手前 */
            background-color: lightgray; /* ゲームプレイ中の背景色をライトグレーに設定 */
        }

        /* 背景動画 - gameContainerのサイズに合わせる */
        #background-video {
            position: absolute; /* gameContainerを基準に配置 */
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover; /* 縦横比を維持しつつ要素を覆う */
            filter: brightness(0.5); /* 少し暗くして見やすくする */
            z-index: -1; /* キャンバスより奥に配置 */
            display: block; /* 初期状態はJSで制御 */
        }

        /* スコア、ライフ、レベル表示 */
        #score, #lives, #level {
            position: absolute;
            font-size: 1.2em;
            font-weight: bold;
            color: #0f0;
            text-shadow: 0 0 5px #0f0;
            z-index: 2; /* ゲーム要素より手前 */
            padding: 5px 10px;
            background-color: rgba(0, 0, 0, 0.5);
            border-radius: 5px;
        }
        #score { top: 10px; left: 10px; }
        #lives { top: 10px; right: 10px; }
        #level { bottom: 10px; left: 10px; }

        /* メッセージボックス (ゲームオーバー/クリア時) */
        #messageBox {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: rgba(0, 0, 0, 0.8);
            border: 2px solid #0f0;
            padding: 20px;
            text-align: center;
            z-index: 3;
            display: none;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.8);
            max-width: 80%;
            box-sizing: border-box; /* パディングを含めて幅を計算 */
        }
        #messageBox p {
            margin: 0 0 20px 0;
            font-size: 1.5em;
            font-weight: bold;
            color: #0f0;
            text-shadow: 0 0 5px #0f0;
        }
        #messageBox button {
            background-color: #0f0;
            color: #000;
            border: none;
            padding: 10px 20px;
            font-size: 1.2em;
            font-weight: bold;
            cursor: pointer;
            border-radius: 5px;
            transition: background-color 0.3s, color 0.3s;
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.5);
        }
        #messageBox button:hover {
            background-color: #0a0;
            color: #fff;
        }

        /* スタートボタンコンテナ */
        #startButtonContainer {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: rgba(0, 0, 0, 0.7);
            border: 2px solid #0f0;
            padding: 30px 40px;
            border-radius: 15px;
            box-shadow: 0 0 25px rgba(0, 255, 0, 0.8);
            z-index: 2; /* ゲーム画面より手前 */
            width: 80%; /* 適度な幅に */
            max-width: 400px; /* 最大幅 */
            box-sizing: border-box; /* パディングを含めて幅を計算 */
        }
        #startButtonContainer h1 {
            font-size: 2.5em;
            color: #0f0;
            text-shadow: 0 0 10px #0f0;
            margin-bottom: 10px;
            text-align: center;
        }
        #startButtonContainer p {
            font-size: 1.2em;
            color: #fff;
            margin-bottom: 30px;
            text-align: center;
        }
        #startButton {
            background-color: #0f0;
            color: #000;
            border: none;
            padding: 15px 30px;
            font-size: 1.5em;
            font-weight: bold;
            cursor: pointer;
            border-radius: 8px;
            transition: background-color 0.3s, color 0.3s, transform 0.1s;
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.5);
            white-space: nowrap; /* ボタン内のテキストが改行されないように */
        }
        #startButton:hover {
            background-color: #0a0;
            color: #fff;
        }
        #startButton:active {
            transform: scale(0.98);
        }

        /* ローディングメッセージ */
        #loadingMessage {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 1.8em;
            font-weight: bold;
            color: #0f0;
            text-shadow: 0 0 8px #0f0;
            z-index: 4;
            display: none;
        }

        /* 音量スライダー */
        .volume-control {
            margin-top: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1em;
            color: #fff;
        }
        #volumeSlider {
            width: 150px;
            -webkit-appearance: none; /* デフォルトスタイルを無効化 */
            appearance: none;
            height: 8px;
            background: #333;
            outline: none;
            border-radius: 4px;
            cursor: pointer;
            box-shadow: inset 0 0 5px rgba(0, 255, 0, 0.3);
        }
        #volumeSlider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            background: #0f0;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.7);
        }
        #volumeSlider::-moz-range-thumb {
            width: 20px;
            height: 20px;
            background: #0f0;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.7);
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/howler/2.2.3/howler.min.js"></script>
</head>
<body>
    <div id="loadingMessage">Loading Game Assets...</div>

    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        <video autoplay loop muted playsinline id="background-video">
            <source src="video/background_loop.mp4" type="video/mp4">
            Your browser does not support the video tag.
        </video>
        <div id="score">Score: 0</div>
        <div id="lives">Lives: 3</div>
        <div id="level">Level: 1</div>
    </div>

    <div id="messageBox">
        <p id="message"></p>
        <button>Play Again</button>
    </div>

    <div id="startButtonContainer">
        <h1>SPACE INVADERS</h1>
        <p>Improved</p>
        <button id="startButton">TAP TO START</button>
        <div class="volume-control">
            <span>Volume</span>
            <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="0.5">
        </div>
    </div>

    <script>
        // --- Global Constants ---
        const GAME_WIDTH = 420;
        const GAME_HEIGHT = GAME_WIDTH * (19.5 / 9); // Aspect ratio for mobile portrait
        const PLAYER_SPEED = 7;
        const PLAYER_PROJECTILE_SPEED = 10;
        const INVADER_BASE_SPEED = 15; // 修正: 20から15に減少（インベーダーの初期移動速度）
        const INVADER_MOVE_DOWN_AMOUNT = 20; // インベーダーが下に移動する量

        // ★難易度調整: 敵の弾速を少し上げる
        const ENEMY_PROJECTILE_SPEED = 5; // 変更: 4 -> 5

        const INVADER_ROWS = 5; // ★修正: 6から5に戻す（敵の行数）
        const INVADER_COLS = 5; // （敵の列数）
        const INVADER_WIDTH = 75; // （敵の表示サイズ）
        const INVADER_HEIGHT = 75; // （敵の表示サイズ）

        // インベーダー間の横方向の間隔と縦方向の間隔を調整
        const INVADER_SPACING_X = 10; // インベーダー間の横方向の間隔を詰める
        const INVADER_SPACING_Y = 15; // インベーダー間の縦方向の間隔を調整

        const BOSS_WIDTH = 150; // ★変更: ボスの幅を大きく
        const BOSS_HEIGHT = 120; // ★変更: ボスの高さを大きく
        const BOSS_HP_PER_LEVEL = 10; // （ボスのHP）
        const MAX_LEVELS = 30; // ★難易度調整: 最大レベル数を30に設定

        const PLAYER_WIDTH = 40; // 修正: 30から40に増加（自機の表示サイズ）
        const PLAYER_HEIGHT = 40; // 修正: 30から40に増加（自機の表示サイズ）
        const PLAYER_SHOOT_COOLDOWN_MAX = 15; // 修正: 20から15に減少（自機の発射間隔）

        // ボスの放射状ミサイル関連の定数
        const BOSS_RADIAL_PROJECTILE_COUNT_BASE = 3; // ボスの初期放射状ミサイル数
        const BOSS_RADIAL_SPREAD_ANGLE = Math.PI * 0.75; // 放射状に広がる角度（ラジアン、例: 135度）

        const GAME_STATE = {
            LOADING: 'LOADING',
            START_SCREEN: 'START_SCREEN', // 最初の「TAP TO START」で動画再生
            PLAYING: 'PLAYING', // 実際のゲームプレイ中
            GAME_OVER: 'GAME_OVER', // ゲームオーバー/クリア画面
            FINAL_BOSS: 'FINAL_BOSS' // ★追加: 最終ボス戦状態
        };

        // --- Global Variables ---
        let canvas, ctx;
        let player;
        let invaders = [];
        let projectiles = [];
        let invaderProjectiles = []; // invaderProjectilesはボスや通常の敵の弾を扱う
        let score = 0;
        let lives = 3;
        let currentLevel = 1;
        let lastTimestamp = 0;
        let animationFrameId;
        let currentGameState = GAME_STATE.LOADING;
        let loadedImages = {};
        let loadedAudio = {};
        let boss = null; // 通常のボス
        let finalBoss = null; // ★追加: 最終ボスオブジェクト
        let bossCreatedForThisLevel = false; // ★追加: 通常ボスがこのレベルで生成されたかどうかのフラグ

        // Player shooting cooldown
        let playerShootCooldown = 0;

        // Player movement target for touch/mouse
        let playerTargetX = null;
        let isPointerDown = false; // Tracks if mouse/touch is currently pressed

        // UI elements
        let scoreDisplay;
        let livesDisplay;
        let levelDisplay;
        let messageBox;
        let messageText;
        let startButtonContainer;
        let startButton;
        let loadingMessage;
        let volumeSlider; // 音量スライダー
        // BGM変数の宣言場所を変更または追加が必要かも - Howler.jsで管理しているのでloadedAudioを使う
        // let backgroundMusic; // Howler.js BGM
        let backgroundVideo; // 背景動画要素

        // Invader movement flags
        let lastInvaderMoveDownTime = 0;
        const INVADER_MOVE_DOWN_INTERVAL = 1500; // ★修正: 500から1500に増加（インベーダーが下に移動する間隔（ミリ秒））

        let isInitialStartTapDone = false; // 最初のタップ（動画再生）が完了したかどうかのフラグ

        // --- Initialization ---

        function init() {
            initGameEssentials();
            loadAssets().then(() => {
                hideLoadingMessage();
                currentGameState = GAME_STATE.START_SCREEN;
                showStartButton(); // これで「TAP TO START」が表示される

                // 音量スライダーの初期値を設定し、イベントリスナーを追加
                const savedVolume = parseFloat(localStorage.getItem('gameVolume')) || 0.5;
                Howler.volume(savedVolume);
                volumeSlider.value = savedVolume;

                volumeSlider.addEventListener('input', (e) => {
                    const newVolume = parseFloat(e.target.value);
                    Howler.volume(newVolume); // Howler.jsのグローバル音量を更新
                    localStorage.setItem('gameVolume', newVolume); // 音量設定をローカルストレージに保存

                    if (backgroundVideo) {
                        backgroundVideo.volume = newVolume;
                        if (newVolume > 0 && backgroundVideo.muted) {
                            backgroundVideo.muted = false;
                        } else if (newVolume === 0 && !backgroundVideo.muted) {
                            backgroundVideo.muted = true;
                        }
                    }
                });

                // スタートボタンのクリックイベントリスナー
                startButton.addEventListener('click', () => {
                    if (currentGameState === GAME_STATE.START_SCREEN) {
                        if (!isInitialStartTapDone) {
                            // 1回目のタップ：動画再生とボタンテキスト変更
                            if (backgroundVideo) {
                                backgroundVideo.muted = false; // ミュート解除
                                backgroundVideo.volume = Howler.volume(); // スライダーの音量に合わせる
                                backgroundVideo.play().catch(e => console.error("Video playback error on first tap:", e));
                                backgroundVideo.style.display = 'block'; // 動画を表示
                            }
                            startButton.innerText = "START GAME"; // ボタンのテキストを変更
                            isInitialStartTapDone = true; // フラグを立てる
                        } else {
                            // 2回目のタップ：ゲーム開始
                            startGame(true); // 新しいゲームを開始
                        }
                    }
                });
            }).catch(error => {
                console.error("Error loading assets:", error);
                loadingMessage.innerText = `Error loading assets: ${error.message || error}. Please check console for details.`;
            });
        }

        // Sets up canvas, player object, and event listeners once
        function initGameEssentials() {
            canvas = document.getElementById('gameCanvas');
            ctx = canvas.getContext('2d');
            canvas.width = GAME_WIDTH;
            canvas.height = GAME_HEIGHT;
            canvas.style.display = 'none'; // ゲーム開始前はキャンバスを非表示にする

            // UI elements
            scoreDisplay = document.getElementById('score');
            livesDisplay = document.getElementById('lives');
            levelDisplay = document.getElementById('level');
            messageBox = document.getElementById('messageBox');
            messageText = messageBox.querySelector('p');
            startButtonContainer = document.getElementById('startButtonContainer');
            startButton = document.getElementById('startButton');
            loadingMessage = document.getElementById('loadingMessage');
            volumeSlider = document.getElementById('volumeSlider'); // スライダー要素を取得

            // 背景動画要素を取得
            backgroundVideo = document.getElementById('background-video');
            if (backgroundVideo) {
                backgroundVideo.style.display = 'none'; // 最初は隠す
                backgroundVideo.muted = true; // 最初はミュートにする
            }

            player = {
                x: GAME_WIDTH / 2 - PLAYER_WIDTH / 2,
                y: GAME_HEIGHT - PLAYER_HEIGHT - 120,
                width: PLAYER_WIDTH,
                height: PLAYER_HEIGHT,
                movingLeft: false,
                movingRight: false,
                invincible: false, // Is player invincible?
                invincibleTimer: 0, // How long player has been invincible
                blinkTimer: 0 // For blinking effect
            };

            // Input Event Listeners
            document.addEventListener('keydown', handleKeyDown);
            document.addEventListener('keyup', handleKeyUp);

            // Touch event listeners for mobile
            document.body.addEventListener('touchstart', handleTouchStart, { passive: false });
            document.body.addEventListener('touchmove', handleTouchMove, { passive: false });
            document.body.addEventListener('touchend', handleTouchEnd);

            // Mouse event listeners for desktop
            document.body.addEventListener('mousedown', handleMouseDown);
            document.body.addEventListener('mousemove', handleMouseMove);
            document.body.addEventListener('mouseup', handleMouseUp);

            // Screen orientation lock (非対応デバイスでは警告が出るが、処理は続行)
            if (screen.orientation && screen.orientation.lock) {
                screen.orientation.lock('portrait')
                    .then(() => console.log("画面の向きを縦向きにロックしました。"))
                    .catch(error => console.warn("画面の向きをロックできませんでした。:", error.name, error.message));
            }
        }

        // アセットロードを開始し、完了後にスタート画面を表示
        function loadAssets() {
            showLoadingMessage();
            const imagePromises = [
                // プレイヤーの画像
                loadImage('player', 'image/invader3.png'),
                // インベーダーの画像
                loadImage('invader', 'image/invader1.png'),
                // ボスの画像
                loadImage('boss', 'image/invader2.png'),
                // ★追加: ボス爆発の画像
                loadImage('boss_explosion', 'image/explosion.png'),
                loadImage('finalBoss', 'image/final_boss.png'), // ★最終ボス用画像を追加
                // もともとのコードに含まれていた他の画像読み込み行があれば、ここにそのまま残してください
            ];
            const audioPromises = [
                loadAudio('backgroundMusic', 'audio/bgm_amelo1.mp3'),
                // 他のサウンドをここに追加ロードすることもできます (例: invaderHit, bossHit, bossExplosion, bossSpawn, playerHit)
                loadAudio('shoot', 'audio/shoot.mp3'), // ★ミサイル音を有効化
                loadAudio('finalBossMusic', 'audio/boss_bgm.mp3'), // ★最終ボス用BGMを追加
                // loadAudio('invaderHit', 'audio/invader_hit.mp3'),
                // loadAudio('bossHit', 'audio/boss_hit.mp3'),
                // loadAudio('bossExplosion', 'audio/boss_explosion.mp3'),
                // loadAudio('bossSpawn', 'audio/boss_spawn.mp3'), // ボス出現音 (必要であれば)
                // loadAudio('playerHit', 'audio/player_hit.mp3'), // 自機被弾音 (必要であれば)
            ];

            return Promise.all([...imagePromises, ...audioPromises]).then(() => {
                 // アセットロード成功後の処理
                 // BGMはスタート画面のタップ後に再生開始
                 // backgroundVideoはスタート画面でミュート解除&再生
                 hideLoadingMessage();
                 currentGameState = GAME_STATE.START_SCREEN;
                 showStartButton(); // これで「TAP TO START」が表示される
            }).catch(error => {
                console.error("Error loading assets:", error);
                loadingMessage.innerText = `Error loading assets: ${error.message || error}. Please check console for details.`;
            });
        }

        // 画像ロード関数
        function loadImage(name, src) {
            return new Promise((resolve, reject) => {
                const img = new Image();
                img.src = src;
                img.onload = () => {
                    loadedImages[name] = img;
                    resolve();
                };
                // エラーハンドリングを強化
                img.onerror = (e) => {
                    console.error(`Failed to load image: ${src}`, e);
                    reject(new Error(`Failed to load image: ${src}`));
                };
            });
        }

        // 音声ロード関数 (Howler.js)
        function loadAudio(name, src) {
            return new Promise((resolve, reject) => {
                const sound = new Howl({
                    src: [src],
                    volume: Howler.volume(), // <-- ここは全体音量を参照
                    onload: () => {
                        loadedAudio[name] = sound;
                         // ★個別の音量を調整 - 初期音量に依存せず個別に調整
                         if (name === 'shoot') {
                             sound.volume(0.05); // ミサイル音の音量を0.05に設定
                         }
                         // 他の効果音の個別音量調整もここに追加できます
                         // if (name === 'invaderHit') { sound.volume(0.7); } など
                         // if (name === 'finalBossMusic') { sound.volume(0.8); } // 最終ボスBGMの個別音量調整 (必要であれば)

                        resolve(); // 音声がロードされたらPromiseを解決
                    },
                    onloaderror: (id, error) => {
                         console.error(`Failed to load audio: ${src} (Howler ID: ${id})`, error);
                         reject(new Error(`Failed to load audio: ${src}`));
                    }
                });
            });
        }

        // --- UI Visibility Functions ---
        function showLoadingMessage() {
            loadingMessage.style.display = 'block';
            startButtonContainer.style.display = 'none';
            messageBox.style.display = 'none';
            canvas.style.display = 'none';
            if (backgroundVideo) {
                backgroundVideo.style.display = 'none';
                backgroundVideo.pause();
                backgroundVideo.currentTime = 0;
                 backgroundVideo.muted = true;
            }
             scoreDisplay.style.display = 'none'; // UIも初期状態では非表示
             livesDisplay.style.display = 'none';
             levelDisplay.style.display = 'none';
        }

        function hideLoadingMessage() {
            loadingMessage.style.display = 'none';
        }

        function showStartButton() {
            startButtonContainer.style.display = 'flex';
            messageBox.style.display = 'none';
            canvas.style.display = 'none'; // スタート画面ではキャンバスは非表示
             scoreDisplay.style.display = 'none'; // UIも非表示
             livesDisplay.style.display = 'none';
             levelDisplay.style.display = 'none';

            if (backgroundVideo) {
                // スタート画面では動画を表示
                backgroundVideo.style.display = 'block';
                backgroundVideo.currentTime = 0; // 動画を最初から再生
                backgroundVideo.muted = false; // 再生時のみミュートを解除
                backgroundVideo.volume = Howler.volume(); // スライダーの音量に合わせる
                backgroundVideo.play().catch(e => console.error("Video playback error on start screen:", e));
                backgroundVideo.style.zIndex = -1; // キャンバスより奥に
            }

            currentGameState = GAME_STATE.START_SCREEN;
            startButton.innerText = "TAP TO START";
            isInitialStartTapDone = false;
        }

        function hideStartButton() {
            startButtonContainer.style.display = 'none';

            // ゲーム開始時に背景動画を非表示にする
            if (backgroundVideo) {
                backgroundVideo.style.display = 'none'; // 動画を非表示にする
                backgroundVideo.pause(); // 動画を一時停止する
                backgroundVideo.currentTime = 0; // 動画の再生位置をリセット
                 backgroundVideo.muted = true; // ミュートに戻す
            }
            canvas.style.display = 'block'; // キャンバスを表示
             // ゲームプレイ中はUIを表示
             scoreDisplay.style.display = 'block';

             levelDisplay.style.display = 'block';

        function showMessage(msg) {
            messageText.innerText = msg;

             // メッセージボックス表示中は動画は非表示に保つ
             if (backgroundVideo && currentGameState !== GAME_STATE.START_SCREEN) {
                 backgroundVideo.style.display = 'none';
                 backgroundVideo.pause();
                 backgroundVideo.currentTime = 0;
                 backgroundVideo.muted = true;
             }
             canvas.style.display = 'block'; // メッセージボックスの背後にキャンバスを表示
             scoreDisplay.style.display = 'none'; // メッセージ中はUI非表示
             livesDisplay.style.display = 'none';
             levelDisplay.style.display = 'none';
        }

        function hideMessageBox() {
            messageBox.style.display = 'none';
             // メッセージボックスが消えたら、ゲーム状態に応じて表示を切り替え
             if (currentGameState === GAME_STATE.PLAYING || currentGameState === GAME_STATE.FINAL_BOSS) { // GAME_STATE.FINAL_BOSS 状態も追加

                     backgroundVideo.pause();

                  }

             } else if (currentGameState === GAME_STATE.START_SCREEN) {
                 showStartButton(); // スタート画面に戻る場合はボタンを表示

        function updateScoreDisplay() {
            scoreDisplay.innerText = `Score: ${score}`;

        function updateLivesDisplay() {
            livesDisplay.innerText = `Lives: ${lives}`;
        }

        function updateLevelDisplay() {
            levelDisplay.innerText = `Level: ${currentLevel}`;
        }

        // --- Game State Management Functions ---

        function createInvaders() {
            invaders = [];
            // インベーダー全体の幅を計算
            const totalInvaderBlockWidth = (INVADER_COLS * INVADER_WIDTH) + ((INVADER_COLS - 1) * INVADER_SPACING_X);
            // 開始X座標を計算（中央揃え）
            const startX = (GAME_WIDTH - totalInvaderBlockWidth) / 2;
            const startY = 80; // インベーダーの初期Y座標は高く保つ

            for (let row = 0; row < INVADER_ROWS; row++) {
                for (let col = 0; col < INVADER_COLS; col++) {
                    invaders.push({
                        x: startX + col * (INVADER_WIDTH + INVADER_SPACING_X),
                        y: startY + row * (INVADER_HEIGHT + INVADER_SPACING_Y),
                        width: INVADER_WIDTH,
                        height: INVADER_HEIGHT,
                        // ★難易度調整: インベーダーのレベルごとの速度増加率を上げる
                        dx: (INVADER_BASE_SPEED + (currentLevel - 1) * 7), // 変更: * 5 -> * 7
                        hp: 1
                    });
                }
            }
        }

        function createBoss() {
             // 通常ボスの生成 - 最終ボスとは別
            boss = {
                x: GAME_WIDTH / 2 - BOSS_WIDTH / 2, // 中央に配置
                y: 30,
                width: BOSS_WIDTH,
                height: BOSS_HEIGHT,
                // ★難易度調整: ボスのレベルごとの速度増加率を上げる
                dx: (INVADER_BASE_SPEED + (currentLevel - 1) * 13) * 1.5, // 変更: * 10 -> * 13
                hp: BOSS_HP_PER_LEVEL, // ボスのHPを定数BOSS_HP_PER_LEVELで固定
                shootTimer: 0,
                // ★難易度調整: ボスのレベルごとの発射間隔の短縮率を上げる (攻撃頻度UP)
                shootInterval: Math.max(60, 120 - (currentLevel - 1) * 18), // 変更: * 15 -> * 18
                isExploding: false,
                explosionTimer: 0,
                explosionDuration: 50,
                originalImage: 'boss',
                explosionImage: 'boss_explosion'
            };
        }

        function startGame(isNewGame) {
            if (animationFrameId) {
                cancelAnimationFrame(animationFrameId);
                animationFrameId = null;
            }

            if (isNewGame) {
                score = 0;
                lives = 3;

                 updateLevelDisplay();

            } else {
                // 既存のゲームからの継続の場合、プレイヤーの状態のみリセット
                player.x = GAME_WIDTH / 2 - PLAYER_WIDTH / 2;
                player.movingLeft = false;
                player.movingRight = false;
                player.invincible = false;
                player.invincibleTimer = 0;
                player.blinkTimer = 0;
                 // 継続時はUI表示状態を維持（hideMessageBoxで表示される想定）
                 levelDisplay.style.display = 'block'; // レベル表示を再開
            }

            boss = null; // 通常ボスは最初に生成しない（インベーダー全滅後に生成）
            finalBoss = null; // ★最終ボスも最初に生成しない
            bossCreatedForThisLevel = false; // 通常ボス生成フラグをリセット
            projectiles = []; // 自機弾をクリア
            invaderProjectiles = []; // 敵弾（通常、ボス、最終ボス）をクリア

            createInvaders(); // まずインベーダーのみを生成

            updateScoreDisplay();
            updateLivesDisplay();
            updateLevelDisplay();
            hideMessageBox(); // メッセージボックスがあれば隠す
            hideStartButton(); // スタートボタンと動画を隠しキャンバスを表示

            currentGameState = GAME_STATE.PLAYING; // ゲーム状態をプレイ中に設定
            lastTimestamp = performance.now();

            // ★修正：音楽が既に再生中でなければ再生開始、ループを設定
             // 通常BGMがロードされていて、かつ再生中でない場合のみ再生
            if (loadedAudio.backgroundMusic && !loadedAudio.backgroundMusic.playing()) {
                 loadedAudio.backgroundMusic.play();
                 loadedAudio.backgroundMusic.loop(true); // ループを有効にする
                 loadedAudio.backgroundMusic.volume(Howler.volume()); // 全体音量に合わせる
            }
             // 最終ボスBGMが再生中であれば停止 (新しいゲーム開始時)
            if (loadedAudio.finalBossMusic && loadedAudio.finalBossMusic.playing()) {
                 loadedAudio.finalBossMusic.stop();
            }


            animationFrameId = requestAnimationFrame(update);

            lastInvaderMoveDownTime = performance.now();
        }

        // ★追加: 最終ボス戦開始関数
        function startFinalBossBattle() {

            // ゲーム状態を最終ボス戦用に設定

            boss = null; // 通常ボスを消去

            }

            // 最終ボスのオブジェクトを作成
            finalBoss = {
                // サイズ: あなたのイメージに合わせて調整 - 画面幅の80%、高さの1/3程度
                width: GAME_WIDTH * 0.8,
                height: GAME_HEIGHT / 3,
                // 位置: 上部中央に鎮座
                x: GAME_WIDTH / 2 - (GAME_WIDTH * 0.8) / 2, // 画面中央に横方向を配置
                y: GAME_HEIGHT * 0.05, // 例: 画面上部から5%の位置に配置 (調整してください)
                // HP: 50に設定
                hp: 50, // ★最終ボスのHPを50に設定★
                // 移動速度: 静止させるため0に設定

                // 画像のキー
                originalImage: 'finalBoss', // 読み込んだ最終ボス画像のキー
                // 爆発関連 (通常のボスと同じものを使うか、新しく作るか検討)
                isExploding: false,
                explosionTimer: 0,
                explosionDuration: 120, // 爆発時間 (通常のボスより長くするなど調整)
                explosionImage: 'boss_explosion' // 通常ボスと同じ爆発画像を一旦使用
            };

            // 最終ボス用の特別な弾丸リストなどが必要であればここで初期化 (必要に応じて)
            // finalBossProjectiles = []; // 例: 最終ボス専用の弾リストを別途管理する場合

            // UI表示の更新 (レベル表示などを消す - 最終ボス戦中はレベルは増えないため)
             levelDisplay.style.display = 'none'; // レベル表示を非表示にする
             updateLivesDisplay(); // ライフ表示は必要
             updateScoreDisplay(); // スコア表示は必要

            // ゲームループは既に動いているはずなので、再開の必要はない (endGame から呼ばれる想定)
            // もし endGame を抜けた後ループが止まる構造であれば、ここで requestAnimationFrame(update) が必要になるかもしれません。
            // 現在のコード構造では、endGame は update から呼ばれていないので、ループは止まりません。

            // 必要であれば、最終ボス出現の演出などを追加
        }


       function endGame(win) {
            // ゲーム状態を一時的にGAME_OVERに設定 (通常のゲームオーバー、または中間レベルクリア後のメッセージ表示用)
            // 最終ボス戦へ移行する場合、および最終ボス撃破時は、状態を適切に処理
             let shouldSetGameOver = true; // デフォルトではGAME_OVERに設定する

             if (win && currentLevel === MAX_LEVELS && !finalBoss) {
                 // レベル30をクリアして最終ボス戦へ移行する場合
                 shouldSetGameOver = false; // GAME_OVERにはしない (startFinalBossBattleでFINAL_BOSSに設定される)
             } else if (win && finalBoss && finalBoss.hp <= 0) {
                 // 最終ボスを撃破した場合 (GAME_OVER に移行してゲームクリアメッセージを表示)
                 shouldSetGameOver = true; // GAME_OVERにする
             } else if (!win) {
                 // プレイヤーが敗北した場合 (GAME_OVER に移行してゲームオーバーメッセージを表示)
                 shouldSetGameOver = true; // GAME_OVERにする
             } else if (currentLevel < MAX_LEVELS && win) {
                 // 中間レベルをクリアした場合 (メッセージ表示のため一時的にGAME_OVER状態にする)
                 shouldSetGameOver = true; // GAME_OVERにする
             }


             if (shouldSetGameOver) {
                currentGameState = GAME_STATE.GAME_OVER;
             }

            if (animationFrameId) {
                cancelAnimationFrame(animationFrameId);
                animationFrameId = null;
            }

            // ... この下に他の endGame のコードが続きます（修正したくない既存コード） ...


            if (animationFrameId) {
                cancelAnimationFrame(animationFrameId);
                animationFrameId = null;
            }

            // ゲームオーバー（敗北）の場合のみBGMを停止
            // 最終ボス戦中に敗北した場合もBGM停止が必要かも（後で調整）
            if (!win) {
                if (loadedAudio.backgroundMusic && loadedAudio.backgroundMusic.playing()) {
                    loadedAudio.backgroundMusic.stop();
                }
                 // 最終ボスBGMも停止が必要ならここに追加
                 if (loadedAudio.finalBossMusic && loadedAudio.finalBossMusic.playing()) {
                     loadedAudio.finalBossMusic.stop();
                 }
            }

            // メッセージ表示中はキャンバスを表示するが、動画は非表示に保つ
            if (backgroundVideo) {
                backgroundVideo.style.display = 'none';
                backgroundVideo.pause();
                backgroundVideo.currentTime = 0;
                 backgroundVideo.muted = true; // ミュートに戻す
            }
             // ゲームオーバー画面ではキャンバスを表示
             if (currentGameState === GAME_STATE.GAME_OVER) {
                 canvas.style.display = 'block'; // キャンバスをメッセージボックスの背後に表示
             }


            let message = '';
            const playAgainButton = messageBox.querySelector('button');

            if (win) {
                // ★ここを修正します★
                if (currentLevel === MAX_LEVELS && !finalBoss) { // レベルがMAX_LEVELSと等しいかチェック AND 最終ボスがまだ出現していないかチェック
                    // ★レベル30クリアなら最終ボス戦へ移行★
                    hideMessageBox(); // メッセージボックスは表示しない
                    startFinalBossBattle(); // ★最終ボス戦開始関数を呼び出し★

                    // この後の endGame の処理は最終ボス戦開始後は不要なのでここで終了します
                    // BGM停止はstartFinalBossBattle内で行うためここでは不要
                    return; // ここで endGame の処理を終了
                } else if (currentLevel < MAX_LEVELS) { // MAX_LEVELS未満なら次のレベルへ
                    // 中間レベルをクリアした場合の処理 (ここで次のレベルに進む)
                    message = `Level ${currentLevel} Clear! Score: ${score}`;
                    currentLevel++; // 次のレベルへ進む
                    playAgainButton.innerText = `Next Level (${currentLevel})`;
                    playAgainButton.onclick = () => {
                        hideMessageBox();
                        // 次のレベルへ直接移行し、最初のスタート画面に戻らない
                        startGame(false); // isNewGame=false で現在のスコア・ライフ・レベルを継続
                    };
                    // 中間レベルクリア時は動画を非表示に保ち、次のゲームがすぐに始まるようにする
                    canvas.style.display = 'block'; // キャンバスは表示したまま
                    // 中間レベルクリア時はBGMは停止しない（継続再生）
                    showMessage(message); // メッセージを表示

                } else if (finalBoss && finalBoss.hp <= 0) { // ★追加: 最終ボス撃破後の勝利判定
                    // 最終ボスを倒した場合
                     currentGameState = GAME_STATE.GAME_OVER; // ゲーム終了状態に移行
                     message = `You Defeated the Final Boss! Final Score: ${score}`; // 最終ボス撃破メッセージ
                     playAgainButton.innerText = "Play Again";
                     playAgainButton.onclick = () => {
                         hideMessageBox();
                         showStartButton(); // 全てのゲーム状態をリセットし、最初の「TAP TO START」画面に戻る
                     };
                    // 最終クリア時は背景動画を再表示
                     if (backgroundVideo) {
                         backgroundVideo.style.display = 'block';
                         backgroundVideo.currentTime = 0;
                         backgroundVideo.muted = false;
                         backgroundVideo.volume = Howler.volume();
                         backgroundVideo.play().catch(e => console.error("Video playback error on final boss win:", e));
                         backgroundVideo.style.zIndex = -1;
                     }
                    canvas.style.display = 'none'; // 動画表示のためキャンバスを非表示
                    // 最終ボス撃破時もBGMは停止
                     if (loadedAudio.finalBossMusic && loadedAudio.finalBossMusic.playing()) {
                         loadedAudio.finalBossMusic.stop();
                     }
                     showMessage(message); // メッセージを表示
                }

            } else {
                // ゲームオーバー（敗北）の場合
                // 通常のゲームオーバー、または最終ボス戦中の敗北
                 if (currentGameState !== GAME_STATE.FINAL_BOSS) { // 通常ゲームオーバーの場合
                     message = `Game Over! Score: ${score}`;
                 } else { // 最終ボス戦中のゲームオーバーの場合
                      message = `Game Over in Final Boss Battle! Score: ${score}`; // 最終ボス戦での敗北メッセージ
                 }

                playAgainButton.innerText = "Play Again";
                playAgainButton.onclick = () => {
                    hideMessageBox();
                    showStartButton(); // 全てのゲーム状態をリセットし、最初の「TAP TO START」画面に戻る
                };
                // 最終クリアまたはゲームオーバー時は背景動画を再表示
                if (backgroundVideo) {
                    backgroundVideo.style.display = 'block';
                    backgroundVideo.currentTime = 0;
                    backgroundVideo.muted = false;
                    backgroundVideo.volume = Howler.volume();
                    backgroundVideo.play().catch(e => console.error("Video playback error on game over/win:", e));
                    backgroundVideo.style.zIndex = -1;
                }
                canvas.style.display = 'none'; // 動画表示のためキャンバスを非表示
                // ゲームオーバー時はBGM停止（上記で処理済み）
                showMessage(message); // メッセージを表示
            }
             // 最終ボス戦に移行する場合はメッセージを表示しない (上記で return しているためここは実行されない)
        }

        // --- Game Loop ---

        function update(timestamp) {
            const deltaTime = (timestamp - lastTimestamp) / 1000; // 秒単位
            lastTimestamp = timestamp;

            // ゲームの状態に応じて処理を分岐
            if (currentGameState === GAME_STATE.LOADING || currentGameState === GAME_STATE.START_SCREEN || currentGameState === GAME_STATE.GAME_OVER) {
                animationFrameId = requestAnimationFrame(update);
                return; // プレイ中以外の状態では描画・更新処理はスキップ
            }

            // --- 通常ゲームプレイ または 最終ボス戦中の更新処理 ---
            // (currentGameState が PLAYING または FINAL_BOSS の場合)

            // Update player position
            if (player.movingLeft && player.x > 0) {
                player.x -= PLAYER_SPEED;
            } else if (player.movingRight && player.x < GAME_WIDTH - player.width) {
                player.x += PLAYER_SPEED;
            } else if (playerTargetX !== null) {
                const targetPlayerCenter = playerTargetX;
                const currentPlayerCenter = player.x + player.width / 2;

                if (Math.abs(targetPlayerCenter - currentPlayerCenter) > PLAYER_SPEED / 2) {
                    if (targetPlayerCenter < currentPlayerCenter) {
                        player.x -= PLAYER_SPEED;
                    } else {
                        player.x += PLAYER_SPEED;
                    }
                }
                // 自機が画面外に出ないようにクランプ
                player.x = Math.max(0, Math.min(player.x, GAME_WIDTH - player.width));
            }

            // Player shooting cooldown
            // クールダウンをdeltaTimeで計算
            if (playerShootCooldown > 0) {
                playerShootCooldown -= deltaTime * 60; // 1秒間に60フレームとして計算
            }
            // ポインタが押されている間、クールダウンが完了していれば発射
            if (isPointerDown && playerShootCooldown <= 0) {
                shootProjectile();
            }

            // Update projectiles (自機弾)
            projectiles.forEach(p => p.y -= PLAYER_PROJECTILE_SPEED);
            projectiles = projectiles.filter(p => p.y > 0);

            // Update invader projectiles (通常敵弾、通常ボス弾、最終ボス弾)
            invaderProjectiles.forEach(p => {
                // deltaTime を使って速度を調整
                p.x += p.dx * deltaTime * 60; // dx/dyはフレーム単位速度を想定し、deltaTimeで補正
                p.y += p.dy * deltaTime * 60;
            });
            invaderProjectiles = invaderProjectiles.filter(p => p.y < GAME_HEIGHT && p.x > -p.width && p.x < GAME_WIDTH + p.width);


            // --- 通常ゲームプレイ中の敵の更新処理 ---
            if (currentGameState === GAME_STATE.PLAYING) {
                 // インベーダーグループ全体の移動処理
                 if (invaders.length > 0) {
                     let minX = Infinity; // グループ全体の最小X座標
                     let maxX = -Infinity; // グループ全体の最大X座標

                     // 現在の進行方向を取得 (最初のインベーダーを代表とする)
                     const currentDirection = invaders[0].dx;

                     invaders.forEach(invader => {
                         // deltaTime を掛けて速度を調整
                         invader.x += invader.dx * deltaTime;

                         // グループ全体の最小・最大X座標を追跡
                         minX = Math.min(minX, invader.x);
                         maxX = Math.max(maxX, invader.x + invader.width); // maxXはインベーダーの右端で計算
                     });

                     let reverseDirection = false;
                     // 端にどれだけ食い込んだら方向転換させるかの許容量
                     const penetrationAmount = Math.abs(invaders[0].dx * deltaTime * 2);

                     // グループ全体の左端が画面左端を超えたか、または右端が画面右端を超えたかチェック
                     if (minX < 0 + penetrationAmount && currentDirection < 0) { // 左に移動中で左端に到達
                         reverseDirection = true;
                     } else if (maxX > GAME_WIDTH - penetrationAmount && currentDirection > 0) { // 右に移動中で右端に到達
                          reverseDirection = true;
                     }

                     if (reverseDirection) {
                         invaders.forEach(invader => {
                             invader.dx *= -1; // 全てのインベーダーの水平方向の速度を反転

                             // 方向転換した直後に、端から少し押し戻す（ナッジ）処理
                             const nudge = (invader.dx > 0 ? penetrationAmount : -penetrationAmount);
                             invader.x += nudge; // ナッジを適用
                         });

                         // 方向転換と同時に、インベーダーを下へ移動させる（時間間隔のチェックは維持）
                         const currentTime = performance.now();
                         if (currentTime - lastInvaderMoveDownTime > INVADER_MOVE_DOWN_INTERVAL) {
                              invaders.forEach(invader => {
                                  invader.y += INVADER_MOVE_DOWN_AMOUNT;
                                  // ゲームオーバー判定
                                  if (invader.y + invader.height > player.y) {
                                      endGame(false); // インベーダーがプレイヤーのラインを超えたらゲームオーバー
                                  }
                              });
                             lastInvaderMoveDownTime = currentTime;
                         }
                     }
                     // 個々のインベーダーが画面外に出ないようにする最終的なクランプ処理
                     invaders.forEach(invader => {
                          invader.x = Math.max(0, Math.min(invader.x, GAME_WIDTH - invader.width));
                     });
                 }

                 // 通常インベーダーの射撃 (通常ボス戦中、最終ボス戦中は行わない)
                 if (invaders.length > 0) {
                     const randomInvader = invaders[Math.floor(Math.random() * invaders.length)];

                     // ★難易度調整: インベーダーのレベルごとの発射間隔を計算 (攻撃頻度UP)
                     const baseInvaderShootInterval = 90;
                     const intervalDecreasePerLevel = 3;
                     const currentInvaderShootInterval = Math.max(
                         30, // 最小間隔
                         baseInvaderShootInterval - (currentLevel - 1) * intervalDecreasePerLevel
                     );

                     // 確率で弾を発射（計算した間隔を使用）
                     if (Math.random() < 1 / currentInvaderShootInterval) {
                         invaderProjectiles.push({
                             x: randomInvader.x + randomInvader.width / 2 - 2.5,
                             y: randomInvader.y + randomInvader.height,
                             width: 5,
                             height: 10,
                             dx: 0,
                             dy: ENEMY_PROJECTILE_SPEED,
                             type: 'invader' // 弾の種類を識別
                         });
                         // if (loadedAudio.invaderShoot) { loadedAudio.invaderShoot.play(); }
                     }
                 }

                 // 通常ボスの移動と射撃
                 if (boss) {
                     if (!boss.isExploding) {
                         boss.x += boss.dx * deltaTime;

                         // ボスが画面の端に到達したら反転
                         if (boss.x + boss.width > GAME_WIDTH || boss.x < 0) {
                             boss.dx *= -1;
                             // 画面外に出るのを防ぐための微調整
                             if (boss.x + boss.width > GAME_WIDTH) {
                                 boss.x = GAME_WIDTH - boss.width;
                             } else if (boss.x < 0) {
                                 boss.x = 0;
                             }
                         }

                         // ボスが弾を撃つ (通常弾と放射状ミサイル)
                         boss.shootTimer++;
                         if (boss.shootTimer >= boss.shootInterval) {
                             // 通常弾 (下方向)
                             invaderProjectiles.push({
                                 x: boss.x + boss.width / 2 - 2.5,
                                 y: boss.y + boss.height,
                                 width: 7,
                                 height: 14,
                                 dx: 0,
                                 dy: ENEMY_PROJECTILE_SPEED * 1.5,
                                 type: 'boss_straight'
                             });

                             // 放射状ミサイル (現在のレベルに応じてミサイル数を増やす)
                             const radialCount = BOSS_RADIAL_PROJECTILE_COUNT_BASE + Math.floor(currentLevel / 2);
                             const startAngle = Math.PI / 2 - BOSS_RADIAL_SPREAD_ANGLE / 2;
                             for (let i = 0; i < radialCount; i++) {
                                 const angle = startAngle + (BOSS_RADIAL_SPREAD_ANGLE / (radialCount > 1 ? radialCount - 1 : 1)) * i;
                                 invaderProjectiles.push({
                                     x: boss.x + boss.width / 2 - 2.5,
                                     y: boss.y + boss.height,
                                     width: 7,
                                     height: 14,
                                     dx: Math.cos(angle) * ENEMY_PROJECTILE_SPEED,
                                     dy: Math.sin(angle) * ENEMY_PROJECTILE_SPEED,
                                     type: 'boss_radial'
                                 });
                             }
                             // if (loadedAudio.bossShoot) { // ボス発射音が必要であれば有効化
                             //     loadedAudio.bossShoot.play();
                             // }
                             boss.shootTimer = 0;
                         }
                     } else {
                         // ボスが爆発中の処理
                         boss.explosionTimer++;
                         if (boss.explosionTimer >= boss.explosionDuration) {
                             boss = null; // 爆発アニメーション終了後、ボスを消滅させる
                             score += 5000 * currentLevel; // ボス撃破ボーナス
                             updateScoreDisplay();
                             endGame(true); // ★中間レベルクリアとして endGame を呼び出す★
                         }
                     }
                 }
            }

            // --- 最終ボス戦中の敵の更新処理 ---
            if (currentGameState === GAME_STATE.FINAL_BOSS) {
                 // ★ここに最終ボスの移動や攻撃などの更新ロジックを書きます★
                 // finalBoss.shootTimer++; // 例: 攻撃タイマーを更新
                 // if (finalBoss.shootTimer >= finalBoss.shootInterval) { ... 攻撃処理 ... }

                 // 注意: 最終ボスは静止している設定なので、移動処理は不要です。
                 // 主に攻撃タイマーの更新と、弾丸の発射処理になります。

                 // 最終ボスの射撃ロジックをここに記述...
                 if (finalBoss && !finalBoss.isExploding) {
                      // 例: 放射状攻撃を定期的に行う
                     finalBoss.radialShootTimer++;
                      if (finalBoss.radialShootTimer >= finalBoss.radialShootInterval) {
                          // 最終ボスの放射状攻撃を実装
                          const radialCount = 8; // 例: 8方向に発射
                          const angleIncrement = (Math.PI * 2) / radialCount; // 360度を分割
                          const startAngle = 0; // 開始角度

                          for (let i = 0; i < radialCount; i++) {
                              const angle = startAngle + angleIncrement * i;
                              invaderProjectiles.push({
                                  x: finalBoss.x + finalBoss.width / 2, // ボスの中心から発射
                                  y: finalBoss.y + finalBoss.height / 2, // ボスの中心から発射
                                  width: 10, // 弾のサイズ (調整)
                                  height: 10, // 弾のサイズ (調整)
                                  dx: Math.cos(angle) * ENEMY_PROJECTILE_SPEED * 1.5, // 弾速を調整 (例: 1.5倍)
                                  dy: Math.sin(angle) * ENEMY_PROJECTILE_SPEED * 1.5, // 弾速を調整
                                  type: 'final_boss_radial' // 弾の種類を識別
                              });
                          }
                          // if (loadedAudio.finalBossShoot) { // 最終ボス発射音 (必要であれば)
                          //     loadedAudio.finalBossShoot.play();
                          // }
                          finalBoss.radialShootTimer = 0; // タイマーをリセット
                      }
                 } else if (finalBoss && finalBoss.isExploding) {
                     // 最終ボスが爆発中の処理 (通常のボスと同じ爆発アニメーションを使う場合)
                     finalBoss.explosionTimer++;
                      if (finalBoss.explosionTimer >= finalBoss.explosionDuration) {
                          finalBoss = null; // 爆発アニメーション終了後、ボスを消滅させる
                           score += 10000; // 最終ボス撃破ボーナス (調整)
                           updateScoreDisplay();
                           endGame(true); // 最終ボス撃破でゲームクリア処理を呼び出す
                      }
                 }
            }


            // Collision detection
            checkCollisions();

            // Player invincibility timer
            if (player.invincible) {
                player.invincibleTimer++;
                player.blinkTimer++;
                if (player.invincibleTimer >= 120) { // 2 seconds (60 frames/sec * 2)
                    player.invincible = false;
                    player.invincibleTimer = 0;
                    player.blinkTimer = 0; // Reset blink timer
                }
            }


            // Check win/lose conditions (update関数内での簡易チェック)
            // より詳細なゲーム状態管理は endGame で行う
             if (currentGameState === GAME_STATE.PLAYING) {
                // 通常ゲームプレイ中の勝利条件チェック (インベーダー全滅 → 通常ボス出現 → 通常ボス撃破)
                 if (invaders.length === 0 && !boss && currentLevel < MAX_LEVELS) {
                     // インベーダー全滅後、通常ボスがまだ出現していない場合は通常ボスを生成
                     if (!bossCreatedForThisLevel) {
                         createBoss();
                         bossCreatedForThisLevel = true; // 通常ボス生成フラグを立てる
                         // if (loadedAudio.bossSpawn) { // ボス出現音が必要であれば有効化
                         //     loadedAudio.bossSpawn.play();
                         // }
                     }
                     // ★追加: レベル30で通常の敵を全滅させた場合の最終ボス戦開始判定
                 if (invaders.length === 0 && !boss && currentLevel === MAX_LEVELS && !finalBoss) {
                     console.log("レベル30の敵を全滅！最終ボス戦開始の条件を満たしました。"); // 確認用
                     startFinalBossBattle(); // 最終ボス戦開始関数を呼び出す
                 }
                     // 通常ボス撃破後のレベルクリア判定は endGame で行われます。
                 }
             } else if (currentGameState === GAME_STATE.FINAL_BOSS) {
                 // 最終ボス戦中の勝利条件チェック (最終ボス撃破)
                 // 最終ボス撃破の判定は Collision detection または updateFinalBoss 内で行い、endGame(true) を呼び出す想定
             }


            if (lives <= 0) {
                // ライフが0になったらゲームオーバー
                endGame(false);
            }


            draw(); // 描画処理を呼び出す
            animationFrameId = requestAnimationFrame(update); // 次のフレームをリクエスト
        }

        // --- Drawing Functions ---

        function draw() {
            ctx.clearRect(0, 0, GAME_WIDTH, GAME_HEIGHT); // 前のフレームをクリア

            // Draw player
            // 点滅効果のロジックを追加
            if (player.invincible && player.blinkTimer % 10 < 5) { // 10フレーム周期で5フレーム表示、5フレーム非表示
                // 非表示期間なので描画しない
            } else {
                if (loadedImages.player) {
                    ctx.drawImage(loadedImages.player, player.x, player.y, player.width, player.height);
                } else {
                    ctx.fillStyle = 'blue';
                    ctx.fillRect(player.x, player.y, player.width, player.height);
                }
            }

            // Draw invaders (通常ゲームプレイ中のみ描画)
            if (currentGameState === GAME_STATE.PLAYING) {
                 invaders.forEach(invader => {
                     if (loadedImages.invader) {
                         ctx.drawImage(loadedImages.invader, invader.x, invader.y, invader.width, invader.height);
                     } else {
                         ctx.fillStyle = 'green';
                         ctx.fillRect(invader.x, invader.y, invader.width, invader.height);
                     }
                 });
            }


            // Draw boss or boss explosion (通常ボス - 通常ゲームプレイ中のみ描画)
            if (currentGameState === GAME_STATE.PLAYING) {
                 if (boss) {
                     if (boss.isExploding && loadedImages[boss.explosionImage]) {
                         const frame = Math.floor(boss.explosionTimer / (boss.explosionDuration / 8)); // 8フレームアニメーションとして調整
                         const spriteWidth = 256; // explosion.png の各フレームの幅
                         const spriteHeight = 256; // explosion.png の各フレームの高さ
                         const drawX = boss.x + boss.width / 2 - spriteWidth / 2;
                         const drawY = boss.y + boss.height / 2 - spriteHeight / 2;
                         const drawWidth = spriteWidth;
                         const drawHeight = spriteHeight;

                         const sourceX = frame * spriteWidth;
                          if (loadedImages[boss.explosionImage] && loadedImages[boss.explosionImage].width > sourceX) {
                             ctx.drawImage(
                                 loadedImages[boss.explosionImage],
                                 sourceX, 0, spriteWidth, spriteHeight,
                                 drawX, drawY, drawWidth, drawHeight
                             );
                          } else { // 最終フレームを超えたら最後のフレームを描画 (念のため)
                               const lastFrameSourceX = (Math.floor(boss.explosionDuration / (boss.explosionDuration / 8)) - 1) * spriteWidth;
                               if (loadedImages[boss.explosionImage] && loadedImages[boss.explosionImage].width > lastFrameSourceX) {
                                   ctx.drawImage(
                                       loadedImages[boss.explosionImage],
                                       lastFrameSourceX, 0, spriteWidth, spriteHeight,
                                       drawX, drawY, drawWidth, drawHeight
                                   );
                               }
                          }

                     } else if (loadedImages[boss.originalImage]) {
                         ctx.drawImage(loadedImages[boss.originalImage], boss.x, boss.y, boss.width, boss.height);
                         // 通常ボスのHPバーを描画
                         const hpBarWidth = boss.width * 0.8;
                         const hpBarHeight = 5;
                         const hpBarX = boss.x + (boss.width - hpBarWidth) / 2;
                         const hpBarY = boss.y + boss.height + 5;

                         ctx.fillStyle = 'red';
                         ctx.fillRect(hpBarX, hpBarY, hpBarWidth, hpBarHeight);

                         ctx.fillStyle = 'lime';
                         ctx.fillRect(hpBarX, hpBarY, hpBarWidth * (boss.hp / BOSS_HP_PER_LEVEL), hpBarHeight);

                         ctx.strokeStyle = '#0f0';
                         ctx.strokeRect(hpBarX, hpBarY, hpBarWidth, hpBarHeight);
                     } else {
                         ctx.fillStyle = 'purple';
                         ctx.fillRect(boss.x, boss.y, boss.width, boss.height);
                     }
                 }
            }

            // ★追加: Draw final boss or final boss explosion (最終ボス戦中のみ描画)
            if (currentGameState === GAME_STATE.FINAL_BOSS) {
                 if (finalBoss) {
                      if (finalBoss.isExploding && loadedImages[finalBoss.explosionImage]) {
                         const frame = Math.floor(finalBoss.explosionTimer / (finalBoss.explosionDuration / 8)); // 8フレームアニメーションとして調整
                         const spriteWidth = 256; // explosion.png の各フレームの幅
                         const spriteHeight = 256; // explosion.png の各フレームの高さ
                         // ボスの中心に描画位置を合わせる
                         const drawX = finalBoss.x + finalBoss.width / 2 - spriteWidth / 2;
                         const drawY = finalBoss.y + finalBoss.height / 2 - spriteHeight / 2;
                         const drawWidth = spriteWidth;
                         const drawHeight = spriteHeight;

                         const sourceX = frame * spriteWidth;
                          if (loadedImages[finalBoss.explosionImage] && loadedImages[finalBoss.explosionImage].width > sourceX) {
                             ctx.drawImage(
                                 loadedImages[finalBoss.explosionImage],
                                 sourceX, 0, spriteWidth, spriteHeight,
                                 drawX, drawY, drawWidth, drawHeight
                             );
                          } else { // 最終フレームを超えたら最後のフレームを描画 (念のため)
                               const lastFrameSourceX = (Math.floor(finalBoss.explosionDuration / (finalBoss.explosionDuration / 8)) - 1) * spriteWidth;
                               if (loadedImages[finalBoss.explosionImage] && loadedImages[finalBoss.explosionImage].width > lastFrameSourceX) {
                                   ctx.drawImage(
                                       loadedImages[finalBoss.explosionImage],
                                       lastFrameSourceX, 0, spriteWidth, spriteHeight,
                                       drawX, drawY, drawWidth, drawHeight
                                   );
                               }
                          }
                     } else if (loadedImages[finalBoss.originalImage]) {
                         ctx.drawImage(loadedImages[finalBoss.originalImage], finalBoss.x, finalBoss.y, finalBoss.width, finalBoss.height);
                         // 最終ボスのHPバーを描画 (通常のボスより太くするなど調整可能)
                         const hpBarWidth = finalBoss.width * 0.9; // 例: 幅の90%
                         const hpBarHeight = 10; // 例: 高さ10px
                         const hpBarX = finalBoss.x + (finalBoss.width - hpBarWidth) / 2;
                         const hpBarY = finalBoss.y + finalBoss.height + 10; // ボスの下 + 10px

                         ctx.fillStyle = 'red';
                         ctx.fillRect(hpBarX, hpBarY, hpBarWidth, hpBarHeight);

                         ctx.fillStyle = 'lime';
                         // finalBoss.hp は数値として扱われる前提
                         ctx.fillRect(hpBarX, hpBarY, hpBarWidth * (finalBoss.hp / 50), hpBarHeight); // HPを50で割って割合を計算

                         ctx.strokeStyle = '#0f0';
                         ctx.strokeRect(hpBarX, hpBarY, hpBarWidth, hpBarHeight);
                     } else {
                         // 画像がない場合の代替描画
                         ctx.fillStyle = 'darkred'; // 最終ボス用の色 (例)
                         ctx.fillRect(finalBoss.x, finalBoss.y, finalBoss.width, finalBoss.height);
                     }
                 }
            }


            // Draw projectiles (自機弾)
            projectiles.forEach(p => {
                ctx.fillStyle = 'yellow';
                ctx.fillRect(p.x, p.y, p.width, p.height);
            });

            // Draw invader projectiles (敵弾 - 通常、ボス、最終ボス)
            invaderProjectiles.forEach(p => {
                 // 弾の種類によって色や形状を変えることも可能 (p.type を利用)
                 if (p.type === 'invader' || p.type === 'boss_straight') {
                     ctx.fillStyle = 'red';
                     ctx.fillRect(p.x, p.y, p.width, p.height);
                 } else if (p.type === 'boss_radial' || p.type === 'final_boss_radial') { // 放射状弾
                      ctx.fillStyle = 'orange'; // 放射状弾の色 (例)
                     ctx.fillRect(p.x, p.y, p.width, p.height); // 一旦四角形で描画
                     // もし画像を使うなら loadImage で読み込んでここで描画
                 } else {
                     // 未知の弾タイプ
                     ctx.fillStyle = 'white';
                     ctx.fillRect(p.x, p.y, p.width, p.height);
                 }
            });
        }

        // --- Collision Detection ---

        function checkCollisions() {
            // 衝突判定は現在のゲーム状態に応じて必要なものだけ行う

            // Player projectiles hitting invaders (通常ゲームプレイ中のみ)
            if (currentGameState === GAME_STATE.PLAYING) {
                const hitInvaders = [];
                projectiles.forEach((p) => {
                    invaders.forEach((invader) => {
                        if (isColliding(p, invader)) {
                             hitInvaders.push(invader);
                        }
                    });
                });

                 // 衝突した弾丸を削除 (インベーダーに当たったもの)
                 projectiles = projectiles.filter(p => {
                     return !invaders.some(invader => isColliding(p, invader));
                 });

                // 衝突したインベーダーを削除し、スコアを加算
                const initialInvaderCount = invaders.length;
                invaders = invaders.filter(invader => {
                     const wasHit = hitInvaders.includes(invader);
                     if (wasHit) {
                        score += 100;
                        if (loadedAudio.invaderHit) {
                            loadedAudio.invaderHit.play(); // インベーダーヒット音
                        }
                     }
                     return !wasHit;
                });

                if (initialInvaderCount !== invaders.length) {
                     updateScoreDisplay();
                }
            }


            // Player projectiles hitting boss (通常ゲームプレイ中のみ)
            if (currentGameState === GAME_STATE.PLAYING) {
                 if (boss && !boss.isExploding) {
                     const bossWasHit = projectiles.some(p => isColliding(p, boss));

                     if (bossWasHit) {
                         // ボスに当たった弾丸を全て削除
                         projectiles = projectiles.filter(p => !isColliding(p, boss));

                         boss.hp--;
                         if (loadedAudio.bossHit) { // ボスヒット音が必要であれば有効化
                             loadedAudio.bossHit.play();
                         }
                         if (boss.hp <= 0) {
                             boss.isExploding = true; // ボスを爆発状態にする
                             boss.explosionTimer = 0;
                             if (loadedAudio.bossExplosion) { // ボス爆発音が必要であれば有効化
                                 loadedAudio.bossExplosion.play();
                             }
                         }
                     }
                 }
            }

            // ★追加: Player projectiles hitting FINAL BOSS (最終ボス戦中のみ)
            if (currentGameState === GAME_STATE.FINAL_BOSS) {
                 if (finalBoss && !finalBoss.isExploding) {
                     const finalBossWasHit = projectiles.some(p => isColliding(p, finalBoss));

                      if (finalBossWasHit) {
                         // 最終ボスに当たった弾丸を全て削除
                         projectiles = projectiles.filter(p => !isColliding(p, finalBoss));

                         finalBoss.hp--;
                         // ★HPバーの更新が必要ならここで updateScoreDisplay() のように別の関数を呼ぶか、描画時にHPを参照
                         // 現在は描画関数でHPバーを描画しているので、hpが減れば自動的に描画も更新されます。
                         // if (loadedAudio.finalBossHit) { // 最終ボスヒット音 (必要であれば)
                         //     loadedAudio.finalBossHit.play();
                         // }

                         // 最終ボス撃破判定
                          if (finalBoss.hp <= 0) {
                             finalBoss.isExploding = true; // 最終ボスを爆発状態にする
                             finalBoss.explosionTimer = 0;
                              // 最終ボス撃破音 (必要であれば)
                              // if (loadedAudio.finalBossExplosion) {
                              //     loadedAudio.finalBossExplosion.play();
                              // }
                          }
                     }
                 }
                 // 最終ボスが爆発アニメーション中の衝突判定は通常行わない
            }


            // Invader projectiles hitting player
            // プレイヤーに当たった敵弾を一時的に格納する配列
            const hitPlayerProjectiles = [];

            invaderProjectiles.forEach(ip => {
                 // プレイヤーが無敵状態でない、かつ敵弾がプレイヤーに当たった場合
                 if (!player.invincible && isColliding(ip, player)) {
                    hitPlayerProjectiles.push(ip);
                 }
            });

            if (hitPlayerProjectiles.length > 0) {
                 // プレイヤーに当たった敵弾を全て削除
                 invaderProjectiles = invaderProjectiles.filter(ip => {
                     return !hitPlayerProjectiles.includes(ip);
                 });

                 // プレイヤーのライフを減らし、無敵時間を開始
                 lives--;
                 updateLivesDisplay();
                 player.invincible = true;
                 player.invincibleTimer = 0;
                 player.blinkTimer = 0;
                 if (loadedAudio.playerHit) { // 自機被弾音が必要であれば有効化
                    loadedAudio.playerHit.play();
                 }
            }


            // 最終ボス戦中のプレイヤー敗北条件は HP=0 で endGame(false) が呼ばれる
            // 通常ゲームプレイ中のインベーダーまたは通常ボスによる敗北条件も endGame(false) が呼ばれる
            if (lives <= 0 && currentGameState !== GAME_STATE.GAME_OVER) { // ライフが0で、かつゲームオーバー状態にまだ移行していなければ
                endGame(false); // ゲームオーバー処理を呼び出す
            }

        }

        function isColliding(rect1, rect2) {
            return rect1.x < rect2.x + rect2.width &&
                rect1.x + rect1.width > rect2.x &&
                rect1.y < rect2.y + rect2.height &&
                rect1.y + rect1.height > rect2.y;
        }

        // --- Input Handling ---

        function handleKeyDown(e) {
            // ゲームプレイ中または最終ボス戦中のみ入力受付
            if (currentGameState !== GAME_STATE.PLAYING && currentGameState !== GAME_STATE.FINAL_BOSS) return;

            if (e.key === 'ArrowLeft' || e.key === 'a') {
                player.movingLeft = true;
            } else if (e.key === 'ArrowRight' || e.key === 'd') {
                player.movingRight = true;
            } else if (e.key === ' ' || e.key === 'w') { // Space or W for shooting
                // このイベントハンドラは、pointerdown/touchstart が設定されているため、
                // 連続発射はそちらで制御します。キーボードでの単発発射を有効にするなら
                // 以下の shootProjectile(); のコメントを外してください。
                // shootProjectile();
            }
             // ★デバッグ用: レベルスキップ (必要に応じてコメント解除して使用)
             
             if (e.key === 'L' || e.key === 'l') {
                  console.log("Level Skip!");
                  currentLevel = MAX_LEVELS - 1; // 最終レベルの直前にスキップ
                  // 現在の敵をクリアして endGame(true) を呼び出す必要がある
                  invaders = [];
                  boss = null;
                  // 一旦ここでレベルを更新して draw を呼ぶと表示が変わる
                  updateLevelDisplay();
                  // 次の update ループで endGame(true) が呼ばれるはず
             }
             
        }

        function handleKeyUp(e) {
             // ゲームプレイ中または最終ボス戦中のみ入力受付
            if (currentGameState !== GAME_STATE.PLAYING && currentGameState !== GAME_STATE.FINAL_BOSS) return;

            if (e.key === 'ArrowLeft' || e.key === 'a') {
                player.movingLeft = false;
            } else if (e.key === 'ArrowRight' || e.key === 'd') {
                player.movingRight = false;
            }
        }

        function handleTouchStart(e) {
            // ゲームプレイ中または最終ボス戦中のみタッチ受付
             if (currentGameState !== GAME_STATE.PLAYING && currentGameState !== GAME_STATE.FINAL_BOSS) return;

            e.preventDefault(); // Prevent default touch behaviors like scrolling/zooming

            if (e.touches.length > 0) {
                isPointerDown = true;
                 // handleTouchMoveで座標計算を行うため、ここではフラグのみ設定
            }
        }

        // スマートフォン向けタッチ操作改善: 端での吸着ロジックを追加
        function handleTouchMove(e) {
             // ゲームプレイ中または最終ボス戦中のみタッチ受付
             if (currentGameState !== GAME_STATE.PLAYING && currentGameState !== GAME_STATE.FINAL_BOSS || !isPointerDown) return;

            e.preventDefault(); // デフォルトのスクロールやズームを防止

            if (e.touches.length > 0) {
                const touchX = e.touches[0].clientX; // スクリーン座標でのタッチX
                const rect = canvas.getBoundingClientRect(); // Canvasの表示位置とサイズを取得

                // Canvas表示領域基準でのタッチX座標
                let targetXOnCanvas = touchX - rect.left;

                // --- スマートフォン向け端処理ロジック ---
                // 画面端から何ピクセル以内にタッチしたら吸着させるかの閾値（表示ピクセル基準）
                const edgeThreshold = 30; // この値を調整して感度を変更できます

                // ゲーム座標と表示座標の比率
                const gameToDisplayRatio = rect.width / GAME_WIDTH;

                if (targetXOnCanvas < edgeThreshold) {
                    // タッチがCanvas表示領域の左端の閾値内なら、ゲーム内の左端を目標にする
                    playerTargetX = player.width / 2;
                } else if (targetXOnCanvas > rect.width - edgeThreshold) {
                    // タッチがCanvas表示領域の右端の閾値内なら、ゲーム内の右端を目標にする
                     playerTargetX = GAME_WIDTH - player.width / 2;
                } else {
                    // それ以外の領域なら、通常通りタッチ位置をゲーム座標にマッピング
                    playerTargetX = targetXOnCanvas / gameToDisplayRatio;
                }
                // --- 端処理ロジック終了 ---

                // 目標座標がゲーム領域内に収まるようにクランプ（念のため）
                playerTargetX = Math.max(player.width / 2, Math.min(playerTargetX, GAME_WIDTH - player.width / 2));
            }
        }

        function handleTouchEnd() {
             // ゲームプレイ中または最終ボス戦中のみタッチ受付
             if (currentGameState !== GAME_STATE.PLAYING && currentGameState !== GAME_STATE.FINAL_BOSS) return;
            isPointerDown = false;
            playerTargetX = null;
        }

        function handleMouseDown(e) {
             // ゲームプレイ中または最終ボス戦中のみマウス受付
             if (currentGameState !== GAME_STATE.PLAYING && currentGameState !== GAME_STATE.FINAL_BOSS) return;
            isPointerDown = true;
            // e.clientX はビューポート基準のX座標
            // canvas.getBoundingClientRect().left はキャンバスの左端のビューポート基準のX座標
            playerTargetX = e.clientX - canvas.getBoundingClientRect().left;
             // ゲーム座標に変換が必要な場合があるかもしれませんが、現在の追従ロジックなら不要かも
        }

        function handleMouseMove(e) {
             // ゲームプレイ中または最終ボス戦中のみマウス受付
             if (currentGameState !== GAME_STATE.PLAYING && currentGameState !== GAME_STATE.FINAL_BOSS || !isPointerDown) return;
             // e.clientX はビューポート基準のX座標
            // canvas.getBoundingClientRect().left はキャンバスの左端のビューポート基準のX座標
            playerTargetX = e.clientX - canvas.getBoundingClientRect().left;
             // ゲーム座標に変換が必要な場合があるかもしれませんが、現在の追従ロジックなら不要かも
        }

        function handleMouseUp() {
             // ゲームプレイ中または最終ボス戦中のみマウス受付
             if (currentGameState !== GAME_STATE.PLAYING && currentGameState !== GAME_STATE.FINAL_BOSS) return;
            isPointerDown = false;
            playerTargetX = null;
        }

        function shootProjectile() {
            // 自機が無敵状態でない、または無敵状態でも発射を許可する場合
            // if (!player.invincible) { // 無敵中は撃てなくするならこのチェックを追加
                 projectiles.push({
                     x: player.x + player.width / 2 - 2.5,
                     y: player.y,
                     width: 5,
                     height: 10
                 });
                 playerShootCooldown = PLAYER_SHOOT_COOLDOWN_MAX;
                 // ★ミサイル音を鳴らす処理を追加
                 if (loadedAudio.shoot) {
                     loadedAudio.shoot.play();
                 }
            // } // 無敵中は撃てなくするならこの閉じ括弧が必要
        }


        // Call init when the DOM is fully loaded
        document.addEventListener('DOMContentLoaded', init);

    </script>
</body>

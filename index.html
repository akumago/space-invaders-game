<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Improved Space Invaders</title>
    <style>
        /* 全体のリセットと基本設定 */
        html, body {
            margin: 0;
            padding: 0;
            overflow: hidden; /* スクロール禁止 */
            background-color: #000; /* デフォルトの背景色を黒に設定（ゲーム画面外） */
            font-family: 'Arial', sans-serif;
            color: #fff;
            -webkit-user-select: none; /* テキスト選択無効化 (iOS) */
            -moz-user-select: none; /* テキスト選択無効化 (Firefox) */
            -ms-user-select: none; /* テキスト選択無効化 (IE/Edge) */
            user-select: none; /* テキスト選択無効化 (標準) */
            -webkit-tap-highlight-color: rgba(0,0,0,0); /* タップ時のハイライトを無効化 (iOS) */
        }

        /* 画面中央にゲームコンテンツを配置するためのFlexbox */
        body {
            display: flex;
            justify-content: center;
            align-items: center; /* 垂直方向の中央揃え */
            min-height: 100vh; /* 画面全体の高さ */
            width: 100vw; /* 画面全体の幅 */
            position: relative; /* 子要素の絶対配置の基準 */
            /* safe-area-inset は必要に応じて追加してください。 */
            /* padding-top: env(safe-area-inset-top); */
            /* padding-bottom: env(safe-area-inset-bottom); */
            /* padding-left: env(safe-area-inset-left); */
            /* padding-right: env(safe-area-inset-right); */
        }

        /* ゲームコンテナ - キャンバスと動画を内包 */
        #gameContainer {
            position: relative; /* 子要素（canvas, video）の基準 */
            /* PCでの表示サイズとアスペクト比維持、画面へのフィット感を調整 */
            /* 画面の幅と高さの比率から、ゲームのアスペクト比(9:19.5)に合う最大のサイズを計算 */
            width: min(100vw, calc(100vh * (9 / 19.5))); /* 画面幅の100% と、画面高さからゲーム比率で計算した幅 の小さい方 */
            height: min(100vh, calc(100vw * (19.5 / 9))); /* 画面高さの100% と、画面幅からゲーム比率で計算した高さ の小さい方 */
            max-width: 100vw; /* 念のため画面幅の100%を超えない制限 */
            max-height: 100vh; /* 念のため画面高さの100%を超えない制限 */
            overflow: hidden; /* はみ出たコンテンツを隠す */
            border: 2px solid #0f0; /* ゲーム画面の枠線 */
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.8);
            z-index: 1; /* 他のUIより奥（UIはz-index 2以上） */
            margin: auto; /* 水平方向の中央配置（Flexboxと組み合わせ） */
            box-sizing: border-box; /* パディングとボーダーを幅と高さに含める */
            flex-shrink: 1; /* 必要に応じて縮小を許可 */
            flex-grow: 0; /* 拡大はしない */
        }

        /* ゲームキャンバス */
        #gameCanvas {
            position: absolute; /* gameContainerを基準に配置 */
            top: 0;
            left: 0;
            width: 100%; /* 親要素 (gameContainer) に合わせる */
            height: 100%; /* 親要素 (gameContainer) に合わせる */
            display: block; /* JSで制御 */
            z-index: 0; /* 動画より手前 (UIより奥) */
            /* background-color はゲーム開始後に draw 関数で描画するため不要 */
        }

        /* 背景動画 - gameContainerのサイズに合わせる */
        #backgroundVideo { /* IDに合わせてセレクターを修正 */
            position: absolute; /* gameContainerを基準に配置 */
            top: 0;
            left: 0;
            width: 100%; /* 親要素 (gameContainer) に合わせる */
            height: 100%; /* 親要素 (gameContainer) に合わせる */
            object-fit: cover; /* 縦横比を維持しつつ要素を覆う */
            filter: brightness(0.5); /* 少し暗くして見やすくする */
            z-index: -1; /* キャンバスより奥に配置 */
            display: block; /* JSで制御 */
        }

        /* スコア、ライフ、レベル表示 */
        #score, #lives, #level {
            position: absolute;
            font-size: 1.2em;
            font-weight: bold;
            color: #0f0;
            text-shadow: 0 0 5px #0f0;
            z-index: 2; /* ゲーム要素より手前 */
            padding: 5px 10px;
            background-color: rgba(0, 0, 0, 0.5);
            border-radius: 5px;
            pointer-events: none; /* クリック/タップを受け付けないようにする */
        }
        #score { top: 10px; left: 10px; }
        #lives { top: 10px; right: 10px; }
        #level { bottom: 10px; left: 10px; }

        /* メッセージボックス (ゲームオーバー/クリア時) */
        #messageBox {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: rgba(0, 0, 0, 0.8);
            border: 2px solid #0f0;
            padding: 20px;
            text-align: center;
            z-index: 3; /* 最前面 */
            display: none; /* JSで制御 */
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.8);
            max-width: 80%;
            box-sizing: border-box; /* パディングを含めて幅を計算 */
            flex-direction: column; /* Flexboxで子要素を縦に並べる */
            align-items: center; /* 子要素を中央揃え */
            justify-content: center; /* 子要素を中央に配置 */
        }
        #messageBox p {
            margin: 0 0 20px 0;
            font-size: 1.5em;
            font-weight: bold;
            color: #0f0;
            text-shadow: 0 0 5px #0f0;
        }
        #messageBox button {
            background-color: #0f0;
            color: #000;
            border: none;
            padding: 10px 20px;
            font-size: 1.2em;
            font-weight: bold;
            cursor: pointer;
            border-radius: 5px;
            transition: background-color 0.3s, color 0.3s, transform 0.1s;
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.5);
            white-space: nowrap; /* ボタン内のテキストが改行されないように */
        }
        #messageBox button:hover {
            background-color: #0a0;
            color: #fff;
        }
        #messageBox button:active {
            transform: scale(0.98);
        }

        /* スタートボタンコンテナ */
        #startButtonContainer {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: rgba(0, 0, 0, 0.7);
            border: 2px solid #0f0;
            padding: 30px 40px;
            border-radius: 15px;
            box-shadow: 0 0 25px rgba(0, 255, 0, 0.8);
            z-index: 10; /* 最前面 */
            width: 80%; /* 適度な幅に */
            max-width: 400px; /* 最大幅 */
            box-sizing: border-box; /* パディングを含めて幅を計算 */
            display: flex; /* JSで制御 */ /* !important は削除済み */
        }
        #startButtonContainer h1 {
            font-size: 2.5em;
            color: #0f0;
            text-shadow: 0 0 10px #0f0;
            margin-bottom: 10px;
            text-align: center;
        }
        #startButtonContainer p {
            font-size: 1.2em;
            color: #fff;
            margin-bottom: 30px;
            text-align: center;
        }
        #startButton {
            background-color: #0f0;
            color: #000;
            border: none;
            padding: 15px 30px;
            font-size: 1.5em;
            font-weight: bold;
            cursor: pointer;
            border-radius: 8px;
            transition: background-color 0.3s, color 0.3s, transform 0.1s;
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.5);
            white-space: nowrap; /* ボタン内のテキストが改行されないように */
        }
        #startButton:hover {
            background-color: #0a0;
            color: #fff;
        }
        #startButton:active {
            transform: scale(0.98);
        }

        /* ローディングメッセージ */
        #loadingMessage {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 1.8em;
            font-weight: bold;
            color: #0f0;
            text-shadow: 0 0 8px #0f0;
            z-index: 4;
            display: none; /* JSで制御 */
        }

        /* 音量スライダー */
        .volume-control {
            margin-top: 20px;
            display: flex; /* StartButtonContainerの子要素としてFlex配置 */
            align-items: center;
            gap: 10px;
            font-size: 1em;
            color: #fff;
        }
        #volumeSlider {
            width: 150px;
            -webkit-appearance: none; /* デフォルトスタイルを無効化 */
            appearance: none;
            height: 8px;
            background: #333;
            outline: none;
            border-radius: 4px;
            cursor: pointer;
            box-shadow: inset 0 0 5px rgba(0, 255, 0, 0.3);
        }
        #volumeSlider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            background: #0f0;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.7);
        }
        #volumeSlider::-moz-range-thumb {
            width: 20px;
            height: 20px;
            background: #0f0;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.7);
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/howler/2.2.3/howler.min.js"></script>
</head>
<body>
    <div id="loadingMessage">Loading Game Assets...</div>

    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        <video autoplay loop playsinline id="backgroundVideo">
            <source src="video/background_loop.mp4" type="video/mp4">
            Your browser does not support the video tag.
        </video>
    </div>

    <div id="score">Score: 0</div>
    <div id="lives">Lives: 3</div>
    <div id="level">Level: 1</div>

    <div id="messageBox">
        <p id="message"></p>
        <button>Play Again</button>
    </div>

    <div id="startButtonContainer">
        <h1>SPACE INVADERS</h1>
        <p>Improved</p>
        <button id="startButton">TAP TO START</button>
        <div class="volume-control">
            <span>Volume</span>
            <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="0.5">
        </div>
    </div>

    <script>
// --- グローバル変数 ---
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const messageBox = document.getElementById('messageBox');
const startButtonContainer = document.getElementById('startButtonContainer');
const startButton = document.getElementById('startButton');
const scoreDisplay = document.getElementById('score');
const livesDisplay = document.getElementById('lives');
const levelDisplay = document.getElementById('level');
const backgroundVideo = document.getElementById('backgroundVideo'); // 背景動画要素を取得
const volumeSlider = document.getElementById('volumeSlider'); // 音量スライダーを取得


// ゲームの状態を管理
const GAME_STATE = {
    LOADING: 'LOADING', // ロード中
    START_SCREEN: 'START_SCREEN', // スタート画面
    PLAYING: 'PLAYING', // プレイ中 (インベーダーまたは通常ボス戦)
    FINAL_BOSS: 'FINAL_BOSS', // 最終ボス戦中
    GAME_OVER: 'GAME_OVER' // ゲームオーバー（クリア含む）
};
let currentGameState = GAME_STATE.LOADING; // 初期状態

// ゲーム要素
let player;
let invaders = [];
let projectiles = []; // 自機の弾
let invaderProjectiles = []; // 敵の弾
let boss = null; // 通常ボス
let finalBoss = null; // 最終ボス

// ゲームパラメータ
const GAME_WIDTH = 800; // ゲーム内部の仮想解像度
const GAME_HEIGHT = 600; // ゲーム内部の仮想解像度
const PLAYER_WIDTH = 40;
const PLAYER_HEIGHT = 30;
const PLAYER_SPEED = 5; // 速度はフレーム/秒で設定し、deltaTimeで調整
const PLAYER_SHOOT_COOLDOWN_MAX = 30; // 30フレームに1回発射可能 (フレーム単位)
let playerShootCooldown = 0;
const PLAYER_PROJECTILE_SPEED = 8;

const INVADER_ROWS = 5;
const INVADER_COLS = 10;
const INVADER_WIDTH = 30;
const INVADER_HEIGHT = 20;
const INVADER_SPACING = 10;
const INVADER_SPEED_BASE = 0.5; // 基準速度 (deltaTime調整前)
let invaderSpeed = INVADER_SPEED_BASE;
let invaderDirection = 1; // 1: 右, -1: 左
const INVADER_MOVE_DOWN_AMOUNT = 20; // 下に移動する量 (ピクセル)
const INVADER_MOVE_DOWN_INTERVAL = 1000; // 下に移動する時間間隔 (ミリ秒)
let lastInvaderMoveDownTime = 0;

const ENEMY_PROJECTILE_SPEED = 4; // 敵弾の速度

const BOSS_WIDTH = 80;
const BOSS_HEIGHT = 60;
const BOSS_SPEED = 1; // 通常ボスの速度 (deltaTime調整前)
const BOSS_SHOOT_INTERVAL_BASE = 90; // 通常ボス射撃間隔（フレーム）
const BOSS_RADIAL_PROJECTILE_COUNT_BASE = 5; // 通常ボス放射状ミサイル数
const BOSS_RADIAL_SPREAD_ANGLE = Math.PI / 2; // 放射状ミサイルの広がり角度 (90度)
const BOSS_HP_PER_LEVEL = 100; // レベルごとの通常ボスHP
let bossCreatedForThisLevel = false; // そのレベルでボスが生成されたか
const BOSS_EXPLOSION_DURATION = 60; // ボス爆発アニメーションのフレーム数 (フレーム)

const FINAL_BOSS_WIDTH = BOSS_WIDTH * 1.5; // 最終ボスは大きい
const FINAL_BOSS_HEIGHT = BOSS_HEIGHT * 1.5;
const FINAL_BOSS_SPEED = 0; // 最終ボスは最初は動かない (deltaTime調整前)
const FINAL_BOSS_SHOOT_INTERVAL_BASE = 60; // 最終ボス通常弾射撃間隔（フレーム）
const FINAL_BOSS_RADIAL_SHOOT_INTERVAL_BASE = 100; // 最終ボス放射状射撃間隔（フレーム）
const FINAL_BOSS_RADIAL_PROJECTILE_COUNT = 8; // 最終ボス放射状ミサイル数（固定）
const FINAL_BOSS_HP_MULTIPLIER = 2.0; // 最終ボスHP乗数（調整可能）
let finalBossHpMax = 0; // 最終ボスの最大HPを保持

const MAX_LEVELS = 5; // 通常レベルの最大数

let score = 0;
let lives = 3;
let currentLevel = 1;

let animationFrameId = null; // requestAnimationFrameのID
let lastTimestamp = 0; // deltaTime計算用

// 入力状態
let isPointerDown = false; // ポインタ（マウス/タップ）が押されているか
let playerTargetX = null; // ポインタ操作時のプレイヤー目標X座標中心


// 画像と音声
let loadedImages = {};
let loadedAudio = {};
let backgroundMusic = null;
let finalBossMusic = null;

const imageAssets = {
    player: 'images/player.png',
    invader: 'images/invader.png',
    boss: 'images/boss.png',
    finalBoss: 'images/final_boss.png', // 最終ボス画像
    boss_explosion: 'images/explosion_spritesheet.png' // ボス爆発スプライトシート
};

const audioAssets = {
    shoot: 'audio/shoot.wav',
    invaderShoot: 'audio/invader_shoot.wav', // もしあれば
    explosion: 'audio/explosion.wav', // プレイヤー被弾、インベーダー爆発
    bossExplosion: 'audio/boss_explosion.wav', // ボス爆発
    backgroundMusic: 'audio/background_music.mp3', // 通常BGM
    finalBossMusic: 'audio/final_boss_music.mp3' // 最終ボスBGM
};


// --- UI 操作 ---
function showMessageBox(message) {
    const targetMessageBox = document.getElementById('messageBox');
    if (!targetMessageBox) { console.error("MessageBox element not found!"); return; }
    targetMessageBox.querySelector('p').innerText = message;
    targetMessageBox.style.display = 'flex'; // Flexboxで表示
    // キャンバスは表示したままにする場合
    canvas.style.display = 'block';
    // 背景動画を表示 (もしあれば)
     if (backgroundVideo) {
        backgroundVideo.style.display = 'block';
        // 動画の再生位置リセットやミュート解除、音量設定は endGame/startGame で行う
        backgroundVideo.style.zIndex = 0; // キャンバスの下に
     }
    console.log(`Message box shown: ${message}`); // Debug Log
}

function hideMessageBox() {
    const targetMessageBox = document.getElementById('messageBox');
    if (!targetMessageBox) { console.error("MessageBox element not found!"); return; }
    targetMessageBox.style.display = 'none'; // 非表示
    console.log("Message box hidden."); // Debug Log
}

function showStartButton() {
    if (!startButtonContainer) { console.error("StartButtonContainer element not found!"); return; }
    startButtonContainer.style.display = 'flex'; // スタートボタンコンテナを表示 (Flexbox)
    // 背景動画を表示 (もしあれば)
     if (backgroundVideo) {
        backgroundVideo.style.display = 'block';
        backgroundVideo.currentTime = 0; // 再生位置リセット
        backgroundVideo.muted = true; // 最初はミュート (ユーザー操作で解除)
        backgroundVideo.volume = 0; // 音量0 (ユーザー操作で設定)
        backgroundVideo.play().catch(e => console.error("Video playback error:", e)); // 自動再生ポリシー回避のためcatch
        backgroundVideo.style.zIndex = 0; // キャンバスの下に
     }
    canvas.style.display = 'none'; // キャンバスは非表示
    // UI表示
    scoreDisplay.style.display = 'none';
    livesDisplay.style.display = 'none';
    levelDisplay.style.display = 'none';
    console.log("Start button shown, canvas hidden."); // Debug Log
}

function hideStartButton() {
     if (!startButtonContainer) { console.error("StartButtonContainer element not found!"); return; }
    startButtonContainer.style.display = 'none'; // スタートボタンコンテナを非表示
    // 背景動画を非表示
     if (backgroundVideo) {
         backgroundVideo.pause(); // 動画を一時停止
         backgroundVideo.style.display = 'none';
         backgroundVideo.muted = true; // ゲームプレイ中はミュートしておく
     }
    canvas.style.display = 'block'; // キャンバスを表示
    // UI表示
    scoreDisplay.style.display = 'block';
    livesDisplay.style.display = 'block';
    levelDisplay.style.display = 'block';
    console.log("Start button hidden, canvas shown."); // Debug Log
}


function updateScoreDisplay() {
     if (!scoreDisplay) { console.error("ScoreDisplay element not found!"); return; }
    scoreDisplay.innerText = `Score: ${score}`;
}

function updateLivesDisplay() {
     if (!livesDisplay) { console.error("LivesDisplay element not found!"); return; }
    livesDisplay.innerText = `Lives: ${lives}`;
}

function updateLevelDisplay() {
     if (!levelDisplay) { console.error("LevelDisplay element not found!"); return; }
     // 最終ボス戦中は「FINAL BOSS」と表示
     if (currentGameState === GAME_STATE.FINAL_BOSS) {
         levelDisplay.innerText = `Level: FINAL BOSS`;
     } else {
         levelDisplay.innerText = `Level: ${currentLevel}`;
     }
}

// Canvas の描画解像度をCanvas要素の表示サイズに合わせる関数
function resizeCanvas() {
    if (canvas) { // Canvas要素が存在するかチェック
        const gameContainer = document.getElementById('gameContainer');
        if (gameContainer) { // gameContainerが存在するかチェック
            // gameContainer の現在の表示サイズを Canvas の描画解像度に設定
            canvas.width = gameContainer.clientWidth;
            canvas.height = gameContainer.clientHeight;
             // Debug Log
             // console.log(`Canvas resized to: ${canvas.width}x${canvas.height}`);
        } else {
             console.warn("gameContainer element not found for canvas resize!");
             // gameContainerが見つからない場合、Canvas自体のclientサイズを使う（代替）
             canvas.width = canvas.clientWidth;
             canvas.height = canvas.clientHeight;
        }
    } else {
        console.error("Canvas element not found for resize!"); // Debug Log
    }
}


// --- ゲーム要素の生成 ---
function createInvaders() {
    invaders = []; // クリア
    const offsetX = (GAME_WIDTH - (INVADER_COLS * (INVADER_WIDTH + INVADER_SPACING))) / 2;
    const offsetY = 50;
    for (let row = 0; row < INVADER_ROWS; row++) {
        for (let col = 0; col < INVADER_COLS; col++) {
            invaders.push({
                x: col * (INVADER_WIDTH + INVADER_SPACING) + offsetX,
                y: row * (INVADER_HEIGHT + INVADER_SPACING) + offsetY,
                width: INVADER_WIDTH,
                height: INVADER_HEIGHT,
                dx: invaderSpeed * invaderDirection, // レベルによる速度調整は update で行う
                dy: 0,
                hp: 1, // 通常インベーダーのHP
                type: 'invader'
            });
        }
    }
    // レベルが上がるごとにインベーダーの横速度の基準値を上げる
    invaderSpeed = INVADER_SPEED_BASE * (1 + (currentLevel - 1) * 0.2); // レベル1で1.0倍, レベル2で1.2倍, ...
    invaderDirection = 1; // 各レベル開始時は右向き
    lastInvaderMoveDownTime = performance.now(); // 下移動タイマーリセット
    console.log(`Invaders created for Level ${currentLevel}. Base speed factor: ${1 + (currentLevel - 1) * 0.2}`); // Debug Log
}

function createBoss() {
    boss = {
        x: GAME_WIDTH / 2 - BOSS_WIDTH / 2,
        y: 30,
        width: BOSS_WIDTH,
        height: BOSS_HEIGHT,
        dx: BOSS_SPEED * (1 + (currentLevel - 1) * 0.1), // レベルに応じて速度増加
        dy: 0,
        hp: BOSS_HP_PER_LEVEL * currentLevel, // レベルに応じてHP増加
        shootTimer: 0,
        shootInterval: Math.max(30, BOSS_SHOOT_INTERVAL_BASE - (currentLevel - 1) * 2), // レベルに応じて射撃間隔短縮（最小30フレーム）
        radialShootTimer: 0,
        radialShootInterval: Math.max(60, BOSS_RADIAL_SHOOT_INTERVAL_BASE - (currentLevel - 1) * 3), // レベルに応じて放射状間隔短縮（最小60フレーム）
        isExploding: false,
        explosionTimer: 0,
        explosionDuration: BOSS_EXPLOSION_DURATION, // フレーム数
        originalImage: 'boss', // 使用する画像のキー
        explosionImage: 'boss_explosion' // 爆発用画像のキー
    };
    console.log(`Boss created for Level ${currentLevel}. HP: ${boss.hp}`); // Debug Log
}

function createFinalBoss() {
     finalBoss = {
         x: GAME_WIDTH / 2 - FINAL_BOSS_WIDTH / 2,
         y: 30,
         width: FINAL_BOSS_WIDTH,
         height: FINAL_BOSS_HEIGHT,
         dx: FINAL_BOSS_SPEED, // 最終ボスは移動しない（設計による）
         dy: 0,
         hp: BOSS_HP_PER_LEVEL * MAX_LEVELS * FINAL_BOSS_HP_MULTIPLIER, // 通常ボス最終レベルHPの乗数倍
         shootTimer: 0,
         shootInterval: FINAL_BOSS_SHOOT_INTERVAL_BASE,
         radialShootTimer: 0,
         radialShootInterval: FINAL_BOSS_RADIAL_SHOOT_INTERVAL_BASE,
         isExploding: false,
         explosionTimer: 0,
         explosionDuration: BOSS_EXPLOSION_DURATION * 1.5, // 最終ボス爆発は少し長く
         originalImage: 'finalBoss', // 使用する画像のキー

// 自機の弾を生成・発射
function shootProjectile() {
     // プレイヤーが存在しないか、無敵状態またはゲームオーバー中は発射しない
     if (!player || player.invincible || currentGameState === GAME_STATE.GAME_OVER || currentGameState === GAME_STATE.START_SCREEN) {
         // console.log("Cannot shoot: Player not available, invincible, or in non-playing state."); // Debug Log (頻繁に出るのでコメントアウト)
         return;
     }

    // プレイヤーの中央上部から弾を発射
    projectiles.push({
        x: player.x + player.width / 2 - 2.5, // 弾の幅の半分を引く
        y: player.y,
        width: 5,
        height: 10,
        dx: 0, // 垂直移動
        dy: -PLAYER_PROJECTILE_SPEED, // 上向き
        type: 'player'
    });

    playerShootCooldown = PLAYER_SHOOT_COOLDOWN_MAX; // クールダウンをリセット

    // 射撃音を鳴らす (try-catchで囲む)
    try {
        if (loadedAudio.shoot) {
            loadedAudio.shoot.play();
        }
    } catch (e) {
         console.warn("Player shoot sound playback failed:", e); // Debug Log
    }
}


// --- アセットロード ---
function loadAssets() {
    // ローディングメッセージ表示
    const loadingMessage = document.getElementById('loadingMessage');
    if(loadingMessage) loadingMessage.style.display = 'block';

    const imagePromises = Object.keys(imageAssets).map(key => {
        return new Promise((resolve, reject) => {
            const img = new Image();
            img.onload = () => {
                loadedImages[key] = img;
                 // console.log(`Image loaded: ${key}`); // Debug Log
                resolve();
            };
            img.onerror = (e) => {
                console.error(`Failed to load image: ${key}`, e); // Debug Log
                 loadedImages[key] = null; // ロード失敗しても続行
                resolve(); // rejectではなくresolveで、一つ失敗しても他を止まらないようにする
            };
            img.src = imageAssets[key];
        });
    });

    const audioPromises = Object.keys(audioAssets).map(key => {
        return new Promise((resolve, reject) => {
            try {
                const sound = new Howl({
                    src: [audioAssets[key]],
                    volume: Howler.volume(), // 初期音量
                    loop: (key === 'backgroundMusic' || key === 'finalBossMusic'), // BGMだけループ
                    onload: () => {
                        loadedAudio[key] = sound;
                         // console.log(`Audio loaded: ${key}`); // Debug Log
                        resolve();
                    },
                    onloaderror: (id, error) => {
                         console.error(`Failed to load audio: ${key}`, error); // Debug Log
                         loadedAudio[key] = null; // ロード失敗しても続行
                        resolve(); // rejectではなくresolveで、一つ失敗しても他を止まらないようにする
                    },
                     onplayerror: (id, error) => {
                         // 自動再生ポリシーなどで再生に失敗した場合のハンドリングは別途行う (unlockAudioなど)
                          console.warn(`Audio play error: ${key}`, error); // Debug Log
                     }
                });
            } catch (e) {
                console.error(`Error creating Howl object for ${key}:`, e); // Debug Log
                 loadedAudio[key] = null; // Howlオブジェクト生成自体に失敗
                 resolve(); // rejectではなくresolve
            }
        });
    });


    return Promise.all([...imagePromises, ...audioPromises]).finally(() => {
         // ロード完了後にローディングメッセージを非表示
         if(loadingMessage) loadingMessage.style.display = 'none';
         console.log("Asset loading process finished."); // Debug Log
    });
}

// --- オーディオアンロック（自動再生ポリシー回避） ---
// ユーザーのジェスチャー（クリックなど）を検出してミュート解除などを試みる
function unlockAudio() {
    const unlock = () => {
        if (Howler.state === 'suspended') {
            Howler.ctx.resume().then(() => {
                 console.log('Howler audio context resumed'); // Debug Log
                 // Howlerがresumeされたら、ロード済みBGMのミュートを解除して再生を試みる
                 if (backgroundMusic && backgroundMusic.state() === 'loaded') {
                      backgroundMusic.mute(false);
                      // backgroundMusic.play() はstartGameで行う
                      console.log("Background music unmuted."); // Debug Log
                 }
                 if (finalBossMusic && finalBossMusic.state() === 'loaded') {
                      finalBossMusic.mute(false);
                      console.log("Final boss music unmuted."); // Debug Log
                 }
            }).catch(e => console.error('Howler audio context resume failed:', e));
        }
        // 動画のミュートも解除
         if (backgroundVideo) {
              backgroundVideo.muted = false;
              backgroundVideo.volume = Howler.volume(); // 全体音量に合わせる
              console.log("Background video unmuted."); // Debug Log
         }

        // 不要になったらイベントリスナーを削除
        document.removeEventListener('click', unlock);
        document.removeEventListener('touchend', unlock);
         console.log("Audio unlock listeners removed."); // Debug Log
    };

    // ページ上のどこかでユーザーがクリックまたはタップしたときにunlockを試みる
    document.addEventListener('click', unlock);
    document.addEventListener('touchend', unlock);
    console.log("Audio unlock listeners added."); // Debug Log
}


// --- ゲーム開始/終了/リセット ---

function startGame(isRestart = false) {
    console.log("Starting game."); // Debug Log

    hideMessageBox(); // メッセージボックスを隠す
    hideStartButton(); // スタートボタンを隠す

    // ゲーム状態を PLAYING に設定
    currentGameState = GAME_STATE.PLAYING;

    // ゲーム状態のリセット（リスタートの場合のみ）
    if (isRestart) {
        score = 0;
        lives = 3;
        currentLevel = 1;
        updateScoreDisplay();
        updateLivesDisplay();
        updateLevelDisplay();
        console.log("Game state reset for restart."); // Debug Log
    } else {
         // 初回スタート時はUI表示を更新
         updateScoreDisplay();
         updateLivesDisplay();
         updateLevelDisplay();
         console.log("Initial game start."); // Debug Log
    }


    // ゲーム要素の初期化
    player = {
        x: GAME_WIDTH / 2 - PLAYER_WIDTH / 2,
        y: GAME_HEIGHT - PLAYER_HEIGHT - 10,
        width: PLAYER_WIDTH,
        height: PLAYER_HEIGHT,
        movingLeft: false,
        movingRight: false,
        invincible: false, // 無敵状態
        invincibleTimer: 0, // 無敵時間タイマー
        blinkTimer: 0 // 点滅用タイマー
    };
    invaders = [];
    projectiles = []; // 自機の弾
    invaderProjectiles = []; // 敵の弾
    boss = null;
    finalBoss = null;
    bossCreatedForThisLevel = false; // ボス生成フラグもリセット

    // 最初のインベーダーを生成
    createInvaders();

    // BGM再生 (try-catchで囲む)
    try {
         // 最終ボス曲がロード済みなら停止しておく
         if (finalBossMusic && finalBossMusic.playing()) {
              finalBossMusic.stop();
              console.log("Final boss music stopped."); // Debug Log
         }
         if (backgroundMusic && backgroundMusic.state() === 'loaded') {
             // ロード済みかつ現在再生中でなければ再生
             if (!backgroundMusic.playing()) {
                 backgroundMusic.play();
                 console.log("Background music started."); // Debug Log
             } else {
                  // 再生中ならミュート解除と音量設定だけ行う
                  backgroundMusic.mute(false);
                  backgroundMusic.volume(Howler.volume()); // 全体音量に合わせる
                  console.log("Background music unmuted and volume set."); // Debug Log
             }
         } else if (!loadedAudio.backgroundMusic) {
             console.warn("Background music not loaded."); // Debug Log
         }
    } catch (e) {
         console.warn("Background music playback failed:", e); // Debug Log
    }


    // ゲームループを開始
    lastTimestamp = performance.now();
    animationFrameId = requestAnimationFrame(update); // update 関数を最初のフレームで呼び出し
    console.log("Game loop requested."); // Debug Log
}


// レベルクリアまたはゲームオーバー時の処理
// win: true ならレベルクリア/ゲームクリア, false ならゲームオーバー
function endGame(win) {
     console.log(`Ending game. Win: ${win}`); // Debug Log

    // ゲームループを停止
    if (animationFrameId) {
        cancelAnimationFrame(animationFrameId);
        animationFrameId = null; // IDをnullにリセット
        console.log("Animation frame cancelled."); // Debug Log
    }


    let message = "";
    const playAgainButton = messageBox.querySelector('button');

    if (win) {
        if (currentGameState === GAME_STATE.FINAL_BOSS) {
             message = `GAME CLEAR!\nFinal Score: ${score}`;
             console.log("Game Clear!"); // Debug Log
             // ゲームクリア時の特別な処理（エンディング表示など）があればここに追加

             // BGM停止 (try-catchで囲む)
             try {
                  if (finalBossMusic && finalBossMusic.playing()) {
                       finalBossMusic.stop();
                       console.log("Final boss music stopped on game clear."); // Debug Log
                  } else if (backgroundMusic && backgroundMusic.playing()) {
                       backgroundMusic.stop();
                       console.log("Background music stopped on game clear."); // Debug Log
                  }
             } catch (e) {
                  console.warn("Music stop failed on game clear:", e); // Debug Log
             }


        } else {
             // 通常レベルクリア
             currentLevel++; // 次のレベルへ
             console.log(`Level ${currentLevel - 1} cleared. Proceeding to Level ${currentLevel}.`); // Debug Log
             message = `LEVEL ${currentLevel - 1} CLEAR!\nScore: ${score}\nPrepare for Level ${currentLevel}`;
             // 通常レベルクリア時はすぐに次のレベルへ進むのでメッセージボックスは一時的、または不要
             // ここではメッセージボックスを表示せず、そのまま次のレベルの要素生成へ移行します。
             // もしレベルクリア表示を入れるなら、ここで少し待ってから startGame(true) を呼ぶ

             // ★通常レベルクリア時はメッセージボックスを表示せず、すぐに次のレベルの要素を生成・開始する
             hideMessageBox(); // メッセージボックス非表示を徹底
             // 次レベル開始
             startGame(false); // リセットせず、次のレベルを開始
             return; // ここで処理を終了
        }
    } else {
        message = `GAME OVER\nFinal Score: ${score}`;
        console.log("Game Over!"); // Debug Log

        // BGM停止 (try-catchで囲む)
        try {
             if (backgroundMusic && backgroundMusic.playing()) {
                  backgroundMusic.stop();
                  console.log("Background music stopped on game over."); // Debug Log
             }
             if (finalBossMusic && finalBossMusic.playing()) {
                   finalBossMusic.stop();
                   console.log("Final boss music stopped on game over."); // Debug Log
             }
        } catch (e) {
             console.warn("Music stop failed on game over:", e); // Debug Log
        }
    }

    // ゲームオーバーまたはゲームクリア時のメッセージボックス表示
    showMessageBox(message);
    if (playAgainButton) {
         playAgainButton.innerText = "Play Again"; // ボタンテキスト設定
         // Play Againボタンにリスナーを再設定（念のため）
         playAgainButton.onclick = () => startGame(true); // 新しいゲームを開始
    } else {
         console.error("Play Again button element not found!"); // Debug Log
    }


    // 画面がゲームオーバー/クリア表示になったとき、背景動画を再度表示する
     if (backgroundVideo) {
         backgroundVideo.style.display = 'block'; // 動画を表示
         backgroundVideo.currentTime = 0; // 再生位置リセット
         backgroundVideo.muted = true; // 最初はミュート (ユーザー操作で解除)
         backgroundVideo.volume = 0; // 音量0 (ユーザー操作で設定)
         backgroundVideo.play().catch(e => console.error("Video playback error:", e)); // 自動再生ポリシー回避のためcatch
         backgroundVideo.style.zIndex = 0; // キャンバスの下に
         console.log("Video shown for end screen."); // Debug Log
     }
     // ゲーム状態を GAME_OVER に最終確定 (中間レベルクリアの場合はすぐに次のレベルに行くため、ここにこない)
     // updateループが停止するための条件としても使われる
     currentGameState = GAME_STATE.GAME_OVER; // 最終的なゲーム終了状態
     console.log(`endGame complete. State: ${currentGameState}`); // Debug Log
}

<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Improved Space Invaders</title>
    <style>
        /* 全体のリセットと基本設定 */
        html, body {
            margin: 0;
            padding: 0;
            overflow: hidden; /* スクロール禁止 */
            background-color: #000; /* 背景色を黒に設定 */
            font-family: 'Arial', sans-serif;
            color: #fff;
            -webkit-user-select: none; /* テキスト選択無効化 (iOS) */
            -moz-user-select: none; /* テキスト選択無効化 (Firefox) */
            -ms-user-select: none; /* テキスト選択無効化 (IE/Edge) */
            user-select: none; /* テキスト選択無効化 (標準) */
            -webkit-tap-highlight-color: rgba(0,0,0,0); /* タップ時のハイライトを無効化 (iOS) */
        }

        /* 画面中央にゲームコンテンツを配置するためのFlexbox */
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh; /* 画面全体の高さ */
            width: 100vw; /* 画面全体の幅 */
            position: relative; /* 子要素の絶対配置の基準 */
        }

        /* ゲームコンテナ - キャンバスと動画、UI要素を内包 */
        #gameContainer {
            position: relative; /* 子要素（canvas, video）の基準 */
            width: 420px; /* GAME_WIDTHと同期 */
            /* aspect-ratio: 9 / 19.5; */ /* CSSでのアスペクト比指定も可能だがJSで高さを制御 */
            height: calc(420px * (19.5 / 9)); /* GAME_HEIGHTと同期 */
            overflow: hidden; /* はみ出たコンテンツを隠す */
            background-color: black; /* ゲーム中の背景色 */
            border: 2px solid #0f0; /* ゲーム画面の枠線 */
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.8);
            z-index: 1; /* 他のUIより手前 */
            margin: auto; /* 画面中央に配置 */
        }

        /* ゲームキャンバス */
        #gameCanvas {
            position: absolute; /* gameContainerを基準に配置 */
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block; /* 初期状態はJSで制御 */
            z-index: 0; /* 動画より手前 */
        }

        /* 背景動画 - gameContainerのサイズに合わせる */
        #background-video {
            position: absolute; /* gameContainerを基準に配置 */
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover; /* 縦横比を維持しつつ要素を覆う */
            filter: brightness(0.5); /* 少し暗くして見やすくする */
            z-index: -1; /* キャンバスより奥に配置 */
            display: block; /* 初期状態はJSで制御 */
        }

        /* スコア、ライフ、レベル表示 */
        #score, #lives, #level {
            position: absolute;
            font-size: 1.2em;
            font-weight: bold;
            color: #0f0;
            text-shadow: 0 0 5px #0f0;
            z-index: 2; /* ゲーム要素より手前 */
            padding: 5px 10px;
            background-color: rgba(0, 0, 0, 0.5);
            border-radius: 5px;
        }
        #score { top: 10px; left: 10px; }
        #lives { top: 10px; right: 10px; }
        #level { bottom: 10px; left: 10px; }

        /* メッセージボックス (ゲームオーバー/クリア時) */
        #messageBox {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: rgba(0, 0, 0, 0.8);
            border: 2px solid #0f0;
            padding: 20px;
            text-align: center;
            z-index: 3;
            display: none;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.8);
            max-width: 80%;
            box-sizing: border-box; /* パディングを含めて幅を計算 */
        }
        #messageBox p {
            margin: 0 0 20px 0;
            font-size: 1.5em;
            font-weight: bold;
            color: #0f0;
            text-shadow: 0 0 5px #0f0;
        }
        #messageBox button {
            background-color: #0f0;
            color: #000;
            border: none;
            padding: 10px 20px;
            font-size: 1.2em;
            font-weight: bold;
            cursor: pointer;
            border-radius: 5px;
            transition: background-color 0.3s, color 0.3s;
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.5);
        }
        #messageBox button:hover {
            background-color: #0a0;
            color: #fff;
        }

        /* スタートボタンコンテナ */
        #startButtonContainer {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: rgba(0, 0, 0, 0.7);
            border: 2px solid #0f0;
            padding: 30px 40px;
            border-radius: 15px;
            box-shadow: 0 0 25px rgba(0, 255, 0, 0.8);
            z-index: 2; /* ゲーム画面より手前 */
            width: 80%; /* 適度な幅に */
            max-width: 400px; /* 最大幅 */
            box-sizing: border-box; /* パディングを含めて幅を計算 */
        }
        #startButtonContainer h1 {
            font-size: 2.5em;
            color: #0f0;
            text-shadow: 0 0 10px #0f0;
            margin-bottom: 10px;
            text-align: center;
        }
        #startButtonContainer p {
            font-size: 1.2em;
            color: #fff;
            margin-bottom: 30px;
            text-align: center;
        }
        #startButton {
            background-color: #0f0;
            color: #000;
            border: none;
            padding: 15px 30px;
            font-size: 1.5em;
            font-weight: bold;
            cursor: pointer;
            border-radius: 8px;
            transition: background-color 0.3s, color 0.3s, transform 0.1s;
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.5);
            white-space: nowrap; /* ボタン内のテキストが改行されないように */
        }
        #startButton:hover {
            background-color: #0a0;
            color: #fff;
        }
        #startButton:active {
            transform: scale(0.98);
        }

        /* ローディングメッセージ */
        #loadingMessage {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 1.8em;
            font-weight: bold;
            color: #0f0;
            text-shadow: 0 0 8px #0f0;
            z-index: 4;
            display: none;
        }

        /* 音量スライダー */
        .volume-control {
            margin-top: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1em;
            color: #fff;
        }
        #volumeSlider {
            width: 150px;
            -webkit-appearance: none; /* デフォルトスタイルを無効化 */
            appearance: none;
            height: 8px;
            background: #333;
            outline: none;
            border-radius: 4px;
            cursor: pointer;
            box-shadow: inset 0 0 5px rgba(0, 255, 0, 0.3);
        }
        #volumeSlider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            background: #0f0;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.7);
        }
        #volumeSlider::-moz-range-thumb {
            width: 20px;
            height: 20px;
            background: #0f0;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.7);
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/howler/2.2.3/howler.min.js"></script>
</head>
<body>
    <div id="loadingMessage">Loading Game Assets...</div>

    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        <video autoplay loop muted playsinline id="background-video">
            <source src="background_loop.mp4" type="video/mp4">
            Your browser does not support the video tag.
        </video>
        <div id="score">Score: 0</div>
        <div id="lives">Lives: 3</div>
        <div id="level">Level: 1</div>
    </div>

    <div id="messageBox">
        <p id="message"></p>
        <button>Play Again</button>
    </div>

    <div id="startButtonContainer">
        <h1>SPACE INVADERS</h1>
        <p>Improved</p>
        <button id="startButton">TAP TO START</button>
        <div class="volume-control">
            <span>Volume</span>
            <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="0.5">
        </div>
    </div>

    <script>
        // --- Global Constants ---
        const GAME_WIDTH = 420;
        const GAME_HEIGHT = GAME_WIDTH * (19.5 / 9); // Aspect ratio for mobile portrait
        const PLAYER_SPEED = 7;
        const PLAYER_PROJECTILE_SPEED = 10;
        const INVADER_SPEED = 1;
        const INVADER_PROJECTILE_SPEED = 5;
        const INVADER_ROWS = 5;
        const INVADER_COLS = 8;
        const INVADER_WIDTH = 30;
        const INVADER_HEIGHT = 20;
        const INVADER_SPACING = 40;
        const BOSS_HP_PER_LEVEL = 5; // ボスのHPはレベルごとに増加
        const MAX_LEVELS = 5; // 最大レベル数
        const PLAYER_WIDTH = 40; // プレイヤーの幅（画像に合わせて調整）
        const PLAYER_HEIGHT = 30; // プレイヤーの高さ（画像に合わせて調整）
        const PLAYER_SHOOT_COOLDOWN_MAX = 20; // frames between shots for player

        const GAME_STATE = {
            LOADING: 'LOADING',
            START_SCREEN: 'START_SCREEN', // 最初の「TAP TO START」で動画再生
            PLAYING: 'PLAYING', // 実際のゲームプレイ中
            GAME_OVER: 'GAME_OVER' // ゲームオーバー/クリア画面
        };

        // --- Global Variables ---
        let canvas, ctx;
        let player;
        let invaders = [];
        let projectiles = [];
        let invaderProjectiles = [];
        let score = 0;
        let lives = 3;
        let currentLevel = 1;
        let lastTimestamp = 0;
        let animationFrameId;
        let currentGameState = GAME_STATE.LOADING;
        let loadedImages = {};
        let loadedAudio = {};
        let boss = null;

        // Player shooting cooldown
        let playerShootCooldown = 0;

        // Player movement target for touch/mouse
        let playerTargetX = null;
        let isPointerDown = false; // Tracks if mouse/touch is currently pressed

        // UI elements
        let scoreDisplay;
        let livesDisplay;
        let levelDisplay;
        let messageBox;
        let messageText;
        let startButtonContainer;
        let startButton;
        let loadingMessage;
        let volumeSlider; // 音量スライダー
        let backgroundMusic; // Howler.js BGM
        let backgroundVideo; // 背景動画要素

        // --- Initialization ---

        function init() {
            initGameEssentials();
            loadAssets().then(() => {
                hideLoadingMessage();
                currentGameState = GAME_STATE.START_SCREEN;
                showStartButton(); // ここでスタートボタンと動画を表示

                // 音量スライダーの初期値を設定し、イベントリスナーを追加
                const savedVolume = parseFloat(localStorage.getItem('gameVolume')) || 0.5;
                Howler.volume(savedVolume);
                volumeSlider.value = savedVolume;
                if (backgroundVideo) { // 初期ロード時に動画の音量も同期
                    backgroundVideo.volume = savedVolume;
                    backgroundVideo.muted = false; // JSでミュート解除。HTMLのmuted属性より優先
                    backgroundVideo.play().catch(e => console.error("Initial video playback error:", e));
                }

                volumeSlider.addEventListener('input', (e) => {
                    const newVolume = parseFloat(e.target.value);
                    Howler.volume(newVolume); // Howler.jsのグローバル音量を更新
                    localStorage.setItem('gameVolume', newVolume); // 音量設定をローカルストレージに保存

                    // 背景動画の音量も同期させる
                    if (backgroundVideo) {
                        backgroundVideo.volume = newVolume;
                        // スライダーを動かしたらミュートを解除 (ユーザー操作とみなす)
                        if (newVolume > 0 && backgroundVideo.muted) {
                            backgroundVideo.muted = false;
                        } else if (newVolume === 0 && !backgroundVideo.muted) {
                            backgroundVideo.muted = true;
                        }
                        backgroundVideo.play().catch(e => console.error("Video play error after volume change:", e)); // 再生を試みる
                    }
                });

                // スタートボタンのクリックイベントリスナー
                startButton.addEventListener('click', () => {
                    if (currentGameState === GAME_STATE.START_SCREEN || currentGameState === GAME_STATE.GAME_OVER) {
                        startGame(true); // 新しいゲームを開始
                    }
                });
            }).catch(error => {
                console.error("Error loading assets:", error);
                loadingMessage.innerText = `Error loading assets: ${error.message || error}. Please check console for details.`;
            });
        }

        // Sets up canvas, player object, and event listeners once
        function initGameEssentials() {
            canvas = document.getElementById('gameCanvas');
            ctx = canvas.getContext('2d');
            canvas.width = GAME_WIDTH;
            canvas.height = GAME_HEIGHT;
            canvas.style.display = 'none'; // ゲーム開始前はキャンバスを非表示にする

            // UI elements
            scoreDisplay = document.getElementById('score');
            livesDisplay = document.getElementById('lives');
            levelDisplay = document.getElementById('level');
            messageBox = document.getElementById('messageBox');
            messageText = messageBox.querySelector('p');
            startButtonContainer = document.getElementById('startButtonContainer');
            startButton = document.getElementById('startButton');
            loadingMessage = document.getElementById('loadingMessage');
            volumeSlider = document.getElementById('volumeSlider'); // スライダー要素を取得

            // 背景動画要素を取得
            backgroundVideo = document.getElementById('background-video');
            // 初期状態（ロード完了時）では動画が表示されている状態にする
            if (backgroundVideo) {
                backgroundVideo.style.display = 'none'; // 最初は隠す
                backgroundVideo.muted = true; // 自動再生のために最初はミュート必須
                backgroundVideo.volume = 0; // 初期音量も0
            }

            // 初期状態ではHowler.jsのBGMを停止しておく (スタート画面では動画の音が鳴るため)
            // backgroundMusicがロードされた後に停止させる
            if (loadedAudio.backgroundMusic) {
                loadedAudio.backgroundMusic.stop();
            }

            player = {
                x: GAME_WIDTH / 2 - PLAYER_WIDTH / 2,
                y: GAME_HEIGHT - PLAYER_HEIGHT - 120,
                width: PLAYER_WIDTH,
                height: PLAYER_HEIGHT,
                movingLeft: false,
                movingRight: false,
                invincible: false, // Is player invincible?
                invincibleTimer: 0, // How long player has been invincible
                blinkTimer: 0 // For blinking effect
            };

            // Input Event Listeners
            document.addEventListener('keydown', handleKeyDown);
            document.addEventListener('keyup', handleKeyUp);

            // Touch event listeners for mobile
            // canvasではなく、body全体でイベントを捕捉し、ゲーム状態に応じて処理を振り分け
            document.body.addEventListener('touchstart', handleTouchStart, { passive: false });
            document.body.addEventListener('touchmove', handleTouchMove, { passive: false });
            document.body.addEventListener('touchend', handleTouchEnd);

            // Mouse event listeners for desktop
            // canvasではなく、body全体でイベントを捕捉し、ゲーム状態に応じて処理を振り分け
            document.body.addEventListener('mousedown', handleMouseDown);
            document.body.addEventListener('mousemove', handleMouseMove);
            document.body.addEventListener('mouseup', handleMouseUp);

            // Screen orientation lock (Added in a previous iteration)
            if (screen.orientation && screen.orientation.lock) {
                screen.orientation.lock('portrait')
                    .then(() => console.log("画面の向きを縦向きにロックしました。"))
                    .catch(error => console.warn("画面の向きをロックできませんでした。:", error.name, error.message));
            }
        }

        function loadAssets() {
            showLoadingMessage();
            const imagePromises = [
                // プレイヤーの画像: あなたの 'camera_biz.png' を使用します
                loadImage('player', 'camera_biz.png'), 

                // インベーダーの画像: あなたの 'invader1.png' を使用します
                loadImage('invader', 'invader1.png'), 
                
                // ボスの画像: あなたの 'invader2.png' を使用します
                loadImage('boss', 'invader2.png'),

                // ↓↓ 以下は現在ファイルが不足しているか、不要とされた画像です ↓↓
                // これらのファイルを追加して、ゲームで利用したい場合は、
                // 各行の先頭にある '//' を削除 (コメントアウトを解除) してください。
                
                // プレイヤーの弾の画像 (例: player_projectile.png)
                // loadImage('projectile', 'player_projectile.png'),
                
                // 敵の弾の画像 (例: invader_projectile.png)
                // loadImage('invaderProjectile', 'invader_projectile.png'),
                
                // ボスの弾の画像 (例: boss_projectile.png)
                // loadImage('bossProjectile', 'boss_projectile.png')
            ];
            const audioPromises = [
                // BGM: bgm_amelo1.mp3 は必ず 'audio/' フォルダに入れてください
                loadAudio('backgroundMusic', 'audio/bgm_amelo1.mp3'),

                // ↓↓ 以下は全て、ユーザーからの要望により不要とされた効果音です ↓↓
                // これらのファイルを追加して、ゲームで利用したい場合は、
                // 各行の先頭にある '//' を削除 (コメントアウトを解除) してください。

                // 射撃音
                // loadAudio('shoot', 'audio/shoot.wav'),
                
                // 敵の被弾音
                // loadAudio('invaderHit', 'audio/invader_hit.wav'), 
                
                // プレイヤー被弾音
                // loadAudio('playerHit', 'audio/player_hit.wav'),
                
                // ゲームオーバー音
                // loadAudio('gameOver', 'audio/game_over.wav'),
                
                // レベルクリア音
                // loadAudio('levelClear', 'audio/level_clear.wav'),
                
                // ボス被弾音
                // loadAudio('bossHit', 'audio/boss_hit.wav'),   
                
                // ボス撃破音
                // loadAudio('bossDefeat', 'audio/boss_defeat.wav'), 
            ];

            return Promise.all([...imagePromises, ...audioPromises]);
        }

        function loadImage(name, src) {
            return new Promise((resolve, reject) => {
                const img = new Image();
                img.src = src;
                img.onload = () => {
                    loadedImages[name] = img;
                    resolve();
                };
                img.onerror = (e) => reject(new Error(`Failed to load image: ${src} (${e.message || e})`));
            });
        }

        function loadAudio(name, src) {
            return new Promise((resolve, reject) => {
                const sound = new Howl({
                    src: [src],
                    volume: Howler.volume(), // グローバル音量設定を反映
                    onload: () => {
                        loadedAudio[name] = sound;
                        resolve();
                    },
                    onloaderror: (id, error) => reject(new Error(`Failed to load audio: ${src} (ID: ${id}, Error: ${error})`))
                });
            });
        }

        // --- UI Visibility Functions ---
        function showLoadingMessage() {
            loadingMessage.style.display = 'block';
            startButtonContainer.style.display = 'none';
            messageBox.style.display = 'none';
            canvas.style.display = 'none';
            if (backgroundVideo) {
                backgroundVideo.style.display = 'none'; // Loading, so video might not be ready or needed
                backgroundVideo.pause();
                backgroundVideo.currentTime = 0;
            }
        }

        function hideLoadingMessage() {
            loadingMessage.style.display = 'none';
        }

        function showStartButton() {
            startButtonContainer.style.display = 'flex'; // Use flex for centering
            messageBox.style.display = 'none';
            canvas.style.display = 'none'; // Game canvas should be hidden
            if (backgroundVideo) {
                backgroundVideo.style.display = 'block'; // Show video on start screen
                backgroundVideo.currentTime = 0; // Reset video
                backgroundVideo.muted = false; // Ensure video can play sound if volume is up
                backgroundVideo.volume = Howler.volume(); // Sync video volume with slider
                backgroundVideo.play().catch(e => console.error("Video play error on start screen:", e));
            }
            currentGameState = GAME_STATE.START_SCREEN; // Ensure correct state
        }

        function hideStartButton() {
            startButtonContainer.style.display = 'none';
            if (backgroundVideo) {
                backgroundVideo.pause(); // Pause video when game starts
                backgroundVideo.currentTime = 0; // Reset video to start
                backgroundVideo.style.display = 'none'; // Hide video
            }
            canvas.style.display = 'block'; // Show game canvas
        }

        function showMessage(msg) {
            messageText.innerText = msg;
            messageBox.style.display = 'block';
        }

        function hideMessageBox() {
            messageBox.style.display = 'none';
        }

        function updateScoreDisplay() {
            scoreDisplay.innerText = `Score: ${score}`;
        }

        function updateLivesDisplay() {
            livesDisplay.innerText = `Lives: ${lives}`;
        }

        function updateLevelDisplay() {
            levelDisplay.innerText = `Level: ${currentLevel}`;
        }

        // --- Game State Management ---

        function createInvaders() {
            invaders = [];
            const startX = (GAME_WIDTH - (INVADER_COLS * (INVADER_WIDTH + INVADER_SPACING) - INVADER_SPACING)) / 2;
            const startY = 50; // 少し上から開始

            for (let row = 0; row < INVADER_ROWS; row++) {
                for (let col = 0; col < INVADER_COLS; col++) {
                    invaders.push({
                        x: startX + col * (INVADER_WIDTH + INVADER_SPACING),
                        y: startY + row * (INVADER_HEIGHT + INVADER_SPACING),
                        width: INVADER_WIDTH,
                        height: INVADER_HEIGHT,
                        dx: INVADER_SPEED + (currentLevel - 1) * 0.5, // レベルアップで速くなる
                        hp: 1
                    });
                }
            }
        }

        function createBoss() {
            boss = {
                x: GAME_WIDTH / 2 - 50, // 中央に配置
                y: 30, // 上の方に配置
                width: 100,
                height: 80,
                dx: (INVADER_SPEED + (currentLevel - 1) * 0.5) * 1.5, // インベーダーより速く
                hp: BOSS_HP_PER_LEVEL * currentLevel, // レベルごとにHPが増加
                shootTimer: 0, // 発射間隔を管理
                shootInterval: Math.max(30, 60 - (currentLevel - 1) * 10) // 発射間隔のフレーム数 (レベルアップで速くなる)
            };
        }

        function startGame(isNewGame) {
            if (animationFrameId) {
                cancelAnimationFrame(animationFrameId);
                animationFrameId = null;
            }

            if (isNewGame) {
                score = 0;
                lives = 3;
                currentLevel = 1;
            } else {
                // Level up - keep score and lives, reset player position/state
                player.x = GAME_WIDTH / 2 - PLAYER_WIDTH / 2;
                player.movingLeft = false;
                player.movingRight = false;
                player.invincible = false;
                player.invincibleTimer = 0;
                player.blinkTimer = 0;
            }
            
            boss = null;
            projectiles = [];
            invaderProjectiles = [];

            createInvaders();
            if (currentLevel % 2 === 0 || currentLevel === MAX_LEVELS) { // 例: 偶数レベルまたは最終レベルでボス出現
                 // ボスの出現条件は調整してください
                 createBoss();
            }

            updateScoreDisplay();
            updateLivesDisplay();
            updateLevelDisplay();
            hideMessageBox();
            hideStartButton(); // ゲーム開始時にスタートボタンと動画を隠す

            currentGameState = GAME_STATE.PLAYING;
            lastTimestamp = performance.now();

            // Howler.jsのBGMを最初から再生 (ゲームプレイ中のBGM)
            if (loadedAudio.backgroundMusic) {
                loadedAudio.backgroundMusic.stop();
                loadedAudio.backgroundMusic.play();
                loadedAudio.backgroundMusic.loop(true);
                loadedAudio.backgroundMusic.volume(Howler.volume());
            }

            animationFrameId = requestAnimationFrame(update);
        }

        function endGame(win) {
            currentGameState = GAME_STATE.GAME_OVER;
            if (animationFrameId) {
                cancelAnimationFrame(animationFrameId);
                animationFrameId = null;
            }

            // BGMの停止と背景動画の表示/音声制御
            if (loadedAudio.backgroundMusic) {
                loadedAudio.backgroundMusic.stop(); // BGMを停止
            }

            // ゲームオーバーまたは全レベルクリア時、スタート画面に戻る
            if (!win || currentLevel >= MAX_LEVELS) {
                if (backgroundVideo) {
                    backgroundVideo.style.display = 'block'; // 動画を再表示する
                    backgroundVideo.muted = false; // ミュートを解除
                    backgroundVideo.volume = Howler.volume(); // スライダーの音量に合わせる
                    backgroundVideo.play().catch(e => console.error("Video playback error on game over:", e)); // 再生開始
                    backgroundVideo.style.zIndex = 0;
                }
                canvas.style.display = 'none'; // キャンバスを非表示に戻す
                showStartButton(); // スタートボタンを再表示し、初期状態に戻す
            } else {
                // レベルクリアで次のレベルへ進む場合: BGMは継続 (すでに停止済みなら再開はしない)。背景動画は非表示のまま
                // canvas.style.displayは'block'のまま
            }

            let message = '';
            const playAgainButton = messageBox.querySelector('button');

            if (win) {
                if (currentLevel >= MAX_LEVELS) {
                    message = `You Win! Final Score: ${score}`;
                    playAgainButton.innerText = "Play Again";
                    playAgainButton.onclick = () => startGame(true);
                } else {
                    message = `Level ${currentLevel} Clear! Score: ${score}`;
                    currentLevel++;
                    // LevelClearSEが必要ならここで再生
                    // if (loadedAudio.levelClear) loadedAudio.levelClear.play();
                    playAgainButton.innerText = `Next Level (${currentLevel})`;
                    playAgainButton.onclick = () => startGame(false); // 次のレベルへ
                }
            } else {
                message = `Game Over! Score: ${score}`;
                // GameOverSEが必要ならここで再生
                // if (loadedAudio.gameOver) loadedAudio.gameOver.play();
                playAgainButton.innerText = "Play Again";
                playAgainButton.onclick = () => startGame(true);
            }
            showMessage(message);
        }

        // --- Game Loop ---

        function update(timestamp) {
            const deltaTime = (timestamp - lastTimestamp) / 1000; // Convert to seconds
            lastTimestamp = timestamp;

            if (currentGameState !== GAME_STATE.PLAYING) {
                animationFrameId = requestAnimationFrame(update);
                return;
            }

            // Update player position (movement via keyboard or touch/mouse)
            if (player.movingLeft && player.x > 0) {
                player.x -= PLAYER_SPEED;
            } else if (player.movingRight && player.x < GAME_WIDTH - player.width) {
                player.x += PLAYER_SPEED;
            } else if (playerTargetX !== null) { // Handle touch/mouse movement
                const targetPlayerCenter = playerTargetX;
                const currentPlayerCenter = player.x + player.width / 2;

                if (Math.abs(targetPlayerCenter - currentPlayerCenter) > PLAYER_SPEED / 2) {
                    if (targetPlayerCenter < currentPlayerCenter) {
                        player.x -= PLAYER_SPEED;
                    } else {
                        player.x += PLAYER_SPEED;
                    }
                }
                // Clamp player position
                player.x = Math.max(0, Math.min(player.x, GAME_WIDTH - player.width));
            }

            // Player shooting cooldown
            if (playerShootCooldown > 0) {
                playerShootCooldown--;
            }

            // Update projectiles
            projectiles.forEach(p => p.y -= PLAYER_PROJECTILE_SPEED);
            projectiles = projectiles.filter(p => p.y > 0); // Remove off-screen

            // Update invader projectiles
            invaderProjectiles.forEach(p => p.y += INVADER_PROJECTILE_SPEED);
            invaderProjectiles = invaderProjectiles.filter(p => p.y < GAME_HEIGHT); // Remove off-screen

            // Update invader movement
            let hitEdge = false;
            invaders.forEach(invader => {
                invader.x += invader.dx;
                if (invader.x + invader.width > GAME_WIDTH || invader.x < 0) {
                    hitEdge = true;
                }
            });

            if (hitEdge) {
                invaders.forEach(invader => {
                    invader.dx *= -1; // Reverse direction
                    invader.y += 20; // Move down
                });
            }

            // Invader shooting (random chance for any invader)
            if (invaders.length > 0 && Math.random() < 0.005 * (1 + currentLevel * 0.1)) { // 0.5% + α chance per frame for an invader to shoot
                const shootingInvader = invaders[Math.floor(Math.random() * invaders.length)];
                invaderProjectiles.push({
                    x: shootingInvader.x + shootingInvader.width / 2 - 2,
                    y: shootingInvader.y + shootingInvader.height,
                    width: 4,
                    height: 10
                });
            }

            // Update boss movement (if exists)
            if (boss) {
                boss.x += boss.dx;
                if (boss.x + boss.width > GAME_WIDTH || boss.x < 0) {
                    boss.dx *= -1;
                }

                // Boss shooting
                boss.shootTimer++;
                if (boss.shootTimer >= boss.shootInterval) {
                    invaderProjectiles.push({
                        x: boss.x + boss.width / 2 - 2,
                        y: boss.y + boss.height,
                        width: 4,
                        height: 10
                    });
                    boss.shootTimer = 0;
                }
            }

            // Collision Detection: Player Projectiles vs Invaders
            // IMPORTANT: Iterate backwards when removing elements to avoid skipping
            for (let pIndex = projectiles.length - 1; pIndex >= 0; pIndex--) {
                const p = projectiles[pIndex];
                for (let invaderIndex = invaders.length - 1; invaderIndex >= 0; invaderIndex--) {
                    const invader = invaders[invaderIndex];
                    if (
                        p.x < invader.x + invader.width &&
                        p.x + p.width > invader.x &&
                        p.y < invader.y + invader.height &&
                        p.y + p.height > invader.y
                    ) {
                        // Collision!
                        invader.hp--;
                        projectiles.splice(pIndex, 1); // Remove projectile
                        
                        if (invader.hp <= 0) {
                            invaders.splice(invaderIndex, 1); // Remove invader
                            score += 10; // Score for invader
                            updateScoreDisplay();
                            // if (loadedAudio.invaderHit) loadedAudio.invaderHit.play(); // Play hit sound
                        }
                        // else {
                        //      if (loadedAudio.invaderHit) loadedAudio.invaderHit.play(); // Play hit sound even if not defeated
                        // }
                        break; // Projectile hit an invader, so it's gone. Break from inner loop.
                    }
                }
            }

            // Collision Detection: Player Projectiles vs Boss
            if (boss) {
                for (let pIndex = projectiles.length - 1; pIndex >= 0; pIndex--) {
                    const p = projectiles[pIndex];
                    if (
                        p.x < boss.x + boss.width &&
                        p.x + p.width > boss.x &&
                        p.y < boss.y + boss.height &&
                        p.y + p.height > boss.y
                    ) {
                        // Collision!
                        boss.hp--;
                        projectiles.splice(pIndex, 1); // Remove projectile
                        // if (loadedAudio.bossHit) loadedAudio.bossHit.play(); // Play boss hit sound

                        if (boss.hp <= 0) {
                            // if (loadedAudio.bossDefeat) loadedAudio.bossDefeat.play(); // Play boss defeat sound
                            score += 100 * currentLevel; // Score for boss defeat
                            updateScoreDisplay();
                            boss = null; // Remove boss
                        }
                        break; // Projectile hit the boss, so it's gone.
                    }
                }
            }

            // Collision Detection: Invader Projectiles vs Player
            if (!player.invincible) {
                for (let pIndex = invaderProjectiles.length - 1; pIndex >= 0; pIndex--) {
                    const p = invaderProjectiles[pIndex];
                    if (
                        p.x < player.x + player.width &&
                        p.x + p.width > player.x &&
                        p.y < player.y + player.height &&
                        p.y + p.height > player.y
                    ) {
                        // Collision!
                        invaderProjectiles.splice(pIndex, 1); // Remove projectile
                        lives--;
                        updateLivesDisplay();
                        // if (loadedAudio.playerHit) loadedAudio.playerHit.play(); // Play player hit sound

                        if (lives <= 0) {
                            endGame(false); // Game Over
                        } else {
                            player.invincible = true;
                            player.invincibleTimer = 0;
                            player.blinkTimer = 0;
                        }
                        break; // Projectile hit the player, so it's gone.
                    }
                }
            }

            // Invincible Timer & Blinking
            if (player.invincible) {
                player.invincibleTimer++;
                player.blinkTimer++;

                // Blinking effect (every 10 frames)
                if (player.blinkTimer >= 10) {
                    player.blinkTimer = 0;
                }

                if (player.invincibleTimer >= 100) { // Invincible for 100 frames (approx 1.6 seconds)
                    player.invincible = false;
                    player.invincibleTimer = 0;
                }
            }


            // Check for win condition (all invaders and boss defeated)
            if (invaders.length === 0 && boss === null) {
                endGame(true); // Win!
            }


            draw();
            animationFrameId = requestAnimationFrame(update);
        }

        // --- Drawing Functions ---

        function draw() {
            ctx.clearRect(0, 0, GAME_WIDTH, GAME_HEIGHT); // Clear canvas

            // Draw player
            // Blinking effect during invincibility
            if (player.invincible && player.blinkTimer < 5) {
                // Do not draw player (creating the blink)
            } else {
                if (loadedImages.player) {
                    ctx.drawImage(loadedImages.player, player.x, player.y, player.width, player.height);
                } else {
                    ctx.fillStyle = 'blue';
                    ctx.fillRect(player.x, player.y, player.width, player.height);
                }
            }

            // Draw invaders
            invaders.forEach(invader => {
                if (loadedImages.invader) {
                    ctx.drawImage(loadedImages.invader, invader.x, invader.y, invader.width, invader.height);
                } else {
                    ctx.fillStyle = 'red';
                    ctx.fillRect(invader.x, invader.y, invader.width, invader.height);
                }
            });

            // Draw player projectiles
            projectiles.forEach(p => {
                if (loadedImages.projectile) { // If projectile image is loaded
                    ctx.drawImage(loadedImages.projectile, p.x, p.y, p.width, p.height);
                } else { // Otherwise, draw as a simple rectangle
                    ctx.fillStyle = 'lime';
                    ctx.fillRect(p.x, p.y, p.width, p.height);
                }
            });

            // Draw invader projectiles
            invaderProjectiles.forEach(p => {
                if (loadedImages.invaderProjectile) { // If invader projectile image is loaded
                    ctx.drawImage(loadedImages.invaderProjectile, p.x, p.y, p.width, p.height);
                } else { // Otherwise, draw as a simple rectangle
                    ctx.fillStyle = 'magenta';
                    ctx.fillRect(p.x, p.y, p.width, p.height);
                }
            });

            // Draw boss (if exists)
            if (boss) {
                if (loadedImages.boss) {
                    ctx.drawImage(loadedImages.boss, boss.x, boss.y, boss.width, boss.height);
                } else {
                    ctx.fillStyle = 'purple';
                    ctx.fillRect(boss.x, boss.y, boss.width, boss.height);
                }
                // Optionally draw boss HP bar
                ctx.fillStyle = 'red';
                // ボスのHPはBOSS_HP_PER_LEVEL * currentLevelが最大HP
                const maxBossHp = BOSS_HP_PER_LEVEL * currentLevel;
                const hpBarWidth = boss.width * (boss.hp / maxBossHp);
                ctx.fillRect(boss.x, boss.y + boss.height + 5, hpBarWidth, 5); // ボスの下側にHPバー
            }
        }

        // --- Event Handlers (Player Input) ---

        function playerShoot() {
            if (playerShootCooldown <= 0) {
                projectiles.push({
                    x: player.x + player.width / 2 - 2, // Center projectile
                    y: player.y,
                    width: 4,
                    height: 10
                });
                playerShootCooldown = PLAYER_SHOOT_COOLDOWN_MAX;
                // if (loadedAudio.shoot) loadedAudio.shoot.play(); // Play shoot sound
            }
        }

        function handleKeyDown(e) {
            if (currentGameState !== GAME_STATE.PLAYING) return;

            if (e.key === 'ArrowLeft' || e.key === 'a') {
                player.movingLeft = true;
            } else if (e.key === 'ArrowRight' || e.key === 'd') {
                player.movingRight = true;
            } else if (e.key === ' ' || e.key === 'Spacebar') { // Spacebar
                e.preventDefault(); // Prevent scrolling
                playerShoot();
            }
        }

        function handleKeyUp(e) {
            if (currentGameState !== GAME_STATE.PLAYING) return;

            if (e.key === 'ArrowLeft' || e.key === 'a') {
                player.movingLeft = false;
            } else if (e.key === 'ArrowRight' || e.key === 'd') {
                player.movingRight = false;
            }
        }

        // For touch/mouse, we'll use playerTargetX and isPointerDown to control movement
        function handleTouchStart(e) {
            if (currentGameState === GAME_STATE.START_SCREEN) {
                // If on start screen, let the start button handle the click
                return;
            }

            if (currentGameState === GAME_STATE.PLAYING) {
                e.preventDefault(); // Prevent scrolling during gameplay
                isPointerDown = true;
                // Set target X to the touch location for player movement
                const touchX = e.touches[0].clientX;
                const rect = canvas.getBoundingClientRect();
                playerTargetX = (touchX - rect.left) * (canvas.width / rect.width);
                playerShoot(); // Also shoot on touch start
            }
        }

        function handleTouchMove(e) {
            if (currentGameState === GAME_STATE.PLAYING && isPointerDown) {
                e.preventDefault(); // Prevent scrolling during gameplay
                const touchX = e.touches[0].clientX;
                const rect = canvas.getBoundingClientRect();
                playerTargetX = (touchX - rect.left) * (canvas.width / rect.width);
            }
        }

        function handleTouchEnd(e) {
            if (currentGameState === GAME_STATE.PLAYING) {
                isPointerDown = false;
                playerTargetX = null; // Stop aiming for a target
            }
        }

        function handleMouseDown(e) {
            if (currentGameState === GAME_STATE.START_SCREEN) {
                // If on start screen, let the start button handle the click
                return;
            }

            if (currentGameState === GAME_STATE.PLAYING) {
                isPointerDown = true;
                const mouseX = e.clientX;
                const rect = canvas.getBoundingClientRect();
                playerTargetX = (mouseX - rect.left) * (canvas.width / rect.width);
                playerShoot(); // Also shoot on mouse down
            }
        }

        function handleMouseMove(e) {
            if (currentGameState === GAME_STATE.PLAYING && isPointerDown) {
                const mouseX = e.clientX;
                const rect = canvas.getBoundingClientRect();
                playerTargetX = (mouseX - rect.left) * (canvas.width / rect.width);
            }
        }

        function handleMouseUp(e) {
            if (currentGameState === GAME_STATE.PLAYING) {
                isPointerDown = false;
                playerTargetX = null; // Stop aiming for a target
            }
        }

        // --- Initialize game when DOM is ready ---
        window.addEventListener('DOMContentLoaded', init);
    </script>

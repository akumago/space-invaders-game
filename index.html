<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Invader Game</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/howler/2.2.4/howler.min.js"></script>
    <style>
        /* スタイルの直接埋め込み（または style.css に追記） */
        body {
            background-color: #000;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            width: 100vw;
            overflow: hidden;
            font-family: 'Press Start 2P', cursive; /* Webフォントがない場合は一般的なフォントにフォールバック */
            color: #0f0;
            /* スマートフォンでのユーザー操作を改善 */
            -webkit-user-select: none; /* テキスト選択不可 */
            user-select: none;
            -webkit-touch-callout: none; /* iOSで長押しした際のメニュー表示を無効化 */
            -webkit-tap-highlight-color: rgba(0,0,0,0); /* タップ時のハイライトを削除 */
        }

        /* ゲームコンテナのデフォルトスタイル（PC向け） */
        #gameContainer {
            position: relative;
            width: 420px;
            height: calc(420px * (19.5 / 9)); /* 19.5:9のアスペクト比 */
            overflow: hidden;
            border: 2px solid #0f0;
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.8);
            z-index: 1;
            margin: auto;
            box-sizing: border-box; /* パディングとボーダーを寸法に含める */
        }

        /* スマートフォンなど、画面幅が768px以下のデバイスにのみ適用するスタイル */
        @media (max-width: 768px) {
            #gameContainer {
                width: min(100vw, calc(100vh * (9 / 19.5))); /* 画面幅と高さのアスペクト比から適切な最大幅を計算 */
                height: min(calc(100vw * (19.5 / 9)), 100vh); /* 画面幅と高さのアスペクト比から適切な最大高さを計算 */
                
                /* iPhone Xなどのノッチやホームインジケーターに対応するための安全領域 */
                padding-top: env(safe-area-inset-top);
                padding-bottom: env(safe-area-inset-bottom);
                padding-left: env(safe-area-inset-left);
                padding-right: env(safe-area-inset-right);
            }
        }

        #gameCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
            /* image-rendering: pixelated; */ /* 必要であればピクセルアート向けに有効化 */
        }

        #background-video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover; /* アスペクト比を保ちつつコンテナを埋める */
            z-index: -1; /* Canvasの下に配置 */
            display: none; /* 初期状態では非表示（JSで制御） */
        }

        #startButton, #gameOverButton {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 15px 30px;
            font-size: 1.5em;
            color: #0f0;
            background-color: rgba(0, 100, 0, 0.7);
            border: 2px solid #0f0;
            cursor: pointer;
            z-index: 100;
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.5);
            transition: background-color 0.3s, box-shadow 0.3s;
        }

        #startButton:hover, #gameOverButton:hover {
            background-color: rgba(0, 150, 0, 0.9);
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.8);
        }

        .game-ui {
            position: absolute;
            font-size: 1.2em;
            color: #0f0;
            z-index: 50;
        }

        #score-display {
            top: 10px;
            left: 10px;
        }

        #lives-display {
            top: 10px;
            right: 10px;
        }

        #level-display {
            top: 40px;
            left: 10px;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <video id="background-video" autoplay loop muted playsinline>
            <source src="image/background_video.mp4" type="video/mp4">
            Your browser does not support the video tag.
        </video>
        <canvas id="gameCanvas"></canvas>
        <button id="startButton">TAP TO START</button>
        <button id="gameOverButton" style="display: none;">PLAY AGAIN</button>
        <div id="score-display" class="game-ui">SCORE: 0</div>
        <div id="lives-display" class="game-ui">LIVES: 3</div>
        <div id="level-display" class="game-ui">LEVEL: 1</div>
    </div>

    <script>
        // ここにあなたの既存のJavaScriptコードを貼り付けてください
        // ただし、以下の startButton.addEventListener の部分のみ、
        // 新しいコードで置き換えてください
        // ...
        // 既存のJavaScriptコードの続き
        // ...
        
        // ▼▼▼ ここから修正が必要なJavaScriptコードのブロック ▼▼▼

        // startButton のクリックイベントリスナー
        // (この部分はあなたの既存のコードに合わせて貼り付けてください)
        startButton.addEventListener('click', () => {
            if (currentGameState === GAME_STATE.START_SCREEN) {
                if (!isInitialStartTapDone) {
                    // 1回目のタップ：動画再生とボタンテキスト変更
                    if (backgroundVideo) {
                        backgroundVideo.muted = false; // ミュート解除
                        backgroundVideo.volume = Howler.volume(); // スライダーの音量に合わせる
                        // ★ここを削除またはコメントアウトしました★
                        // backgroundVideo.play().catch(e => console.error("Video playback error on first tap:", e)); 
                        backgroundVideo.style.display = 'block'; // 動画を表示
                    }
                    startButton.innerText = "START GAME"; // ボタンのテキストを変更
                    isInitialStartTapDone = true; // フラグを立てる
                } else {
                    // 2回目のタップ：ゲーム開始
                    startGame(true); // 新しいゲームを開始
                }
            } else if (currentGameState === GAME_STATE.GAME_OVER) {
                // ゲームオーバー画面から再スタート
                startGame(true);
            }
        });

        // ▲▲▲ ここまでが修正が必要なJavaScriptコードのブロック ▲▲▲

        // ...
        // 既存のJavaScriptコードの続き
        // ...
    </script>
</body>
</html>

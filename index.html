<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Improved Space Invaders</title>
    <style>
        /* ... (CSS部分は省略 - 変更ありません) ... */
        /* 全体のリセットと基本設定 */
        html, body {
            margin: 0;
            padding: 0;
            overflow: hidden; /* スクロール禁止 */
            background-color: #000; /* デフォルトの背景色を黒に設定（ゲーム画面外） */
            font-family: 'Arial', sans-serif;
            color: #fff;
            -webkit-user-select: none; /* テキスト選択無効化 (iOS) */
            -moz-user-select: none; /* テキスト選択無効化 (Firefox) */
            -ms-user-select: none; /* テキスト選択無効化 (IE/Edge) */
            user-select: none; /* テキスト選択無効化 (標準) */
            -webkit-tap-highlight-color: rgba(0,0,0,0); /* タップ時のハイライトを無効化 (iOS) */
        }

        /* 画面中央にゲームコンテンツを配置するためのFlexbox */
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh; /* 画面全体の高さ */
            width: 100vw; /* 画面全体の幅 */
            position: relative; /* 子要素の絶対配置の基準 */
        }

        /* ゲームコンテナ - キャンバスと動画、UI要素を内包 */
        #gameContainer {
            position: relative; /* 子要素（canvas, video）の基準 */
            width: 420px; /* GAME_WIDTHと同期 */
            height: calc(420px * (19.5 / 9)); /* GAME_HEIGHTと同期 */
            overflow: hidden; /* はみ出たコンテンツを隠す */
            border: 2px solid #0f0; /* ゲーム画面の枠線 */
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.8);
            z-index: 1; /* 他のUIより手前 */
            margin: auto; /* 画面中央に配置 */
            box-sizing: border-box; /* パディングとボーダーを幅と高さに含める */
        }

        /* スマートフォンなど、画面幅が768px以下のデバイスにのみ適用するスタイル */
        @media (max-width: 768px) {
            #gameContainer {
                width: min(100vw, calc(100vh * (9 / 19.5)));
                height: min(calc(100vw * (19.5 / 9)), 100vh);
                /* safe-area-inset は必要に応じて追加してください。
                   現状のコードにはないので今回は含めません。
                padding-top: env(safe-area-inset-top);
                padding-bottom: env(safe-area-inset-bottom);
                padding-left: env(safe-area-inset-left);
                padding-right: env(safe-area-inset-right);
                */
            }
        }

        /* ゲームキャンバス */
        #gameCanvas {
            position: absolute; /* gameContainerを基準に配置 */
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block; /* 初期状態はJSで制御 */
            z-index: 0; /* 動画より手前 */
            background-color: lightgray; /* ゲームプレイ中の背景色をライトグレーに設定 */
        }

        /* 背景動画 - gameContainerのサイズに合わせる */
        #background-video {
            position: absolute; /* gameContainerを基準に配置 */
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover; /* 縦横比を維持しつつ要素を覆う */
            filter: brightness(0.5); /* 少し暗くして見やすくする */
            z-index: -1; /* キャンバスより奥に配置 */
            display: block; /* 初期状態はJSで制御 */
        }

        /* スコア、ライフ、レベル表示 */
        #score, #lives, #level {
            position: absolute;
            font-size: 1.2em;
            font-weight: bold;
            color: #0f0;
            text-shadow: 0 0 5px #0f0;
            z-index: 2; /* ゲーム要素より手前 */
            padding: 5px 10px;
            background-color: rgba(0, 0, 0, 0.5);
            border-radius: 5px;
        }
        #score { top: 10px; left: 10px; }
        #lives { top: 10px; right: 10px; }
        #level { bottom: 10px; left: 10px; }

        /* メッセージボックス (ゲームオーバー/クリア時) */
        #messageBox {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: rgba(0, 0, 0, 0.8);
            border: 2px solid #0f0;
            padding: 20px;
            text-align: center;
            z-index: 3;
            display: none;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.8);
            max-width: 80%;
            box-sizing: border-box; /* パディングを含めて幅を計算 */
        }
        #messageBox p {
            margin: 0 0 20px 0;
            font-size: 1.5em;
            font-weight: bold;
            color: #0f0;
            text-shadow: 0 0 5px #0f0;
        }
        #messageBox button {
            background-color: #0f0;
            color: #000;
            border: none;
            padding: 10px 20px;
            font-size: 1.2em;
            font-weight: bold;
            cursor: pointer;
            border-radius: 5px;
            transition: background-color 0.3s, color 0.3s;
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.5);
        }
        #messageBox button:hover {
            background-color: #0a0;
            color: #fff;
        }

        /* スタートボタンコンテナ */
        #startButtonContainer {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: rgba(0, 0, 0, 0.7);
            border: 2px solid #0f0;
            padding: 30px 40px;
            border-radius: 15px;
            box-shadow: 0 0 25px rgba(0, 255, 0, 0.8);
            z-index: 2; /* ゲーム画面より手前 */
            width: 80%; /* 適度な幅に */
            max-width: 400px; /* 最大幅 */
            box-sizing: border-box; /* パディングを含めて幅を計算 */
        }
        #startButtonContainer h1 {
            font-size: 2.5em;
            color: #0f0;
            text-shadow: 0 0 10px #0f0;
            margin-bottom: 10px;
            text-align: center;
        }
        #startButtonContainer p {
            font-size: 1.2em;
            color: #fff;
            margin-bottom: 30px;
            text-align: center;
        }
        #startButton {
            background-color: #0f0;
            color: #000;
            border: none;
            padding: 15px 30px;
            font-size: 1.5em;
            font-weight: bold;
            cursor: pointer;
            border-radius: 8px;
            transition: background-color 0.3s, color 0.3s, transform 0.1s;
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.5);
            white-space: nowrap; /* ボタン内のテキストが改行されないように */
        }
        #startButton:hover {
            background-color: #0a0;
            color: #fff;
        }
        #startButton:active {
            transform: scale(0.98);
        }

        /* ローディングメッセージ */
        #loadingMessage {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 1.8em;
            font-weight: bold;
            color: #0f0;
            text-shadow: 0 0 8px #0f0;
            z-index: 4;
            display: none;
        }

        /* 音量スライダー */
        .volume-control {
            margin-top: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1em;
            color: #fff;
        }
        #volumeSlider {
            width: 150px;
            -webkit-appearance: none; /* デフォルトスタイルを無効化 */
            appearance: none;
            height: 8px;
            background: #333;
            outline: none;
            border-radius: 4px;
            cursor: pointer;
            box-shadow: inset 0 0 5px rgba(0, 255, 0, 0.3);
        }
        #volumeSlider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            background: #0f0;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.7);
        }
        #volumeSlider::-moz-range-thumb {
            width: 20px;
            height: 20px;
            background: #0f0;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.7);
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/howler/2.2.3/howler.min.js"></script>
</head>
<body>
    <div id="loadingMessage">Loading Game Assets...</div>

    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        <video autoplay loop muted playsinline id="background-video">
            <source src="video/background_loop.mp4" type="video/mp4">
            Your browser does not support the video tag.
        </video>
        <div id="score">Score: 0</div>
        <div id="lives">Lives: 3</div>
        <div id="level">Level: 1</div>
    </div>

    <div id="messageBox">
        <p id="message"></p>
        <button>Play Again</button>
    </div>

    <div id="startButtonContainer">
        <h1>SPACE INVADERS</h1>
        <p>Improved</p>
        <button id="startButton">TAP TO START</button>
        <div class="volume-control">
            <span>Volume</span>
            <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="0.5">
        </div>
    </div>

    <script>
        // ★★★ このscriptタグの中身全てを、お手元のscriptタグの中身全てと置き換えてください ★★★

        // --- Global Constants ---
        const GAME_WIDTH = 420;
        const GAME_HEIGHT = GAME_WIDTH * (19.5 / 9); // Aspect ratio for mobile portrait
        const PLAYER_SPEED = 7;
        const PLAYER_PROJECTILE_SPEED = 10;
        const INVADER_BASE_SPEED = 15; // 修正: 20から15に減少（インベーダーの初期移動速度）
        const INVADER_MOVE_DOWN_AMOUNT = 20; // インベーダーが下に移動する量

        // ★難易度調整: 敵の弾速を少し上げる
        const ENEMY_PROJECTILE_SPEED = 5; // 変更: 4 -> 5

        const INVADER_ROWS = 5; // ★修正: 6から5に戻す（敵の行数）
        const INVADER_COLS = 5; // （敵の列数）
        const INVADER_WIDTH = 75; // （敵の表示サイズ）
        const INVADER_HEIGHT = 75; // （敵の表示サイズ）

        // インベーダー間の横方向の間隔と縦方向の間隔を調整
        const INVADER_SPACING_X = 10; // インベーダー間の横方向の間隔を詰める
        const INVADER_SPACING_Y = 15; // インベーダー間の縦方向の間隔を調整

        const BOSS_WIDTH = 150; // ★変更: ボスの幅を大きく
        const BOSS_HEIGHT = 120; // ★変更: ボスの高さを大きく
        const BOSS_HP_PER_LEVEL = 10; // （ボスのHP）
        const MAX_LEVELS = 30; // ★難易度調整: 最大レベル数を30に設定

        const PLAYER_WIDTH = 40; // 修正: 30から40に増加（自機の表示サイズ）
        const PLAYER_HEIGHT = 40; // 修正: 30から40に増加（自機の表示サイズ）
        const PLAYER_SHOOT_COOLDOWN_MAX = 15; // 修正: 20から15に減少（自機の発射間隔）

        // ボスの放射状ミサイル関連の定数
        const BOSS_RADIAL_PROJECTILE_COUNT_BASE = 3; // ボスの初期放射状ミサイル数
        const BOSS_RADIAL_SPREAD_ANGLE = Math.PI * 0.75; // 放射状に広がる角度（ラジアン、例: 135度）

        const GAME_STATE = {
            LOADING: 'LOADING',
            START_SCREEN: 'START_SCREEN', // 最初の「TAP TO START」で動画再生
            PLAYING: 'PLAYING', // 実際のゲームプレイ中
            GAME_OVER: 'GAME_OVER', // ゲームオーバー/クリア画面
            FINAL_BOSS: 'FINAL_BOSS' // ★最終ボス状態を追加★
        };

        // --- Global Variables ---
        let canvas, ctx;
        let player;
        let invaders = [];
        let projectiles = [];
        let invaderProjectiles = []; // invaderProjectilesはボスや通常の敵の弾を扱う
        let score = 0;
        let lives = 3;
        let currentLevel = 1;
        let lastTimestamp = 0;
        let animationFrameId;
        let currentGameState = GAME_STATE.LOADING;
        let loadedImages = {};
        let loadedAudio = {};
        let boss = null;
        let bossCreatedForThisLevel = false; // ★追加: ボスがこのレベルで生成されたかどうかのフラグ
        let finalBoss = null; // ★最終ボスオブジェクトを追加★

        // Player shooting cooldown
        let playerShootCooldown = 0;

        // Player movement target for touch/mouse
        let playerTargetX = null;
        let isPointerDown = false; // Tracks if mouse/touch is currently pressed

        // UI elements
        let scoreDisplay;
        let livesDisplay;
        let levelDisplay;
        let messageBox;
        let messageText;
        let startButtonContainer;
        let startButton;
        let loadingMessage;
        let volumeSlider; // 音量スライダー
        let backgroundMusic; // Howler.js BGM
        let backgroundVideo; // 背景動画要素

        // Invader movement flags
        let lastInvaderMoveDownTime = 0;
        const INVADER_MOVE_DOWN_INTERVAL = 1500; // ★修正: 500から1500に増加（インベーダーが下に移動する間隔（ミリ秒））

        let isInitialStartTapDone = false; // 最初のタップ（動画再生）が完了したかどうかのフラグ

        // --- Initialization ---

        function init() {
            initGameEssentials();
            loadAssets().then(() => {
                hideLoadingMessage();
                currentGameState = GAME_STATE.START_SCREEN;
                showStartButton(); // これで「TAP TO START」が表示される

                // 音量スライダーの初期値を設定し、イベントリスナーを追加
                const savedVolume = parseFloat(localStorage.getItem('gameVolume')) || 0.5;
                Howler.volume(savedVolume);
                volumeSlider.value = savedVolume;

                volumeSlider.addEventListener('input', (e) => {
                    const newVolume = parseFloat(e.target.value);
                    Howler.volume(newVolume); // Howler.jsのグローバル音量を更新
                    localStorage.setItem('gameVolume', newVolume); // 音量設定をローカルストレージに保存

                    if (backgroundVideo) {
                        backgroundVideo.volume = newVolume;
                        if (newVolume > 0 && backgroundVideo.muted) {
                            backgroundVideo.muted = false;
                        } else if (newVolume === 0 && !backgroundVideo.muted) {
                            backgroundVideo.muted = true;
                        }
                    }
                });

                // スタートボタンのクリックイベントリスナー
                startButton.addEventListener('click', () => {
                    if (currentGameState === GAME_STATE.START_SCREEN) {
                        if (!isInitialStartTapDone) {
                            // 1回目のタップ：動画再生とボタンテキスト変更
                            if (backgroundVideo) {
                                backgroundVideo.muted = false; // ミュート解除
                                backgroundVideo.volume = Howler.volume(); // スライダーの音量に合わせる
                                backgroundVideo.play().catch(e => console.error("Video playback error on first tap:", e));
                                backgroundVideo.style.display = 'block'; // 動画を表示
                            }
                            startButton.innerText = "START GAME"; // ボタンのテキストを変更
                            isInitialStartTapDone = true; // フラグを立てる
                        } else {
                            // 2回目のタップ：ゲーム開始
                            startGame(true); // 新しいゲームを開始
                        }
                    }
                });
            }).catch(error => {
                console.error("Error loading assets:", error);
                loadingMessage.innerText = `Error loading assets: ${error.message || error}. Please check console for details.`;
            });
        }

        // Sets up canvas, player object, and event listeners once
        function initGameEssentials() {
            canvas = document.getElementById('gameCanvas');
            ctx = canvas.getContext('2d');
            canvas.width = GAME_WIDTH;
            canvas.height = GAME_HEIGHT;
            canvas.style.display = 'none'; // ゲーム開始前はキャンバスを非表示にする

            // UI elements
            scoreDisplay = document.getElementById('score');
            livesDisplay = document.getElementById('lives');
            levelDisplay = document.getElementById('level');
            messageBox = document.getElementById('messageBox');
            messageText = messageBox.querySelector('p');
            startButtonContainer = document.getElementById('startButtonContainer');
            startButton = document.getElementById('startButton');
            loadingMessage = document.getElementById('loadingMessage');
            volumeSlider = document.getElementById('volumeSlider'); // スライダー要素を取得

            // 背景動画要素を取得
            backgroundVideo = document.getElementById('background-video');
            if (backgroundVideo) {
                backgroundVideo.style.display = 'none'; // 最初は隠す
                backgroundVideo.muted = true; // 最初はミュートにする
            }

            // ★修正：Howler.jsの背景音楽はここで停止せず、startGameで制御する
            // if (loadedAudio.backgroundMusic) {
            //     loadedAudio.backgroundMusic.stop();
            // }

            player = {
                x: GAME_WIDTH / 2 - PLAYER_WIDTH / 2,
                y: GAME_HEIGHT - PLAYER_HEIGHT - 120,
                width: PLAYER_WIDTH,
                height: PLAYER_HEIGHT,
                movingLeft: false,
                movingRight: false,
                invincible: false, // Is player invincible?
                invincibleTimer: 0, // How long player has been invincible
                blinkTimer: 0 // For blinking effect
            };

            // Input Event Listeners
            document.addEventListener('keydown', handleKeyDown);
            document.addEventListener('keyup', handleKeyUp);

            // Touch event listeners for mobile
            document.body.addEventListener('touchstart', handleTouchStart, { passive: false });
            document.body.addEventListener('touchmove', handleTouchMove, { passive: false });
            document.body.addEventListener('touchend', handleTouchEnd);

            // Mouse event listeners for desktop
            document.body.addEventListener('mousedown', handleMouseDown);
            document.body.addEventListener('mousemove', handleMouseMove);
            document.body.addEventListener('mouseup', handleMouseUp);

            // Screen orientation lock (非対応デバイスでは警告が出るが、処理は続行)
            if (screen.orientation && screen.orientation.lock) {
                screen.orientation.lock('portrait')
                    .then(() => console.log("画面の向きを縦向きにロックしました。"))
                    .catch(error => console.warn("画面の向きをロックできませんでした。:", error.name, error.message));
            }
        }

        function loadAssets() {
            showLoadingMessage();
            const imagePromises = [
                // プレイヤーの画像
                loadImage('player', 'image/invader3.png'),

                // インベーダーの画像
                loadImage('invader', 'image/invader1.png'),

                // ボスの画像
                loadImage('boss', 'image/invader2.png'), // 通常ボス画像

                // ★追加: ボス爆発の画像 (通常ボスと最終ボス共通で使用)
                loadImage('boss_explosion', 'image/explosion.png'),

                // ★最終ボス画像を追加（ここでは通常ボスと同じ画像を再利用）★
                loadImage('finalBoss', 'image/invader2.png'),
            ];
            const audioPromises = [
                loadAudio('backgroundMusic', 'audio/bgm_amelo1.mp3'),
                // 他のサウンドをここに追加ロードすることもできます (例: invaderHit, bossHit, bossExplosion, bossSpawn, playerHit)
                loadAudio('shoot', 'audio/shoot.mp3'), // ★ミサイル音を有効化
                // loadAudio('invaderHit', 'audio/invader_hit.mp3'),
                // loadAudio('bossHit', 'audio/boss_hit.mp3'),
                // loadAudio('bossExplosion', 'audio/boss_explosion.mp3'),
                // loadAudio('bossSpawn', 'audio/boss_spawn.mp3'), // ボス出現音 (必要であれば)
                // loadAudio('playerHit', 'audio/player_hit.mp3'), // 自機被弾音 (必要であれば)
            ];
            return Promise.all([...imagePromises, ...audioPromises]);
        }

        function loadImage(name, src) {
            return new Promise((resolve, reject) => {
                const img = new Image();
                img.src = src;
                img.onload = () => {
                    loadedImages[name] = img;
                    resolve();
                };
                img.onerror = (e) => reject(new Error(`Failed to load image: ${src} (${e.message || e})`));
            });
        }

        function loadAudio(name, src) {
            return new Promise((resolve, reject) => {
                const sound = new Howl({
                    src: [src],
                    volume: Howler.volume(),
                    onload: () => {
                        loadedAudio[name] = sound;
                        if (name === 'shoot') { // もし読み込んだ音がミサイル音(shoot)なら
                             sound.volume(0.05); // その音の個別音量を0.5に設定する (ここを調整！)
                         }
                        resolve(); // 音声がロードされたらPromiseを解決
                    },
                    onloaderror: (id, error) => reject(new Error(`Failed to load audio: ${src} (ID: ${id}, Error: ${error})`))
                });
            });
        }

        // --- UI Visibility Functions ---
        function showLoadingMessage() {
            loadingMessage.style.display = 'block';
            startButtonContainer.style.display = 'none';
            messageBox.style.display = 'none';
            canvas.style.display = 'none';
            if (backgroundVideo) {
                backgroundVideo.style.display = 'none';
                backgroundVideo.pause();
                backgroundVideo.currentTime = 0;
                backgroundVideo.muted = true;
            }
        }

        function hideLoadingMessage() {
            loadingMessage.style.display = 'none';
        }

        function showStartButton() {
            startButtonContainer.style.display = 'flex';
            messageBox.style.display = 'none';
            canvas.style.display = 'none';

            if (backgroundVideo) {
                // スタート画面では動画を表示
                backgroundVideo.style.display = 'block';
                backgroundVideo.currentTime = 0; // 動画を最初から再生
                backgroundVideo.muted = false; // 再生時のみミュートを解除
                backgroundVideo.volume = Howler.volume(); // スライダーの音量に合わせる
                backgroundVideo.play().catch(e => console.error("Video playback error on start screen:", e));
                backgroundVideo.style.zIndex = -1; // キャンバスより奥に
            }

            currentGameState = GAME_STATE.START_SCREEN;
            startButton.innerText = "TAP TO START";
            isInitialStartTapDone = false;
        }

        function hideStartButton() {
            startButtonContainer.style.display = 'none';

            // ゲーム開始時に背景動画を非表示にする
            if (backgroundVideo) {
                backgroundVideo.style.display = 'none'; // 動画を非表示にする
                backgroundVideo.pause(); // 動画を一時停止する
                backgroundVideo.currentTime = 0; // 動画の再生位置をリセット
            }
            canvas.style.display = 'block'; // キャンバスを表示
        }

        function showMessage(msg) {
            messageText.innerText = msg;
            messageBox.style.display = 'block';
        }

        function hideMessageBox() {
            messageBox.style.display = 'none';
        }

        function updateScoreDisplay() {
            scoreDisplay.innerText = `Score: ${score}`;
        }

        function updateLivesDisplay() {
            livesDisplay.innerText = `Lives: ${lives}`;
        }

        function updateLevelDisplay() {
            levelDisplay.innerText = `Level: ${currentLevel}`;
        }

        // --- Game State Management ---

        function createInvaders() {
            invaders = [];
            // インベーダー全体の幅を計算
            const totalInvaderBlockWidth = (INVADER_COLS * INVADER_WIDTH) + ((INVADER_COLS - 1) * INVADER_SPACING_X);
            // 開始X座標を計算（中央揃え）
            const startX = (GAME_WIDTH - totalInvaderBlockWidth) / 2;
            const startY = 80; // インベーダーの初期Y座標は高く保つ

            for (let row = 0; row < INVADER_ROWS; row++) {
                for (let col = 0; col < INVADER_COLS; col++) {
                    invaders.push({
                        x: startX + col * (INVADER_WIDTH + INVADER_SPACING_X),
                        y: startY + row * (INVADER_HEIGHT + INVADER_SPACING_Y),
                        width: INVADER_WIDTH,
                        height: INVADER_HEIGHT,
                        dx: (INVADER_BASE_SPEED + (currentLevel - 1) * 7),
                        hp: 1
                    });
                }
            }
        }

        function createBoss() {
            boss = {
                x: GAME_WIDTH / 2 - BOSS_WIDTH / 2,
                y: 30,
                width: BOSS_WIDTH,
                height: BOSS_HEIGHT,
                dx: (INVADER_BASE_SPEED + (currentLevel - 1) * 13) * 1.5,
                hp: BOSS_HP_PER_LEVEL,
                shootTimer: 0,
                shootInterval: Math.max(60, 120 - (currentLevel - 1) * 18),
                isExploding: false,
                explosionTimer: 0,
                explosionDuration: 50,
                originalImage: 'boss',
                explosionImage: 'boss_explosion'
            };
        }

        function startGame(isNewGame) {
            if (animationFrameId) {
                cancelAnimationFrame(animationFrameId);
                animationFrameId = null;
            }

            if (isNewGame) {
                score = 0;
                lives = 3;
                currentLevel = 1;
            } else {
                // 既存のゲームからの継続の場合、プレイヤーの状態のみリセット
                player.x = GAME_WIDTH / 2 - PLAYER_WIDTH / 2;
                player.movingLeft = false;
                player.movingRight = false;
                player.invincible = false;
                player.invincibleTimer = 0;
                player.blinkTimer = 0;
            }

            boss = null; // ボスは最初に生成しない（インベーダー全滅後に生成）
            bossCreatedForThisLevel = false; // 新しいゲームまたはレベル開始時にリセット
            finalBoss = null; // ゲーム開始時に最終ボスもリセット
            projectiles = [];
            invaderProjectiles = [];

            createInvaders(); // まずインベーダーのみを生成

            updateScoreDisplay();
            updateLivesDisplay();
            updateLevelDisplay();
            hideMessageBox();
            hideStartButton(); // ゲーム開始時に動画を非表示にしキャンバスを表示

            currentGameState = GAME_STATE.PLAYING;
            lastTimestamp = performance.now();

            // ★修正：音楽が既に再生中でなければ再生開始、ループを設定
            if (loadedAudio.backgroundMusic && !loadedAudio.backgroundMusic.playing()) {
                loadedAudio.backgroundMusic.play();
                loadedAudio.backgroundMusic.loop(true); // ループを有効にする
                loadedAudio.backgroundMusic.volume(Howler.volume());
            }


            animationFrameId = requestAnimationFrame(update);

            lastInvaderMoveDownTime = performance.now();
        }

        function endGame(win) {
            currentGameState = GAME_STATE.GAME_OVER; // ゲーム状態を一時的にGAME_OVERに設定
            if (animationFrameId) {
                cancelAnimationFrame(animationFrameId);
                animationFrameId = null;
            }

            // ★修正：ゲームオーバー（敗北）の場合のみBGMを停止
            if (!win) {
                if (loadedAudio.backgroundMusic) {
                    loadedAudio.backgroundMusic.stop();
                }
            }


            // メッセージ表示中はキャンバスを表示するが、動画は非表示に保つ
            if (backgroundVideo) {
                backgroundVideo.style.display = 'none';
                backgroundVideo.pause();
                backgroundVideo.currentTime = 0;
            }
            canvas.style.display = 'block'; // キャンバスをメッセージボックスの背後に表示

            let message = '';
            const playAgainButton = messageBox.querySelector('button');

            if (win) {
                if (currentLevel >= MAX_LEVELS && !finalBoss) { // 最終レベルクリアかつ最終ボスを倒した場合
                    message = `You Win! Final Score: ${score}`;
                    playAgainButton.innerText = "Play Again";
                    playAgainButton.onclick = () => {
                        hideMessageBox();
                        showStartButton(); // 全てのゲーム状態をリセットし、最初の「TAP TO START」画面に戻る
                    };
                    // 最終クリアまたはゲームオーバー時は背景動画を再表示
                    if (backgroundVideo) {
                        backgroundVideo.style.display = 'block';
                        backgroundVideo.currentTime = 0;
                        backgroundVideo.muted = false;
                        backgroundVideo.volume = Howler.volume();
                        backgroundVideo.play().catch(e => console.error("Video playback error on game over/win:", e));
                        backgroundVideo.style.zIndex = -1;
                    }
                    canvas.style.display = 'none'; // 動画表示のためキャンバスを非表示
                    // ★最終クリア時もBGMは停止
                    if (loadedAudio.backgroundMusic) {
                        loadedAudio.backgroundMusic.stop();
                    }
                } else { // 中間レベルクリアの場合 または 通常ボス撃破で最終レベルに到達した場合
                    if (currentLevel < MAX_LEVELS) { // 通常レベルクリア
                         message = `Level ${currentLevel} Clear! Score: ${score}`;
                         currentLevel++; // 次のレベルへ進む
                         playAgainButton.innerText = `Next Level (${currentLevel})`;
                         playAgainButton.onclick = () => {
                             hideMessageBox();
                             // 次のレベルへ直接移行し、最初のスタート画面に戻らない
                             startGame(false); // isNewGame=false で現在のスコア・ライフ・レベルを継続
                         };
                         // 中間レベルクリア時は動画を非表示に保ち、次のゲームがすぐに始まるようにする
                         canvas.style.display = 'block'; // キャンバスは表示したまま
                         // ★中間レベルクリア時はBGMは停止しない（継続再生）
                    } else { // MAX_LEVELS に到達したが最終ボスはまだ存在
                         // 最終ボス戦へ移行するための処理をここに追加する必要があるかもしれません
                         // 現在はLキーでスキップして最終ボス戦に入りますが、
                         // 本来は最終レベルの通常ボス撃破で最終ボス戦が始まるロジックが必要です。
                         // この endGame(true) は通常レベルクリアとして処理されます。
                         // 最終ボス戦の開始ロジックは handleKeyDown のLキー部分や、
                         // 通常ボス撃破後のレベルMAXチェック部分に追加する必要があります。
                         // ここでは一旦、通常レベルクリアと同じ挙動にしておきます。
                          message = `Level ${currentLevel} Clear! Preparing for Final Battle! Score: ${score}`;
                          playAgainButton.innerText = `Continue`; // ボタンテキストを変更
                          playAgainButton.onclick = () => {
                              hideMessageBox();
                              // 最終ボス戦を開始する関数をここで呼び出すなど
                              // startFinalBossBattle(); // 仮の関数名
                              // 現状はLキーでスキップして入る想定なので、ここでは何もしないか、
                              // 再度ゲーム画面に戻してLキー入力を待つ形になります。
                              // ゲーム画面に戻す処理：
                                currentGameState = GAME_STATE.PLAYING; // PLAYINGに戻す
                                lastTimestamp = performance.now();
                                animationFrameId = requestAnimationFrame(update);
                                // 必要に応じてプレイヤーの位置リセットなど
                                player.x = GAME_WIDTH / 2 - PLAYER_WIDTH / 2;
                                player.movingLeft = false;
                                player.movingRight = false;
                                player.invincible = false;
                                player.invincibleTimer = 0;
                                player.blinkTimer = 0;
                                invaders = []; // インベーダーは消しておく
                                boss = null; // ボスも消しておく
                                invaderProjectiles = []; // 敵弾も消しておく
                          };
                          canvas.style.display = 'block'; // キャンバスは表示したまま
                           // BGMは停止しない
                    }
                }
            } else {
                // ゲームオーバー（敗北）の場合
                message = `Game Over! Score: ${score}`;
                playAgainButton.innerText = "Play Again";
                playAgainButton.onclick = () => {
                    hideMessageBox();
                    showStartButton(); // 全てのゲーム状態をリセットし、最初の「TAP TO START」画面に戻る
                };
                // 最終クリアまたはゲームオーバー時は背景動画を再表示
                if (backgroundVideo) {
                    backgroundVideo.style.display = 'block';
                    backgroundVideo.currentTime = 0;
                    backgroundVideo.muted = false;
                    backgroundVideo.volume = Howler.volume();
                    backgroundVideo.play().catch(e => console.error("Video playback error on game over/win:", e));
                    backgroundVideo.style.zIndex = -1;
                }
                canvas.style.display = 'none'; // 動画表示のためキャンバスを非表示
                // ★ゲームオーバー時はBGM停止（上記で処理済み）
            }
            showMessage(message);
        }

        // --- Game Loop ---

        function update(timestamp) {
            const deltaTime = (timestamp - lastTimestamp) / 1000; // 秒単位
            lastTimestamp = timestamp;

            // ゲームがロード中、スタート画面、またはゲームオーバー状態の場合は更新処理の大部分をスキップ
            // FINAL_BOSS状態でも更新処理は行います
            if (currentGameState === GAME_STATE.LOADING || currentGameState === GAME_STATE.START_SCREEN || currentGameState === GAME_STATE.GAME_OVER) {
                 draw(); // 静止画でも描画は必要
                 animationFrameId = requestAnimationFrame(update); // ループを継続
                 return; // 更新処理の本体はスキップ
            }

            // --- PLAYING 状態と FINAL_BOSS 状態共通の更新処理 ---

            // Update player position
            if (player.movingLeft && player.x > 0) {
                player.x -= PLAYER_SPEED;
            } else if (player.movingRight && player.x < GAME_WIDTH - player.width) {
                player.x += PLAYER_SPEED;
            } else if (playerTargetX !== null) {
                const targetPlayerCenter = playerTargetX;
                const currentPlayerCenter = player.x + player.width / 2;

                if (Math.abs(targetPlayerCenter - currentPlayerCenter) > PLAYER_SPEED / 2) {
                    if (targetPlayerCenter < currentPlayerCenter) {
                        player.x -= PLAYER_SPEED;
                    } else {
                        player.x += PLAYER_SPEED;
                    }
                }
                // 自機が画面外に出ないようにクランプ
                player.x = Math.max(0, Math.min(player.x, GAME_WIDTH - player.width));
            }

            // Player shooting cooldown
            if (playerShootCooldown > 0) {
                playerShootCooldown -= deltaTime * 60; // フレーム単位で計算（暫定）
            }
            // ポインタが押されている間、クールダウンが完了していれば発射
            if (isPointerDown && playerShootCooldown <= 0) {
                shootProjectile();
            }

            // Update projectiles (自機の弾)
            projectiles.forEach(p => p.y -= PLAYER_PROJECTILE_SPEED);
            projectiles = projectiles.filter(p => p.y > 0);

            // Update invader projectiles (敵弾 - 通常敵とボス、最終ボス含む)
            invaderProjectiles.forEach(p => {
                p.x += p.dx * deltaTime * 60; // dx/dyはフレーム単位速度を想定し、deltaTimeで補正（暫定）
                p.y += p.dy * deltaTime * 60;
            });
            invaderProjectiles = invaderProjectiles.filter(p => p.y < GAME_HEIGHT && p.x > -p.width && p.x < GAME_WIDTH + p.width);

            // Player invincibility timer
            if (player.invincible) {
                player.invincibleTimer++;
                player.blinkTimer++;
                if (player.invincibleTimer >= 120) { // 2 seconds (60 frames/sec * 2)
                    player.invincible = false;
                    player.invincibleTimer = 0;
                    player.blinkTimer = 0; // Reset blink timer
                }
            }

            // --- 各ゲーム状態ごとの固有の更新処理 ---

            // PLAYING 状態の更新処理
            if (currentGameState === GAME_STATE.PLAYING) {
                // ★インベーダーグループ全体の移動処理 (deltaTime対応)
                if (invaders.length > 0) {
                    let minX = Infinity;
                    let maxX = -Infinity;
                    const currentDirection = invaders[0].dx > 0 ? 1 : -1; // 現在の進行方向を明確に

                    invaders.forEach(invader => {
                        invader.x += invader.dx * deltaTime; // deltaTimeを掛けて速度調整
                        minX = Math.min(minX, invader.x);
                        maxX = Math.max(maxX, invader.x + invader.width);
                    });

                    let reverseDirection = false;
                    // 速度に応じて端判定の許容量を調整
                    const penetrationAmount = Math.abs(invaders[0].dx * deltaTime * 2);

                    if (minX < 0 + penetrationAmount && currentDirection < 0) {
                        reverseDirection = true;
                    } else if (maxX > GAME_WIDTH - penetrationAmount && currentDirection > 0) {
                         reverseDirection = true;
                    }

                    if (reverseDirection) {
                        invaders.forEach(invader => {
                            invader.dx *= -1; // 水平速度を反転
                            const nudge = (invader.dx > 0 ? penetrationAmount : -penetrationAmount);
                             invader.x += nudge; // 端からの押し戻し
                        });

                         // 方向転換と同時に下へ移動（時間間隔のチェックは維持）
                        const currentTime = performance.now();
                        if (currentTime - lastInvaderMoveDownTime > INVADER_MOVE_DOWN_INTERVAL) {
                             invaders.forEach(invader => {
                                 invader.y += INVADER_MOVE_DOWN_AMOUNT;
                                 // ゲームオーバー判定
                                 if (invader.y + invader.height > player.y - player.height / 2) { // 自機の中央Y座標あたりで判定
                                     endGame(false); // インベーダーがプレイヤーのラインを超えたらゲームオーバー
                                     return; // ゲームオーバーなので以降の処理は不要
                                 }
                             });
                             lastInvaderMoveDownTime = currentTime;
                        }
                    }

                    // 個々のインベーダーが画面外に出ないようにクランプ
                    invaders.forEach(invader => {
                         invader.x = Math.max(0, Math.min(invader.x, GAME_WIDTH - invader.width));
                    });
                }

                // Invader shooting (PLAYING状態かつインベーダーが存在する場合)
                if (invaders.length > 0) {
                    const randomInvader = invaders[Math.floor(Math.random() * invaders.length)];
                    const baseInvaderShootInterval = 90;
                    const intervalDecreasePerLevel = 3;
                    const currentInvaderShootInterval = Math.max(30, baseInvaderShootInterval - (currentLevel - 1) * intervalDecreasePerLevel);

                    if (Math.random() < 1 / currentInvaderShootInterval) {
                        invaderProjectiles.push({
                            x: randomInvader.x + randomInvader.width / 2 - 2.5,
                            y: randomInvader.y + randomInvader.height,
                            width: 5,
                            height: 10,
                            dx: 0,
                            dy: ENEMY_PROJECTILE_SPEED,
                            type: 'invader'
                        });
                    }
                }

                 // ★★★ここが通常ボス出現のロジックです！★★★
                // インベーダー全滅かつ、まだ通常ボスが生成されていない場合
                if (invaders.length === 0 && !boss && !bossCreatedForThisLevel && currentLevel < MAX_LEVELS) { // MAX_LEVELS未満のレベルでのみ通常ボスを生成
                     console.log(`Invaders cleared on Level ${currentLevel}. Spawning Boss!`); // Debug Log
                     createBoss(); // 通常ボスを生成
                     bossCreatedForThisLevel = true; // このレベルでボスは生成済みとする
                     // 通常ボス出現音があれば再生 (loadedAudio.bossSpawnなど)
                }
                 // ★★★通常ボス出現のロジック、ここまで！★★★


                // Boss movement and shooting (PLAYING状態かつ通常ボスが存在する場合)
                if (boss && !boss.isExploding) { // ボスが爆発中でなければ更新
                    boss.x += boss.dx * deltaTime;

                    if (boss.x + boss.width > GAME_WIDTH || boss.x < 0) {
                        boss.dx *= -1;
                        if (boss.x + boss.width > GAME_WIDTH) boss.x = GAME_WIDTH - boss.width;
                        else if (boss.x < 0) boss.x = 0;
                    }

                    boss.shootTimer++;
                    if (boss.shootTimer >= boss.shootInterval) {
                        // 通常弾
                        invaderProjectiles.push({
                            x: boss.x + boss.width / 2 - 2.5,
                            y: boss.y + boss.height,
                            width: 7, height: 14, dx: 0, dy: ENEMY_PROJECTILE_SPEED * 1.5, type: 'boss_straight'
                        });
                        // 放射状ミサイル
                        const radialCount = BOSS_RADIAL_PROJECTILE_COUNT_BASE + Math.floor(currentLevel / 2);
                        const startAngle = Math.PI / 2 - BOSS_RADIAL_SPREAD_ANGLE / 2;
                        for (let i = 0; i < radialCount; i++) {
                            const angle = startAngle + (radialCount > 1 ? BOSS_RADIAL_SPREAD_ANGLE / (radialCount - 1) : 0) * i; // 弾が1つの場合は角度ステップは0
                            invaderProjectiles.push({
                                x: boss.x + boss.width / 2 - 2.5,
                                y: boss.y + boss.height,
                                width: 7, height: 14, dx: Math.cos(angle) * ENEMY_PROJECTILE_SPEED, dy: Math.sin(angle) * ENEMY_PROJECTILE_SPEED, type: 'boss_radial'
                            });
                        }
                        // if (loadedAudio.bossShoot) { loadedAudio.bossShoot.play(); }
                        boss.shootTimer = 0;
                    }
                } else if (boss && boss.isExploding) { // 通常ボス爆発中
                    boss.explosionTimer++;
                    if (boss.explosionTimer >= boss.explosionDuration) {
                        boss = null; // 爆発アニメーション終了後、ボスを消滅させる
                        score += 5000 * currentLevel; // ボス撃破ボーナス
                        updateScoreDisplay();
                        // 通常レベルクリア判定 (インベーダーと通常ボス両方いない場合) - これは boss=null になった直後にチェック
                        if (invaders.length === 0 && !boss && currentLevel < MAX_LEVELS) {
                            endGame(true); // 通常レベルクリア画面へ移行
                        } else if (invaders.length === 0 && !boss && currentLevel >= MAX_LEVELS) {
                             // MAX_LEVELSで通常ボスを倒した場合の処理
                             // ここで最終ボス戦開始の準備を行うか、endGame(true)でクリアメッセージを出すか選択
                             // 今回はLキーで最終ボス戦にスキップするので、ここでは endGame(true) でクリアメッセージを出すのみにしておく
                             endGame(true); // MAXレベルの通常ボス撃破でも一旦クリア画面へ（本来は最終ボス戦へ）
                        }
                    }
                }

                // 通常レベルクリア判定 (インベーダー全滅かつ通常ボス撃破後)
                // これはボス撃破時の処理内に移動したのでここでは削除
                // if (invaders.length === 0 && !boss && currentLevel < MAX_LEVELS) {
                //     endGame(true);
                // }
            }

            // ★★★ここから FINAL_BOSS 状態の更新処理！★★★
            if (currentGameState === GAME_STATE.FINAL_BOSS && finalBoss) {
                 if (!finalBoss.isExploding) { // 最終ボスが爆発中でなければ更新
                     // 最終ボスの移動ロジック（必要であれば実装、この時点では停止）
                     // finalBoss.x += finalBoss.dx * deltaTime;

                     // 最終ボスの射撃タイマーを更新
                     finalBoss.shootTimer++;
                     finalBoss.radialShootTimer++; // 放射状ミサイル用タイマーも更新

                     // 最終ボスの通常弾の発射
                     if (finalBoss.shootTimer >= finalBoss.shootInterval) {
                         invaderProjectiles.push({
                             x: finalBoss.x + finalBoss.width / 2 - 3.5,
                             y: finalBoss.y + finalBoss.height,
                             width: 7, height: 14, dx: 0, dy: ENEMY_PROJECTILE_SPEED * 1.8, type: 'finalboss_straight'
                         });
                         finalBoss.shootTimer = 0;
                     }

                     // 最終ボスの放射状ミサイルの発射
                     if (finalBoss.radialShootTimer >= finalBoss.radialShootInterval) {
                          const radialCount = BOSS_RADIAL_PROJECTILE_COUNT_BASE + Math.floor(MAX_LEVELS / 5); // 最終ボスなので固定数または最大レベル基準
                          const startAngle = Math.PI / 2 - BOSS_RADIAL_SPREAD_ANGLE / 2;
                          const angleStep = radialCount > 1 ? BOSS_RADIAL_SPREAD_ANGLE / (radialCount - 1) : 0; // 弾が1つの場合は角度ステップは0

                          for (let i = 0; i < radialCount; i++) {
                               const angle = startAngle + i * angleStep;
                               invaderProjectiles.push({
                                    x: finalBoss.x + finalBoss.width / 2 - 3.5,
                                    y: finalBoss.y + finalBoss.height,
                                    width: 7, height: 14, dx: Math.cos(angle) * ENEMY_PROJECTILE_SPEED * 1.5, dy: Math.sin(angle) * ENEMY_PROJECTILE_SPEED * 1.5, type: 'finalboss_radial'
                               });
                          }
                          finalBoss.radialShootTimer = 0;
                     }

                 } else { // 最終ボスが爆発中の処理
                     finalBoss.explosionTimer++;
                     if (finalBoss.explosionTimer >= finalBoss.explosionDuration) {
                         finalBoss = null; // 爆発アニメーション終了後、最終ボスを消滅させる
                         score += 10000 * MAX_LEVELS; // 最終ボス撃破ボーナス
                         updateScoreDisplay();
                         // 最終ゲームクリア処理へ
                         endGame(true); // ゲームクリア
                     }
                 }
            }
            // ★★★ FINAL_BOSS 状態の更新処理、ここまで！★★★

            // Collision detection (PLAYING 状態と FINAL_BOSS 状態の両方でチェック)
            checkCollisions(); // この関数内で FINAL_BOSS 状態の衝突判定も処理されます。

            // ゲームオーバー判定 (ライフ0になったら) - updateの最後の方でチェック
            if (lives <= 0 && currentGameState !== GAME_STATE.GAME_OVER) { // すでにゲームオーバー状態で重複して呼ばれないようにチェックを追加
                endGame(false); // ゲームオーバー
            }

            draw(); // 描画関数を呼び出す
            animationFrameId = requestAnimationFrame(update); // 次のフレームを予約
        }

        // --- Drawing Functions ---
        // ... (draw 関数全体は変更ありません - 前回貼り付けたものと同じ) ...

        function draw() {
            ctx.clearRect(0, 0, GAME_WIDTH, GAME_HEIGHT);

            // Draw player
            // 点滅効果のロジックを追加
            if (player.invincible && player.blinkTimer % 10 < 5) {
                // 非表示期間なので描画しない
            } else {
                if (loadedImages.player) {
                    ctx.drawImage(loadedImages.player, player.x, player.y, player.width, player.height);
                } else {
                    ctx.fillStyle = 'blue';
                    ctx.fillRect(player.x, player.y, player.width, player.height);
                }
            }

            // Draw invaders (PLAYING状態のみ)
            if (currentGameState === GAME_STATE.PLAYING) {
                invaders.forEach(invader => {
                    if (loadedImages.invader) {
                        ctx.drawImage(loadedImages.invader, invader.x, invader.y, invader.width, invader.height);
                    } else {
                        ctx.fillStyle = 'green';
                        ctx.fillRect(invader.x, invader.y, invader.width, invader.height);
                    }
                });
            }

            // Draw boss or boss explosion (PLAYING状態での通常ボスのみ)
            if (currentGameState === GAME_STATE.PLAYING && boss) {
                if (boss.isExploding && loadedImages[boss.explosionImage]) {
                    const frame = Math.floor(boss.explosionTimer / (boss.explosionDuration / 8));
                    const spriteWidth = 256;
                    const spriteHeight = 256;
                    const drawX = boss.x + boss.width / 2 - spriteWidth / 2;
                    const drawY = boss.y + boss.height / 2 - spriteHeight / 2;
                    const drawWidth = spriteWidth;
                    const drawHeight = spriteHeight;
                    ctx.drawImage(
                        loadedImages[boss.explosionImage],
                        frame * spriteWidth, 0, spriteWidth, spriteHeight,
                        drawX, drawY, drawWidth, drawHeight
                    );
                } else if (loadedImages[boss.originalImage]) {
                    ctx.drawImage(loadedImages[boss.originalImage], boss.x, boss.y, boss.width, boss.height);
                    // ボスのHPバーを描画
                    const hpBarWidth = boss.width * 0.8;
                    const hpBarHeight = 5;
                    const hpBarX = boss.x + (boss.width - hpBarWidth) / 2;
                    const hpBarY = boss.y + boss.height + 5;
                    ctx.fillStyle = 'red'; ctx.fillRect(hpBarX, hpBarY, hpBarWidth, hpBarHeight);
                    ctx.fillStyle = 'lime'; ctx.fillRect(hpBarX, hpBarY, hpBarWidth * (boss.hp / BOSS_HP_PER_LEVEL), hpBarHeight);
                    ctx.strokeStyle = '#0f0'; ctx.strokeRect(hpBarX, hpBarY, hpBarWidth, hpBarHeight);
                } else {
                    ctx.fillStyle = 'purple';
                    ctx.fillRect(boss.x, boss.y, boss.width, boss.height);
                }
            }

            // ★★★ここから FINAL_BOSS 状態の描画処理を追加！★★★
             if (currentGameState === GAME_STATE.FINAL_BOSS && finalBoss) {
                 if (finalBoss.isExploding && loadedImages[finalBoss.explosionImage]) {
                     // 最終ボス爆発のアニメーションを描画 (通常ボスと同じロジックを流用)
                     const frame = Math.floor(finalBoss.explosionTimer / (finalBoss.explosionDuration / 8));
                     const spriteWidth = 256;
                     const spriteHeight = 256;
                     const drawX = finalBoss.x + finalBoss.width / 2 - spriteWidth / 2;
                     const drawY = finalBoss.y + finalBoss.height / 2 - spriteHeight / 2;
                     const drawWidth = spriteWidth;
                     const drawHeight = spriteHeight;
                     ctx.drawImage(
                         loadedImages[finalBoss.explosionImage],
                         frame * spriteWidth, 0, spriteWidth, spriteHeight,
                         drawX, drawY, drawWidth, drawHeight
                     );

                 } else if (loadedImages[finalBoss.originalImage]) {
                    // 最終ボスの画像を描画
                    ctx.drawImage(loadedImages[finalBoss.originalImage], finalBoss.x, finalBoss.y, finalBoss.width, finalBoss.height);

                    // 最終ボスのHPバーを描画
                    const hpBarWidth = finalBoss.width * 0.9; // HPバーを少し大きく
                    const hpBarHeight = 7; // HPバーを少し太く
                    const hpBarX = finalBoss.x + (finalBoss.width - hpBarWidth) / 2;
                    const hpBarY = finalBoss.y + finalBoss.height + 10; // 少し下に表示

                    ctx.fillStyle = 'red'; ctx.fillRect(hpBarX, hpBarY, hpBarWidth, hpBarHeight);
                    ctx.fillStyle = 'lime'; ctx.fillRect(hpBarX, hpBarY, hpBarWidth * (finalBoss.hp / (BOSS_HP_PER_LEVEL * MAX_LEVELS)), hpBarHeight); // 最終ボスの最大HPは全レベルの合計HP
                    ctx.strokeStyle = '#0f0'; ctx.strokeRect(hpBarX, hpBarY, hpBarWidth, hpBarHeight);

                 } else {
                     // 画像がない場合の代替描画
                     ctx.fillStyle = 'purple';
                     ctx.fillRect(finalBoss.x, finalBoss.y, finalBoss.width, finalBoss.height);
                 }
             }
            // ★★★ FINAL_BOSS 状態の描画処理、ここまで！★★★

            // Draw projectiles (自機の弾)
            projectiles.forEach(p => {
                ctx.fillStyle = 'yellow';
                ctx.fillRect(p.x, p.y, p.width, p.height);
            });

            // Draw invader projectiles (敵弾 - 通常敵とボス、最終ボス含む)
            invaderProjectiles.forEach(p => {
                ctx.fillStyle = 'red'; // 敵弾の色
                ctx.fillRect(p.x, p.y, p.width, p.height);
            });
        }


        // --- Collision Detection ---
        // ... (checkCollisions 関数全体は変更ありません - 前回貼り付けたものと同じ) ...

        function checkCollisions() {
            // Player projectiles hitting invaders (PLAYING状態のみ)
            if (currentGameState === GAME_STATE.PLAYING) {
                projectiles.forEach((p, pIndex) => {
                    const hitInvaders = [];

                    invaders.forEach((invader) => {
                        if (isColliding(p, invader)) {
                            hitInvaders.push(invader);
                        }
                    });

                    if (hitInvaders.length > 0) {
                        projectiles.splice(pIndex, 1); // Remove projectile

                        hitInvaders.forEach(hitInvader => {
                            const invaderIndex = invaders.indexOf(hitInvader);
                            if (invaderIndex !== -1) {
                                invaders.splice(invaderIndex, 1); // Remove invader
                                score += 100;
                                updateScoreDisplay();
                                // if (loadedAudio.invaderHit) { loadedAudio.invaderHit.play(); }
                            }
                        });
                        return; // projectiles.forEach から抜ける
                    }
                });
            }

            // Player projectiles hitting boss (PLAYING状態での通常ボスのみ)
            if (currentGameState === GAME_STATE.PLAYING && boss && !boss.isExploding) { // ボスが爆発中でなければ判定
                projectiles.forEach((p, pIndex) => {
                    if (isColliding(p, boss)) {
                        projectiles.splice(pIndex, 1); // Remove projectile
                        boss.hp--;
                        // if (loadedAudio.bossHit) { loadedAudio.bossHit.play(); }
                        if (boss.hp <= 0) {
                            boss.isExploding = true; // ボスを爆発状態にする
                            boss.explosionTimer = 0;
                            // if (loadedAudio.bossExplosion) { loadedAudio.bossExplosion.play(); }
                        }
                        return; // ボスに当たったらその弾丸のチェックは終了
                    }
                });
            }

             // ★★★ここからプレイヤーの弾丸が最終ボスに当たる衝突判定を追加！★★★
             if (currentGameState === GAME_STATE.FINAL_BOSS && finalBoss && !finalBoss.isExploding) {
                  projectiles.forEach((p, pIndex) => {
                      if (isColliding(p, finalBoss)) {
                          projectiles.splice(pIndex, 1); // プレイヤーの弾丸を削除
                          finalBoss.hp--; // 最終ボスのHPを減らす
                           // 最終ボス被弾音があれば再生 (loadedAudio.finalBossHitなど)
                           if (finalBoss.hp <= 0) {
                               finalBoss.isExploding = true; // 最終ボスを爆発状態にする
                               finalBoss.explosionTimer = 0;
                               // 最終ボス爆発音があれば再生 (loadedAudio.finalBossExplosionなど)
                               // 最終ボス撃破時の処理は update 関数で行います。
                           }
                          return; // プレイヤーの弾丸のチェックを終了
                      }
                  });
             }
             // ★★★プレイヤーの弾丸が最終ボスに当たる衝突判定の追加、ここまで！★★★


            // Invader projectiles hitting player (PLAYING状態とFINAL_BOSS状態の両方でチェック)
            invaderProjectiles.forEach((ip, ipIndex) => {
                if (!player.invincible && isColliding(ip, player)) {
                    invaderProjectiles.splice(ipIndex, 1); // Remove projectile (safe due to single target)
                    lives--;
                    updateLivesDisplay();
                    player.invincible = true;
                    player.invincibleTimer = 0;
                    player.blinkTimer = 0;
                    // if (loadedAudio.playerHit) { loadedAudio.playerHit.play(); }
                    // ゲームオーバー判定
                    if (lives <= 0 && currentGameState !== GAME_STATE.GAME_OVER) { // すでにゲームオーバー状態で重複して呼ばれないようにチェックを追加
                         endGame(false); // ゲームオーバー
                    }
                    // プレイヤーに当たったらその弾丸のチェックは終了
                    // ※ forEach内でspliceするとインデックスがずれる可能性があるので注意。
                    // シンプルなゲームなので大きな問題になりにくいですが、より頑丈にするなら別の方法が必要。
                    // ここではシンプルさを優先し、処理を続けます。
                }
            });
        }

        function isColliding(rect1, rect2) {
            return rect1.x < rect2.x + rect2.width &&
                rect1.x + rect1.width > rect2.x &&
                rect1.y < rect2.y + rect2.height &&
                rect1.y + rect1.height > rect2.y;
        }


        // --- Input Handling ---

        // ★★★ handleKeyDown 関数全体は変更ありません - 前回貼り付けた、Lキーと最終ボス生成コードを含むものと同じです ★★★
        function handleKeyDown(e) {
            // ゲームプレイ中 (PLAYING) または最終ボス戦中 (FINAL_BOSS) のみキー操作を有効にする
            // この関数の最初の状態チェックは、このままで大丈夫です。
            if (currentGameState !== GAME_STATE.PLAYING) return;

            // ここに既存のキー操作 (矢印キーやスペースキー) の if / else if ブロックがあります
            if (e.key === 'ArrowLeft' || e.key === 'a') {
                player.movingLeft = true;
            } else if (e.key === 'ArrowRight' || e.key === 'd') {
                player.movingRight = true;
            } else if (e.key === ' ' || e.key === 'w') {
                // This is handled by touch/mouse for continuous shooting,
                // but keep for keyboard single shots if desired.
                // Or disable to force touch/mouse for shooting.
                // For now, let's use isPointerDown for shooting logic.
                // If you want keyboard shooting, re-enable the shootProjectile() call here.
                // shootProjectile();
            }
            // ↑↑↑ この既存のキー操作のブロックはここで終わっています ↑↑↑

            // ↓↓↓ ★★★ここから、前回追加したLキーのコードブロック（最終ボスオブジェクト生成を追加済）です！★★★ ↓↓↓
            if (e.key === 'L' || e.key === 'l') { // Lキーが押されたかチェック
                console.log("Level Skip to Final Boss Trigger!"); // Debug Log
                // 現在のゲーム状態が、スキップを許可する状態かチェック
                if (currentGameState !== GAME_STATE.LOADING && currentGameState !== GAME_STATE.START_SCREEN && currentGameState !== GAME_STATE.GAME_OVER && currentGameState !== GAME_STATE.FINAL_BOSS) {
                     console.log("Changing state to FINAL_BOSS"); // Debug Log
                    currentLevel = 30; // デバッグ用にレベルを最終レベルに設定
                    currentGameState = GAME_STATE.FINAL_BOSS; // ゲーム状態を最終ボス戦に設定

                    // ここでインベーダーや通常ボス、敵弾をクリア (もし存在すれば)
                    invaders = [];
                    boss = null;
                    invaderProjectiles = [];

                    updateLevelDisplay(); // レベル表示を更新

                    // ↓↓↓ ★★★ここが、最終ボスオブジェクトの生成コードです！★★★ ↓↓↓
                     finalBoss = {
                         x: GAME_WIDTH / 2 - BOSS_WIDTH / 2, // 中央に配置
                         y: 30, // 上の方に配置
                         width: BOSS_WIDTH * 1.5, // 最終ボスは通常ボスより大きい (サイズは調整可能)
                         height: BOSS_HEIGHT * 1.5, // 最終ボスは通常ボスより大きい (サイズは調整可能)
                         dx: 0, // この時点では動かしません。更新ロジックで動かします。
                         dy: 0, // この時点では動かしません。
                         hp: BOSS_HP_PER_LEVEL * MAX_LEVELS, // 最終ボスのHPは高い (全レベル分のHP相当)
                         shootTimer: 0, // 射撃タイマー
                         shootInterval: Math.max(30, 60 - (MAX_LEVELS - 1) * 5), // 射撃間隔 (難易度調整可能)
                         radialShootTimer: 0, // 放射状ミサイル用タイマー
                         radialShootInterval: Math.max(60, 100 - (MAX_LEVELS - 1) * 8), // 放射状ミサイル間隔 (難易度調整可能)
                         isExploding: false, // 爆発中フラグ
                         explosionTimer: 0, // 爆発タイマー
                         explosionDuration: 60, // 爆発時間 (フレーム単位)
                         originalImage: 'finalBoss', // ★最終ボス画像キーを使用★
                         explosionImage: 'boss_explosion' // 爆発用画像のキー
                     };
                    // ↑↑↑ ★★★ここが、最終ボスオブジェクトの生成コードです！★★★ ↓↓↓

                } else {
                    console.log("Level Skip ignored: Game is not in a state where skip is allowed or already in FINAL_BOSS.");
                }
            }
            // ↑↑↑ ★★★ここまでが、Lキーのコードブロック（最終ボスオブジェクト生成を追加済）です！★★★ ↓↓↓

        } // handleKeyDown 関数の最後の閉じ波括弧


        function handleKeyUp(e) {
             // ゲームプレイ中または最終ボス戦中のみ操作を有効にする
            if (currentGameState !== GAME_STATE.PLAYING && currentGameState !== GAME_STATE.FINAL_BOSS) return;

            if (e.key === 'ArrowLeft' || e.key === 'a') {
                player.movingLeft = false;
            } else if (e.key === 'ArrowRight' || e.key === 'd') {
                player.movingRight = false;
            }
        }

        function handleTouchStart(e) {
             // ゲームプレイ中または最終ボス戦中のみ操作を有効にする
            if (currentGameState !== GAME_STATE.PLAYING && currentGameState !== GAME_STATE.FINAL_BOSS) return;

            e.preventDefault(); // Prevent default touch behaviors like scrolling/zooming

            if (e.touches.length > 0) {
                isPointerDown = true;
            }
        }

        function handleTouchMove(e) {
             // ゲームプレイ中または最終ボス戦中のみ操作を有効にする
            if (currentGameState !== GAME_STATE.PLAYING && currentGameState !== GAME_STATE.FINAL_BOSS || !isPointerDown) return;

            e.preventDefault(); // デフォルトのスクロールやズームを防止

            if (e.touches.length > 0) {
                const touchX = e.touches[0].clientX; // スクリーン座標でのタッチX
                const rect = canvas.getBoundingClientRect(); // Canvasの表示位置とサイズを取得

                // Canvas表示領域基準でのタッチX座標
                let targetXOnCanvas = touchX - rect.left;
                // --- スマートフォン向け端処理ロジック ---
                // 画面端から何ピクセル以内にタッチしたら吸着させるかの閾値（表示ピクセル基準）
                const edgeThreshold = 30;

                if (targetXOnCanvas < edgeThreshold) {
                    playerTargetX = player.width / 2;
                } else if (targetXOnCanvas > rect.width - edgeThreshold) {
                     playerTargetX = GAME_WIDTH - player.width / 2;
                } else {
                    targetXOnCanvas = Math.max(0, Math.min(targetXOnCanvas, rect.width)); // Canvas表示領域内にクランプ
                    const gameToDisplayRatio = rect.width / GAME_WIDTH;
                    playerTargetX = targetXOnCanvas / gameToDisplayRatio;
                }
                // --- 端処理ロジック終了 ---

                // 目標座標がゲーム領域内に収まるようにクランプ（念のため）
                playerTargetX = Math.max(player.width / 2, Math.min(playerTargetX, GAME_WIDTH - player.width / 2));
            }
        }


        function handleTouchEnd() {
             // ゲームプレイ中または最終ボス戦中のみ操作を有効にする
            if (currentGameState !== GAME_STATE.PLAYING && currentGameState !== GAME_STATE.FINAL_BOSS) return;

            isPointerDown = false;
            playerTargetX = null;
        }

        function handleMouseDown(e) {
             // ゲームプレイ中または最終ボス戦中のみ操作を有効にする
            if (currentGameState !== GAME_STATE.PLAYING && currentGameState !== GAME_STATE.FINAL_BOSS) return;

            isPointerDown = true;
            const rect = canvas.getBoundingClientRect();
            let mouseX = e.clientX - rect.left;
             // Canvas表示領域内にクランプ
             mouseX = Math.max(0, Math.min(mouseX, rect.width));
             const gameToDisplayRatio = rect.width / GAME_WIDTH;
            playerTargetX = mouseX / gameToDisplayRatio;
        }

        function handleMouseMove(e) {
             // ゲームプレイ中または最終ボス戦中のみ操作を有効にする
            if (currentGameState !== GAME_STATE.PLAYING && currentGameState !== GAME_STATE.FINAL_BOSS || !isPointerDown) return;

            const rect = canvas.getBoundingClientRect();
            let mouseX = e.clientX - rect.left;
            // Canvas表示領域内にクランプ
             mouseX = Math.max(0, Math.min(mouseX, rect.width));
             const gameToDisplayRatio = rect.width / GAME_WIDTH;
            playerTargetX = mouseX / gameToDisplayRatio;
        }

        function handleMouseUp() {
             // ゲームプレイ中または最終ボス戦中のみ操作を有効にする
            if (currentGameState !== GAME_STATE.PLAYING && currentGameState !== GAME_STATE.FINAL_BOSS) return;

            isPointerDown = false;
            playerTargetX = null;
        }

        function shootProjectile() {
            // ゲームプレイ中または最終ボス戦中のみ発射を許可する
            if (currentGameState !== GAME_STATE.PLAYING && currentGameState !== GAME_STATE.FINAL_BOSS) return;

            // 自機が無敵状態でない、または無敵状態でも発射を許可する場合
            // if (!player.invincible) { // 無敵中は撃てなくするならこのチェックを追加
                 projectiles.push({
                     x: player.x + player.width / 2 - 2.5,
                     y: player.y,
                     width: 5,
                     height: 10,
                     dx: 0, // 弾のdx, dyを追加（放射状などにも対応できるように）
                     dy: -PLAYER_PROJECTILE_SPEED // 上向きなのでマイナス
                 });
                 playerShootCooldown = PLAYER_SHOOT_COOLDOWN_MAX;
                 if (loadedAudio.shoot) {
                     loadedAudio.shoot.play();
                 }
            // } // 無敵中は撃てなくするならこの閉じ括弧が必要
        }


        // Call init when the DOM is fully loaded
        document.addEventListener('DOMContentLoaded', init);

        // ★★★ このscriptタグの中身全てを、お手元のscriptタグの中身全てと置き換えるのはここまでです ★★★
    </script>
</body>
